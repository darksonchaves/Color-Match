<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">

<title>
ColorMatch Pro – OEM MultiBrand Edition
</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#0f0f0f;
  color:#fff;
  font-family:Arial,sans-serif;
  text-align:center;
  padding-bottom:40px;
}

h1{
  margin-top:25px;
  padding:0 15px;
  font-size:42px;
  line-height:1.1;
}

.controls{
  margin-top:25px;
}

button{
  padding:14px 18px;
  margin:6px;
  border:none;
  border-radius:14px;
  background:#232323;
  color:#fff;
  font-size:18px;
  cursor:pointer;
}

button:active{
  transform:scale(0.98);
}

button.active{
  background:#004d40;
}

#cameraWrap{
  width:92%;
  max-width:900px;
  margin:30px auto 0 auto;
  border-radius:22px;
  overflow:hidden;
  border:2px solid #2b2b2b;
  background:#000;
  position:relative;
  aspect-ratio:16/9;
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
  background:#000;
}

#crosshair{
  position:absolute;
  top:50%;
  left:50%;
  width:34px;
  height:34px;
  margin-left:-17px;
  margin-top:-17px;
  border:2px solid #00ffd0;
  border-radius:50%;
  pointer-events:none;
  z-index:5;
}

#status{
  margin-top:22px;
  font-size:22px;
  min-height:30px;
}

.good{
  color:#00ff9d;
}

.warn{
  color:#ffd54f;
}

.bad{
  color:#ff7070;
}

#panel{
  width:92%;
  max-width:900px;
  margin:30px auto 0 auto;
  display:flex;
  gap:20px;
  justify-content:center;
}

.previewBox{
  flex:1;
}

canvas{
  width:100%;
  aspect-ratio:1/1;
  border-radius:18px;
  background:#1c1c1c;
}

.label{
  margin-top:10px;
  font-size:20px;
}

#result{
  width:92%;
  max-width:900px;
  margin:30px auto 0 auto;
  font-size:26px;
  line-height:1.4;
  min-height:70px;
}

</style>

</head>

<body>

<h1>
ColorMatch Pro – OEM MultiBrand Edition
</h1>

<div class="controls">

<button id="btnCamera">
Iniciar Câmera
</button>

<button id="btnUniversal">
Universal
</button>

<button id="btnUniversalLive">
Universal Live
</button>

<button id="btnVoice">
Áudio
</button>

</div>

<div id="cameraWrap">

<video
id="video"
playsinline
webkit-playsinline
muted
autoplay>
</video>

<div id="crosshair"></div>

</div>

<div id="status">
Sistema aguardando inicialização...
</div>

<div id="panel">

<div class="previewBox">

<canvas id="canvasCapture"></canvas>

<div class="label">
Captura
</div>

</div>

<div class="previewBox">

<canvas id="canvasColor"></canvas>

<div class="label">
Cor Detectada
</div>

</div>

</div>

<div id="result">
Aguardando inicialização da câmera...
</div>

<script>

/* =========================================================
   ELEMENTOS
========================================================= */

const video =
document.getElementById("video");

const statusEl =
document.getElementById("status");

const resultEl =
document.getElementById("result");

const canvasCapture =
document.getElementById("canvasCapture");

const canvasColor =
document.getElementById("canvasColor");

const ctxCapture =
canvasCapture.getContext(
  "2d",
  {willReadFrequently:true}
);

const ctxColor =
canvasColor.getContext(
  "2d",
  {willReadFrequently:true}
);

const btnCamera =
document.getElementById("btnCamera");

const btnUniversal =
document.getElementById("btnUniversal");

const btnUniversalLive =
document.getElementById("btnUniversalLive");

/* =========================================================
   CONTROLE
========================================================= */

let stream = null;

let started = false;

let liveMode = false;

let voiceEnabled = true;

let animationId = null;

/* =========================================================
   UNIVERSAL COLORS
========================================================= */

const universalColors = [

{
  name:"Branco",
  rgb:{r:255,g:255,b:255}
},

{
  name:"Preto",
  rgb:{r:0,g:0,b:0}
},

{
  name:"Cinza",
  rgb:{r:128,g:128,b:128}
},

{
  name:"Vermelho",
  rgb:{r:255,g:0,b:0}
},

{
  name:"Rosa",
  rgb:{r:255,g:105,b:180}
},

{
  name:"Azul",
  rgb:{r:0,g:0,b:255}
},

{
  name:"Verde",
  rgb:{r:0,g:255,b:0}
},

{
  name:"Amarelo",
  rgb:{r:255,g:255,b:0}
},

{
  name:"Laranja",
  rgb:{r:255,g:140,b:0}
},

{
  name:"Roxo",
  rgb:{r:128,g:0,b:128}
},

{
  name:"Marrom",
  rgb:{r:101,g:67,b:33}
}

];

/* =========================================================
   RGB -> LAB
========================================================= */

function rgbToLab(r,g,b){

  r /= 255;
  g /= 255;
  b /= 255;

  [r,g,b] = [r,g,b].map(v =>

    v > 0.04045
    ? Math.pow((v+0.055)/1.055,2.4)
    : v/12.92

  );

  let x =
  r*0.4124 +
  g*0.3576 +
  b*0.1805;

  let y =
  r*0.2126 +
  g*0.7152 +
  b*0.0722;

  let z =
  r*0.0193 +
  g*0.1192 +
  b*0.9505;

  x /= 0.95047;
  y /= 1;
  z /= 1.08883;

  [x,y,z] = [x,y,z].map(v =>

    v > 0.008856
    ? Math.cbrt(v)
    : (7.787*v)+(16/116)

  );

  return{

    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)

  };

}

/* =========================================================
   DELTA E
========================================================= */

function deltaE(a,b){

  return Math.sqrt(

    (a.L-b.L)**2 +
    (a.a-b.a)**2 +
    (a.b-b.b)**2

  );

}

/* =========================================================
   PREPARA LAB
========================================================= */

universalColors.forEach(color=>{

  color.lab = rgbToLab(
    color.rgb.r,
    color.rgb.g,
    color.rgb.b
  );

});

/* =========================================================
   SPEAK
========================================================= */

function speak(text){

  if(!voiceEnabled) return;

  if(!window.speechSynthesis) return;

  speechSynthesis.cancel();

  const msg =
  new SpeechSynthesisUtterance(text);

  msg.lang = "pt-BR";

  speechSynthesis.speak(msg);

}

/* =========================================================
   START CAMERA
========================================================= */

async function startCamera(){

  try{

    statusEl.innerHTML =
    "<span class='warn'>Inicializando câmera...</span>";

    if(stream){

      stream.getTracks().forEach(track=>{

        track.stop();

      });

    }

    stream = await navigator.mediaDevices.getUserMedia({

      video:{
        facingMode:{
          ideal:"environment"
        }
      },

      audio:false

    });

    video.srcObject = stream;

    await video.play();

    await new Promise(resolve=>{

      if(video.readyState >= 2){

        resolve();

      }

      else{

        video.onloadeddata = ()=>{

          resolve();

        };

      }

    });

    started = true;

    statusEl.innerHTML =
    "<span class='good'>Câmera iniciada com sucesso</span>";

    resultEl.innerHTML =
    "Sistema pronto para leitura.";

  }

  catch(err){

    console.log(err);

    statusEl.innerHTML =
    "<span class='bad'>Falha ao iniciar câmera</span>";

    resultEl.innerHTML =

    "Safari/iPhone bloqueou a câmera ou permissão negada.";

  }

}

/* =========================================================
   CAPTURE CENTER
========================================================= */

function captureCenter(){

  if(
    !started ||
    !video.videoWidth ||
    !video.videoHeight
  ){
    return null;
  }

  const w =
  video.videoWidth;

  const h =
  video.videoHeight;

  canvasCapture.width = w;
  canvasCapture.height = h;

  ctxCapture.drawImage(
    video,
    0,
    0,
    w,
    h
  );

  const centerX =
  Math.floor(w/2);

  const centerY =
  Math.floor(h/2);

  const size = 24;

  let r=0,g=0,b=0,count=0;

  for(let y=-size;y<=size;y+=3){

    for(let x=-size;x<=size;x+=3){

      const px = centerX + x;
      const py = centerY + y;

      const data =
      ctxCapture.getImageData(
        px,
        py,
        1,
        1
      ).data;

      r += data[0];
      g += data[1];
      b += data[2];

      count++;

    }

  }

  r = Math.round(r/count);
  g = Math.round(g/count);
  b = Math.round(b/count);

  return {r,g,b};

}

/* =========================================================
   DRAW COLOR
========================================================= */

function drawColor(rgb){

  canvasColor.width = 300;
  canvasColor.height = 300;

  ctxColor.fillStyle =

  rgb(${rgb.r},${rgb.g},${rgb.b});

  ctxColor.fillRect(
    0,
    0,
    300,
    300
  );

}

/* =========================================================
   UNIVERSAL DETECT
========================================================= */

function detectUniversal(rgb){

  const targetLab =
  rgbToLab(
    rgb.r,
    rgb.g,
    rgb.b
  );

  let best = null;

  let bestDelta = 999;

  for(const color of universalColors){

    const d =
    deltaE(
      targetLab,
      color.lab
    );

    if(d < bestDelta){

      bestDelta = d;
      best = color;

    }

  }

  return{

    match:best,
    delta:bestDelta

  };

}

/* =========================================================
   ANALYZE
========================================================= */

function analyze(){

  const rgb =
  captureCenter();

  if(!rgb) return;

  drawColor(rgb);

  const result =
  detectUniversal(rgb);

  const similarity =

  Math.max(
    0,
    100 - result.delta
  ).toFixed(1);

  resultEl.innerHTML =

  "<span class='good'>"
  +
  result.match.name
  +
  "</span>"
  +
  "<br>"
  +
  similarity
  +
  "% de similaridade";

  return result.match.name;

}

/* =========================================================
   LIVE LOOP
========================================================= */

function startLive(){

  if(animationId){

    cancelAnimationFrame(animationId);

  }

  function loop(){

    if(liveMode){

      analyze();

      animationId =
      requestAnimationFrame(loop);

    }

  }

  loop();

}

/* =========================================================
   BUTTONS
========================================================= */

btnCamera.addEventListener(

  "click",

  async ()=>{

    await startCamera();

  }

);

btnUniversal.addEventListener(

  "click",

  ()=>{

    liveMode = false;

    const color =
    analyze();

    if(color){

      speak(color);

    }

  }

);

btnUniversalLive.addEventListener(

  "click",

  ()=>{

    if(!started){

      resultEl.innerHTML =
      "Inicie a câmera primeiro.";

      return;
    }

    liveMode = !liveMode;

    btnUniversalLive.classList.toggle(
      "active",
      liveMode
    );

    if(liveMode){

      startLive();

    }

    else{

      cancelAnimationFrame(animationId);

    }

  }

);

/* =========================================================
   TOGGLE VOICE
========================================================= */

document
.getElementById("btnVoice")
.addEventListener(

  "click",

  ()=>{

    voiceEnabled = !voiceEnabled;

    alert(

      "Áudio "
      +
      (
        voiceEnabled
        ? "ativado"
        : "desativado"
      )

    );

  }

);

</script>

</body>
</html>
