<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro - Global Engine v3</title>
<style>
  body{ margin:0; font-family: 'Segoe UI', sans-serif; background:#000; color:#fff; text-align:center; overflow:hidden; }
  #header{ padding: 10px; background: #111; display: flex; justify-content: center; gap: 8px; border-bottom: 1px solid #333; }
  #video-container { position: relative; width: 100%; height: 65vh; background: #000; overflow: hidden; }
  video{ width: 100%; height: 100%; object-fit: contain; }
  button{ padding:10px 14px; border-radius:8px; border:none; background:#222; color:white; font-weight:bold; cursor:pointer; transition: 0.3s; }
  .active{ background:#00ffcc !important; color:#000 !important; box-shadow: 0 0 15px rgba(0,255,204,0.4); }
  #cross{ 
    position:absolute; top:50%; left:50%; width:40px; height:40px; 
    transform:translate(-50%,-50%); border:2px solid #00ffcc; 
    border-radius:50%; pointer-events:none; z-index: 10; 
  }
  #cross::after { content: ''; position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: #00ffcc; border-radius: 50%; transform: translate(-50%, -50%); }
  #display{ font-size: 42px; font-weight: 900; color: #00ffcc; margin: 15px 0; text-transform: uppercase; min-height: 50px; }
  .info { color: #888; font-size: 11px; letter-spacing: 1px; }
</style>
</head>
<body>

<div id="header">
  <button onclick="toggleUniv()" id="btnU">UNIVERSAL: OFF</button>
  <button onclick="calibrate()">CALIBRAR</button>
  <button onclick="toggleVoice()" id="btnV" class="active">🔊 ÁUDIO: ON</button>
</div>

<div id="video-container">
  <video id="v" autoplay playsinline muted></video>
  <div id="cross"></div>
</div>

<div id="display">AGUARDANDO...</div>
<div id="stats" class="info">ESTABILIZAÇÃO DE REFLEXO ATIVA</div>

<canvas id="c" style="display:none;"></canvas>

<script>
const video = document.getElementById('v');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', {willReadFrequently: true});
const display = document.getElementById('display');
const stats = document.getElementById('stats');

let isUniv = false, isVoice = true;
let lastColor = "", stableCount = 0;
let offset = {r:255, g:255, b:255};

// Configuração otimizada para iPhone 12 Pro Max e dispositivos Pro
navigator.mediaDevices.getUserMedia({
    video:{ 
        facingMode:"environment", 
        width: {ideal: 1280},
        exposureMode: "continuous" 
    }
}).then(s => { video.srcObject = s; });

function speak(t) {
    if(!isVoice || !isUniv) return;
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(t);
    msg.lang = 'pt-BR';
    msg.rate = 1.3;
    window.speechSynthesis.speak(msg);
}

function calibrate() {
    const data = getCenterColor();
    offset = {r: data.r, g: data.g, b: data.b};
    speak("Calibrado");
}

function getCenterColor() {
    if (canvas.width !== video.videoWidth) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
    }
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const x = canvas.width / 2;
    const y = canvas.height / 2;
    
    // Amostragem Expandida (11x11) para filtrar ruído e reflexos
    const size = 11;
    const d = ctx.getImageData(x - Math.floor(size/2), y - Math.floor(size/2), size, size).data;
    
    let r=0, g=0, b=0, validPixels=0;

    for(let i=0; i<d.length; i+=4){
        // FILTRO DE ESPECULARIDADE: Ignora pixels que são puro reflexo de luz (muito brancos)
        // Isso impede que o brilho do plástico "lave" a cor real.
        if (d[i] < 245 || d[i+1] < 245 || d[i+2] < 245) {
            r += d[i]; g += d[i+1]; b += d[i+2];
            validPixels++;
        }
    }

    if(validPixels === 0) return { r: d[0], g: d[1], b: d[2] }; // Fallback caso tudo seja brilho
    return { r: r/validPixels, g: g/validPixels, b: b/validPixels };
}

function solveColor(r, g, b) {
    // Aplicação da Calibração
    let nr = (r / (offset.r || 255)) * 255;
    let ng = (g / (offset.g || 255)) * 255;
    let nb = (b / (offset.b || 255)) * 255;
    
    const max = Math.max(nr, ng, nb);
    const min = Math.min(nr, ng, nb);
    const chroma = max - min;
    const lum = (max + min) / 510;

    let h = 0;
    if (chroma !== 0) {
        if (max === nr) h = ((ng - nb) / chroma) % 6;
        else if (max === ng) h = (nb - nr) / chroma + 2;
        else h = (nr - ng) / chroma + 4;
        h = Math.round(h * 60);
        if (h < 0) h += 360;
    }

    // --- LÓGICA DE PRECISÃO V3 ---

    // 1. Neutros com tolerância a sombras
    if (lum < 0.15) return "Preto";
    if (chroma < 20) {
        if (lum > 0.85) return "Branco";
        return "Cinza";
    }

    // 2. Refino Rosa vs Vermelho (Foco do vídeo)
    if (h < 22 || h > 335) {
        // Se a luminosidade for média/alta e o equilíbrio entre R e os outros diminuir, é Rosa.
        // O Vermelho "ganha" se for muito escuro ou muito saturado (chroma alto)
        const density = nr / (ng + nb + 1); 
        if (lum > 0.40 && density < 1.8) {
            return "Rosa";
        }
        return (lum < 0.35) ? "Vermelho Escuro" : "Vermelho";
    }

    // 3. Roxo e Transições
    if (h >= 265 && h <= 305) return "Roxo";
    if (h > 305 && h <= 335) return "Rosa";

    // 4. Outras Categorias
    if (h >= 22 && h < 46) {
        if (lum < 0.38) return "Marrom";
        return "Laranja";
    }
    if (h >= 46 && h < 68) return "Amarelo";
    if (h >= 68 && h < 158) return "Verde";
    if (h >= 158 && h < 265) return "Azul";

    return "Analizando...";
}

function mainLoop() {
    if(video.videoWidth) {
        const rgb = getCenterColor();
        const colorName = solveColor(rgb.r, rgb.g, rgb.b);

        if(isUniv) {
            display.innerText = colorName;
            if(colorName === lastColor && colorName !== "Analizando...") {
                stableCount++;
                if(stableCount === 14) speak(colorName);
            } else {
                lastColor = colorName;
                stableCount = 0;
            }
            stats.innerText = `LUM: ${Math.round(lum*100)}% | R:${Math.round(rgb.r)} G:${Math.round(rgb.g)} B:${Math.round(rgb.b)}`;
        } else {
            display.innerText = `RGB: ${Math.round(rgb.r)},${Math.round(rgb.g)},${Math.round(rgb.b)}`;
        }
    }
    requestAnimationFrame(mainLoop);
}

function toggleUniv() { 
    isUniv = !isUniv; 
    const btn = document.getElementById('btnU');
    btn.classList.toggle('active');
    btn.innerText = isUniv ? "UNIVERSAL: ON" : "UNIVERSAL: OFF";
    if(isUniv) speak("Leitura ativada");
    stableCount = 0;
}

function toggleVoice() { 
    isVoice = !isVoice; 
    document.getElementById('btnV').classList.toggle('active');
    if(!isVoice) window.speechSynthesis.cancel();
}

requestAnimationFrame(mainLoop);
</script>
</body>
</html>
