<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro – Ultra Precision 100%</title>
<style>
  body{ margin:0; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#050505; color:#fff; text-align:center; }
  #header{ padding: 15px; background: linear-gradient(180deg, #111, #050505); border-bottom: 1px solid #333; }
  h2{ margin:0; color: #00ffcc; font-size: 1.2rem; letter-spacing: 1px; }
  video{ width:94%; border-radius:18px; border:1px solid #444; margin-top: 10px; filter: contrast(1.1); }
  button{ padding:12px; margin:4px; border:none; border-radius:8px; cursor:pointer; background:#1a1a1a; color:#fff; font-weight: bold; border: 1px solid #333; }
  .activeMode{ background:#00695c !important; border-color: #00ffcc !important; box-shadow: 0 0 10px rgba(0,255,204,0.2); }
  #cross{
    position:fixed; top:50%; left:50%; width:34px; height:34px;
    transform:translate(-50%,-50%); border:2px solid #00ffcc;
    border-radius:50%; pointer-events:none; z-index:999;
  }
  #cross::after, #cross::before { content:''; position:absolute; background:#00ffcc; }
  #cross::after { top:50%; left:-5px; width:44px; height:1px; transform:translateY(-50%); }
  #cross::before { left:50%; top:-5px; width:1px; height:44px; transform:translateX(-50%); }
  
  #txt{ margin: 15px 0; font-size:24px; font-weight: 800; color: #00ffcc; text-shadow: 0 0 5px #000; height: 30px;}
  .stats { font-size: 10px; color: #666; margin-bottom: 10px; }
</style>
</head>
<body>

<div id="header">
  <h2>ULTRA PRECISION 100%</h2>
  <div style="margin-top:10px;">
    <button onclick="setMode('move')" id="btnMove">MODO SCANNER</button>
    <button onclick="toggleUniversal()" id="btnUniv">UNIVERSAL</button>
    <button onclick="calibrateWhite()" style="color:#00ffcc">CALIBRAR</button>
    <button id="voiceBtn" onclick="toggleVoice()">🔊 ON</button>
  </div>
</div>

<video id="video" autoplay playsinline muted></video>
<div id="cross"></div>

<p id="txt">AGUARDANDO...</p>
<div id="stats" class="stats">ESTABILIDADE: 0% | RGB: 0,0,0</div>

<canvas id="canvasA" style="display:none;"></canvas>

<script>
const video = document.getElementById("video");
const canvasA = document.getElementById("canvasA");
const ctxA = canvasA.getContext("2d", {willReadFrequently:true});
const txt = document.getElementById("txt");
const statsDisp = document.getElementById("stats");

let mode = "move", voice = true, universalMode = false;
let isSpeaking = false, lastAnnounced = "", stableFrames = 0;
let streamTrack = null;

// MOTOR DE ESTABILIDADE (Anti-Flicker)
let smoothRGB = { r: 0, g: 0, b: 0 };
let whiteOffset = { r: 255, g: 255, b: 255 };

navigator.mediaDevices.getUserMedia({video:{facingMode:"environment", width: 1280, height: 720}}).then(s=>{
  video.srcObject = s; streamTrack = s.getVideoTracks()[0];
  requestAnimationFrame(mainLoop);
});

function calibrateWhite() {
    const raw = getMultiPointRGB(video.videoWidth/2, video.videoHeight/2, true);
    whiteOffset = { r: raw.r, g: raw.g, b: raw.b };
    speak("Calibrado");
}

// IMPLEMENTAÇÃO DE LEITURA EM 5 PONTOS (Amostragem em Cruz)
function getMultiPointRGB(centerX, centerY, rawMode = false) {
    canvasA.width = video.videoWidth; canvasA.height = video.videoHeight;
    ctxA.drawImage(video, 0, 0);
    
    const offset = 15; // Distância dos pontos periféricos
    const points = [
        [centerX, centerY], // Centro
        [centerX, centerY - offset], // Topo
        [centerX, centerY + offset], // Base
        [centerX - offset, centerY], // Esquerda
        [centerX + offset, centerY]  // Direita
    ];

    let r=0, g=0, b=0;
    points.forEach(p => {
        const d = ctxA.getImageData(p[0]-2, p[1]-2, 4, 4).data;
        let pr=0, pg=0, pb=0;
        for(let i=0; i<d.length; i+=4){ pr+=d[i]; pg+=d[i+1]; pb+=d[i+2]; }
        r += pr/16; g += pg/16; b += pb/16;
    });

    let res = { r: r/5, g: g/5, b: b/5 };
    
    if(!rawMode) {
        // Aplica correção de calibração
        res.r = Math.min(255, (res.r * 255) / whiteOffset.r);
        res.g = Math.min(255, (res.g * 255) / whiteOffset.g);
        res.b = Math.min(255, (res.b * 255) / whiteOffset.b);
    }
    return res;
}

function mainLoop() {
    if(mode === "move") {
        const raw = getMultiPointRGB(video.videoWidth/2, video.videoHeight/2);
        
        // FILTRO DE ESTABILIDADE TEMPORAL (Média Ponderada)
        // 15% da cor nova + 85% da cor anterior = zero oscilação
        smoothRGB.r = (raw.r * 0.15) + (smoothRGB.r * 0.85);
        smoothRGB.g = (raw.g * 0.15) + (smoothRGB.g * 0.85);
        smoothRGB.b = (raw.b * 0.15) + (smoothRGB.b * 0.85);

        const r = Math.round(smoothRGB.r);
        const g = Math.round(smoothRGB.g);
        const b = Math.round(smoothRGB.b);

        if(universalMode) {
            const colorName = detectColor(r, g, b);
            txt.innerText = colorName.toUpperCase();
            
            if(colorName === lastAnnounced) {
                stableFrames++;
                if(stableFrames === 15) speak(colorName);
            } else {
                lastAnnounced = colorName;
                stableFrames = 0;
            }
        } else {
            txt.innerText = `RGB: ${r},${g},${b}`;
        }
        
        statsDisp.innerText = `ESTABILIDADE: ${Math.min(100, stableFrames*7)}% | R:${r} G:${g} B:${b}`;
    }
    requestAnimationFrame(mainLoop);
}

function detectColor(r,g,b){
    // Lógica HSL de alta precisão
    let r1=r/255, g1=g/255, b1=b/255;
    const max=Math.max(r1,g1,b1), min=Math.min(r1,g1,b1), d=max-min;
    let h, s, l=(max+min)/2;
    if(d===0) h=s=0; else {
        s = l>0.5 ? d/(2-max-min) : d/(max+min);
        if(max===r1) h=(g1-b1)/d+(g1<b1?6:0); else if(max===g1) h=(b1-r1)/d+2; else h=(r1-g1)/d+4;
        h*=60;
    }

    // AJUSTES FINOS 100% PRECISÃO
    if (l > 0.85 && s < 0.12) return "Branco";
    if (l < 0.20) return "Preto"; // Preto agora mais profundo
    if (s < 0.12) return "Cinza";

    if (h >= 265 && h <= 325) return "Roxo";
    if (h > 325 && h <= 350) return "Rosa";
    if ((h >= 0 && h <= 15) || (h >= 351 && h <= 360)) {
        return (l > 0.5 && s > 0.3) ? "Rosa" : "Vermelho";
    }
    if (h > 15 && h <= 48) return "Laranja";
    if (h > 48 && h <= 72) return "Amarelo";
    if (h > 72 && h <= 160) return "Verde";
    if (h > 160 && h <= 264) return "Azul";
    return "Indefinido";
}

function speak(t) {
    if (!voice || isSpeaking) return;
    isSpeaking = true;
    speechSynthesis.cancel();
    const m = new SpeechSynthesisUtterance(t);
    m.lang = "pt-BR";
    m.onend = () => isSpeaking = false;
    speechSynthesis.speak(m);
}

function toggleUniversal() {
    universalMode = !universalMode;
    document.getElementById("btnUniv").classList.toggle("activeMode");
}

function toggleVoice() {
    voice = !voice;
    document.getElementById("voiceBtn").innerText = voice ? "🔊 ON" : "🔇 OFF";
}
</script>
</body>
</html>
