<script>

/* ================= ELEMENTOS ================= */

const video = document.getElementById("video");
const canvasA = document.getElementById("canvasA");
const canvasB = document.getElementById("canvasB");
const ctxA = canvasA.getContext("2d");
const ctxB = canvasB.getContext("2d");
const cross = document.getElementById("cross");
const txt = document.getElementById("txt");

/* ================= CONTROLE ================= */

let mode = "static";
let voice = true;
let lastSpeak = "";
let compareA = null;
let compareALab = null;
let compareStep = 0;
let selectedDatabaseColor = null;
let universalMode = false;

/* ================= FLASH ================= */

let streamTrack = null;
let flashOn = false;
let flashBusy = false;
let processingPaused = false;

/* ================= CAMERA ================= */

navigator.mediaDevices.getUserMedia({
  video:{
    facingMode:{
      ideal:"environment"
    }
  },
  audio:false
})
.then(stream=>{
  video.srcObject = stream;
  streamTrack = stream.getVideoTracks()[0];
})
.catch(()=>{
  alert("Erro ao acessar câmera");
});

/* ================= VOZ ================= */

function speak(text){

  if(!voice) return;

  if(lastSpeak === text) return;

  lastSpeak = text;

  speechSynthesis.cancel();

  const msg = new SpeechSynthesisUtterance(text);

  msg.lang = "pt-BR";

  speechSynthesis.speak(msg);
}

/* ================= AUDIO ================= */

function toggleVoice(){

  voice = !voice;

  lastSpeak = "";

  alert(
    "Áudio: " +
    (voice ? "ON" : "OFF")
  );
}

/* ================= UNIVERSAL ================= */

function toggleUniversalMode(){

  universalMode = !universalMode;

  const btn = document.getElementById("universalBtn");

  if(universalMode){

    btn.innerText = "Universal ON";

    btn.classList.add("activeMode");

    txt.innerText = "Modo universal ativado";

    speak("Modo universal ativado");

  }else{

    btn.innerText = "Universal OFF";

    btn.classList.remove("activeMode");

    txt.innerText = "Modo universal desativado";

    speak("Modo universal desativado");
  }
}

/* ================= FLASH ================= */

async function toggleFlash(){

  if(flashBusy) return;

  if(!streamTrack){

    alert("Câmera não iniciada");
    return;
  }

  flashBusy = true;

  processingPaused = true;

  try{

    const capabilities = streamTrack.getCapabilities();

    if(!capabilities.torch){

      alert("Flash não suportado");

      processingPaused = false;
      flashBusy = false;

      return;
    }

    flashOn = !flashOn;

    await streamTrack.applyConstraints({
      advanced:[
        {
          torch:flashOn
        }
      ]
    });

    await new Promise(resolve=>
      setTimeout(resolve,700)
    );

  }catch(e){

    flashOn = false;

    alert("Falha no flash");
  }

  processingPaused = false;

  setTimeout(()=>{
    flashBusy = false;
  },500);
}

/* ================= RGB -> LAB ================= */

function rgbToLab(r,g,b){

  r/=255;
  g/=255;
  b/=255;

  [r,g,b]=[r,g,b].map(v=>
    v>0.04045
    ? Math.pow((v+0.055)/1.055,2.4)
    : v/12.92
  );

  let x =
  r*0.4124 +
  g*0.3576 +
  b*0.1805;

  let y =
  r*0.2126 +
  g*0.7152 +
  b*0.0722;

  let z =
  r*0.0193 +
  g*0.1192 +
  b*0.9505;

  x/=0.95047;
  y/=1;
  z/=1.08883;

  [x,y,z]=[x,y,z].map(v=>
    v>0.008856
    ? Math.cbrt(v)
    : (7.787*v)+(16/116)
  );

  return{
    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)
  };
}

/* ================= DELTA E ================= */

function deltaE(a,b){

  return Math.sqrt(
    (a.L-b.L)**2 +
    (a.a-b.a)**2 +
    (a.b-b.b)**2
  );
}

/* ================= DATABASE ================= */

const oemDatabase = [

{
  brand:"Toyota",
  model:"Corolla",
  year:"2024",
  code:"040",
  name:"Super White II",
  rgb:{r:244,g:244,b:241}
},

{
  brand:"Toyota",
  model:"Corolla",
  year:"2024",
  code:"1F7",
  name:"Classic Silver Metallic",
  rgb:{r:169,g:173,b:177}
},

{
  brand:"Toyota",
  model:"Corolla",
  year:"2024",
  code:"218",
  name:"Midnight Black Metallic",
  rgb:{r:27,g:27,b:27}
},

{
  brand:"Toyota",
  model:"Corolla",
  year:"2024",
  code:"3U5",
  name:"Emotional Red",
  rgb:{r:126,g:31,b:36}
},

{
  brand:"Toyota",
  model:"Hilux",
  year:"2024",
  code:"040",
  name:"Super White II",
  rgb:{r:244,g:244,b:241}
},

{
  brand:"Toyota",
  model:"Hilux",
  year:"2024",
  code:"1G3",
  name:"Graphite Metallic",
  rgb:{r:92,g:95,b:102}
},

{
  brand:"Toyota",
  model:"SW4",
  year:"2024",
  code:"070",
  name:"White Pearl",
  rgb:{r:247,g:247,b:244}
}

];

/* ================= PREPARA LAB ================= */

oemDatabase.forEach(item=>{

  item.lab = rgbToLab(
    item.rgb.r,
    item.rgb.g,
    item.rgb.b
  );

});

/* ================= FILTRO UNIVERSAL ================= */

function applyUniversalFilter(r,g,b){

  return {
    r:r,
    g:g,
    b:b
  };
}

/* ================= CAPTURA ================= */

function captureRaw(x,y){

  if(
    !video.videoWidth ||
    processingPaused
  ){
    return {r:0,g:0,b:0};
  }

  canvasA.width = video.videoWidth;
  canvasA.height = video.videoHeight;

  ctxA.drawImage(video,0,0);

  const s = 12;

  const data = ctxA.getImageData(
    x-s,
    y-s,
    s*2,
    s*2
  ).data;

  let r=0,g=0,b=0,c=0;

  for(let i=0;i<data.length;i+=4){

    r += data[i];
    g += data[i+1];
    b += data[i+2];

    c++;
  }

  return {
    r:Math.round(r/c),
    g:Math.round(g/c),
    b:Math.round(b/c)
  };
}

/* ================= NOME SIMPLES ================= */

function detectSimpleColor(r,g,b){

  if(r > 200 && g > 200 && b > 200){
    return "Branco";
  }

  if(r < 50 && g < 50 && b < 50){
    return "Preto";
  }

  if(r > g && r > b){
    return "Vermelho";
  }

  if(g > r && g > b){
    return "Verde";
  }

  if(b > r && b > g){
    return "Azul";
  }

  return "Cor detectada";
}

/* ================= OEM MATCH ================= */

function detectOEM(sig){

  const targetLab = rgbToLab(sig.r,sig.g,sig.b);

  let best = null;

  let bestDelta = 999;

  for(const color of oemDatabase){

    const d = deltaE(targetLab,color.lab);

    if(d < bestDelta){

      bestDelta = d;
      best = color;
    }
  }

  return {
    match:best,
    delta:bestDelta
  };
}

/* ================= ANALYZER ================= */

function analyzeOEM(){

  const sig = captureRaw(
    video.videoWidth/2,
    video.videoHeight/2
  );

  const result = detectOEM(sig);

  const similarity = Math.max(
    0,
    100 - result.delta
  ).toFixed(1);

  const text =
  result.match.brand
  + " | "
  + result.match.model
  + " | "
  + result.match.year
  + " | "
  + result.match.code
  + " | "
  + result.match.name
  + " | "
  + similarity
  + "%";

  txt.innerText = text;

  speak(result.match.name);
}

/* ================= PESQUISA ================= */

function searchBrand(){

  const brand =
  document.getElementById("brandSearch")
  .value
  .trim()
  .toLowerCase();

  const models =
  [...new Set(

    oemDatabase

    .filter(item=>
      item.brand.toLowerCase()
      .includes(brand)
    )

    .map(item=>item.model)

  )]
  .sort();

  const select = document.getElementById("modelSelect");

  select.innerHTML =
  `<option value="">
  Selecione o modelo
  </option>`;

  models.forEach(model=>{

    select.innerHTML +=
    `<option value="${model}">
      ${model}
    </option>`;

  });

  document.getElementById("resultList")
  .innerHTML = "";
}

/* ================= MOSTRAR CORES ================= */

function showModelColors(){

  const model =
  document.getElementById("modelSelect")
  .value;

  const resultList =
  document.getElementById("resultList");

  resultList.innerHTML = "";

  const colors =
  oemDatabase
  .filter(item=>item.model===model)
  .sort((a,b)=>
    a.name.localeCompare(b.name)
  );

  colors.forEach((item,index)=>{

    resultList.innerHTML +=

    `<div
    class="item"
    onclick="selectDatabaseColor(${index},'${item.name}')">

      <span
      class="colorBox"
      style="
      background:rgb(
      ${item.rgb.r},
      ${item.rgb.g},
      ${item.rgb.b}
      )">
      </span>

      <strong>${item.name}</strong>

      <br>

      Código:
      ${item.code}

      <br>

      Ano:
      ${item.year}

      <br>

      Modelo:
      ${item.model}

      <br>

      Montadora:
      ${item.brand}

    </div>`;

  });
}

/* ================= SELECIONA COR DATABASE ================= */

function selectDatabaseColor(index,colorName){

  const model =
  document.getElementById("modelSelect")
  .value;

  const colors =
  oemDatabase
  .filter(item=>item.model===model)
  .sort((a,b)=>
    a.name.localeCompare(b.name)
  );

  selectedDatabaseColor = colors[index];

  txt.innerText =
  "Cor de referência selecionada: "
  + colorName;

  speak(colorName);
}

/* ================= COMPARAR DATABASE ================= */

function compareWithDatabase(sig){

  if(!selectedDatabaseColor){

    alert(
      "Selecione uma cor da base de dados primeiro"
    );

    return;
  }

  const targetLab = rgbToLab(sig.r,sig.g,sig.b);

  const similarity =
  Math.max(
    0,
    100 -
    deltaE(
      targetLab,
      selectedDatabaseColor.lab
    )
  )
  .toFixed(1);

  const result =
  "BASE OEM: "
  + selectedDatabaseColor.name
  + " | NOVA AMOSTRA: "
  + similarity
  + "% similar";

  txt.innerText = result;

  speak(
    similarity
    + " porcento similar"
  );
}

/* ================= MOVIMENTO ================= */

function moveLoop(){

  if(mode !== "move") return;

  if(processingPaused){

    requestAnimationFrame(moveLoop);
    return;
  }

  const sig = captureRaw(
    video.videoWidth/2,
    video.videoHeight/2
  );

  const colorName = detectSimpleColor(
    sig.r,
    sig.g,
    sig.b
  );

  txt.innerText =
  "Movimento: " + colorName;

  speak(colorName);

  requestAnimationFrame(moveLoop);
}

/* ================= MODOS ================= */

function setMode(m){

  mode = m;

  compareStep = 0;

  compareA = null;

  compareALab = null;

  lastSpeak = "";

  cross.style.display =
  (
    m === "move" ||
    m === "comparePoint" ||
    m === "compareDatabase"
  )
  ? "block"
  : "none";

  if(m === "comparePoint"){

    txt.innerText =
    "Modo: COMPARAR PONTO A PONTO";
  }

  else if(m === "compareDatabase"){

    txt.innerText =
    "Modo: COMPARAR COM BASE DE DADOS";
  }

  else{

    txt.innerText =
    "Modo: " + m.toUpperCase();
  }

  if(m === "move"){
    moveLoop();
  }
}

/* ================= CLIQUE ================= */

video.addEventListener("click",(e)=>{

  if(processingPaused) return;

  const rect = video.getBoundingClientRect();

  const x =
  (e.clientX - rect.left)
  *
  (video.videoWidth / rect.width);

  const y =
  (e.clientY - rect.top)
  *
  (video.videoHeight / rect.height);

  const sig = captureRaw(x,y);

/* ================= ESTATICO ================= */

  if(mode === "static"){
    analyzeOEM();
  }

/* ================= COMPARAR PONTO A PONTO ================= */

  if(mode === "comparePoint"){

    if(compareStep === 0){

      compareA = sig;

      compareALab = rgbToLab(
        sig.r,
        sig.g,
        sig.b
      );

      compareStep = 1;

      txt.innerText =
      "Primeiro ponto capturado";

      speak(
        "Primeiro ponto capturado"
      );

    }

    else{

      const compareBLab = rgbToLab(
        sig.r,
        sig.g,
        sig.b
      );

      const similarity =
      Math.max(
        0,
        100 -
        deltaE(
          compareALab,
          compareBLab
        )
      );

      txt.innerText =
      "Similaridade entre pontos: "
      +
      similarity.toFixed(1)
      +
      "%";

      speak(
        similarity.toFixed(1)
        + " porcento similar"
      );

      compareStep = 0;
    }
  }

/* ================= COMPARAR DATABASE ================= */

  if(mode === "compareDatabase"){
    compareWithDatabase(sig);
  }

});

</script>
