<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
ColorMatch Pro – OEM MultiBrand Edition
</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
  text-align:center;
}

h2{
  margin-top:15px;
  padding:0 10px;
}

video{
  width:92%;
  border-radius:12px;
  border:2px solid #333;
  background:#000;
  object-fit:cover;
}

button{
  padding:12px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#222;
  color:#fff;
  font-size:15px;
}

button:hover{
  background:#333;
}

button.active{
  background:#004d40;
}

#txt{
  margin-top:15px;
  font-size:18px;
  padding:10px;
  line-height:1.5;
}

.good{
  color:#00ff99;
}

.bad{
  color:#ff6666;
}

.warn{
  color:#ffcc00;
}

#cross{
  position:fixed;
  top:50%;
  left:50%;
  width:26px;
  height:26px;
  transform:translate(-50%,-50%);
  border:2px solid #00ffcc;
  border-radius:50%;
  display:none;
  pointer-events:none;
  z-index:999;
}

#panel{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:20px;
}

canvas{
  width:160px;
  height:160px;
  border-radius:10px;
  background:#222;
  margin:10px;
}

.previewLabel{
  margin-top:5px;
}

</style>

</head>

<body>

<h2>
ColorMatch Pro – OEM MultiBrand Edition
</h2>

<button id="btnCamera">
Iniciar Câmera
</button>

<button id="btnUniversal"
onclick="setMode('universal')">
Universal
</button>

<button id="btnUniversalMove"
onclick="setMode('universalMove')">
Universal Live
</button>

<button onclick="toggleVoice()">
Áudio
</button>

<br><br>

<video
id="video"
playsinline
webkit-playsinline
muted>
</video>

<div id="cross"></div>

<div id="panel">

<div>
<canvas id="canvasA"></canvas>
<div class="previewLabel">
Captura
</div>
</div>

<div>
<canvas id="canvasB"></canvas>
<div class="previewLabel">
Cor Detectada
</div>
</div>

</div>

<p id="txt">
Aguardando inicialização da câmera...
</p>

<script>

/* ================= ELEMENTOS ================= */

const video =
document.getElementById("video");

const canvasA =
document.getElementById("canvasA");

const canvasB =
document.getElementById("canvasB");

const ctxA =
canvasA.getContext(
"2d",
{willReadFrequently:true}
);

const ctxB =
canvasB.getContext(
"2d",
{willReadFrequently:true}
);

const txt =
document.getElementById("txt");

const cross =
document.getElementById("cross");

const btnCamera =
document.getElementById("btnCamera");

const btnUniversal =
document.getElementById("btnUniversal");

const btnUniversalMove =
document.getElementById("btnUniversalMove");

/* ================= CONTROLE ================= */

let voice = true;

let mode = "universal";

let streamTrack = null;

let loopRunning = false;

let cameraStarted = false;

/* ================= CORES UNIVERSAIS ================= */

const universalColors = [

{
name:"Vermelho",
rgb:{r:255,g:0,b:0}
},

{
name:"Rosa",
rgb:{r:255,g:105,b:180}
},

{
name:"Azul",
rgb:{r:0,g:0,b:255}
},

{
name:"Verde",
rgb:{r:0,g:255,b:0}
},

{
name:"Amarelo",
rgb:{r:255,g:255,b:0}
},

{
name:"Laranja",
rgb:{r:255,g:140,b:0}
},

{
name:"Roxo",
rgb:{r:128,g:0,b:128}
},

{
name:"Branco",
rgb:{r:255,g:255,b:255}
},

{
name:"Preto",
rgb:{r:0,g:0,b:0}
},

{
name:"Cinza",
rgb:{r:128,g:128,b:128}
}

];

/* ================= RGB -> LAB ================= */

function rgbToLab(r,g,b){

r/=255;
g/=255;
b/=255;

[r,g,b]=[r,g,b].map(v=>

v>0.04045
? Math.pow((v+0.055)/1.055,2.4)
: v/12.92

);

let x =
r*0.4124 +
g*0.3576 +
b*0.1805;

let y =
r*0.2126 +
g*0.7152 +
b*0.0722;

let z =
r*0.0193 +
g*0.1192 +
b*0.9505;

x/=0.95047;
z/=1.08883;

[x,y,z]=[x,y,z].map(v=>

v>0.008856
? Math.cbrt(v)
: (7.787*v)+(16/116)

);

return{

L:(116*y)-16,
a:500*(x-y),
b:200*(y-z)

};

}

/* ================= DELTA ================= */

function deltaE(a,b){

return Math.sqrt(

(a.L-b.L)**2 +
(a.a-b.a)**2 +
(a.b-b.b)**2

);

}

/* ================= PREPARA LAB ================= */

universalColors.forEach(c=>{

c.lab = rgbToLab(
c.rgb.r,
c.rgb.g,
c.rgb.b
);

});

/* ================= CAMERA ================= */

async function startCamera(){

try{

txt.innerHTML =
"<span class='warn'>Iniciando câmera...</span>";

const stream =

await navigator.mediaDevices.getUserMedia({

video:{
facingMode:{
ideal:"environment"
},
width:{
ideal:1280
},
height:{
ideal:720
}
},

audio:false

});

video.srcObject = stream;

streamTrack =
stream.getVideoTracks()[0];

await video.play();

cameraStarted = true;

canvasA.width = 160;
canvasA.height = 160;

canvasB.width = 160;
canvasB.height = 160;

txt.innerHTML =
"<span class='good'>Câmera iniciada com sucesso</span>";

btnCamera.innerText =
"Câmera Ativa";

btnCamera.disabled = true;

}

catch(e){

console.log(e);

txt.innerHTML =
"<span class='bad'>Falha ao acessar câmera</span>";

alert(
"Permita o acesso da câmera no navegador e recarregue a página."
);

}

}

btnCamera.addEventListener(
"click",
startCamera
);

/* ================= CAPTURA ================= */

function captureRaw(){

if(
!cameraStarted ||
!video.videoWidth
){

return null;

}

ctxA.drawImage(
video,
0,
0,
160,
160
);

const data =
ctxA.getImageData(
72,
72,
16,
16
).data;

let r=0,g=0,b=0;

for(let i=0;i<data.length;i+=4){

r += data[i];
g += data[i+1];
b += data[i+2];

}

const total =
data.length / 4;

r = Math.round(r/total);
g = Math.round(g/total);
b = Math.round(b/total);

return {r,g,b};

}

/* ================= UNIVERSAL ================= */

function detectUniversal(sig){

const targetLab =
rgbToLab(
sig.r,
sig.g,
sig.b
);

let best = null;

let bestDelta = 999;

for(const color of universalColors){

const d =
deltaE(
targetLab,
color.lab
);

if(d < bestDelta){

bestDelta = d;
best = color;

}

}

return{

match:best,
delta:bestDelta

};

}

/* ================= PREVIEW ================= */

function drawPreview(r,g,b){

ctxB.fillStyle =
rgb(${r},${g},${b});

ctxB.fillRect(
0,
0,
160,
160
);

}

/* ================= ANALISADOR ================= */

function analyzeUniversal(){

const sig =
captureRaw();

if(!sig) return;

drawPreview(
sig.r,
sig.g,
sig.b
);

const result =
detectUniversal(sig);

const similarity =

Math.max(
0,
100 - result.delta
).toFixed(1);

txt.innerHTML =

"<span class='good'>"
+
result.match.name
+
" | "
+
similarity
+
"%"
+
"</span>";

}

/* ================= LOOP ================= */

function universalLoop(){

if(mode !== "universalMove"){

loopRunning = false;
return;

}

analyzeUniversal();

setTimeout(()=>{

requestAnimationFrame(
universalLoop
);

},80);

}

/* ================= MODOS ================= */

function clearButtons(){

btnUniversal.classList.remove("active");

btnUniversalMove.classList.remove("active");

}

function setMode(m){

mode = m;

clearButtons();

if(m==="universal"){

btnUniversal.classList.add("active");

cross.style.display = "none";

txt.innerHTML =
"<span class='good'>Modo Universal ativado</span>";

}

if(m==="universalMove"){

btnUniversalMove.classList.add("active");

cross.style.display = "block";

txt.innerHTML =
"<span class='good'>Modo Universal Live ativado</span>";

if(!loopRunning){

loopRunning = true;

universalLoop();

}

}

}

/* ================= CLIQUE ================= */

video.addEventListener(
"click",
()=>{

if(mode==="universal"){

analyzeUniversal();

}

}
);

/* ================= ÁUDIO ================= */

function toggleVoice(){

voice = !voice;

alert(
"Áudio: "
+
(voice ? "ON" : "OFF")
);

}

/* ================= INICIAL ================= */

setMode("universal");

</script>

</body>
</html>
