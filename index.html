<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro ENGINE v4</title>

<style>
body { text-align:center; font-family:Arial; background:#111; color:#fff; }
video { width:90%; border-radius:10px; }
#colorBox { width:120px; height:120px; margin:15px auto; border-radius:10px; border:2px solid #fff; }
</style>
</head>

<body>

<h2>Color Engine v4 🚗 (Industrial Core)</h2>

<button onclick="calibrate()">Calibrar Iluminação</button>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<div id="colorBox"></div>
<p id="colorText">---</p>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let whiteRef = null;
let buffer = [];

// -------------------------
// CAMERA
// -------------------------
navigator.mediaDevices.getUserMedia({
  video: { facingMode: { ideal: "environment" } }
}).then(stream => video.srcObject = stream);

// -------------------------
// CALIBRAÇÃO (BASE DE LUZ)
// -------------------------
function calibrate(){
  sampleFrame((r,g,b)=>{
    whiteRef = {r,g,b};
    alert("Calibração de iluminação aplicada");
  });
}

// -------------------------
// REMOÇÃO DE REFLEXO (IMPORTANTE AUTOMOTIVO)
// -------------------------
function isValidPixel(r,g,b){
  const avg = (r+g+b)/3;
  if(avg > 245) return false; // brilho extremo (reflexo)
  if(avg < 5) return false;   // sombra total
  return true;
}

// -------------------------
// RGB -> LAB (base correta já mantida)
// -------------------------
function rgbToLab(r,g,b){

  r/=255; g/=255; b/=255;

  [r,g,b]=[r,g,b].map(v=>{
    return v>0.04045?Math.pow((v+0.055)/1.055,2.4):v/12.92;
  });

  let x=r*0.4124 + g*0.3576 + b*0.1805;
  let y=r*0.2126 + g*0.7152 + b*0.0722;
  let z=r*0.0193 + g*0.1192 + b*0.9505;

  x/=0.95047; y/=1.00000; z/=1.08883;

  [x,y,z]=[x,y,z].map(v=>{
    return v>0.008856?Math.cbrt(v):(7.787*v)+(16/116);
  });

  return {
    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)
  };
}

// -------------------------
// DELTA E
// -------------------------
function deltaE(l1,l2){
  return Math.sqrt(
    (l1.L-l2.L)**2 +
    (l1.a-l2.a)**2 +
    (l1.b-l2.b)**2
  );
}

// -------------------------
// BASE DE CORES
// -------------------------
const colors = [
  {name:"Vermelho", lab:rgbToLab(255,0,0)},
  {name:"Verde", lab:rgbToLab(0,255,0)},
  {name:"Azul", lab:rgbToLab(0,0,255)},
  {name:"Amarelo", lab:rgbToLab(255,255,0)},
  {name:"Laranja", lab:rgbToLab(255,165,0)},
  {name:"Roxo", lab:rgbToLab(128,0,128)},
  {name:"Branco", lab:rgbToLab(255,255,255)},
  {name:"Preto", lab:rgbToLab(0,0,0)},
  {name:"Cinza", lab:rgbToLab(128,128,128)}
];

// -------------------------
// SEPARAÇÃO LUMINÂNCIA / CROMINÂNCIA (ESSENCIAL)
// -------------------------
function normalizeColor(r,g,b){

  const ref = whiteRef || {r:255,g:255,b:255};

  // correção de iluminação
  r = (r / ref.r) * 255;
  g = (g / ref.g) * 255;
  b = (b / ref.b) * 255;

  // normalização de energia (reduz influência de brilho)
  const max = Math.max(r,g,b);
  r = r / max * 255;
  g = g / max * 255;
  b = b / max * 255;

  return {r,g,b};
}

// -------------------------
// CAPTURA ROBUSTA (COM FILTRO REAL)
// -------------------------
function sampleFrame(callback){

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  const size = 30;
  const cx = canvas.width/2;
  const cy = canvas.height/2;

  const data = ctx.getImageData(cx-size,cy-size,size*2,size*2).data;

  let pixels = [];

  for(let i=0;i<data.length;i+=4){

    const r = data[i];
    const g = data[i+1];
    const b = data[i+2];

    if(!isValidPixel(r,g,b)) continue;

    pixels.push([r,g,b]);
  }

  if(pixels.length < 10) return;

  // REMOVE OUTLIERS (20% extremos)
  pixels.sort((a,b)=> (a[0]+a[1]+a[2]) - (b[0]+b[1]+b[2]));
  const cut = Math.floor(pixels.length * 0.2);
  pixels = pixels.slice(cut, pixels.length-cut);

  let r=0,g=0,b=0;

  for(const p of pixels){
    r += p[0];
    g += p[1];
    b += p[2];
  }

  r/=pixels.length;
  g/=pixels.length;
  b/=pixels.length;

  const norm = normalizeColor(r,g,b);

  callback(norm.r, norm.g, norm.b);
}

// -------------------------
// ESTABILIZAÇÃO TEMPORAL REAL (VARIÂNCIA)
// -------------------------
function getStable(callback){

  sampleFrame((r,g,b)=>{

    buffer.push([r,g,b]);

    if(buffer.length > 9){
      buffer.shift();
    }

    if(buffer.length < 6) return;

    // cálculo de média + variância
    let rs = buffer.map(v=>v[0]);
    let gs = buffer.map(v=>v[1]);
    let bs = buffer.map(v=>v[2]);

    const avg = arr => arr.reduce((a,b)=>a+b)/arr.length;
    const variance = arr => {
      const m = avg(arr);
      return avg(arr.map(v=> (v-m)**2));
    };

    const rMean = avg(rs);
    const gMean = avg(gs);
    const bMean = avg(bs);

    const v = variance(rs) + variance(gs) + variance(bs);

    const confidence = Math.max(0, 100 - v / 10);

    callback(rMean, gMean, bMean, confidence);
  });
}

// -------------------------
// DETECÇÃO FINAL
// -------------------------
function detect(r,g,b){

  const lab = rgbToLab(r,g,b);

  let best = {name:"Indefinida", d:999};

  for(const c of colors){
    const d = deltaE(lab,c.lab);
    if(d < best.d){
      best = {name:c.name, d};
    }
  }

  return best;
}

// -------------------------
// INTERAÇÃO
// -------------------------
video.addEventListener('click',()=>{

  getStable((r,g,b,conf)=>{

    const result = detect(r,g,b);

    const color = `rgb(${r},${g},${b})`;

    document.getElementById('colorBox').style.background = color;

    document.getElementById('colorText').innerText =
      `${result.name} | conf: ${conf.toFixed(1)}%`;
  });
});

</script>

</body>
</html>
