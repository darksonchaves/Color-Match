<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro - Universal v7.7 (Elite)</title>
<style>
  body{ margin:0; font-family: 'Segoe UI', sans-serif; background:#000; color:#fff; text-align:center; overflow:hidden; }
  #header{ padding: 12px; background: #0a0a0a; display: flex; justify-content: center; gap: 10px; border-bottom: 2px solid #1a1a1a; }
  #video-container { position: relative; width: 100%; height: 65vh; background: #000; }
  video{ width: 100%; height: 100%; object-fit: contain; }
  button{ padding:12px 18px; border-radius:10px; border:none; background:#1a1a1a; color:#888; font-weight:bold; cursor:pointer; transition: 0.4s; border: 1px solid #333; }
  .active{ background:#00ffcc !important; color:#000 !important; box-shadow: 0 0 20px rgba(0,255,204,0.3); border: 1px solid #00ffcc; }
  #cross{ position:absolute; top:50%; left:50%; width:34px; height:34px; transform:translate(-50%,-50%); border:3px solid #00ffcc; border-radius:50%; pointer-events:none; z-index: 10; box-shadow: 0 0 15px #00ffcc; }
  #display{ font-size: 56px; font-weight: 900; color: #00ffcc; margin: 20px 0; text-transform: uppercase; letter-spacing: -2px; }
  .info { color: #666; font-size: 11px; font-weight: bold; }
</style>
</head>
<body>

<div id="header">
  <button onclick="toggleUniv()" id="btnU">UNIVERSAL: OFF</button>
  <button onclick="calibrate()">CALIBRAR NO BRANCO</button>
  <button onclick="toggleVoice()" id="btnV" class="active">ÁUDIO: ON</button>
</div>

<div id="video-container">
  <video id="v" autoplay playsinline muted></video>
  <div id="cross"></div>
</div>

<div id="display">AGUARDANDO</div>
<div id="stats" class="info">V7.7 | ANALISADOR DE PIGMENTO DE ALTA PRECISÃO</div>

<canvas id="c" style="display:none;"></canvas>

<script>
const video = document.getElementById('v');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', {willReadFrequently: true});
const display = document.getElementById('display');
const stats = document.getElementById('stats');

let isUniv = false, isVoice = true, lastColor = "", stableCount = 0;
let offset = {r:255, g:255, b:255}, colorHistory = []; 

navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment", width: {ideal: 1280}, frameRate: {ideal: 60} }
}).then(s => { video.srcObject = s; });

function speak(t) {
    if(!isVoice || !isUniv) return;
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(t);
    msg.lang = 'pt-BR';
    msg.rate = 1.6;
    window.speechSynthesis.speak(msg);
}

function calibrate() {
    const data = getCenterColor();
    offset = {r: data.r, g: data.g, b: data.b};
    speak("Branco de referência calibrado");
}

function getCenterColor() {
    if (canvas.width !== video.videoWidth) {
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    }
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const x = canvas.width / 2, y = canvas.height / 2;
    const d = ctx.getImageData(x - 6, y - 6, 12, 12).data;
    let r=0, g=0, b=0, v=0;
    for(let i=0; i<d.length; i+=4){
        // Filtro de brilho especular (reflexos de luz direta)
        if ((d[i]+d[i+1]+d[i+2])/3 < 245) {
            r += d[i]; g += d[i+1]; b += d[i+2]; v++;
        }
    }
    return v > 0 ? { r: r/v, g: g/v, b: b/v } : { r: 128, g: 128, b: 128 };
}

function solveColor(r, g, b) {
    // 1. COMPENSAÇÃO DE EXPOSIÇÃO DINÂMICA
    const rawLum = (r + g + b) / 3;
    let nr = r; let ng = g; let nb = b;

    // Se estiver muito claro, expande o contraste para separar pigmento de luz
    if (rawLum > 130) {
        const contrast = 1.25; 
        nr = Math.pow(nr/255, contrast) * 255;
        ng = Math.pow(ng/255, contrast) * 255;
        nb = Math.pow(nb/255, contrast) * 255;
    }

    // 2. NORMALIZAÇÃO PELO BRANCO DA FOLHA SULFITE
    nr = (nr / (offset.r || 255)) * 255;
    ng = (ng / (offset.g || 255)) * 255;
    nb = (nb / (offset.b || 255)) * 255;

    const max = Math.max(nr, ng, nb);
    const min = Math.min(nr, ng, nb);
    const chroma = max - min;
    const brightness = (nr + ng + nb) / 3;

    let h = 0;
    if (chroma > 0) {
        if (max === nr) h = (ng - nb) / chroma + (ng < nb ? 6 : 0);
        else if (max === ng) h = (nb - nr) / chroma + 2;
        else h = (nr - ng) / chroma + 4;
        h *= 60;
    }

    // 3. MATRIZ DE DECISÃO (Fidelidade ao Pigmento)
    
    // Neutros: Travas rigorosas para Branco, Cinza e Preto
    if (chroma < 18) {
        if (brightness < 45) return "Preto";
        if (brightness > 200) return "Branco";
        return "Cinza";
    }

    // Vermelhos e Variações
    if (h < 18 || h > 342) {
        // Diferencia Rosa por saturação de azul/brilho
        if (nb > nr * 0.42 || (brightness > 130 && ng > 60)) return "Rosa";
        return (brightness < 80) ? "Vermelho Escuro" : "Vermelho";
    }
    
    // Marrom / Laranja
    if (h >= 18 && h < 46) {
        return (brightness < 85) ? "Marrom" : "Laranja";
    }
    
    // Amarelo
    if (h >= 46 && h < 64) return "Amarelo";
    
    // Verde (inclui tons turquesa que no Universal caem para verde)
    if (h >= 64 && h < 162) {
        if (h > 150 && nb > ng * 0.8) return "Azul"; 
        return (brightness < 75) ? "Verde Escuro" : "Verde";
    }
    
    // Azul
    if (h >= 162 && h < 265) return "Azul";
    
    // Roxo e Rosa (Zona Crítica)
    if (h >= 265 && h < 318) {
        // Se houver muito vermelho em relação ao azul, a luz está lavando um rosa
        if (nr > nb * 1.25) return "Rosa";
        return "Roxo";
    }
    
    if (h >= 318 && h <= 342) return "Rosa";

    return "Analisando...";
}

function getStableColor(newColor) {
    colorHistory.push(newColor);
    if (colorHistory.length > 35) colorHistory.shift(); // Estabilidade extrema
    return colorHistory.sort((a,b) =>
          colorHistory.filter(v => v===a).length - colorHistory.filter(v => v===b).length
    ).pop();
}

function mainLoop() {
    if(video.videoWidth > 0) {
        const rgb = getCenterColor();
        const colorName = getStableColor(solveColor(rgb.r, rgb.g, rgb.b));

        if(isUniv) {
            display.innerText = colorName;
            if(colorName === lastColor && colorName !== "Analisando...") {
                stableCount++;
                if(stableCount === 35) speak(colorName);
            } else { lastColor = colorName; stableCount = 0; }
        } else {
            display.innerText = "STANDBY";
            stats.innerText = `OFFSET R:${Math.round(offset.r)} G:${Math.round(offset.g)} B:${Math.round(offset.b)}`;
        }
    }
    requestAnimationFrame(mainLoop);
}

function toggleUniv() { 
    isUniv = !isUniv; 
    const btn = document.getElementById('btnU');
    btn.classList.toggle('active');
    btn.innerText = isUniv ? "UNIVERSAL: ON" : "UNIVERSAL: OFF";
    if(isUniv) { speak("Modo espectro ativo"); colorHistory = []; }
}

function toggleVoice() { 
    isVoice = !isVoice; 
    document.getElementById('btnV').classList.toggle('active');
}

requestAnimationFrame(mainLoop);
</script>
</body>
</html>
