<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
>

<title>
ColorMatch Pro – OEM MultiBrand Edition
</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
  text-align:center;
}

h2{
  margin-top:15px;
  padding:0 10px;
}

video{
  width:92%;
  border-radius:12px;
  border:2px solid #333;
  background:#000;
  object-fit:cover;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#222;
  color:#fff;
  font-size:15px;
}

button:hover{
  background:#333;
}

button.active{
  background:#004d40;
}

input,select{
  padding:10px;
  border-radius:8px;
  border:none;
  margin:5px;
  width:90%;
  max-width:420px;
}

#panel{
  display:flex;
  justify-content:space-around;
  flex-wrap:wrap;
  margin-top:15px;
}

.box{
  width:45%;
  min-width:160px;
}

canvas{
  width:100%;
  border-radius:10px;
  background:#222;
}

#cross{
  position:fixed;
  top:50%;
  left:50%;
  width:26px;
  height:26px;
  transform:translate(-50%,-50%);
  border:2px solid #00ffcc;
  border-radius:50%;
  display:none;
  pointer-events:none;
  z-index:999;
}

#databasePanel{
  margin-top:20px;
  padding:15px;
  background:#181818;
  border-top:2px solid #333;
}

#resultList{
  margin-top:10px;
  text-align:left;
  width:90%;
  max-width:700px;
  margin-left:auto;
  margin-right:auto;
  background:#1f1f1f;
  border-radius:10px;
  padding:10px;
}

.item{
  padding:10px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

.item:hover{
  background:#2c2c2c;
}

.colorBox{
  width:18px;
  height:18px;
  display:inline-block;
  border-radius:50%;
  margin-right:8px;
  border:1px solid #fff;
  vertical-align:middle;
}

.selectedColor{
  background:#004d40 !important;
}

#txt{
  margin-top:15px;
  font-size:18px;
  padding:10px;
  line-height:1.5;
}

.good{
  color:#00ff99;
}

.bad{
  color:#ff6666;
}

.warn{
  color:#ffcc00;
}

</style>

</head>

<body>

<h2>
ColorMatch Pro – OEM MultiBrand Edition
</h2>

<button onclick="setMode('static')">
Estático
</button>

<button onclick="setMode('move')">
Movimento
</button>

<button onclick="setMode('universal')">
Universal Sólido
</button>

<button onclick="setMode('universalMove')">
Universal Live
</button>

<button onclick="setMode('comparePoint')">
Comparar Ponto a Ponto
</button>

<button onclick="setMode('compareDatabase')">
Comparar Base de Dados
</button>

<button onclick="analyzeOEM()">
🎨 OEM Scan
</button>

<button onclick="toggleFlash()">
⚡ Flash
</button>

<button onclick="toggleVoice()">
🔊 Áudio
</button>

<br><br>

<video
id="video"
autoplay
playsinline
muted
webkit-playsinline>
</video>

<div id="cross"></div>

<div id="panel">

  <div class="box">
    <canvas id="canvasA"></canvas>
    <div>Referência</div>
  </div>

  <div class="box">
    <canvas id="canvasB"></canvas>
    <div>Comparação</div>
  </div>

</div>

<div id="databasePanel">

<h3>
Pesquisa OEM
</h3>

<input
type="text"
id="brandSearch"
placeholder="Digite a montadora..."
oninput="searchBrand()"
>

<br>

<select id="modelSelect" onchange="showModelColors()">

<option value="">
Selecione o modelo
</option>

</select>

<div id="resultList"></div>

</div>

<p id="txt">
Inicializando câmera...
</p>

<script>

/* ================= ELEMENTOS ================= */

const video =
document.getElementById("video");

const canvasA =
document.getElementById("canvasA");

const canvasB =
document.getElementById("canvasB");

const ctxA =
canvasA.getContext(
  "2d",
  {willReadFrequently:true}
);

const ctxB =
canvasB.getContext(
  "2d",
  {willReadFrequently:true}
);

const cross =
document.getElementById("cross");

const txt =
document.getElementById("txt");

/* ================= CONTROLE ================= */

let mode = "static";

let voice = true;

let compareA = null;
let compareALab = null;
let compareStep = 0;

let selectedDatabaseColor = null;

let streamTrack = null;

let flashOn = false;
let flashBusy = false;

let processingPaused = false;

/* ================= UNIVERSAL ================= */

const universalColors = [

{
  name:"Branco",
  rgb:{r:255,g:255,b:255}
},

{
  name:"Preto",
  rgb:{r:0,g:0,b:0}
},

{
  name:"Cinza",
  rgb:{r:128,g:128,b:128}
},

{
  name:"Vermelho",
  rgb:{r:255,g:0,b:0}
},

{
  name:"Rosa",
  rgb:{r:255,g:105,b:180}
},

{
  name:"Azul",
  rgb:{r:0,g:0,b:255}
},

{
  name:"Verde",
  rgb:{r:0,g:255,b:0}
},

{
  name:"Amarelo",
  rgb:{r:255,g:255,b:0}
},

{
  name:"Laranja",
  rgb:{r:255,g:140,b:0}
},

{
  name:"Roxo",
  rgb:{r:128,g:0,b:128}
},

{
  name:"Marrom",
  rgb:{r:101,g:67,b:33}
}

];

/* ================= CAMERA ================= */

async function startCamera(){

  try{

    txt.innerHTML =
    "<span class='warn'>Inicializando câmera...</span>";

    const stream =

    await navigator.mediaDevices.getUserMedia({

      video:{
        facingMode:{
          ideal:"environment"
        },
        width:{
          ideal:1280
        },
        height:{
          ideal:720
        }
      },

      audio:false

    });

    video.srcObject = stream;

    streamTrack =
    stream.getVideoTracks()[0];

    await video.play();

    txt.innerHTML =
    "<span class='good'>Câmera iniciada com sucesso</span>";

  }

  catch(e){

    console.log(e);

    txt.innerHTML =

    "<span class='bad'>Falha ao acessar câmera</span>";

    alert(
      "Permita acesso à câmera no Safari/Chrome e recarregue a página."
    );

  }

}

window.addEventListener(

  "load",

  ()=>{

    startCamera();

  }

);

/* ================= VOZ ================= */

function speak(text){

  if(!voice) return;

  if(!window.speechSynthesis) return;

  speechSynthesis.cancel();

  const msg =
  new SpeechSynthesisUtterance(text);

  msg.lang = "pt-BR";

  speechSynthesis.speak(msg);

}

/* ================= FLASH ================= */

async function toggleFlash(){

  if(flashBusy) return;

  if(!streamTrack){

    alert("Câmera não iniciada");
    return;
  }

  flashBusy = true;

  try{

    const capabilities =
    streamTrack.getCapabilities();

    if(!capabilities.torch){

      alert("Flash não suportado");

      flashBusy = false;
      return;
    }

    flashOn = !flashOn;

    await streamTrack.applyConstraints({

      advanced:[
        {
          torch:flashOn
        }
      ]

    });

  }

  catch(e){

    flashOn = false;

    alert("Falha no flash");

  }

  setTimeout(()=>{

    flashBusy = false;

  },500);

}

/* ================= RGB -> LAB ================= */

function rgbToLab(r,g,b){

  r/=255;
  g/=255;
  b/=255;

  [r,g,b]=[r,g,b].map(v=>

    v>0.04045
    ? Math.pow((v+0.055)/1.055,2.4)
    : v/12.92

  );

  let x =
  r*0.4124 +
  g*0.3576 +
  b*0.1805;

  let y =
  r*0.2126 +
  g*0.7152 +
  b*0.0722;

  let z =
  r*0.0193 +
  g*0.1192 +
  b*0.9505;

  x/=0.95047;
  y/=1;
  z/=1.08883;

  [x,y,z]=[x,y,z].map(v=>

    v>0.008856
    ? Math.cbrt(v)
    : (7.787*v)+(16/116)

  );

  return{

    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)

  };

}

/* ================= DELTA E ================= */

function deltaE(a,b){

  return Math.sqrt(

    (a.L-b.L)**2 +
    (a.a-b.a)**2 +
    (a.b-b.b)**2

  );

}

/* ================= DATABASE ================= */

const oemDatabase = [

{
  brand:"Toyota",
  model:"Corolla",
  year:"2024",
  code:"040",
  name:"Super White II",
  rgb:{r:244,g:244,b:241}
},

{
  brand:"Toyota",
  model:"Corolla",
  year:"2024",
  code:"1F7",
  name:"Classic Silver Metallic",
  rgb:{r:169,g:173,b:177}
},

{
  brand:"Toyota",
  model:"Corolla",
  year:"2024",
  code:"218",
  name:"Midnight Black Metallic",
  rgb:{r:27,g:27,b:27}
},

{
  brand:"Toyota",
  model:"Corolla",
  year:"2024",
  code:"3U5",
  name:"Emotional Red",
  rgb:{r:126,g:31,b:36}
}

];

/* ================= PREPARA LAB ================= */

oemDatabase.forEach(item=>{

  item.lab = rgbToLab(
    item.rgb.r,
    item.rgb.g,
    item.rgb.b
  );

});

universalColors.forEach(item=>{

  item.lab = rgbToLab(
    item.rgb.r,
    item.rgb.g,
    item.rgb.b
  );

});

/* ================= CAPTURA ================= */

function captureRaw(x,y){

  if(
    !video.videoWidth ||
    !video.videoHeight
  ){

    return{
      r:0,
      g:0,
      b:0,
      variance:999
    };

  }

  canvasA.width =
  video.videoWidth;

  canvasA.height =
  video.videoHeight;

  ctxA.drawImage(
    video,
    0,
    0,
    video.videoWidth,
    video.videoHeight
  );

  const samples = [];

  const area = 14;

  for(let sy=-area; sy<=area; sy+=2){

    for(let sx=-area; sx<=area; sx+=2){

      const px = Math.floor(x + sx);
      const py = Math.floor(y + sy);

      if(
        px < 0 ||
        py < 0 ||
        px >= video.videoWidth ||
        py >= video.videoHeight
      ){
        continue;
      }

      const data =
      ctxA.getImageData(
        px,
        py,
        1,
        1
      ).data;

      samples.push({

        r:data[0],
        g:data[1],
        b:data[2]

      });

    }

  }

  let r=0,g=0,b=0;

  samples.forEach(s=>{

    r += s.r;
    g += s.g;
    b += s.b;

  });

  r = Math.round(r/samples.length);
  g = Math.round(g/samples.length);
  b = Math.round(b/samples.length);

  let variance = 0;

  samples.forEach(s=>{

    variance +=

    Math.abs(s.r-r) +
    Math.abs(s.g-g) +
    Math.abs(s.b-b);

  });

  variance =
  variance / samples.length;

  drawPreview(r,g,b);

  return{
    r,
    g,
    b,
    variance
  };

}

/* ================= PREVIEW ================= */

function drawPreview(r,g,b){

  canvasA.width = 200;
  canvasA.height = 200;

  ctxA.fillStyle =
  rgb(${r},${g},${b});

  ctxA.fillRect(0,0,200,200);

  canvasB.width = 200;
  canvasB.height = 200;

  ctxB.fillStyle =
  rgb(${r},${g},${b});

  ctxB.fillRect(0,0,200,200);

}

/* ================= OEM MATCH ================= */

function detectOEM(sig){

  const targetLab =
  rgbToLab(
    sig.r,
    sig.g,
    sig.b
  );

  let best = null;
  let bestDelta = 999;

  for(const color of oemDatabase){

    const d =
    deltaE(
      targetLab,
      color.lab
    );

    if(d < bestDelta){

      bestDelta = d;
      best = color;

    }

  }

  return{
    match:best,
    delta:bestDelta
  };

}

/* ================= UNIVERSAL MATCH ================= */

function detectUniversal(sig){

  if(sig.variance > 15){

    return{
      blocked:true
    };

  }

  const targetLab =
  rgbToLab(
    sig.r,
    sig.g,
    sig.b
  );

  let best = null;
  let bestDelta = 999;

  for(const color of universalColors){

    const d =
    deltaE(
      targetLab,
      color.lab
    );

    if(d < bestDelta){

      bestDelta = d;
      best = color;

    }

  }

  return{
    blocked:false,
    match:best,
    delta:bestDelta
  };

}

/* ================= ANALYZER OEM ================= */

function analyzeOEM(){

  const sig =
  captureRaw(
    video.videoWidth/2,
    video.videoHeight/2
  );

  const result =
  detectOEM(sig);

  const similarity =

  Math.max(
    0,
    100 - result.delta
  ).toFixed(1);

  txt.innerText =

  result.match.name
  + " | "
  + similarity
  + "%";

  speak(result.match.name);

}

/* ================= ANALYZER UNIVERSAL ================= */

function analyzeUniversal(){

  const sig =
  captureRaw(
    video.videoWidth/2,
    video.videoHeight/2
  );

  const result =
  detectUniversal(sig);

  if(result.blocked){

    txt.innerHTML =

    "<span class='warn'>Aproxime de uma cor sólida uniforme</span>";

    return;
  }

  const similarity =

  Math.max(
    0,
    100 - result.delta
  ).toFixed(1);

  txt.innerHTML =

  "<span class='good'>"
  + result.match.name
  + " | "
  + similarity
  + "%"
  + "</span>";

  speak(result.match.name);

}

/* ================= UNIVERSAL LIVE ================= */

function universalLoop(){

  if(mode !== "universalMove") return;

  analyzeUniversal();

  requestAnimationFrame(universalLoop);

}

/* ================= MOVIMENTO ================= */

function moveLoop(){

  if(mode !== "move") return;

  const sig =

  captureRaw(
    video.videoWidth/2,
    video.videoHeight/2
  );

  txt.innerText =

  `RGB:
  ${sig.r},
  ${sig.g},
  ${sig.b}`;

  requestAnimationFrame(moveLoop);

}

/* ================= MODOS ================= */

function setMode(m){

  mode = m;

  compareStep = 0;

  compareA = null;

  compareALab = null;

  cross.style.display =

  (
    m === "move" ||
    m === "comparePoint" ||
    m === "compareDatabase" ||
    m === "universalMove"
  )

  ? "block"
  : "none";

  txt.innerText =
  "Modo: " + m;

  if(m === "move"){
    moveLoop();
  }

  if(m === "universalMove"){
    universalLoop();
  }

  if(m === "universal"){
    analyzeUniversal();
  }

}

/* ================= CLIQUE ================= */

video.addEventListener("click",(e)=>{

  if(
    !video.videoWidth ||
    !video.videoHeight
  ){
    return;
  }

  const rect =
  video.getBoundingClientRect();

  const x =

  (e.clientX - rect.left)
  *
  (video.videoWidth / rect.width);

  const y =

  (e.clientY - rect.top)
  *
  (video.videoHeight / rect.height);

  const sig =
  captureRaw(x,y);

/* ================= ESTATICO ================= */

  if(mode === "static"){

    analyzeOEM();
  }

/* ================= UNIVERSAL ================= */

  if(mode === "universal"){

    analyzeUniversal();
  }

/* ================= COMPARAR PONTO ================= */

  if(mode === "comparePoint"){

    if(compareStep === 0){

      compareA = sig;

      compareALab =

      rgbToLab(
        sig.r,
        sig.g,
        sig.b
      );

      compareStep = 1;

      txt.innerText =
      "Primeiro ponto capturado";

      speak(
        "Primeiro ponto capturado"
      );

    }

    else{

      const compareBLab =

      rgbToLab(
        sig.r,
        sig.g,
        sig.b
      );

      const similarity =

      Math.max(
        0,
        100 -
        deltaE(
          compareALab,
          compareBLab
        )
      );

      txt.innerText =

      "Similaridade: "
      +
      similarity.toFixed(1)
      +
      "%";

      speak(
        similarity.toFixed(1)
        + " porcento similar"
      );

      compareStep = 0;
    }
  }

});

/* ================= AUDIO ================= */

function toggleVoice(){

  voice = !voice;

  alert(
    "Áudio: "
    +
    (voice ? "ON" : "OFF")
  );
}

/* ================= PESQUISA ================= */

function searchBrand(){

  const brand =

  document.getElementById("brandSearch")
  .value
  .trim()
  .toLowerCase();

  const models =

  [...new Set(

    oemDatabase

    .filter(item=>

      item.brand.toLowerCase()
      .includes(brand)

    )

    .map(item=>item.model)

  )]

  .sort();

  const select =
  document.getElementById("modelSelect");

  select.innerHTML =

  `<option value="">
  Selecione o modelo
  </option>`;

  models.forEach(model=>{

    select.innerHTML +=

    `<option value="${model}">
      ${model}
    </option>`;

  });

  document.getElementById("resultList")
  .innerHTML = "";
}

/* ================= MOSTRAR CORES ================= */

function showModelColors(){

  const model =
  document.getElementById("modelSelect")
  .value;

  const resultList =
  document.getElementById("resultList");

  resultList.innerHTML = "";

  const colors =

  oemDatabase

  .filter(item=>item.model===model)

  .sort((a,b)=>
    a.name.localeCompare(b.name)
  );

  colors.forEach((item,index)=>{

    resultList.innerHTML +=

    `<div class="item">

      <span
      class="colorBox"
      style="
      background:rgb(
      ${item.rgb.r},
      ${item.rgb.g},
      ${item.rgb.b}
      )">
      </span>

      <strong>${item.name}</strong>

      <br>

      Código:
      ${item.code}

      <br>

      Ano:
      ${item.year}

    </div>`;

  });

}

</script>

</body>
</html>
