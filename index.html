<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"


<title>
ColorMatch Pro – OEM MultiBrand Edition
</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
  text-align:center;
}

h2{
  margin-top:15px;
  font-size:28px;
}

#videoContainer{
  position:relative;
  display:inline-block;
  width:92%;
  max-width:900px;
  overflow:hidden;
  border-radius:12px;
}

/* ================= VIDEO ================= */

video{
  width:100%;
  min-height:260px;
  border-radius:12px;
  border:2px solid #333;
  object-fit:cover;
  background:#000;
  display:block;

  position:relative;
  z-index:1;
}

/* ================= OVERLAY ================= */

#cross,
.pointMarker{
  position:absolute;
  z-index:9999;
  pointer-events:none;
}

/* ================= MIRA CENTRAL ================= */

#cross{
  top:50%;
  left:50%;
  width:46px;
  height:46px;
  transform:translate(-50%,-50%);
  display:none;
}

#cross::before,
#cross::after{
  content:"";
  position:absolute;
  background:#00ffcc;
  box-shadow:0 0 12px #00ffcc;
}

#cross::before{
  left:50%;
  top:0;
  width:3px;
  height:100%;
  transform:translateX(-50%);
}

#cross::after{
  top:50%;
  left:0;
  width:100%;
  height:3px;
  transform:translateY(-50%);
}

/* ================= MARCADORES ================= */

.pointMarker{
  width:30px;
  height:30px;
  border-radius:50%;
  transform:translate(-50%,-50%);
  display:none;
  box-sizing:border-box;
}

#pointA{
  border:4px solid #ffee58;

  box-shadow:
  0 0 12px #ffee58,
  0 0 25px rgba(255,238,88,0.5);
}

#pointB{
  border:4px solid #ff5252;

  box-shadow:
  0 0 12px #ff5252,
  0 0 25px rgba(255,82,82,0.5);
}

#pointA::after,
#pointB::after{
  content:"";
  position:absolute;
  top:50%;
  left:50%;
  width:8px;
  height:8px;
  border-radius:50%;
  transform:translate(-50%,-50%);
}

#pointA::after{
  background:#ffee58;
}

#pointB::after{
  background:#ff5252;
}

/* ================= BOTÕES ================= */

button{
  padding:10px 14px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#222;
  color:#fff;
  font-size:15px;
}

button:hover{
  background:#333;
}

.activeMode{
  background:#00695c !important;
}

input,select{
  padding:10px;
  border-radius:8px;
  border:none;
  margin:5px;
  width:90%;
  max-width:420px;
}

/* ================= PAINEL ================= */

#panel{
  display:flex;
  justify-content:space-around;
  flex-wrap:wrap;
  margin-top:15px;
}

.box{
  width:45%;
  min-width:160px;
}

canvas{
  width:100%;
  height:140px;
  border-radius:10px;
  background:#222;
}

/* ================= DATABASE ================= */

#databasePanel{
  margin-top:20px;
  padding:15px;
  background:#181818;
  border-top:2px solid #333;
}

#resultList{
  margin-top:10px;
  text-align:left;
  width:90%;
  max-width:700px;
  margin-left:auto;
  margin-right:auto;
  background:#1f1f1f;
  border-radius:10px;
  padding:10px;
}

.item{
  padding:10px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

.item:hover{
  background:#2c2c2c;
}

.colorBox{
  width:18px;
  height:18px;
  display:inline-block;
  border-radius:50%;
  margin-right:8px;
  border:1px solid #fff;
  vertical-align:middle;
}

#txt{
  margin-top:15px;
  font-size:18px;
  padding:10px;
  min-height:40px;
}

#universalPanel{
  margin-top:15px;
  padding:10px;
  background:#181818;
  border-top:2px solid #333;
}

#cameraStatus{
  margin-top:10px;
  color:#00ffcc;
  font-size:15px;
}

</style>

</head>

<body>

<h2>
ColorMatch Pro – OEM MultiBrand Edition
</h2>

<button onclick="setMode('static')">
Estático
</button>

<button onclick="setMode('move')">
Movimento
</button>

<button onclick="setMode('comparePoint')">
Comparar Ponto a Ponto
</button>

<button onclick="setMode('compareDatabase')">
Comparar Base de Dados
</button>

<button onclick="analyzeOEM()">
🎨 OEM Scan
</button>

<button onclick="toggleFlash()">
⚡ Flash
</button>

<button onclick="toggleVoice()">
🔊 Áudio
</button>

<br><br>

<div id="universalPanel">

<h3>
Modo Universal
</h3>

<button
id="universalBtn"
onclick="toggleUniversalMode()"

Universal OFF
</button>

<p style="font-size:14px;color:#aaa;">
Reconhecimento puro baseado na leitura real da câmera
</p>

</div>

<div id="videoContainer">

<video
id="video"
autoplay
playsinline
muted
</video>


<!-- MIRA -->
<div id="cross"></div>

<!-- MARCADORES -->
<div
id="pointA"
class="pointMarker"
</div>


<div
id="pointB"
class="pointMarker"
</div>


</div>

<div id="cameraStatus">
Aguardando câmera...
</div>

<div id="panel">

<div class="box">
<canvas id="canvasA"></canvas>
<div>Referência</div>
</div>

<div class="box">
<canvas id="canvasB"></canvas>
<div>Comparação</div>
</div>

</div>

<div id="databasePanel">

<h3>
Pesquisa OEM
</h3>

<input
type="text"
id="brandSearch"
placeholder="Digite a montadora..."
oninput="searchBrand()"


<br>

<select
id="modelSelect"
onchange="showModelColors()"


<option value="">
Selecione o modelo
</option>

</select>

<div id="resultList"></div>

</div>

<p id="txt">
Inicializando câmera...
</p>

<script>

/* ================= ELEMENTOS ================= */

const video =
document.getElementById("video");

const videoContainer =
document.getElementById("videoContainer");

const canvasA =
document.getElementById("canvasA");

const canvasB =
document.getElementById("canvasB");

const ctxA =
canvasA.getContext(
"2d",
{willReadFrequently:true}
);

const ctxB =
canvasB.getContext(
"2d",
{willReadFrequently:true}
);

const cross =
document.getElementById("cross");

const pointA =
document.getElementById("pointA");

const pointB =
document.getElementById("pointB");

const txt =
document.getElementById("txt");

const cameraStatus =
document.getElementById("cameraStatus");

/* ================= CONTROLE ================= */

let mode = "static";

let moveRunning = false;

let processingPaused = false;

/* ================= CAMERA ================= */

async function startCamera(){

  try{

    const stream =
    await navigator.mediaDevices.getUserMedia({

      video:{
        facingMode:{
          ideal:"environment"
        },
        width:{ideal:1280},
        height:{ideal:720}
      },

      audio:false

    });

    video.srcObject = stream;

    await video.play();

    cameraStatus.innerText =
    "Câmera ativa";

    txt.innerText =
    "Câmera iniciada com sucesso";

  }catch(e){

    console.error(e);

    cameraStatus.innerText =
    "Falha ao iniciar câmera";

    txt.innerText =
    "Erro ao acessar câmera";

    alert(
      "Permita acesso à câmera"
    );
  }
}

window.addEventListener(
"load",
()=>{
  startCamera();
}
);

/* ================= MOVE ================= */

function moveLoop(){

  if(mode !== "move"){

    moveRunning = false;
    return;
  }

  cross.style.display = "block";

  requestAnimationFrame(
    moveLoop
  );
}

/* ================= MODOS ================= */

function setMode(m){

  mode = m;

  pointA.style.display = "none";
  pointB.style.display = "none";

  if(
    m === "move" ||
    m === "comparePoint" ||
    m === "compareDatabase"
  ){

    cross.style.display = "block";

  }else{

    cross.style.display = "none";
  }

  txt.innerText =
  "Modo: " + m;

  if(
    m === "move" &&
    !moveRunning
  ){

    moveRunning = true;

    moveLoop();
  }
}

/* ================= CLICK ================= */

video.addEventListener(
"click",
(e)=>{

  if(processingPaused) return;

  if(!video.videoWidth) return;

  const rect =
  video.getBoundingClientRect();

  const markerX =

  (
    (e.clientX - rect.left)
    / rect.width
  )

  *
  videoContainer.offsetWidth;

  const markerY =

  (
    (e.clientY - rect.top)
    / rect.height
  )

  *
  videoContainer.offsetHeight;

  if(mode === "comparePoint"){

    if(
      pointA.style.display ===
      "none"
    ){

      pointA.style.left =
      markerX + "px";

      pointA.style.top =
      markerY + "px";

      pointA.style.display =
      "block";

      pointB.style.display =
      "none";

      txt.innerText =
      "Primeiro ponto marcado";

    }else{

      pointB.style.left =
      markerX + "px";

      pointB.style.top =
      markerY + "px";

      pointB.style.display =
      "block";

      txt.innerText =
      "Segundo ponto marcado";
    }
  }

});

</script>

</body>
</html>
