<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro – Visual Compare Engine</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
  text-align:center;
}

h2 {
  margin:10px;
}

#video {
  width:90%;
  border-radius:10px;
}

#controls button {
  padding:10px;
  margin:5px;
}

/* ÁREA DAS IMAGENS */
#panel {
  display:flex;
  justify-content:space-around;
  margin-top:15px;
  flex-wrap:wrap;
}

.box {
  width:45%;
  min-width:160px;
}

canvas {
  width:100%;
  border-radius:10px;
  background:#222;
}

.label {
  margin-top:5px;
  font-size:14px;
  color:#aaa;
}
</style>
</head>

<body>

<h2>ColorMatch Pro – Comparação Visual</h2>

<div id="controls">
  <button onclick="setMode('static')">Estático</button>
  <button onclick="setMode('compare')">Comparar</button>
</div>

<video id="video" autoplay playsinline></video>

<!-- PAINEL DE IMAGENS -->
<div id="panel">

  <div class="box">
    <canvas id="canvasA"></canvas>
    <div class="label">Referência</div>
  </div>

  <div class="box">
    <canvas id="canvasB"></canvas>
    <div class="label">Comparação</div>
  </div>

</div>

<p id="txt">Selecione um modo</p>

<script>

const video = document.getElementById("video");

const canvasA = document.getElementById("canvasA");
const ctxA = canvasA.getContext("2d");

const canvasB = document.getElementById("canvasB");
const ctxB = canvasB.getContext("2d");

let mode = "static";
let step = 0;

let sampleA = null;
let sampleB = null;

/* ================= CAMERA ================= */
navigator.mediaDevices.getUserMedia({
  video:{facingMode:"environment"}
}).then(stream=>{
  video.srcObject = stream;
});

/* ================= DETECÇÃO SIMPLES ================= */
function getColor(x,y){

  const c = document.createElement("canvas");
  const ctx = c.getContext("2d");

  c.width = video.videoWidth;
  c.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  const d = ctx.getImageData(x,y,1,1).data;

  return `RGB(${d[0]},${d[1]},${d[2]})`;
}

/* ================= DESENHAR MIRA ================= */
function drawPoint(ctx,x,y,color){

  ctx.strokeStyle = color;
  ctx.fillStyle = color;

  ctx.beginPath();
  ctx.arc(x,y,10,0,Math.PI*2);
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(x,y,3,0,Math.PI*2);
  ctx.fill();
}

/* ================= CLICK ================= */
video.addEventListener("click",(e)=>{

  const rect = video.getBoundingClientRect();

  const x = (e.clientX - rect.left) * (video.videoWidth / rect.width);
  const y = (e.clientY - rect.top) * (video.videoHeight / rect.height);

  /* ================= ESTÁTICO ================= */
  if(mode === "static"){
    const color = getColor(x,y);
    document.getElementById("txt").innerText =
      "Cor detectada: " + color;
  }

  /* ================= COMPARAÇÃO ================= */
  if(mode === "compare"){

    // PRIMEIRA IMAGEM (REFERÊNCIA)
    if(step === 0){

      canvasA.width = video.videoWidth;
      canvasA.height = video.videoHeight;

      ctxA.drawImage(video,0,0);

      const colorA = getColor(x,y);
      sampleA = colorA;

      drawPoint(ctxA,x,y,"lime");

      document.getElementById("txt").innerText =
        "Referência capturada: " + colorA;

      step = 1;
    }

    // SEGUNDA IMAGEM (COMPARAÇÃO)
    else{

      canvasB.width = video.videoWidth;
      canvasB.height = video.videoHeight;

      ctxB.drawImage(video,0,0);

      const colorB = getColor(x,y);
      sampleB = colorB;

      drawPoint(ctxB,x,y,"red");

      const text =
        `Ref: ${sampleA} | Atual: ${sampleB}`;

      document.getElementById("txt").innerText = text;

      step = 0;
    }
  }
});

/* ================= MODO ================= */
function setMode(m){
  mode = m;
  step = 0;
  sampleA = null;
  sampleB = null;

  document.getElementById("txt").innerText =
    "Modo: " + m.toUpperCase();
}

</script>

</body>
</html>
