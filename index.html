<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ColorMatch Pro - v33.0 Ultra Gold</title>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: #fff; overflow: hidden; text-align: center; }
        #header { 
            position: absolute; top: 0; width: 100%; z-index: 20;
            background: rgba(10, 10, 10, 0.95); display: flex; justify-content: center; 
            padding: 10px 0; gap: 5px; border-bottom: 1px solid #333; flex-wrap: wrap;
        }
        button { 
            background: #1a1a1a; color: #aaa; border: 1px solid #444; padding: 8px 12px; 
            border-radius: 6px; font-weight: bold; font-size: 10px; text-transform: uppercase; cursor: pointer;
            transition: all 0.1s ease;
        }
        .active { background: #007bff !important; color: #fff !important; }
        .audio-on { background: #28a745 !important; color: #fff !important; }
        .univ-on { background: #ffc107 !important; color: #000 !important; }

        #video-container { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #crosshair { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border: 2px solid rgba(255,255,255,0.7); border-radius: 50%; pointer-events: none; z-index: 10;
            transition: all 0.1s;
        }
        .mira-livre { width: 16px; height: 16px; }
        .mira-padrao { width: 15vw; height: 15vw; border: 2px dashed rgba(255,255,255,0.6); }
        .locked { border-color: #00ffcc !important; box-shadow: 0 0 20px #00ffcc; background: rgba(0,255,204,0.05); }

        #ui-overlay { position: absolute; bottom: 0; width: 100%; padding: 45px 0; background: linear-gradient(transparent, #000 85%); z-index: 20; }
        #color-name { font-size: 55px; font-weight: 900; text-transform: uppercase; color: #444; min-height: 70px; letter-spacing: 2px; }
        .active-text { color: #00ffcc !important; text-shadow: 0 0 30px rgba(0,255,204,0.7); }
    </style>
</head>
<body>

<div id="header">
    <button onclick="toggleSystem()" id="btnPower">SISTEMA: OFF</button>
    <button onclick="toggleAudio()" id="btnAudio">ÁUDIO: OFF</button>
    <button onclick="toggleUniversal()" id="btnUniv">MODO UNIVERSAL: OFF</button>
    <button onclick="calibrate()" id="btnCalib">CALIBRAR BRANCO</button>
    <button onclick="setMode('LIVRE')" id="btnLivre">MODO LIVRE</button>
    <button onclick="setMode('PADRAO')" id="btnPadrao">MODO PADRÃO</button>
</div>

<div id="video-container">
    <video id="v" autoplay playsinline muted></video>
    <div id="crosshair" class="mira-livre"></div>
</div>

<div id="ui-overlay">
    <div id="color-name">INATIVO</div>
</div>

<canvas id="c" style="display:none;"></canvas>

<script>
    const v = document.getElementById('v'), c = document.getElementById('c');
    const ctx = c.getContext('2d', {willReadFrequently: true, alpha: false});
    const colorTxt = document.getElementById('color-name'), cross = document.getElementById('crosshair');

    let active = false, audioActive = false, universalMode = false, mode = 'LIVRE';
    
    // Balanceamento de ganhos por canal com base em matriz de iluminação ideal
    let balance = { r: 1.0, g: 1.0, b: 1.0, calibrated: false };
    let history = [], lastSpeach = "", isSpeaking = false;

    // Configurações focadas em estabilização de amostragem nativa da câmera
    const constraints = {
        video: {
            facingMode: "environment",
            width: { ideal: 1280 },
            height: { ideal: 720 },
            frameRate: { ideal: 60 }
        }
    };

    navigator.mediaDevices.getUserMedia(constraints)
        .then(s => { v.srcObject = s; })
        .catch(() => {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => v.srcObject = s);
        });

    function toggleSystem() { 
        active = !active; 
        document.getElementById('btnPower').classList.toggle('active', active);
        document.getElementById('btnPower').innerText = `SISTEMA: ${active ? 'ON' : 'OFF'}`;
        if(!active) { colorTxt.innerText = "INATIVO"; colorTxt.className = ""; history = []; }
    }

    function toggleAudio() {
        audioActive = !audioActive;
        document.getElementById('btnAudio').classList.toggle('audio-on', audioActive);
        document.getElementById('btnAudio').innerText = `ÁUDIO: ${audioActive ? 'ON' : 'OFF'}`;
        if(audioActive && active) speak("Áudio ligado");
    }

    function toggleUniversal() {
        universalMode = !universalMode;
        document.getElementById('btnUniv').classList.toggle('univ-on', universalMode);
        document.getElementById('btnUniv').innerText = `MODO UNIVERSAL: ${universalMode ? 'ON' : 'OFF'}`;
        if(audioActive) speak("Universal " + (universalMode ? "On" : "Off"));
    }

    function setMode(m) {
        mode = m;
        document.getElementById('btnLivre').classList.toggle('active', m === 'LIVRE');
        document.getElementById('btnPadrao').classList.toggle('active', m === 'PADRAO');
        cross.className = (m === 'LIVRE' ? 'mira-livre' : 'mira-padrao');
        if(audioActive) speak("Modo " + m);
    }

    function calibrate() {
        if(!active) return;
        c.width = v.videoWidth; c.height = v.videoHeight;
        ctx.drawImage(v, 0, 0);
        
        // Coleta uma matriz de amostragem maior (16x16) para diluir ruídos cromáticos locais do papel
        const size = 16;
        const sample = ctx.getImageData(v.videoWidth/2 - size/2, v.videoHeight/2 - size/2, size, size).data;
        let r=0, g=0, b=0, total=0;
        
        for(let i=0; i<sample.length; i+=4) {
            r+=sample[i]; g+=sample[i+1]; b+=sample[i+2]; total++;
        }
        
        let avgR = r/total, avgG = g/total, avgB = b/total;
        let target = (avgR + avgG + avgB) / 3;
        
        // Aplicação matemática do vetor Von Kries para ajuste do iluminante padrão
        balance.r = target / Math.max(avgR, 1);
        balance.g = target / Math.max(avgG, 1);
        balance.b = target / Math.max(avgB, 1);
        balance.calibrated = true;
        
        history = []; 
        if(audioActive) speak("Calibrado");
    }

    // Tabela de Centroides de Cor no espaço RGB Normalizado (Evita erros de fronteira de ângulos)
    const COLOR_CENTROIDS = [
        { name: "VERMELHO",  r: 0.75, g: 0.12, b: 0.13 },
        { name: "LARANJA",   r: 0.72, g: 0.33, b: 0.10 },
        { name: "AMARELO",   r: 0.60, g: 0.58, b: 0.12 },
        { name: "VERDE",     r: 0.15, g: 0.58, b: 0.25 },
        { name: "AZUL",      r: 0.12, g: 0.35, b: 0.70 },
        { name: "ROXO",      r: 0.38, g: 0.15, b: 0.55 },
        { name: "ROSA",      r: 0.70, g: 0.25, b: 0.52 },
        { name: "MARROM",    r: 0.42, g: 0.24, b: 0.15 }
    ];

    function getFinalColor(rawR, rawG, rawB) {
        // 1. Aplicação Rígida dos Ganhos de Calibração
        let r = Math.min(255, Math.max(0, rawR * balance.r));
        let g = Math.min(255, Math.max(0, rawG * balance.g));
        let b = Math.min(255, Math.max(0, rawB * balance.b));

        let sum = r + g + b;
        let max = Math.max(r, g, b);
        let min = Math.min(r, g, b);
        let rgbDiff = max - min;

        // 2. Extração Absoluta de Tons Neutros (Preto, Branco, Cinza) baseada em Delta Cromático
        if (sum < 50 || (max < 42 && rgbDiff < 18)) return "PRETO";
        if (min > 185 && rgbDiff < 22) return "BRANCO";
        if (rgbDiff < 14 && max > 42 && min < 185) return "CINZA";

        // 3. Normalização Vetorial de Proximidade (Anula variações bruscas de luminosidade)
        let normR = r / (sum || 1);
        let normG = g / (sum || 1);
        let normB = b / (sum || 1);

        // 4. Modo Universal (Redução de Escopo Cromático Direto)
        if (universalMode) {
            if (normR > 0.45 && normG > 0.42) return "AMARELO";
            if (normR > 0.48 && normG > 0.22) return "VERMELHO";
            if (normG > 0.42) return "VERDE";
            if (normB > 0.42) return "AZUL";
            if (normR > 0.38 && normB > 0.35) return "ROXO";
            if (normR > 0.42 && normB > 0.28) return "ROSA";
        }

        // 5. Cálculo da Distância Euclidiana Mínima para os Centroides Estabilizados
        let minDistance = Infinity;
        let matchedColor = "ANALISANDO";

        for (let centroid of COLOR_CENTROIDS) {
            let dr = normR - centroid.r;
            let dg = normG - centroid.g;
            let db = normB - centroid.b;
            let distance = Math.sqrt(dr*dr + dg*dg + db*db);

            if (distance < minDistance) {
                minDistance = distance;
                matchedColor = centroid.name;
            }
        }

        // 6. Salvaguardas Matemáticas para Isqueiro Amarelo vs Laranja e Rosa vs Vermelho
        if (matchedColor === "LARANJA" && normG > 0.41) {
            return "AMARELO"; 
        }
        if (matchedColor === "VERMELHO" && normB > 0.24 && rawR > 130) {
            return "ROSA";
        }

        return matchedColor;
    }

    function loop() {
        if (active && v.videoWidth > 0) {
            c.width = v.videoWidth; c.height = v.videoHeight;
            
            ctx.imageSmoothingEnabled = false; // Desativado para evitar borrão de interpolação nas bordas
            ctx.drawImage(v, 0, 0);
            
            // Tamanho dinâmico e otimizado da janela de leitura central
            let size = (mode === 'LIVRE' ? 6 : 24); 
            const p = ctx.getImageData(v.videoWidth/2 - size/2, v.videoHeight/2 - size/2, size, size).data;
            
            let r=0, g=0, b=0, count=0;
            for(let i=0; i<p.length; i+=4) {
                // Descarta pixels saturados por reflexo especular direto (brilho do plástico)
                if(p[i] > 252 && p[i+1] > 252 && p[i+2] > 252) continue; 
                r += p[i]; g += p[i+1]; b += p[i+2];
                count++;
            }
            
            if(count === 0) { r=255; g=255; b=255; count=1; }
            
            let res = getFinalColor(r/count, g/count, b/count);
            
            // Histograma Inteligente Amortecido: Reduz o delay da v32 de forma drástica
            history.push(res);
            if(history.length > 10) history.shift(); 
            
            const votes = {};
            history.forEach(x => votes[x] = (votes[x] || 0) + 1);
            const winner = Object.keys(votes).reduce((a, b) => votes[a] > votes[b] ? a : b);

            // Confiança de transição rápida: Exige 60% de dominância no buffer curto (Fim do travamento no ALINHANDO)
            if (votes[winner] >= 6) { 
                if (colorTxt.innerText !== winner) {
                    colorTxt.innerText = winner;
                    colorTxt.className = "active-text";
                    cross.classList.add('locked');
                    
                    if (audioActive && winner !== lastSpeach) {
                        speak(winner);
                    }
                }
            } else {
                colorTxt.innerText = "ALINHANDO";
                colorTxt.className = "";
                cross.classList.remove('locked');
            }
        }
        requestAnimationFrame(loop);
    }

    function speak(t) {
        if(!audioActive || isSpeaking || !t || t === "ALINHANDO" || t === "INATIVO") return;
        try {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'pt-BR'; 
            m.rate = 2.0; // Voz mais rápida e responsiva ao operador
            m.onstart = () => isSpeaking = true;
            m.onend = () => isSpeaking = false;
            m.onerror = () => isSpeaking = false;
            window.speechSynthesis.speak(m);
            lastSpeach = t;
        } catch(e) {
            isSpeaking = false;
        }
    }
    loop();
</script>
</body>
</html>
