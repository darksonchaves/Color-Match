<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro – Full Engine</title>

<style>
body {
  text-align:center;
  font-family:Arial;
  background:#111;
  color:#fff;
}

video {
  width:90%;
  border-radius:10px;
}

#boxA, #boxB, #colorBox {
  width:90px;
  height:90px;
  margin:10px;
  display:inline-block;
  border-radius:10px;
  border:2px solid #fff;
}

#snapshot {
  width:90%;
  margin:10px auto;
  border-radius:10px;
  display:none;
  border:2px solid #00ffcc;
}

button {
  padding:10px;
  margin:5px;
}

#result {
  margin-top:10px;
  font-size:14px;
  color:#00ffcc;
}
</style>
</head>

<body>

<h2>ColorMatch Pro – Engine</h2>

<button onclick="setMode('static')">Modo Estático</button>
<button onclick="setMode('live')">Modo Live</button>
<button onclick="setMode('compare1')">Comparar 1</button>
<button onclick="setMode('compare2')">Comparar 2</button>
<button onclick="runCompare()">Executar Comparação</button>
<button onclick="toggleVoice()">🔊 Voz</button>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<img id="snapshot"/>

<div>
  <div id="colorBox"></div>
  <div id="boxA"></div>
  <div id="boxB"></div>
</div>

<p id="result">Aguardando ação...</p>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let mode = "static";
let voiceEnabled = false;

let sampleA = null;
let sampleB = null;

// ---------------- VOZ ----------------
function speak(text){
  if(!voiceEnabled) return;
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = "pt-BR";
  speechSynthesis.speak(msg);
}

// ---------------- CAMERA ----------------
navigator.mediaDevices.getUserMedia({
  video: { facingMode: { ideal: "environment" } }
}).then(s => video.srcObject = s);

// ---------------- LAB ----------------
function rgbToLab(r,g,b){

  r/=255; g/=255; b/=255;

  [r,g,b]=[r,g,b].map(v=>{
    return v>0.04045
      ? Math.pow((v+0.055)/1.055,2.4)
      : v/12.92;
  });

  let x=r*0.4124 + g*0.3576 + b*0.1805;
  let y=r*0.2126 + g*0.7152 + b*0.0722;
  let z=r*0.0193 + g*0.1192 + b*0.9505;

  x/=0.95047;
  y/=1.0;
  z/=1.08883;

  [x,y,z]=[x,y,z].map(v=>{
    return v>0.008856 ? Math.cbrt(v) : (7.787*v)+(16/116);
  });

  return {
    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)
  };
}

// ---------------- DISTÂNCIA ----------------
function deltaE(a,b){
  return Math.sqrt(
    (a.L-b.L)**2 +
    (a.a-b.a)**2 +
    (a.b-b.b)**2
  );
}

// ---------------- NOMES DE COR ----------------
function getColorName(r,g,b){
  if(r<30 && g<30 && b<30) return "Preto";
  if(r>200 && g>200 && b>200) return "Branco";
  if(r>200 && g<80 && b<80) return "Vermelho";
  if(r<80 && g>200 && b<80) return "Verde";
  if(r<80 && g<80 && b>200) return "Azul";
  if(r>200 && g>200 && b<80) return "Amarelo";
  if(r>200 && g>120 && b<80) return "Laranja";
  if(r>150 && g<80 && b>150) return "Rosa";
  if(r>120 && g<80 && b>120) return "Roxo";
  return "Indefinida";
}

// ---------------- CAPTURA ----------------
function capture(x,y){

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  const size = 12;

  const data = ctx.getImageData(
    x-size,y-size,size*2,size*2
  ).data;

  let r=0,g=0,b=0,c=0;

  for(let i=0;i<data.length;i+=4){
    r+=data[i];
    g+=data[i+1];
    b+=data[i+2];
    c++;
  }

  r/=c; g/=c; b/=c;

  return {
    rgb:{r,g,b},
    lab: rgbToLab(r,g,b),
    name: getColorName(r,g,b)
  };
}

// ---------------- CLICK ----------------
video.addEventListener("click",(e)=>{

  const rect = video.getBoundingClientRect();

  const x = (e.clientX-rect.left)*(video.videoWidth/rect.width);
  const y = (e.clientY-rect.top)*(video.videoHeight/rect.height);

  const sample = capture(x,y);

  const color = `rgb(${sample.rgb.r},${sample.rgb.g},${sample.rgb.b})`;

  document.getElementById("snapshot").src = canvas.toDataURL();
  document.getElementById("snapshot").style.display = "block";

  if(mode === "static"){
    document.getElementById("colorBox").style.background = color;
    document.getElementById("result").innerText = sample.name;
    speak(sample.name);
  }

  if(mode === "compare1"){
    sampleA = sample;
    document.getElementById("boxA").style.background = color;
    document.getElementById("result").innerText = "Amostra 1 salva";
    speak(sample.name);
  }

  if(mode === "compare2"){
    sampleB = sample;
    document.getElementById("boxB").style.background = color;
    document.getElementById("result").innerText = "Amostra 2 salva";
    speak(sample.name);
  }

});

// ---------------- COMPARAÇÃO ----------------
function runCompare(){

  if(!sampleA || !sampleB){
    alert("Capture as duas amostras");
    return;
  }

  const d = deltaE(sampleA.lab, sampleB.lab);

  const similarity = Math.max(0, 100 - d * 2.5);
  const diff = 100 - similarity;

  let label = "";

  if(similarity > 90) label = "Quase idênticas";
  else if(similarity > 70) label = "Muito próximas";
  else if(similarity > 40) label = "Diferentes";
  else label = "Muito diferentes";

  const text =
    `Amostra 1: ${sampleA.name} | Amostra 2: ${sampleB.name} | Similaridade ${similarity.toFixed(1)}% | Diferença ${diff.toFixed(1)}%`;

  document.getElementById("result").innerText = text;

  speak(text);
}

// ---------------- MODE ----------------
function setMode(m){
  mode = m;
}

// ---------------- VOZ TOGGLE ----------------
function toggleVoice(){
  voiceEnabled = !voiceEnabled;
  alert("Voz: " + (voiceEnabled ? "ATIVADA" : "DESATIVADA"));
}

</script>

</body>
</html>
