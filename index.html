<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro - v11.0 Stable</title>
<style>
  body{ margin:0; font-family: Arial; background:#111; color:#fff; text-align:center; }
  #header { padding: 10px; background: #000; border-bottom: 2px solid #333; display: flex; justify-content: center; flex-wrap: wrap; gap: 5px; }
  
  /* BOTOES ESTILO OEM STABLE */
  button{ padding:12px; border:none; border-radius:8px; cursor:pointer; background:#222; color:#fff; font-weight: bold; font-size: 11px; }
  .activeMode { background: #00695c !important; border: 1px solid #00ffcc; }
  .univActive { background: #ffaa00 !important; color: #000 !important; }

  video{ width:92%; margin-top: 15px; border-radius:12px; border:2px solid #333; object-fit:cover; height: 50vh; }
  
  #cross{ 
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); 
    border-radius:50%; pointer-events:none; z-index:999;
    transition: 0.2s;
  }
  .cross-livre { width: 26px; height: 26px; border: 2px solid #00ffcc; }
  .cross-padrao { width: 40vw; height: 40vw; border: 3px dashed rgba(255,255,255,0.4); }
  .valid { border-color: #00ffcc !important; box-shadow: 0 0 20px #00ffcc; }

  #txt{ margin: 20px; font-size: 24px; font-weight: bold; min-height: 40px; color: #aaa; text-transform: uppercase; }
  #status-info { font-size: 12px; color: #00ffcc; margin-bottom: 10px; }
</style>
</head>
<body>

<div id="header">
  <button id="btnUniv" onclick="toggleUniversal()">UNIVERSAL: OFF</button>
  <button id="btnLivre" onclick="setMode('LIVRE')" class="activeMode">MOV. LIVRE</button>
  <button id="btnPadrao" onclick="setMode('PADRAO')">MOV. PADRÃO</button>
  <button onclick="toggleFlash()">⚡ FLASH</button>
</div>

<video id="video" autoplay playsinline muted></video>
<div id="cross" class="cross-livre"></div>

<div id="txt">AGUARDANDO...</div>
<div id="status-info">SISTEMA ESTÁVEL</div>

<canvas id="canvasA" style="display:none;"></canvas>

<script>
const video = document.getElementById("video");
const canvasA = document.getElementById("canvasA");
const ctxA = canvasA.getContext("2d", {willReadFrequently:true});
const cross = document.getElementById("cross");
const txt = document.getElementById("txt");

let currentMode = 'LIVRE';
let universalMode = false;
let currentSpokenColor = "";
let isSpeaking = false;
let streamTrack = null;
let flashOn = false;

// INICIALIZAÇÃO DE CÂMERA (ESTILO OEM)
navigator.mediaDevices.getUserMedia({ video:{ facingMode:"environment" } })
.then(s => { video.srcObject = s; streamTrack = s.getVideoTracks()[0]; });

function speak(text){
    if(!text || text === currentSpokenColor || isSpeaking) return;
    currentSpokenColor = text;
    isSpeaking = true;
    speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "pt-BR"; msg.rate = 1.2;
    msg.onend = () => isSpeaking = false;
    speechSynthesis.speak(msg);
}

function toggleUniversal() {
    universalMode = !universalMode;
    const btn = document.getElementById("btnUniv");
    btn.classList.toggle("univActive", universalMode);
    btn.innerText = `UNIVERSAL: ${universalMode ? 'ON' : 'OFF'}`;
    speak(universalMode ? "Universal Ativado" : "Universal Desativado");
}

function setMode(m) {
    currentMode = m;
    document.getElementById("btnLivre").className = (m === 'LIVRE' ? 'activeMode' : '');
    document.getElementById("btnPadrao").className = (m === 'PADRAO' ? 'activeMode' : '');
    cross.className = (m === 'LIVRE' ? 'cross-livre' : 'cross-padrao');
    speak(m === 'LIVRE' ? "Livre" : "Padrão");
}

function rgbToHsl(r,g,b){
    r/=255; g/=255; b/=255;
    const max=Math.max(r,g,b), min=Math.min(r,g,b), d=max-min;
    let h=0, s=0, l=(max+min)/2;
    if(d!==0){
        s = l > 0.5 ? d/(2-max-min) : d/(max+min);
        if(max===r) h=(g-b)/d+(g<b?6:0); else if(max===g) h=(b-r)/d+2; else h=(r-g)/d+4;
        h/=6;
    }
    return { h:h*360, s:s*100, l:l*100 };
}

// LOGICA DE RECONHECIMENTO PURO (O QUE FUNCIONA)
function detectColorName(r,g,b){
    const hsl = rgbToHsl(r,g,b);
    const {h, s, l} = hsl;
    if(s <= 12 && l >= 80) return "Branco";
    if(s <= 15 && l <= 18) return "Preto";
    if(s <= 15) return "Cinza";
    if((h >= 0 && h <= 12) || (h >= 345 && h <= 360)) return "Vermelho";
    if(h >= 13 && h <= 38) return "Laranja";
    if(h >= 39 && h <= 68) return "Amarelo";
    if(h >= 69 && h <= 165) return "Verde";
    if(h >= 166 && h < 260) return "Azul";
    if(h >= 260 && h <= 315) return "Roxo";
    if(h >= 316 && h <= 344) return "Rosa";
    return "";
}

function mainLoop(){
    if(video.videoWidth > 0){
        canvasA.width = video.videoWidth; canvasA.height = video.videoHeight;
        ctxA.drawImage(video, 0, 0);
        
        const cX = video.videoWidth/2, cY = video.videoHeight/2;
        const p = ctxA.getImageData(cX-5, cY-5, 10, 10).data;
        let r=0, g=0, b=0;
        for(let i=0; i<p.length; i+=4){ r+=p[i]; g+=p[i+1]; b+=p[i+2]; }
        r/=(p.length/4); g/=(p.length/4); b/=(p.length/4);

        if(currentMode === 'PADRAO'){
            const rad = (window.innerWidth * 0.40) * (video.videoWidth / window.innerWidth) / 2;
            const samples = [
                ctxA.getImageData(cX, cY-rad, 1, 1).data,
                ctxA.getImageData(cX, cY+rad, 1, 1).data,
                ctxA.getImageData(cX-rad, cY, 1, 1).data,
                ctxA.getImageData(cX+rad, cY, 1, 1).data
            ];
            // Tolerância alta para não travar no aguardando (estilo OEM)
            const isFilled = samples.every(s => Math.abs(s[0]-r) + Math.abs(s[1]-g) + Math.abs(s[2]-b) < 110);
            
            if(!isFilled){
                txt.innerText = "AGUARDANDO"; txt.style.color = "#555";
                cross.classList.remove("valid");
                requestAnimationFrame(mainLoop); return;
            }
        }

        cross.classList.add("valid");
        if(universalMode){
            const name = detectColorName(r,g,b);
            txt.innerText = name || "ANALISANDO...";
            txt.style.color = "#00ffcc";
            if(name) speak(name);
        } else {
            txt.innerText = `RGB: ${Math.round(r)},${Math.round(g)},${Math.round(b)}`;
            txt.style.color = "#fff";
        }
    }
    requestAnimationFrame(mainLoop);
}

async function toggleFlash(){
    if(!streamTrack) return;
    flashOn = !flashOn;
    await streamTrack.applyConstraints({ advanced:[{ torch:flashOn }] });
}

mainLoop();
</script>
</body>
</html>
