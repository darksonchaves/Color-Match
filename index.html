<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro – Static Touch Mode</title>

<style>
body {
  text-align:center;
  font-family:Arial;
  background:#111;
  color:#fff;
  position:relative;
  margin:0;
}

video {
  width:90%;
  border-radius:10px;
}

#box {
  width:120px;
  height:120px;
  margin:15px auto;
  border-radius:10px;
  border:2px solid #fff;
}

/* 🔥 MIRA VISUAL */
#crosshair {
  position:absolute;
  width:18px;
  height:18px;
  border:2px solid #00ffcc;
  border-radius:50%;
  transform:translate(-50%, -50%);
  pointer-events:none;
  display:none;
  box-shadow:0 0 10px #00ffcc;
}
</style>
</head>

<body>

<h2>ColorMatch Pro – Static Mode</h2>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<div id="box"></div>
<p id="txt">Toque na imagem</p>

<!-- 🔥 MIRA -->
<div id="crosshair"></div>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const crosshair = document.getElementById("crosshair");

// ---------------- CAMERA ----------------
navigator.mediaDevices.getUserMedia({
  video: { facingMode: { ideal: "environment" } }
}).then(s => video.srcObject = s);

// ---------------- LAB ----------------
function rgbToLab(r,g,b){

  r/=255; g/=255; b/=255;

  [r,g,b]=[r,g,b].map(v=>{
    return v>0.04045
      ? Math.pow((v+0.055)/1.055,2.4)
      : v/12.92;
  });

  let x=r*0.4124 + g*0.3576 + b*0.1805;
  let y=r*0.2126 + g*0.7152 + b*0.0722;
  let z=r*0.0193 + g*0.1192 + b*0.9505;

  x/=0.95047;
  y/=1.0;
  z/=1.08883;

  [x,y,z]=[x,y,z].map(v=>{
    return v>0.008856 ? Math.cbrt(v) : (7.787*v)+(16/116);
  });

  return {
    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)
  };
}

// ---------------- ΔE ----------------
function deltaE(a,b){
  return Math.sqrt(
    (a.L-b.L)**2 +
    (a.a-b.a)**2 +
    (a.b-b.b)**2
  );
}

// ---------------- CORES ----------------
const colors = [
  {n:"Preto", lab:rgbToLab(15,15,15)},
  {n:"Branco", lab:rgbToLab(245,245,245)},
  {n:"Cinza", lab:rgbToLab(128,128,128)},

  {n:"Vermelho", lab:rgbToLab(220,60,60)},
  {n:"Verde", lab:rgbToLab(60,200,60)},
  {n:"Azul", lab:rgbToLab(60,80,220)},

  {n:"Amarelo", lab:rgbToLab(240,220,80)},
  {n:"Laranja", lab:rgbToLab(240,150,80)},
  {n:"Rosa", lab:rgbToLab(240,120,180)},
  {n:"Roxo", lab:rgbToLab(140,70,170)},
  {n:"Marrom", lab:rgbToLab(120,80,60)}
];

// ---------------- CAPTURA ----------------
function captureAtPoint(x,y,cb){

  let samples = [];
  let frames = 5;

  function loop(){

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video,0,0);

    const size = 12;

    const data = ctx.getImageData(
      x-size,
      y-size,
      size*2,
      size*2
    ).data;

    let pixels = [];

    for(let i=0;i<data.length;i+=4){
      const r=data[i], g=data[i+1], b=data[i+2];

      if(r+g+b < 10 || r+g+b > 740) continue;

      pixels.push([r,g,b]);
    }

    pixels.sort((a,b)=>(a[0]+a[1]+a[2])-(b[0]+b[1]+b[2]));

    const cut = Math.floor(pixels.length*0.2);
    pixels = pixels.slice(cut,pixels.length-cut);

    let r=0,g=0,b=0,c=0;

    for(const p of pixels){
      r+=p[0]; g+=p[1]; b+=p[2];
      c++;
    }

    samples.push([r/c,g/c,b/c]);

    frames--;

    if(frames>0){
      requestAnimationFrame(loop);
    } else {

      const rs = samples.map(s=>s[0]).sort((a,b)=>a-b);
      const gs = samples.map(s=>s[1]).sort((a,b)=>a-b);
      const bs = samples.map(s=>s[2]).sort((a,b)=>a-b);

      const mid = Math.floor(samples.length/2);

      cb(rs[mid],gs[mid],bs[mid]);
    }
  }

  loop();
}

// ---------------- DETECÇÃO ----------------
function detect(r,g,b){

  const lab = rgbToLab(r,g,b);

  let best = {n:"Indefinido", d:999};

  for(const c of colors){

    const d = deltaE(lab,c.lab);

    if(d < best.d){
      best = {n:c.n, d};
    }
  }

  return {
    name: best.n,
    confidence: Math.max(0, 100 - best.d*2)
  };
}

// ---------------- RENDER ----------------
function render(r,g,b){

  const res = detect(r,g,b);

  document.getElementById("box").style.background =
    `rgb(${r},${g},${b})`;

  document.getElementById("txt").innerText =
    `${res.name} | ${res.confidence.toFixed(1)}%`;
}

// ---------------- TOQUE + MIRA ----------------
video.addEventListener("click",(e)=>{

  const rect = video.getBoundingClientRect();

  const x = (e.clientX - rect.left) * (video.videoWidth / rect.width);
  const y = (e.clientY - rect.top) * (video.videoHeight / rect.height);

  // 🔥 posiciona mira
  crosshair.style.display = "block";
  crosshair.style.left = e.clientX + "px";
  crosshair.style.top = e.clientY + "px";

  setTimeout(()=>{
    crosshair.style.display = "none";
  }, 900);

  captureAtPoint(x,y,(r,g,b)=>render(r,g,b));
});

</script>

</body>
</html>
