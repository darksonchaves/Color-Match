<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ColorMatch Pro - v19.1 Recon-Fidelity</title>
    <style>
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; overflow: hidden; text-align: center; }
        #header { 
            position: absolute; top: 0; width: 100%; z-index: 20;
            background: rgba(0, 0, 0, 0.95); display: flex; justify-content: center; padding: 12px 0; gap: 8px;
            border-bottom: 1px solid #333; flex-wrap: wrap;
        }
        button { 
            background: #111; color: #888; border: 1px solid #444;
            padding: 10px 14px; border-radius: 8px; font-weight: bold; font-size: 10px;
            text-transform: uppercase; transition: 0.2s;
        }
        .active { background: #00ffcc !important; color: #000 !important; border-color: #00ffcc; }
        #video-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #crosshair { 
            position: absolute; border: 2px solid rgba(0,255,204,0.3); border-radius: 50%;
            pointer-events: none; z-index: 10; width: 45px; height: 45px;
        }
        .locked { border-color: #00ffcc !important; box-shadow: 0 0 30px #00ffcc; background: rgba(0,255,204,0.05); }
        #ui-overlay { 
            position: absolute; bottom: 0; width: 100%; padding: 60px 0;
            background: linear-gradient(transparent, rgba(0,0,0,1) 70%); z-index: 20;
        }
        #color-name { font-size: 58px; font-weight: 900; text-transform: uppercase; color: #222; min-height: 80px; }
        .active-text { color: #00ffcc !important; text-shadow: 0 0 40px rgba(0,255,204,0.8); }
        #debug { font-size: 10px; color: #444; margin-top: 15px; font-family: monospace; }
    </style>
</head>
<body>

<div id="header">
    <button onclick="toggleSystem()" id="btnPower">SISTEMA: OFF</button>
    <button onclick="calibrate()" id="btnCalib">CALIBRAR MARCO ZERO</button>
</div>

<div id="video-container">
    <video id="v" autoplay playsinline muted></video>
    <div id="crosshair"></div>
</div>

<div id="ui-overlay">
    <div id="color-name">STANDBY</div>
    <div id="debug">Aguardando calibração...</div>
</div>

<canvas id="c" style="display:none;"></canvas>

<script>
    const v = document.getElementById('v'), c = document.getElementById('c'), ctx = c.getContext('2d', {willReadFrequently:true});
    const colorTxt = document.getElementById('color-name'), debugTxt = document.getElementById('debug'), cross = document.getElementById('crosshair');

    let active = false, lastSpeach = "", isSpeaking = false;
    let iris = { r: 1, g: 1, b: 1, baseL: 100 }; 
    let history = []; 

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => v.srcObject = s);

    function toggleSystem() { 
        active = !active; 
        document.getElementById('btnPower').classList.toggle('active', active);
        document.getElementById('btnPower').innerText = `SISTEMA: ${active ? 'ON' : 'OFF'}`;
        if(!active) resetUI(); else speak("Calibrando sensores");
    }

    function calibrate() {
        if(!active) return;
        const d = getMultiSample(v.videoWidth/2, v.videoHeight/2);
        iris.r = 255 / d.r; iris.g = 255 / d.g; iris.b = 255 / d.b;
        const lab = rgbToLab(d.r * iris.r, d.g * iris.g, d.b * iris.b);
        iris.baseL = lab.l;
        speak("Fidelidade Calibrada");
    }

    function getMultiSample(x, y) {
        c.width = v.videoWidth; c.height = v.videoHeight;
        ctx.drawImage(v, 0, 0);
        const pix = ctx.getImageData(x, y, 1, 1).data;
        return { r: pix[0], g: pix[1], b: pix[2] };
    }

    function rgbToLab(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        r = (r > 0.04045) ? Math.pow((r + 0.055) / 1.055, 2.4) : r / 12.92;
        g = (g > 0.04045) ? Math.pow((g + 0.055) / 1.055, 2.4) : g / 12.92;
        b = (b > 0.04045) ? Math.pow((b + 0.055) / 1.055, 2.4) : b / 12.92;
        let x = (r * 0.4124 + g * 0.3576 + b * 0.1805) * 100;
        let y = (r * 0.2126 + g * 0.7152 + b * 0.0722) * 100;
        let z = (r * 0.0193 + g * 0.1192 + b * 0.9505) * 100;
        x /= 95.047; y /= 100.000; z /= 108.883;
        x = (x > 0.008856) ? Math.pow(x, 1/3) : (7.787 * x) + (16 / 116);
        y = (y > 0.008856) ? Math.pow(y, 1/3) : (7.787 * y) + (16 / 116);
        z = (z > 0.008856) ? Math.pow(z, 1/3) : (7.787 * z) + (16 / 116);
        return { l: (116 * y) - 16, a: 500 * (x - y), b: 200 * (y - z) };
    }

    function getColorName(lab) {
        const { l, a, b } = lab;
        const chroma = Math.sqrt(a*a + b*b);
        let h = Math.atan2(b, a) * (180 / Math.PI);
        if (h < 0) h += 360;

        // RETORNO DAS REGRAS QUE FUNCIONAVAM (Ajustadas para CIE Lab)
        if (chroma < 11) {
            if (l > (iris.baseL * 0.8)) return "Branco";
            if (l < 28) return "Preto";
            return "Cinza";
        }

        // MAPEAMENTO EXPERIMENTAL BASEADO NO SEU VÍDEO
        if (h > 345 || h < 22) return (l < 45) ? "Vermelho Escuro" : "Vermelho";
        if (h >= 22 && h < 48) return (l < 55) ? "Marrom" : "Laranja";
        if (h >= 48 && h < 95) return "Amarelo"; // Alargado para evitar o "Verde" falso
        if (h >= 95 && h < 170) return (l < 50) ? "Verde Escuro" : "Verde";
        if (h >= 170 && h < 265) return "Azul";
        if (h >= 265 && h < 315) return (l > 60 && chroma > 40) ? "Rosa" : "Roxo";
        if (h >= 315 && h < 345) return "Rosa";
        
        return "Indefinido";
    }

    function loop() {
        if (v.videoWidth > 0 && active) {
            const raw = getMultiSample(v.videoWidth/2, v.videoHeight/2);
            const lab = rgbToLab(Math.min(255, raw.r * iris.r), Math.min(255, raw.g * iris.g), Math.min(255, raw.b * iris.b));
            
            const name = getColorName(lab);
            
            history.push(name);
            if(history.length > 10) history.shift(); // Reduzi para 10 para ser mais esperto
            
            const counts = {};
            history.forEach(n => counts[n] = (counts[n] || 0) + 1);
            const winner = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
            
            if (counts[winner] >= 7) { // 70% de certeza já libera a voz
                colorTxt.innerText = winner;
                colorTxt.className = "active-text";
                cross.classList.add('locked');
                if(winner !== lastSpeach && winner !== "Indefinido") speak(winner);
            }
            
            debugTxt.innerText = `L:${Math.round(lab.l)} Chroma:${Math.round(chroma)} H:${Math.round(h)}°`;
        }
        requestAnimationFrame(loop);
    }

    function speak(t) {
        if(!t || isSpeaking) return;
        speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang='pt-BR'; m.rate=1.7;
        m.onstart = () => isSpeaking = true;
        m.onend = () => isSpeaking = false;
        speechSynthesis.speak(m);
        lastSpeach = t;
    }

    function resetUI() {
        colorTxt.innerText = "STANDBY"; colorTxt.className = "";
        cross.classList.remove('locked');
        history = []; lastSpeach = "";
    }
    loop();
</script>
</body>
</html>
