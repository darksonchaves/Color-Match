<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Análise Colorimétrica em Tempo Real</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  #header {
    background: rgba(10,10,20,0.88);
    padding: 5px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(100,100,255,0.15);
    z-index: 30;
    position: relative;
    flex-shrink: 0;
  }
  #header h1 {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 2px;
    color: #7b8cde;
    text-transform: uppercase;
  }
  #top-bar {
    background: rgba(8,8,20,0.86);
    border-bottom: 1px solid rgba(100,100,255,0.12);
    padding: 5px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 25;
    position: relative;
    flex-shrink: 0;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    flex-wrap: wrap;
  }
  #color-swatch {
    width: 28px;
    height: 28px;
    border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.12);
    flex-shrink: 0;
    transition: background 0.25s ease;
    box-shadow: 0 0 8px rgba(0,0,0,0.5);
  }
  #color-name {
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.4px;
    min-width: 120px;
  }
  #delta-e-display {
    font-size: 0.58rem;
    color: #556;
    white-space: nowrap;
  }
  .sep {
    color: rgba(100,100,255,0.3);
    font-size: 0.7rem;
    flex-shrink: 0;
  }
  .data-inline {
    font-size: 0.64rem;
    font-family: 'Courier New', monospace;
    color: #aab;
    white-space: nowrap;
  }
  .data-inline .lbl { color: #558; margin-right: 1px; }
  #base-info {
    font-size: 0.58rem;
    color: #446;
    white-space: nowrap;
  }
  .btn-top {
    padding: 4px 8px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    transition: all 0.18s ease;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #btn-calibrate {
    background: linear-gradient(135deg, #2a2a6e, #3a3a9e);
    color: #aac;
    border: 1px solid rgba(100,100,255,0.3);
  }
  #btn-calibrate:hover { background: linear-gradient(135deg, #3a3a8e, #5a5abe); color: #eef; }
  #btn-calibrate.calibrated {
    background: linear-gradient(135deg, #1a4a2e, #2a7a4e);
    border-color: rgba(50,200,100,0.4);
    color: #8fc;
  }
  #btn-camera {
    background: linear-gradient(135deg, #2a1a3e, #4a2a6e);
    color: #bac;
    border: 1px solid rgba(180,100,255,0.3);
  }
  #btn-camera:hover { background: linear-gradient(135deg, #3a2a5e, #6a4a9e); color: #edf; }
  #btn-audio {
    background: linear-gradient(135deg, #1a1a2e, #2a2a3e);
    color: #446;
    border: 1px solid rgba(100,100,150,0.2);
  }
  #btn-audio:hover { background: linear-gradient(135deg, #252535, #353550); color: #778; }
  #btn-audio.audio-on {
    background: linear-gradient(135deg, #163a1e, #1f6030);
    color: #6effa0;
    border: 1px solid rgba(60,200,100,0.45);
    box-shadow: 0 0 6px rgba(60,200,100,0.2);
  }
  #btn-universal {
    background: linear-gradient(135deg, #1a1a2e, #2a2a3e);
    color: #446;
    border: 1px solid rgba(100,100,150,0.2);
  }
  #btn-universal:hover { background: linear-gradient(135deg, #252535, #353550); color: #778; }
  #btn-universal.universal-on {
    background: linear-gradient(135deg, #3a2a1e, #6a4a30);
    color: #ffa060;
    border: 1px solid rgba(200,100,60,0.45);
    box-shadow: 0 0 6px rgba(200,100,60,0.2);
  }
  #main {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #camera-container {
    position: absolute;
    inset: 0;
    background: #000;
  }
  #videoEl {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
  }
  #canvasEl { display: none; }
  #reticle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60px;
    height: 60px;
    pointer-events: none;
    z-index: 20;
  }
  .reticle-h {
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    height: 2px;
    background: rgba(120,220,255,0.9);
    transform: translateY(-50%);
    box-shadow: 0 0 4px rgba(120,220,255,0.5);
  }
  .reticle-v {
    position: absolute;
    left: 50%;
    top: 0;
    height: 100%;
    width: 2px;
    background: rgba(120,220,255,0.9);
    transform: translateX(-50%);
    box-shadow: 0 0 4px rgba(120,220,255,0.5);
  }
  .reticle-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 22px;
    height: 22px;
    border: 1.5px solid rgba(120,220,255,0.5);
  }
  .reticle-sample-circle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1px dashed rgba(120,220,255,0.55);
  }
  .reticle-dot {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(120,220,255,0.9);
    box-shadow: 0 0 4px rgba(120,220,255,0.8);
  }
  #start-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 30;
    gap: 14px;
  }
  #start-overlay p { color: #778; font-size: 0.88rem; }
  #btn-start {
    padding: 13px 30px;
    background: linear-gradient(135deg, #3a3a9e, #7b5ce8);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  #btn-start:hover { transform: scale(1.05); }
  
  @media (max-width: 768px) {
    #header h1 { font-size: 0.65rem; }
    #top-bar { gap: 6px; padding: 4px 8px; }
    .btn-top { padding: 3px 6px; font-size: 0.55rem; }
    #color-name { font-size: 0.74rem; min-width: 100px; }
    .data-inline { font-size: 0.58rem; }
    #base-info { font-size: 0.54rem; }
  }
</style>
</head>
<body>
<div id="header">
  <h1>&#9632; Análise Colorimétrica</h1>
  <span style="font-size:0.6rem;color:#334;letter-spacing:1px;">Sistema HSV · Estabilizado</span>
</div>
<div id="top-bar">
  <div id="color-swatch" style="background:#1a1a2e;"></div>
  <div id="color-name" style="color:#445;">Aguardando...</div>
  <div id="delta-e-display"></div>
  <span class="sep">│</span>
  <div class="data-inline" id="hsv-line">
    <span class="lbl">H:</span>--- &nbsp;<span class="lbl">S:</span>--- &nbsp;<span class="lbl">V:</span>---
  </div>
  <span class="sep">│</span>
  <div class="data-inline" id="rgb-line">
    <span class="lbl">R:</span>--- &nbsp;<span class="lbl">G:</span>--- &nbsp;<span class="lbl">B:</span>---
  </div>
  <span class="sep">│</span>
  <div id="base-info">Base: não calibrada</div>
  <span class="sep">│</span>
  <button class="btn-top" id="btn-calibrate" onclick="calibrate()">&#9670; Calibrar</button>
  <button class="btn-top" id="btn-camera"    onclick="switchCamera()">&#8635; Câmera</button>
  <button class="btn-top" id="btn-audio"     onclick="toggleAudio()">&#128263; Áudio</button>
  <button class="btn-top" id="btn-universal" onclick="toggleUniversalMode()">&#9733; Universal</button>
</div>
<div id="main">
  <div id="camera-container">
    <video id="videoEl" autoplay playsinline muted></video>
    <canvas id="canvasEl"></canvas>
    <div id="reticle">
      <div class="reticle-h"></div>
      <div class="reticle-v"></div>
      <div class="reticle-box"></div>
      <div class="reticle-sample-circle"></div>
      <div class="reticle-dot"></div>
    </div>
    <div id="start-overlay">
      <p>Toque para iniciar a câmera</p>
      <button id="btn-start" onclick="startCamera()">&#9654; Iniciar Câmera</button>
    </div>
  </div>
</div>
<script>
  const video  = document.getElementById('videoEl');
  const canvas = document.getElementById('canvasEl');
  const ctx    = canvas.getContext('2d');
  
  // Estado do sistema
  let stream        = null;
  let devices       = [];
  let deviceIndex   = 0;
  let running       = false;
  let base          = null;
  let universalMode = false;
  
  // Configurações de amostragem e estabilização
  const SAMPLE_SIZE = 10;
  const BUFFER_SIZE = 8;  // Número de frames para média móvel
  const HYSTERESIS_THRESHOLD = 15;  // Limiar para mudança de cor (em graus de Hue)
  
  // Buffer circular para estabilização
  let colorBuffer = [];
  let lastStableColorName = '';
  let lastStableHue = 0;
  
  // Sistema de áudio
  let audioEnabled = false;
  let lastSpokenName = '';
  let pendingName = '';
  let stableTimer = null;
  const STABLE_SPEECH_MS = 400;
  // ===============================================
  // CONVERSÃO DE ESPAÇO DE COR: RGB → HSV
  // ===============================================
  function rgbToHSV(r, g, b) {
    r /= 255; g /= 255; b /= 255;
    const max = Math.max(r, g, b);
    const min = Math.min(r, g, b);
    const delta = max - min;
    
    let h = 0, s = 0, v = max;
    
    if (delta !== 0) {
      s = delta / max;
      
      if (max === r) {
        h = ((g - b) / delta + (g < b ? 6 : 0)) / 6;
      } else if (max === g) {
        h = ((b - r) / delta + 2) / 6;
      } else {
        h = ((r - g) / delta + 4) / 6;
      }
    }
    
    return {
      h: h * 360,      // 0-360 graus
      s: s * 100,      // 0-100%
      v: v * 100       // 0-100%
    };
  }
  // ===============================================
  // CLASSIFICAÇÃO DE COR - SISTEMA SIMPLIFICADO
  // ===============================================
  function classifyColorSimple(hsv, rgb) {
    const { h, s, v } = hsv;
    const { r, g, b } = rgb;
    
    // ============================================
    // 1. CORES ACROMÁTICAS (Branco, Cinza, Preto)
    // ============================================
    if (s < 12) {  // Baixa saturação = acromático
      if (v >= 88) {
        return { name: 'Branco', color: '#ffffff' };
      } else if (v <= 20) {
        return { name: 'Preto', color: '#666677' };
      } else {
        return { name: 'Cinza', color: '#9999aa' };
      }
    }
    
    // ============================================
    // 2. CORES CROMÁTICAS - Distribuição Igualitária
    // ============================================
    // Dividindo o espectro em 12 faixas iguais de 30° cada
    
    let baseName = '';
    let baseColor = '';
    
    // VERMELHO: 345-15° (passa pelo 0°)
    if (h >= 345 || h < 15) {
      baseName = 'Vermelho';
      baseColor = '#ef4444';
    }
    // VERMELHO-LARANJA: 15-45°
    else if (h >= 15 && h < 45) {
      baseName = 'Laranja Avermelhado';
      baseColor = '#f97316';
    }
    // LARANJA: 45-75°
    else if (h >= 45 && h < 75) {
      baseName = 'Laranja';
      baseColor = '#fb923c';
    }
    // AMARELO: 75-105°
    else if (h >= 75 && h < 105) {
      baseName = 'Amarelo';
      baseColor = '#fbbf24';
    }
    // VERDE-AMARELO: 105-135°
    else if (h >= 105 && h < 135) {
      baseName = 'Verde Amarelado';
      baseColor = '#a3e635';
    }
    // VERDE: 135-165°
    else if (h >= 135 && h < 165) {
      baseName = 'Verde';
      baseColor = '#22c55e';
    }
    // VERDE-CIANO: 165-195°
    else if (h >= 165 && h < 195) {
      baseName = 'Verde Azulado';
      baseColor = '#14b8a6';
    }
    // CIANO: 195-225°
    else if (h >= 195 && h < 225) {
      baseName = 'Ciano';
      baseColor = '#06b6d4';
    }
    // AZUL-CIANO: 225-255°
    else if (h >= 225 && h < 255) {
      baseName = 'Azul Claro';
      baseColor = '#3b82f6';
    }
    // AZUL: 255-285°
    else if (h >= 255 && h < 285) {
      baseName = 'Azul';
      baseColor = '#2563eb';
    }
    // ROXO/VIOLETA: 285-315°
    else if (h >= 285 && h < 315) {
      baseName = 'Roxo';
      baseColor = '#a855f7';
    }
    // MAGENTA/ROSA: 315-345°
    else if (h >= 315 && h < 345) {
      baseName = 'Rosa';
      baseColor = '#ec4899';
    }
    
    // ============================================
    // 3. ADICIONAR MODIFICADORES DE LUMINOSIDADE
    // ============================================
    let modifier = '';
    if (v < 35) {
      modifier = ' Escuro';
    } else if (v > 75 && s < 40) {
      modifier = ' Claro';
    }
    
    return {
      name: baseName + modifier,
      color: baseColor
    };
  }
  // ===============================================
  // CLASSIFICAÇÃO UNIVERSAL - MODO DESCRITIVO
  // ===============================================
  function classifyColorUniversal(hsv, rgb) {
    const { h, s, v } = hsv;
    
    // 1. Determinar acromático vs cromático
    let hueDesc = '';
    if (s < 12) {
      if (v >= 88) return { name: 'Branco puro', color: '#ffffff' };
      if (v <= 20) return { name: 'Preto profundo', color: '#666677' };
      hueDesc = 'neutro';
    } else {
      // Determinar matiz
      if (h >= 345 || h < 15) hueDesc = 'vermelho';
      else if (h >= 15 && h < 45) hueDesc = 'laranja avermelhado';
      else if (h >= 45 && h < 75) hueDesc = 'laranja';
      else if (h >= 75 && h < 105) hueDesc = 'amarelo';
      else if (h >= 105 && h < 135) hueDesc = 'verde amarelado';
      else if (h >= 135 && h < 165) hueDesc = 'verde';
      else if (h >= 165 && h < 195) hueDesc = 'verde azulado';
      else if (h >= 195 && h < 225) hueDesc = 'ciano';
      else if (h >= 225 && h < 255) hueDesc = 'azul claro';
      else if (h >= 255 && h < 285) hueDesc = 'azul';
      else if (h >= 285 && h < 315) hueDesc = 'roxo';
      else if (h >= 315 && h < 345) hueDesc = 'rosa';
    }
    
    // 2. Determinar brilho
    let brightnessDesc = '';
    if (v < 25) brightnessDesc = 'muito escuro';
    else if (v < 45) brightnessDesc = 'escuro';
    else if (v < 65) brightnessDesc = 'médio';
    else if (v < 82) brightnessDesc = 'claro';
    else brightnessDesc = 'muito claro';
    
    // 3. Determinar saturação
    let satDesc = '';
    if (s < 12) satDesc = 'sem cor';
    else if (s < 30) satDesc = 'pouco saturado';
    else if (s < 60) satDesc = 'saturado';
    else satDesc = 'muito saturado';
    
    // Construir descrição
    const parts = [hueDesc, brightnessDesc, satDesc].filter(p => p);
    const description = parts.join(', ');
    
    return {
      name: description.charAt(0).toUpperCase() + description.slice(1),
      color: classifyColorSimple(hsv, rgb).color
    };
  }
  // ===============================================
  // ESTABILIZAÇÃO COM MÉDIA MÓVEL
  // ===============================================
  function addToBuffer(hsv, rgb) {
    colorBuffer.push({ hsv, rgb });
    if (colorBuffer.length > BUFFER_SIZE) {
      colorBuffer.shift();
    }
  }
  
  function getStableColor() {
    if (colorBuffer.length === 0) return null;
    
    // Calcular média de HSV e RGB
    let avgH = 0, avgS = 0, avgV = 0;
    let avgR = 0, avgG = 0, avgB = 0;
    
    // Tratamento especial para Hue (é circular, 0° = 360°)
    let sinSum = 0, cosSum = 0;
    
    colorBuffer.forEach(item => {
      const radH = item.hsv.h * Math.PI / 180;
      sinSum += Math.sin(radH);
      cosSum += Math.cos(radH);
      
      avgS += item.hsv.s;
      avgV += item.hsv.v;
      avgR += item.rgb.r;
      avgG += item.rgb.g;
      avgB += item.rgb.b;
    });
    
    const len = colorBuffer.length;
    avgH = Math.atan2(sinSum / len, cosSum / len) * 180 / Math.PI;
    if (avgH < 0) avgH += 360;
    
    avgS /= len;
    avgV /= len;
    avgR = Math.round(avgR / len);
    avgG = Math.round(avgG / len);
    avgB = Math.round(avgB / len);
    
    return {
      hsv: { h: avgH, s: avgS, v: avgV },
      rgb: { r: avgR, g: avgG, b: avgB }
    };
  }
  // ===============================================
  // HISTERESE PARA EVITAR OSCILAÇÕES
  // ===============================================
  function shouldUpdateColor(newHue, newColorName) {
    // Se é a primeira vez, aceita
    if (!lastStableColorName) return true;
    
    // Se o nome mudou, verifica se a mudança de Hue é significativa
    if (newColorName !== lastStableColorName) {
      // Calcular diferença circular de Hue
      let diff = Math.abs(newHue - lastStableHue);
      if (diff > 180) diff = 360 - diff;
      
      // Só aceita mudança se for maior que o threshold
      return diff >= HYSTERESIS_THRESHOLD;
    }
    
    return true;
  }
  // ===============================================
  // AMOSTRAGEM DE PIXELS DA CÂMERA
  // ===============================================
  function samplePixels() {
    const vw = video.videoWidth, vh = video.videoHeight;
    if (!vw || !vh) return null;
    
    const cw = video.clientWidth, ch = video.clientHeight;
    const scale = Math.max(cw / vw, ch / vh);
    const offsetX = (vw * scale - cw) / 2;
    const offsetY = (vh * scale - ch) / 2;
    
    const nativeCX = Math.round((cw / 2 + offsetX) / scale);
    const nativeCY = Math.round((ch / 2 + offsetY) / scale);
    const nativeSample = Math.max(1, Math.round(SAMPLE_SIZE / scale));
    
    canvas.width = vw;
    canvas.height = vh;
    ctx.drawImage(video, 0, 0);
    
    const x0 = Math.max(0, nativeCX - nativeSample);
    const y0 = Math.max(0, nativeCY - nativeSample);
    const data = ctx.getImageData(x0, y0, nativeSample * 2, nativeSample * 2).data;
    
    let rSum = 0, gSum = 0, bSum = 0, count = 0;
    for (let i = 0; i < data.length; i += 4) {
      rSum += data[i];
      gSum += data[i + 1];
      bSum += data[i + 2];
      count++;
    }
    
    return {
      r: Math.round(rSum / count),
      g: Math.round(gSum / count),
      b: Math.round(bSum / count)
    };
  }
  // ===============================================
  // SISTEMA DE ÁUDIO
  // ===============================================
  function toggleAudio() {
    if (window.speechSynthesis) {
      window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
    }
    audioEnabled = !audioEnabled;
    const btn = document.getElementById('btn-audio');
    if (audioEnabled) {
      btn.textContent = '🔊 Áudio';
      btn.classList.add('audio-on');
    } else {
      btn.textContent = '🔇 Áudio';
      btn.classList.remove('audio-on');
      if (window.speechSynthesis) window.speechSynthesis.cancel();
      if (stableTimer) {
        clearTimeout(stableTimer);
        stableTimer = null;
      }
      pendingName = '';
      lastSpokenName = '';
    }
  }
  function toggleUniversalMode() {
    universalMode = !universalMode;
    const btn = document.getElementById('btn-universal');
    btn.textContent = universalMode ? '⭐ Universal' : '☆ Universal';
    btn.classList.toggle('universal-on', universalMode);
    
    lastSpokenName = '';
    pendingName = '';
    if (stableTimer) {
      clearTimeout(stableTimer);
      stableTimer = null;
    }
  }
  function speakColor(name) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    setTimeout(() => {
      if (!audioEnabled) return;
      const utt = new SpeechSynthesisUtterance(name);
      utt.lang = 'pt-BR';
      utt.rate = 1.1;
      utt.pitch = 1.0;
      window.speechSynthesis.speak(utt);
    }, 60);
  }
  function triggerAudioIfChanged(name) {
    if (!audioEnabled) return;
    
    if (name === lastSpokenName) {
      if (pendingName !== name && stableTimer) {
        clearTimeout(stableTimer);
        stableTimer = null;
        pendingName = '';
      }
      return;
    }
    
    if (name !== pendingName) {
      pendingName = name;
      if (stableTimer) clearTimeout(stableTimer);
      stableTimer = setTimeout(() => {
        if (!audioEnabled) {
          stableTimer = null;
          return;
        }
        lastSpokenName = pendingName;
        speakColor(pendingName);
        stableTimer = null;
      }, STABLE_SPEECH_MS);
    }
  }
  // ===============================================
  // LOOP PRINCIPAL DE ATUALIZAÇÃO
  // ===============================================
  function update() {
    if (!running || video.readyState < 2) {
      requestAnimationFrame(update);
      return;
    }
    
    const pixels = samplePixels();
    if (!pixels) {
      requestAnimationFrame(update);
      return;
    }
    
    const { r, g, b } = pixels;
    const hsv = rgbToHSV(r, g, b);
    
    // Adicionar ao buffer de estabilização
    addToBuffer(hsv, { r, g, b });
    
    // Obter cor estabilizada
    const stable = getStableColor();
    if (!stable) {
      requestAnimationFrame(update);
      return;
    }
    
    // Classificar cor
    const classification = universalMode 
      ? classifyColorUniversal(stable.hsv, stable.rgb)
      : classifyColorSimple(stable.hsv, stable.rgb);
    
    // Aplicar histerese
    if (shouldUpdateColor(stable.hsv.h, classification.name)) {
      lastStableColorName = classification.name;
      lastStableHue = stable.hsv.h;
      
      // Atualizar UI
      document.getElementById('color-name').textContent = classification.name;
      document.getElementById('color-name').style.color = classification.color;
      
      // Trigger áudio
      triggerAudioIfChanged(classification.name);
    }
    
    // Atualizar dados técnicos (sempre atualiza)
    document.getElementById('rgb-line').innerHTML =
      `<span class="lbl">R:</span>${stable.rgb.r} <span class="lbl">G:</span>${stable.rgb.g} <span class="lbl">B:</span>${stable.rgb.b}`;
    
    document.getElementById('hsv-line').innerHTML =
      `<span class="lbl">H:</span>${stable.hsv.h.toFixed(0)}° <span class="lbl">S:</span>${stable.hsv.s.toFixed(0)}% <span class="lbl">V:</span>${stable.hsv.v.toFixed(0)}%`;
    
    document.getElementById('color-swatch').style.background =
      `rgb(${stable.rgb.r},${stable.rgb.g},${stable.rgb.b})`;
    
    requestAnimationFrame(update);
  }
  // ===============================================
  // GERENCIAMENTO DE CÂMERA
  // ===============================================
  async function getDevices() {
    const devs = await navigator.mediaDevices.enumerateDevices();
    devices = devs.filter(d => d.kind === 'videoinput');
  }
  async function openCamera(preferredDeviceId) {
    if (stream) stream.getTracks().forEach(t => t.stop());
    
    const tryOpen = async (constraints) => {
      stream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = stream;
    };
    
    if (preferredDeviceId) {
      try {
        await tryOpen({
          video: {
            deviceId: { exact: preferredDeviceId },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }
        });
        return;
      } catch (_) {}
    }
    
    try {
      await tryOpen({
        video: {
          facingMode: { exact: 'environment' },
          width: { ideal: 1280 },
          height: { ideal: 720 }
        }
      });
      return;
    } catch (_) {}
    
    try {
      await tryOpen({
        video: {
          facingMode: 'environment',
          width: { ideal: 1280 },
          height: { ideal: 720 }
        }
      });
      return;
    } catch (_) {}
    
    try {
      await tryOpen({ video: true });
    } catch (e) {
      alert('Erro ao acessar a câmera: ' + e.message);
    }
  }
  async function startCamera() {
    document.getElementById('start-overlay').style.display = 'none';
    await getDevices();
    await openCamera();
    running = true;
    requestAnimationFrame(update);
  }
  async function switchCamera() {
    if (devices.length < 2) {
      alert('Apenas uma câmera disponível.');
      return;
    }
    deviceIndex = (deviceIndex + 1) % devices.length;
    await openCamera(devices[deviceIndex].deviceId);
  }
  // ===============================================
  // CALIBRAÇÃO (PLACEHOLDER - PODE SER EXPANDIDA)
  // ===============================================
  function calibrate() {
    if (!running) {
      alert('Inicie a câmera primeiro.');
      return;
    }
    
    const stable = getStableColor();
    if (!stable) return;
    
    base = stable.hsv;
    const btn = document.getElementById('btn-calibrate');
    btn.textContent = '✓ Calibrado';
    btn.classList.add('calibrated');
    
    document.getElementById('base-info').textContent =
      `Base: H:${base.h.toFixed(0)}° S:${base.s.toFixed(0)}% V:${base.v.toFixed(0)}%`;
  }
</script>
