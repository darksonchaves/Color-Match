<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro – Ultimate Perceptual Engine</title>

<style>
body { text-align:center; font-family:Arial; background:#111; color:#fff; }
video { width:90%; border-radius:10px; }
#box { width:120px; height:120px; margin:15px auto; border-radius:10px; border:2px solid #fff; }
</style>
</head>

<body>

<h2>ColorMatch Pro – Perceptual Engine MAX</h2>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<div id="box"></div>
<p id="txt">Toque para capturar</p>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// CAMERA (sem intervenção de cor manual)
navigator.mediaDevices.getUserMedia({
  video: { facingMode: { ideal: "environment" } }
}).then(s => video.srcObject = s);

// ---------------- RGB → LAB (percepção humana real) ----------------
function rgbToLab(r,g,b){

  r/=255; g/=255; b/=255;

  [r,g,b]=[r,g,b].map(v=>{
    return v>0.04045?Math.pow((v+0.055)/1.055,2.4):v/12.92;
  });

  let x=r*0.4124 + g*0.3576 + b*0.1805;
  let y=r*0.2126 + g*0.7152 + b*0.0722;
  let z=r*0.0193 + g*0.1192 + b*0.9505;

  x/=0.95047; y/=1.0; z/=1.08883;

  [x,y,z]=[x,y,z].map(v=>{
    return v>0.008856?Math.cbrt(v):(7.787*v)+(16/116);
  });

  return {
    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)
  };
}

// ---------------- ΔE (distância perceptual) ----------------
function deltaE(a,b){
  return Math.sqrt(
    (a.L-b.L)**2 +
    (a.a-b.a)**2 +
    (a.b-b.b)**2
  );
}

// ---------------- MODELO DE CORES ESTÁVEL ----------------
const colors = [
  {n:"Preto", lab:rgbToLab(12,12,12)},
  {n:"Branco", lab:rgbToLab(245,245,245)},
  {n:"Cinza", lab:rgbToLab(128,128,128)},

  {n:"Vermelho", lab:rgbToLab(220,65,65)},
  {n:"Verde", lab:rgbToLab(65,200,65)},
  {n:"Azul", lab:rgbToLab(65,85,220)},

  {n:"Amarelo", lab:rgbToLab(240,220,85)},
  {n:"Laranja", lab:rgbToLab(240,150,85)},
  {n:"Rosa", lab:rgbToLab(240,120,180)},
  {n:"Roxo", lab:rgbToLab(140,75,170)},
  {n:"Marrom", lab:rgbToLab(120,80,60)}
];

// ---------------- CAPTURA ULTRA ROBUSTA ----------------
function capture(x,y,cb){

  let samples = [];
  let frames = 6;

  function loop(){

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video,0,0);

    const size = 12;
    const d = ctx.getImageData(x-size,y-size,size*2,size*2).data;

    let r=0,g=0,b=0,c=0;

    for(let i=0;i<d.length;i+=4){

      const rr=d[i], gg=d[i+1], bb=d[i+2];

      // filtro de ruído extremo do sensor
      if(rr+gg+bb < 8 || rr+gg+bb > 740) continue;

      r+=rr; g+=gg; b+=bb;
      c++;
    }

    samples.push([r/c,g/c,b/c]);

    frames--;

    if(frames>0){
      requestAnimationFrame(loop);
    } else {

      // mediana temporal (robustez máxima prática)
      const rs = samples.map(s=>s[0]).sort((a,b)=>a-b);
      const gs = samples.map(s=>s[1]).sort((a,b)=>a-b);
      const bs = samples.map(s=>s[2]).sort((a,b)=>a-b);

      const mid = Math.floor(samples.length/2);

      cb(rs[mid],gs[mid],bs[mid]);
    }
  }

  loop();
}

// ---------------- CLASSIFICAÇÃO PERCEPTUAL ----------------
function detect(r,g,b){

  const lab = rgbToLab(r,g,b);

  let best = {n:"Indefinido", d:999};

  for(const c of colors){

    const d = deltaE(lab,c.lab);

    if(d < best.d){
      best = {n:c.n, d};
    }
  }

  return {
    name: best.n,
    confidence: Math.max(0, 100 - best.d * 2)
  };
}

// ---------------- RENDER ----------------
function render(r,g,b){

  const res = detect(r,g,b);

  document.getElementById("box").style.background =
    `rgb(${r},${g},${b})`;

  document.getElementById("txt").innerText =
    `${res.name} | confiança: ${res.confidence.toFixed(1)}%`;
}

// ---------------- INPUT ----------------
video.addEventListener("click",(e)=>{

  const rect = video.getBoundingClientRect();

  const x = (e.clientX-rect.left)*(video.videoWidth/rect.width);
  const y = (e.clientY-rect.top)*(video.videoHeight/rect.height);

  capture(x,y,(r,g,b)=>render(r,g,b));

});
</script>

</body>
</html>
