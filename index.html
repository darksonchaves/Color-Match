<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"


<title>
ColorMatch Pro – OEM MultiBrand Edition
</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
  text-align:center;
}

h2{
  margin-top:15px;
  font-size:28px;
}

video{
  width:92%;
  max-width:900px;
  min-height:260px;
  border-radius:12px;
  border:2px solid #333;
  object-fit:cover;
  background:#000;
}

button{
  padding:10px 14px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#222;
  color:#fff;
  font-size:15px;
}

button:hover{
  background:#333;
}

.activeMode{
  background:#00695c !important;
}

input,select{
  padding:10px;
  border-radius:8px;
  border:none;
  margin:5px;
  width:90%;
  max-width:420px;
}

#panel{
  display:flex;
  justify-content:space-around;
  flex-wrap:wrap;
  margin-top:15px;
}

.box{
  width:45%;
  min-width:160px;
}

canvas{
  width:100%;
  height:140px;
  border-radius:10px;
  background:#222;
}

#cross{
  position:fixed;
  top:50%;
  left:50%;
  width:26px;
  height:26px;
  transform:translate(-50%,-50%);
  border:2px solid #00ffcc;
  border-radius:50%;
  display:none;
  pointer-events:none;
  z-index:999;
}

#databasePanel{
  margin-top:20px;
  padding:15px;
  background:#181818;
  border-top:2px solid #333;
}

#resultList{
  margin-top:10px;
  text-align:left;
  width:90%;
  max-width:700px;
  margin-left:auto;
  margin-right:auto;
  background:#1f1f1f;
  border-radius:10px;
  padding:10px;
}

.item{
  padding:10px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

.item:hover{
  background:#2c2c2c;
}

.colorBox{
  width:18px;
  height:18px;
  display:inline-block;
  border-radius:50%;
  margin-right:8px;
  border:1px solid #fff;
  vertical-align:middle;
}

#txt{
  margin-top:15px;
  font-size:18px;
  padding:10px;
  min-height:40px;
}

#universalPanel{
  margin-top:15px;
  padding:10px;
  background:#181818;
  border-top:2px solid #333;
}

#cameraStatus{
  margin-top:10px;
  color:#00ffcc;
  font-size:15px;
}

</style>

</head>

<body>

<h2>
ColorMatch Pro – OEM MultiBrand Edition
</h2>

<button onclick="setMode('static')">
Estático
</button>

<button onclick="setMode('move')">
Movimento
</button>

<button onclick="setMode('comparePoint')">
Comparar Ponto a Ponto
</button>

<button onclick="setMode('compareDatabase')">
Comparar Base de Dados
</button>

<button onclick="analyzeOEM()">
🎨 OEM Scan
</button>

<button onclick="toggleFlash()">
⚡ Flash
</button>

<button onclick="toggleVoice()">
🔊 Áudio
</button>

<br><br>

<div id="universalPanel">

<h3>
Modo Universal
</h3>

<button
id="universalBtn"
onclick="toggleUniversalMode()"

Universal OFF
</button>

<p style="font-size:14px;color:#aaa;">
Reconhecimento puro baseado na leitura real da câmera
</p>

</div>

<video
id="video"
autoplay
playsinline
muted
</video>


<div id="cameraStatus">
Inicializando câmera...
</div>

<div id="cross"></div>

<div id="panel">

<div class="box">
<canvas id="canvasA"></canvas>
<div>Referência</div>
</div>

<div class="box">
<canvas id="canvasB"></canvas>
<div>Comparação</div>
</div>

</div>

<div id="databasePanel">

<h3>
Pesquisa OEM
</h3>

<input
type="text"
id="brandSearch"
placeholder="Digite a montadora..."
oninput="searchBrand()"


<br>

<select
id="modelSelect"
onchange="showModelColors()"


<option value="">
Selecione o modelo
</option>

</select>

<div id="resultList"></div>

</div>

<p id="txt">
Inicializando sistema...
</p>

<script>

/* ================= ELEMENTOS ================= */

const video =
document.getElementById("video");

const canvasA =
document.getElementById("canvasA");

const canvasB =
document.getElementById("canvasB");

const ctxA =
canvasA.getContext(
"2d",
{willReadFrequently:true}
);

const ctxB =
canvasB.getContext(
"2d",
{willReadFrequently:true}
);

const cross =
document.getElementById("cross");

const txt =
document.getElementById("txt");

const cameraStatus =
document.getElementById("cameraStatus");

/* ================= CONTROLE ================= */

let mode = "static";

let voice = true;

let universalMode = false;

let moveRunning = false;

let compareA = null;

let compareALab = null;

let compareStep = 0;

let selectedDatabaseColor = null;

/* ================= AUDIO ================= */

let currentSpokenColor = "";

let isSpeaking = false;

/* ================= ESTABILIDADE ================= */

let detectedColor = "";

let stableFrames = 0;

const MIN_STABLE_FRAMES = 8;

/* ================= FLASH ================= */

let streamTrack = null;

let flashOn = false;

let flashBusy = false;

let processingPaused = false;

/* ================= CAMERA ================= */

navigator.mediaDevices.getUserMedia({

  video:{
    facingMode:{
      ideal:"environment"
    }
  },

  audio:false

})

.then(stream=>{

  video.srcObject = stream;

  streamTrack =
  stream.getVideoTracks()[0];

  video.play()

  .then(()=>{

    cameraStatus.innerText =
    "Câmera ativa";

    txt.innerText =
    "Câmera iniciada com sucesso";

  })

  .catch(()=>{

    cameraStatus.innerText =
    "Falha ao iniciar preview";

    txt.innerText =
    "Erro ao reproduzir câmera";

  });

})

.catch(error=>{

  console.log(error);

  cameraStatus.innerText =
  "Falha ao iniciar câmera";

  txt.innerText =
  "Erro ao acessar câmera";

  alert(
    "Permita acesso à câmera no navegador"
  );

});

/* ================= VOZ ================= */

function speak(text){

  if(!voice) return;

  if(!text) return;

  if(text === currentSpokenColor){
    return;
  }

  currentSpokenColor = text;

  speechSynthesis.cancel();

  const msg =
  new SpeechSynthesisUtterance(text);

  msg.lang = "pt-BR";

  msg.rate = 1.0;

  msg.pitch = 1;

  msg.volume = 1;

  isSpeaking = true;

  msg.onend = ()=>{

    isSpeaking = false;
  };

  msg.onerror = ()=>{

    isSpeaking = false;
  };

  speechSynthesis.speak(msg);
}

/* ================= TOGGLE AUDIO ================= */

function toggleVoice(){

  voice = !voice;

  speechSynthesis.cancel();

  currentSpokenColor = "";

  isSpeaking = false;

  alert(
    "Áudio: "
    + (voice ? "ON" : "OFF")
  );
}

/* ================= UNIVERSAL ================= */

function toggleUniversalMode(){

  universalMode = !universalMode;

  const btn =
  document.getElementById("universalBtn");

  stableFrames = 0;

  detectedColor = "";

  currentSpokenColor = "";

  if(universalMode){

    btn.innerText =
    "Universal ON";

    btn.classList.add(
      "activeMode"
    );

    txt.innerText =
    "Modo universal ativado";

  }else{

    btn.innerText =
    "Universal OFF";

    btn.classList.remove(
      "activeMode"
    );

    txt.innerText =
    "Modo universal desativado";
  }
}

/* ================= FLASH ================= */

async function toggleFlash(){

  if(flashBusy) return;

  if(!streamTrack){

    alert("Câmera não iniciada");
    return;
  }

  flashBusy = true;

  processingPaused = true;

  try{

    const capabilities =
    streamTrack.getCapabilities();

    if(!capabilities.torch){

      alert(
        "Flash não suportado"
      );

      processingPaused = false;

      flashBusy = false;

      return;
    }

    flashOn = !flashOn;

    await streamTrack.applyConstraints({

      advanced:[
        {
          torch:flashOn
        }
      ]

    });

  }catch(e){

    console.log(e);

    flashOn = false;

    alert("Falha no flash");
  }

  processingPaused = false;

  setTimeout(()=>{

    flashBusy = false;

  },300);
}

/* ================= RGB -> HSL ================= */

function rgbToHsl(r,g,b){

  r/=255;
  g/=255;
  b/=255;

  const max =
  Math.max(r,g,b);

  const min =
  Math.min(r,g,b);

  let h,s,l;

  l = (max+min)/2;

  if(max===min){

    h = 0;
    s = 0;

  }else{

    const d = max-min;

    s =
    l>0.5
    ? d/(2-max-min)
    : d/(max+min);

    switch(max){

      case r:
      h = (g-b)/d + (g<b?6:0);
      break;

      case g:
      h = (b-r)/d + 2;
      break;

      case b:
      h = (r-g)/d + 4;
      break;
    }

    h /= 6;
  }

  return{
    h:h*360,
    s:s*100,
    l:l*100
  };
}

/* ================= RGB -> LAB ================= */

function rgbToLab(r,g,b){

  r/=255;
  g/=255;
  b/=255;

  [r,g,b] =
  [r,g,b].map(v=>

    v>0.04045
    ? Math.pow(
        (v+0.055)/1.055,
        2.4
      )
    : v/12.92
  );

  let x =
  r*0.4124 +
  g*0.3576 +
  b*0.1805;

  let y =
  r*0.2126 +
  g*0.7152 +
  b*0.0722;

  let z =
  r*0.0193 +
  g*0.1192 +
  b*0.9505;

  x/=0.95047;
  y/=1;
  z/=1.08883;

  [x,y,z] =
  [x,y,z].map(v=>

    v>0.008856
    ? Math.cbrt(v)
    : (7.787*v)+(16/116)
  );

  return{

    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)

  };
}

/* ================= DELTA E ================= */

function deltaE(a,b){

  return Math.sqrt(

    (a.L-b.L)**2 +

    (a.a-b.a)**2 +

    (a.b-b.b)**2

  );
}

/* ================= DATABASE ================= */

const oemDatabase = [

{
  brand:"Toyota",
  model:"Corolla",
  year:"2024",
  code:"040",
  name:"Super White II",
  rgb:{r:244,g:244,b:241}
},

{
  brand:"Toyota",
  model:"Corolla",
  year:"2024",
  code:"1F7",
  name:"Classic Silver Metallic",
  rgb:{r:169,g:173,b:177}
},

{
  brand:"Toyota",
  model:"Corolla",
  year:"2024",
  code:"218",
  name:"Midnight Black Metallic",
  rgb:{r:27,g:27,b:27}
},

{
  brand:"Toyota",
  model:"Corolla",
  year:"2024",
  code:"3U5",
  name:"Emotional Red",
  rgb:{r:126,g:31,b:36}
}

];

oemDatabase.forEach(item=>{

  item.lab =
  rgbToLab(

    item.rgb.r,
    item.rgb.g,
    item.rgb.b

  );
});

/* ================= CAPTURA ================= */

function captureRaw(x,y){

  if(
    !video.videoWidth ||
    !video.videoHeight ||
    processingPaused
  ){
    return{
      r:0,
      g:0,
      b:0
    };
  }

  canvasA.width =
  video.videoWidth;

  canvasA.height =
  video.videoHeight;

  ctxA.drawImage(
    video,
    0,
    0,
    canvasA.width,
    canvasA.height
  );

  const sampleSize = 24;

  const px =
  Math.max(
    0,
    Math.floor(x - sampleSize/2)
  );

  const py =
  Math.max(
    0,
    Math.floor(y - sampleSize/2)
  );

  const width =
  Math.min(
    sampleSize,
    canvasA.width - px
  );

  const height =
  Math.min(
    sampleSize,
    canvasA.height - py
  );

  if(width <= 0 || height <= 0){

    return{
      r:0,
      g:0,
      b:0
    };
  }

  const data =
  ctxA.getImageData(
    px,
    py,
    width,
    height
  ).data;

  let r=0;
  let g=0;
  let b=0;
  let c=0;

  for(let i=0;i<data.length;i+=4){

    const rr = data[i];
    const gg = data[i+1];
    const bb = data[i+2];

    const brightness =
    (rr+gg+bb)/3;

    if(
      brightness < 12 ||
      brightness > 245
    ){
      continue;
    }

    r += rr;
    g += gg;
    b += bb;

    c++;
  }

  if(c===0){

    return{
      r:0,
      g:0,
      b:0
    };
  }

  return{

    r:Math.round(r/c),
    g:Math.round(g/c),
    b:Math.round(b/c)

  };
}

/* ================= DETECTOR UNIVERSAL ================= */

function detectUniversalColor(r,g,b){

  const hsl =
  rgbToHsl(r,g,b);

  const h = hsl.h;
  const s = hsl.s;
  const l = hsl.l;

  if(
    l >= 82 &&
    s <= 10
  ){
    return "Branco";
  }

  if(
    l <= 15 &&
    s <= 20
  ){
    return "Preto";
  }

  if(
    s <= 15 &&
    l > 15 &&
    l < 82
  ){
    return "Cinza";
  }

  if(
    (h>=0 && h<=15) ||
    (h>=345 && h<=360)
  ){
    return "Vermelho";
  }

  if(h>=16 && h<=40){
    return "Laranja";
  }

  if(h>=41 && h<=68){
    return "Amarelo";
  }

  if(h>=69 && h<=165){
    return "Verde";
  }

  if(h>=166 && h<=260){
    return "Azul";
  }

  if(h>=261 && h<=320){
    return "Roxo";
  }

  if(h>=321 && h<=344){
    return "Rosa";
  }

  return "Indefinido";
}

/* ================= OEM MATCH ================= */

function detectOEM(sig){

  const targetLab =
  rgbToLab(
    sig.r,
    sig.g,
    sig.b
  );

  let best = null;

  let bestDelta = Infinity;

  for(const color of oemDatabase){

    const d =
    deltaE(
      targetLab,
      color.lab
    );

    if(d < bestDelta){

      bestDelta = d;

      best = color;
    }
  }

  return{

    match:best,
    delta:bestDelta

  };
}

/* ================= ANALYZER ================= */

function analyzeOEM(){

  if(!video.videoWidth){

    txt.innerText =
    "Câmera ainda não iniciou";

    return;
  }

  const sig =
  captureRaw(

    video.videoWidth/2,
    video.videoHeight/2

  );

  const result =
  detectOEM(sig);

  if(!result.match){

    txt.innerText =
    "Nenhuma cor encontrada";

    return;
  }

  const similarity =

  Math.max(
    0,
    100 - result.delta
  ).toFixed(1);

  txt.innerText =

  result.match.brand
  + " | "
  + result.match.model
  + " | "
  + result.match.year
  + " | "
  + result.match.code
  + " | "
  + result.match.name
  + " | "
  + similarity
  + "%";

  speak(result.match.name);
}

/* ================= MOVIMENTO ================= */

function moveLoop(){

  if(mode !== "move"){

    moveRunning = false;
    return;
  }

  if(processingPaused){

    requestAnimationFrame(
      moveLoop
    );

    return;
  }

  const sig =
  captureRaw(

    video.videoWidth/2,
    video.videoHeight/2

  );

  const colorName =
  detectUniversalColor(

    sig.r,
    sig.g,
    sig.b

  );

  txt.innerText =
  "Movimento: "
  + colorName;

  if(
    colorName !== "Indefinido"
  ){

    if(
      colorName === detectedColor
    ){

      stableFrames++;

    }else{

      detectedColor =
      colorName;

      stableFrames = 0;
    }

    if(
      stableFrames >=
      MIN_STABLE_FRAMES
    ){

      speak(colorName);

      stableFrames = 0;
    }
  }

  requestAnimationFrame(
    moveLoop
  );
}

/* ================= MODOS ================= */

function setMode(m){

  mode = m;

  compareStep = 0;

  compareA = null;

  compareALab = null;

  detectedColor = "";

  stableFrames = 0;

  currentSpokenColor = "";

  speechSynthesis.cancel();

  isSpeaking = false;

  cross.style.display =

  (
    m === "move" ||
    m === "comparePoint" ||
    m === "compareDatabase"
  )

  ? "block"
  : "none";

  txt.innerText =
  "Modo: " + m;

  if(
    m === "move" &&
    !moveRunning
  ){

    moveRunning = true;

    moveLoop();
  }
}

/* ================= PESQUISA ================= */

function searchBrand(){

  const brand =

  document
  .getElementById("brandSearch")
  .value
  .trim()
  .toLowerCase();

  const models =

  [...new Set(

    oemDatabase

    .filter(item=>

      item.brand
      .toLowerCase()
      .includes(brand)

    )

    .map(item=>item.model)

  )]

  .sort();

  const select =

  document.getElementById(
    "modelSelect"
  );

  select.innerHTML =

  `<option value="">
  Selecione o modelo
  </option>`;

  models.forEach(model=>{

    select.innerHTML +=

    `<option value="${model}">
    ${model}
    </option>`;
  });

  document
  .getElementById("resultList")
  .innerHTML = "";
}

/* ================= MOSTRAR CORES ================= */

function showModelColors(){

  const model =

  document
  .getElementById("modelSelect")
  .value;

  const resultList =

  document.getElementById(
    "resultList"
  );

  resultList.innerHTML = "";

  const colors =

  oemDatabase

  .filter(item=>
    item.model === model
  )

  .sort((a,b)=>

    a.name.localeCompare(
      b.name
    )
  );

  colors.forEach((item,index)=>{

    resultList.innerHTML +=

    `<div
    class="item"
    onclick="selectDatabaseColor(${index},'${item.name}')">

    <span
    class="colorBox"
    style="
    background:rgb(
    ${item.rgb.r},
    ${item.rgb.g},
    ${item.rgb.b}
    )">
    </span>

    <strong>${item.name}</strong>

    <br>

    Código:
    ${item.code}

    <br>

    Ano:
    ${item.year}

    </div>`;
  });
}

/* ================= SELECIONAR DATABASE ================= */

function selectDatabaseColor(index,colorName){

  const model =

  document
  .getElementById("modelSelect")
  .value;

  const colors =

  oemDatabase

  .filter(item=>
    item.model === model
  )

  .sort((a,b)=>

    a.name.localeCompare(
      b.name
    )
  );

  selectedDatabaseColor =
  colors[index];

  txt.innerText =

  "Cor de referência selecionada: "
  + colorName;

  speak(colorName);
}

/* ================= COMPARAR DATABASE ================= */

function compareWithDatabase(sig){

  if(!selectedDatabaseColor){

    alert(
      "Selecione uma cor da base OEM primeiro"
    );

    return;
  }

  const targetLab =

  rgbToLab(
    sig.r,
    sig.g,
    sig.b
  );

  const similarity =

  Math.max(
    0,
    100 -

    deltaE(
      targetLab,
      selectedDatabaseColor.lab
    )

  ).toFixed(1);

  txt.innerText =

  "BASE OEM: "
  + selectedDatabaseColor.name
  + " | "
  + similarity
  + "% similar";

  speak(
    similarity
    + " porcento similar"
  );
}

/* ================= CLIQUE ================= */

video.addEventListener(
"click",
(e)=>{

  if(processingPaused) return;

  if(!video.videoWidth) return;

  const rect =
  video.getBoundingClientRect();

  const x =

  (e.clientX - rect.left)
  *
  (
    video.videoWidth /
    rect.width
  );

  const y =

  (e.clientY - rect.top)
  *
  (
    video.videoHeight /
    rect.height
  );

  const sig =
  captureRaw(x,y);

  if(mode === "static"){

    analyzeOEM();
  }

  if(mode === "comparePoint"){

    if(compareStep === 0){

      compareA = sig;

      compareALab =

      rgbToLab(
        sig.r,
        sig.g,
        sig.b
      );

      compareStep = 1;

      txt.innerText =
      "Primeiro ponto capturado";

      speak(
        "Primeiro ponto capturado"
      );

    }else{

      const compareBLab =

      rgbToLab(
        sig.r,
        sig.g,
        sig.b
      );

      const similarity =

      Math.max(
        0,
        100 -

        deltaE(
          compareALab,
          compareBLab
        )

      ).toFixed(1);

      txt.innerText =

      "Similaridade entre pontos: "
      + similarity
      + "%";

      speak(
        similarity
        + " porcento similar"
      );

      compareStep = 0;
    }
  }

  if(mode === "compareDatabase"){

    compareWithDatabase(sig);
  }

});

</script>

</body>
</html>
