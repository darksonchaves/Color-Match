<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro – Precision Select</title>

<style>
body {
  text-align:center;
  font-family:Arial;
  background:#111;
  color:#fff;
  margin:0;
}

video {
  width:90%;
  border-radius:10px;
}

/* BOXES */
#colorBox, #boxA, #boxB {
  width:90px;
  height:90px;
  margin:10px;
  display:inline-block;
  border-radius:10px;
  border:2px solid #fff;
}

/* SNAPSHOT */
#snapshot {
  width:90%;
  margin:10px auto;
  border-radius:10px;
  display:none;
  border:2px solid #00ffcc;
}

/* CROSSHAIR FIXO */
#crosshair {
  position:absolute;
  top:50%;
  left:50%;
  width:20px;
  height:20px;
  transform:translate(-50%,-50%);
  border:2px solid #00ffcc;
  border-radius:50%;
  pointer-events:none;
}

/* PONTO TOCADO */
#touchPoint {
  position:absolute;
  width:18px;
  height:18px;
  border-radius:50%;
  border:2px solid red;
  pointer-events:none;
  display:none;
}

button {
  padding:10px;
  margin:5px;
}

#result {
  margin-top:10px;
  font-size:14px;
  color:#00ffcc;
}
</style>
</head>

<body>

<h2>ColorMatch Pro – Precision Engine</h2>

<button onclick="setMode('static')">Modo Estático</button>
<button onclick="setMode('compare1')">Comparar 1</button>
<button onclick="setMode('compare2')">Comparar 2</button>
<button onclick="runCompare()">Comparar</button>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<!-- VISUAIS -->
<div id="crosshair"></div>
<div id="touchPoint"></div>

<img id="snapshot"/>

<div>
  <div id="colorBox"></div>
  <div id="boxA"></div>
  <div id="boxB"></div>
</div>

<p id="result">Toque na tela para selecionar o ponto</p>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let mode = "static";

let sampleA = null;
let sampleB = null;

// ---------------- CAMERA ----------------
navigator.mediaDevices.getUserMedia({
  video: { facingMode: { ideal: "environment" } }
}).then(s => video.srcObject = s);

// ---------------- LAB ----------------
function rgbToLab(r,g,b){

  r/=255; g/=255; b/=255;

  [r,g,b]=[r,g,b].map(v=>{
    return v>0.04045
      ? Math.pow((v+0.055)/1.055,2.4)
      : v/12.92;
  });

  let x=r*0.4124 + g*0.3576 + b*0.1805;
  let y=r*0.2126 + g*0.7152 + b*0.0722;
  let z=r*0.0193 + g*0.1192 + b*0.9505;

  x/=0.95047;
  y/=1.0;
  z/=1.08883;

  [x,y,z]=[x,y,z].map(v=>{
    return v>0.008856 ? Math.cbrt(v) : (7.787*v)+(16/116);
  });

  return {
    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)
  };
}

// ---------------- ΔE ----------------
function deltaE(a,b){
  return Math.sqrt(
    (a.L-b.L)**2 +
    (a.a-b.a)**2 +
    (a.b-b.b)**2
  );
}

// ---------------- CAPTURA ----------------
function capture(x,y){

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  const size = 12;

  const data = ctx.getImageData(
    x-size,y-size,size*2,size*2
  ).data;

  let r=0,g=0,b=0,c=0;

  for(let i=0;i<data.length;i+=4){
    r+=data[i];
    g+=data[i+1];
    b+=data[i+2];
    c++;
  }

  r/=c; g/=c; b/=c;

  return {
    rgb:{r,g,b},
    lab: rgbToLab(r,g,b)
  };
}

// ---------------- CLICK + MIRA VISUAL ----------------
video.addEventListener("click",(e)=>{

  const rect = video.getBoundingClientRect();

  const x = (e.clientX-rect.left)*(video.videoWidth/rect.width);
  const y = (e.clientY-rect.top)*(video.videoHeight/rect.height);

  // 🔴 ponto visual tocado
  const point = document.getElementById("touchPoint");
  point.style.left = e.clientX + "px";
  point.style.top = e.clientY + "px";
  point.style.display = "block";

  const sample = capture(x,y);

  const color = `rgb(${sample.rgb.r},${sample.rgb.g},${sample.rgb.b})`;

  document.getElementById("snapshot").src = canvas.toDataURL();
  document.getElementById("snapshot").style.display = "block";

  if(mode === "static"){
    document.getElementById("colorBox").style.background = color;
    document.getElementById("result").innerText = "Cor: " + color;
  }

  if(mode === "compare1"){
    sampleA = sample;
    document.getElementById("boxA").style.background = color;
    document.getElementById("result").innerText = "Amostra 1 selecionada";
  }

  if(mode === "compare2"){
    sampleB = sample;
    document.getElementById("boxB").style.background = color;
    document.getElementById("result").innerText = "Amostra 2 selecionada";
  }

});

// ---------------- COMPARAÇÃO ----------------
function runCompare(){

  if(!sampleA || !sampleB){
    alert("Selecione as duas amostras");
    return;
  }

  const d = deltaE(sampleA.lab, sampleB.lab);

  const similarity = Math.max(0, 100 - d * 2.5);
  const diff = 100 - similarity;

  document.getElementById("result").innerText =
    `Similaridade: ${similarity.toFixed(1)}% | Diferença: ${diff.toFixed(1)}%`;
}

// ---------------- MODE ----------------
function setMode(m){
  mode = m;
}

</script>

</body>
</html>
