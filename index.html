<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motor de Cor - Compensação de Brilho v2.0</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  #header {
    background: rgba(10,10,20,0.88);
    padding: 5px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(100,100,255,0.15);
    z-index: 30;
    position: relative;
    flex-shrink: 0;
  }
  #btn-system {
    padding: 5px 12px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    transition: all 0.2s ease;
  }
  #btn-system.system-on {
    background: linear-gradient(135deg, #1a4a2e, #2a7a4e);
    color: #6effa0;
    border: 1px solid rgba(60,200,100,0.45);
    box-shadow: 0 0 8px rgba(60,200,100,0.25);
  }
  #btn-system.system-off {
    background: linear-gradient(135deg, #3a1a1a, #5a2020);
    color: #ff5050;
    border: 1px solid rgba(200,50,50,0.45);
    box-shadow: 0 0 8px rgba(200,50,50,0.2);
  }
  #top-bar {
    background: rgba(8,8,20,0.86);
    border-bottom: 1px solid rgba(100,100,255,0.12);
    padding: 5px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 25;
    position: relative;
    flex-shrink: 0;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    flex-wrap: wrap;
  }
  #color-swatch {
    width: 28px;
    height: 28px;
    border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.12);
    flex-shrink: 0;
    transition: background 0.25s ease;
    box-shadow: 0 0 8px rgba(0,0,0,0.5);
  }
  #color-name {
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.4px;
    min-width: 120px;
  }
  #confidence-display {
    font-size: 0.58rem;
    color: #6a6;
    white-space: nowrap;
  }
  .sep {
    color: rgba(100,100,255,0.3);
    font-size: 0.7rem;
    flex-shrink: 0;
  }
  .data-inline {
    font-size: 0.64rem;
    font-family: 'Courier New', monospace;
    color: #aab;
    white-space: nowrap;
  }
  .data-inline .lbl { color: #558; margin-right: 1px; }
  #base-info {
    font-size: 0.58rem;
    color: #446;
    white-space: nowrap;
  }
  #light-warning {
    font-size: 0.58rem;
    color: #fa0;
    white-space: nowrap;
    display: none;
  }
  .btn-top {
    padding: 4px 8px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    transition: all 0.18s ease;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-top:disabled {
    opacity: 0.25;
    cursor: not-allowed;
  }
  #btn-calibrate {
    background: linear-gradient(135deg, #2a2a6e, #3a3a9e);
    color: #aac;
    border: 1px solid rgba(100,100,255,0.3);
  }
  #btn-calibrate:hover:not(:disabled) { background: linear-gradient(135deg, #3a3a8e, #5a5abe); color: #eef; }
  #btn-calibrate.calibrated {
    background: linear-gradient(135deg, #1a4a2e, #2a7a4e);
    border-color: rgba(50,200,100,0.4);
    color: #8fc;
  }
  #btn-camera {
    background: linear-gradient(135deg, #2a1a3e, #4a2a6e);
    color: #bac;
    border: 1px solid rgba(180,100,255,0.3);
  }
  #btn-camera:hover:not(:disabled) { background: linear-gradient(135deg, #3a2a5e, #6a4a9e); color: #edf; }
  #btn-audio {
    background: linear-gradient(135deg, #1a1a2e, #2a2a3e);
    color: #446;
    border: 1px solid rgba(100,100,150,0.2);
  }
  #btn-audio:hover:not(:disabled) { background: linear-gradient(135deg, #252535, #353550); color: #778; }
  #btn-audio.audio-on {
    background: linear-gradient(135deg, #163a1e, #1f6030);
    color: #6effa0;
    border: 1px solid rgba(60,200,100,0.45);
    box-shadow: 0 0 6px rgba(60,200,100,0.2);
  }
  #btn-universal {
    background: linear-gradient(135deg, #1a1a2e, #2a2a3e);
    color: #446;
    border: 1px solid rgba(100,100,150,0.2);
  }
  #btn-universal:hover:not(:disabled) { background: linear-gradient(135deg, #252535, #353550); color: #778; }
  #btn-universal.universal-on {
    background: linear-gradient(135deg, #3a2a1e, #6a4a30);
    color: #ffa060;
    border: 1px solid rgba(200,100,60,0.45);
    box-shadow: 0 0 6px rgba(200,100,60,0.2);
  }
  #main {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #camera-container {
    position: absolute;
    inset: 0;
    background: #000;
  }
  #videoEl {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
  }
  #canvasEl { display: none; }
  #reticle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60px;
    height: 60px;
    pointer-events: none;
    z-index: 20;
  }
  .reticle-h {
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    height: 2px;
    background: rgba(120,220,255,0.9);
    transform: translateY(-50%);
    box-shadow: 0 0 4px rgba(120,220,255,0.5);
  }
  .reticle-v {
    position: absolute;
    left: 50%;
    top: 0;
    height: 100%;
    width: 2px;
    background: rgba(120,220,255,0.9);
    transform: translateX(-50%);
    box-shadow: 0 0 4px rgba(120,220,255,0.5);
  }
  .reticle-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 22px;
    height: 22px;
    border: 1.5px solid rgba(120,220,255,0.5);
  }
  .reticle-sample-circle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1px dashed rgba(120,220,255,0.55);
  }
  .reticle-dot {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(120,220,255,0.9);
    box-shadow: 0 0 4px rgba(120,220,255,0.8);
  }
  #start-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 30;
    gap: 14px;
  }
  #start-overlay p { color: #778; font-size: 0.88rem; }
  #btn-start {
    padding: 13px 30px;
    background: linear-gradient(135deg, #3a3a9e, #7b5ce8);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  #btn-start:hover { transform: scale(1.05); }
  
  @media (max-width: 768px) {
    #header { padding: 4px 8px; }
    #btn-system { font-size: 0.6rem; padding: 4px 9px; }
    #top-bar { gap: 6px; padding: 4px 8px; }
    .btn-top { padding: 3px 6px; font-size: 0.55rem; }
    #color-name { font-size: 0.74rem; min-width: 100px; }
    .data-inline { font-size: 0.58rem; }
    #base-info { font-size: 0.54rem; }
  }
</style>
</head>
<body>
<div id="header">
  <button id="btn-system" class="system-on" onclick="toggleSystem()">SISTEMA/ON</button>
  <span style="font-size:0.6rem;color:#334;letter-spacing:1px;">Compensação de Brilho v2.0 · Filtros Aprimorados</span>
</div>
<div id="top-bar">
  <div id="color-swatch" style="background:#1a1a2e;"></div>
  <div id="color-name" style="color:#445;">Aguardando...</div>
  <div id="confidence-display"></div>
  <span class="sep">│</span>
  <div class="data-inline" id="hsv-line">
    <span class="lbl">H:</span>--- &nbsp;<span class="lbl">S:</span>--- &nbsp;<span class="lbl">V:</span>---
  </div>
  <span class="sep">│</span>
  <div class="data-inline" id="rgb-line">
    <span class="lbl">R:</span>--- &nbsp;<span class="lbl">G:</span>--- &nbsp;<span class="lbl">B:</span>---
  </div>
  <span class="sep">│</span>
  <div id="base-info">Base: não calibrada</div>
  <div id="light-warning">⚠️ Pouca luz</div>
  <span class="sep">│</span>
  <button class="btn-top" id="btn-calibrate" onclick="calibrate()">&#9670; Calibrar</button>
  <button class="btn-top" id="btn-camera"    onclick="switchCamera()">&#8635; Câmera</button>
  <button class="btn-top" id="btn-audio"     onclick="toggleAudio()">&#128263; Áudio</button>
  <button class="btn-top" id="btn-universal" onclick="toggleUniversalMode()">&#9733; Universal</button>
</div>
<div id="main">
  <div id="camera-container">
    <video id="videoEl" autoplay playsinline muted></video>
    <canvas id="canvasEl"></canvas>
    <div id="reticle">
      <div class="reticle-h"></div>
      <div class="reticle-v"></div>
      <div class="reticle-box"></div>
      <div class="reticle-sample-circle"></div>
      <div class="reticle-dot"></div>
    </div>
    <div id="start-overlay">
      <p>Toque para iniciar a câmera</p>
      <button id="btn-start" onclick="startCamera()">&#9654; Iniciar Câmera</button>
    </div>
  </div>
</div>
<script>
  const video = document.getElementById('videoEl');
  const canvas = document.getElementById('canvasEl');
  const ctx = canvas.getContext('2d');
  
  let stream = null, devices = [], deviceIndex = 0, running = false, universalMode = false;
  let systemOn = true;
  
  let whiteReference = null;
  let isCalibrated = false;
  let ambientProfile = { light: 100, whiteV: 100, grayZone: { min: 0, max: 100 } };
  
  const SAMPLE_SIZE = 12;
  // MODIFICAÇÃO 2: Aumentado buffer para melhor média móvel (era 10, agora 8 para performance)
  const BUFFER_SIZE = 8;
  const HYSTERESIS_THRESHOLD = 6;
  const RGB_CHANGE_THRESHOLD = 55;
  const WHITE_RGB_DISTANCE = 20;
  
  let colorBuffer = [];
  let lastStableColorName = '';
  let lastStableHue = 0;
  let lastStableRGB = { r: 0, g: 0, b: 0 };
  let lastStableVariance = 0;
  
  let mismatchCounter = 0;
  const MISMATCH_FORCE_UPDATE = 5;
  
  let audioEnabled = false, lastSpokenName = '', pendingName = '', stableTimer = null;
  // MODIFICAÇÃO 2: Aumentado tempo de estabilização para 400ms (era 400, mantido)
  const STABLE_SPEECH_MS = 400;
  
  // MODIFICAÇÃO 2: Contador de frames consecutivos para evitar flicker
  let consecutiveFrameCounter = 0;
  const MIN_CONSECUTIVE_FRAMES = 3;
  
  function toggleSystem() {
    systemOn = !systemOn;
    const btn = document.getElementById('btn-system');
    const btns = ['btn-calibrate', 'btn-camera', 'btn-audio', 'btn-universal'];
    
    if (systemOn) {
      btn.textContent = 'SISTEMA/ON';
      btn.className = 'system-on';
      btns.forEach(id => document.getElementById(id).disabled = false);
    } else {
      btn.textContent = 'SISTEMA/OFF';
      btn.className = 'system-off';
      btns.forEach(id => document.getElementById(id).disabled = true);
      if (window.speechSynthesis) window.speechSynthesis.cancel();
      if (stableTimer) { clearTimeout(stableTimer); stableTimer = null; }
      document.getElementById('color-name').textContent = '---';
      document.getElementById('color-name').style.color = '#445';
      document.getElementById('confidence-display').textContent = '';
      document.getElementById('hsv-line').innerHTML = '<span class="lbl">H:</span>--- &nbsp;<span class="lbl">S:</span>--- &nbsp;<span class="lbl">V:</span>---';
      document.getElementById('rgb-line').innerHTML = '<span class="lbl">R:</span>--- &nbsp;<span class="lbl">G:</span>--- &nbsp;<span class="lbl">B:</span>---';
      document.getElementById('color-swatch').style.background = '#1a1a2e';
      document.getElementById('light-warning').style.display = 'none';
    }
  }
  
  function rgbToHSV(r, g, b) {
    r /= 255; g /= 255; b /= 255;
    const max = Math.max(r, g, b), min = Math.min(r, g, b), delta = max - min;
    let h = 0, s = 0, v = max;
    if (delta !== 0) {
      s = delta / max;
      if (max === r) h = ((g - b) / delta + (g < b ? 6 : 0)) / 6;
      else if (max === g) h = ((b - r) / delta + 2) / 6;
      else h = ((r - g) / delta + 4) / 6;
    }
    return { h: h * 360, s: s * 100, v: v * 100 };
  }
  
  // MODIFICAÇÃO 3: Função de normalização de luminância adaptativa
  function normalizeLuminance(hsv, rgb) {
    const avgRGB = (rgb.r + rgb.g + rgb.b) / 3;
    
    // Detectar se há reflexo especular (brilho excessivo em superfície)
    const maxChannel = Math.max(rgb.r, rgb.g, rgb.b);
    const minChannel = Math.min(rgb.r, rgb.g, rgb.b);
    const channelSpread = maxChannel - minChannel;
    
    // Se os canais RGB estão muito próximos e V está alto, pode ser reflexo
    const isSpecularReflection = (channelSpread < 30 && hsv.v > 75);
    
    let normalizedV = hsv.v;
    
    // Aplicar normalização adaptativa baseada na intensidade média
    if (avgRGB > 200 && hsv.v > 70) {
      // Luz muito forte - reduzir V proporcionalmente
      const reductionFactor = Math.min(0.25, (avgRGB - 200) / 220);
      normalizedV = hsv.v * (1 - reductionFactor);
    } else if (isSpecularReflection) {
      // Reflexo especular detectado - reduzir drasticamente
      normalizedV = hsv.v * 0.75;
    }
    
    return {
      h: hsv.h,
      s: hsv.s,
      v: normalizedV,
      originalV: hsv.v
    };
  }
  
  function detectAmbientLight(v, rgb) {
    const avgRGB = (rgb.r + rgb.g + rgb.b) / 3;
    ambientProfile.light = Math.min(100, (avgRGB / 255) * 100 + v * 0.5);
    const warning = document.getElementById('light-warning');
    
    // MODIFICAÇÃO 3: Limiares de aviso mais adaptativos e menos sensíveis
    if (ambientProfile.light < 35) {
      warning.style.display = 'block';
      warning.textContent = '⚠️ Pouca luz';
    } else if (ambientProfile.light > 92) {
      // Aumentado de 85 para 92 para reduzir avisos desnecessários
      warning.style.display = 'block';
      warning.textContent = '⚠️ Luz excessiva';
    } else {
      warning.style.display = 'none';
    }
    return ambientProfile.light;
  }
  
  function calculateVariance(buffer) {
    if (buffer.length < 3) return 0;
    const values = buffer.map(item => item.hsv.v);
    const mean = values.reduce((a, b) => a + b, 0) / values.length;
    const variance = values.reduce((sum, val) => sum + Math.pow(val - mean, 2), 0) / values.length;
    return Math.sqrt(variance);
  }
  
  function applyDarkGlasses(hsv, variance, rgb) {
    let adjustedV = hsv.v;
    const isReflective = variance > 6;
    
    if (isReflective) {
      const reductionFactor = Math.min(0.4, variance / 25);
      adjustedV = hsv.v * (1 - reductionFactor);
    }
    
    return {
      h: hsv.h,
      s: hsv.s,
      v: adjustedV,
      originalV: hsv.v
    };
  }
  
  function distanceFromWhiteRef(rgb) {
    if (!whiteReference) return Infinity;
    const dr = rgb.r - whiteReference.rgb.r;
    const dg = rgb.g - whiteReference.rgb.g;
    const db = rgb.b - whiteReference.rgb.b;
    return Math.sqrt(dr * dr + dg * dg + db * db);
  }
  
  function getAdaptiveThresholds() {
    let whiteThreshold, blackThreshold, satThreshold, grayMaxThreshold;
    
    if (isCalibrated) {
      grayMaxThreshold = Math.min(ambientProfile.grayZone.max, ambientProfile.whiteV - 18);
      whiteThreshold = ambientProfile.whiteV - 5;
      blackThreshold = Math.max(22, Math.min(32, ambientProfile.whiteV * 0.35));
      satThreshold = 22;
    } else {
      if (ambientProfile.light < 40) {
        whiteThreshold = 62; blackThreshold = 32; satThreshold = 24; grayMaxThreshold = 50;
      } else if (ambientProfile.light > 70) {
        whiteThreshold = 78; blackThreshold = 22; satThreshold = 14; grayMaxThreshold = 68;
      } else {
        whiteThreshold = 72; blackThreshold = 28; satThreshold = 18; grayMaxThreshold = 60;
      }
    }
    
    return { whiteThreshold, blackThreshold, satThreshold, grayMaxThreshold };
  }
  
  // MODIFICAÇÃO 1: Função de classificação acromática com validação de saturação
  function classifyAchromatic(v, s, rgb, thresholds) {
    // REGRA CRÍTICA: Se saturação > 20%, NUNCA classificar como acromático
    if (s > 20) {
      return null; // Forçar classificação cromática
    }
    
    if (isCalibrated && whiteReference) {
      const dist = distanceFromWhiteRef(rgb);
      if (dist <= WHITE_RGB_DISTANCE) {
        return { name: 'Branco', color: '#ffffff', confidence: 98 };
      }
      if (v <= thresholds.blackThreshold) {
        return { name: 'Preto', color: '#1a1a2a', confidence: 98 };
      }
      return { name: 'Cinza', color: '#9999aa', confidence: 96 };
    }
    
    if (v >= thresholds.whiteThreshold) {
      return { name: 'Branco', color: '#ffffff', confidence: 98 };
    } else if (v <= thresholds.blackThreshold) {
      return { name: 'Preto', color: '#1a1a2a', confidence: 98 };
    }
    return { name: 'Cinza', color: '#9999aa', confidence: 96 };
  }
  
  function classifyPinkRegion(h, s, v, rgb) {
    if (h >= 345 || h < 20) {
      const hasBlueComponent = rgb.b > rgb.g * 1.2;
      if (s < 58 && v > 40) {
        return 'Rosa';
      }
      if (hasBlueComponent && s < 72 && v > 45) {
        return 'Rosa';
      }
      return 'Vermelho';
    }
    
    if (h >= 290 && h < 345) {
      const moreRedThanBlue = rgb.r > rgb.b * 0.9;
      if (s < 60 && v > 40) {
        return 'Rosa';
      }
      if (moreRedThanBlue && s < 70 && v > 45) {
        return 'Rosa';
      }
      return 'Magenta';
    }
    
    return null;
  }
  
  function classifyColorSimple(hsv, rgb, variance) {
    const thresholds = getAdaptiveThresholds();
    
    // MODIFICAÇÃO 3: Aplicar normalização de luminância ANTES do processamento
    const normalized = normalizeLuminance(hsv, rgb);
    const adjusted = applyDarkGlasses(normalized, variance, rgb);
    const { h, s, v } = adjusted;
    
    // MODIFICAÇÃO 1: Tentar classificação acromática com validação de saturação
    if (s < thresholds.satThreshold) {
      const achromaticResult = classifyAchromatic(v, s, rgb, thresholds);
      if (achromaticResult !== null) {
        return achromaticResult;
      }
      // Se retornou null, a saturação está entre satThreshold e 20%, forçar cromático
    }
    
    // Classificação cromática obrigatória
    let baseName = '', baseColor = '', confidence = 98;
    
    const pinkResult = classifyPinkRegion(h, s, v, rgb);
    if (pinkResult !== null) {
      if (pinkResult === 'Rosa') {
        baseName = 'Rosa';
        baseColor = '#ff88aa';
        confidence = 95;
      } else if (pinkResult === 'Vermelho') {
        baseName = 'Vermelho';
        baseColor = '#ef4444';
      } else {
        baseName = 'Magenta';
        baseColor = '#d946ef';
      }
    }
    else if (h >= 20 && h < 35) {
      baseName = 'Laranja';
      baseColor = '#f97316';
    }
    else if (h >= 35 && h < 70) {
      baseName = 'Amarelo';
      baseColor = '#fbbf24';
    }
    else if (h >= 70 && h < 165) {
      baseName = 'Verde';
      baseColor = '#22c55e';
    }
    else if (h >= 165 && h < 190) {
      baseName = 'Ciano';
      baseColor = '#06b6d4';
    }
    else if (h >= 190 && h < 260) {
      baseName = 'Azul';
      baseColor = '#3b82f6';
    }
    else if (h >= 260 && h < 290) {
      baseName = 'Roxo';
      baseColor = '#a855f7';
    }
    
    let modifier = '';
    if (v < 28) modifier = ' Escuro';
    else if (v > 82 && s < 45) modifier = ' Claro';
    
    if (ambientProfile.light < 35) confidence = Math.max(75, confidence - 10);
    
    return { name: baseName + modifier, color: baseColor, confidence };
  }
  
  function classifyColorUniversal(hsv, rgb, variance) {
    const thresholds = getAdaptiveThresholds();
    
    // MODIFICAÇÃO 3: Aplicar normalização de luminância ANTES do processamento
    const normalized = normalizeLuminance(hsv, rgb);
    const adjusted = applyDarkGlasses(normalized, variance, rgb);
    const { h, s, v } = adjusted;
    
    let confidence = 98;
    
    // MODIFICAÇÃO 1: Tentar classificação acromática com validação de saturação
    if (s < thresholds.satThreshold) {
      const achromaticResult = classifyAchromatic(v, s, rgb, thresholds);
      if (achromaticResult !== null) {
        return achromaticResult;
      }
    }
    
    // Classificação cromática
    let colorName = '', colorHex = '';
    
    const pinkResult = classifyPinkRegion(h, s, v, rgb);
    if (pinkResult !== null) {
      if (pinkResult === 'Rosa') {
        colorName = 'Rosa';
        colorHex = '#ff88aa';
        confidence = 95;
      } else if (pinkResult === 'Vermelho') {
        colorName = 'Vermelho';
        colorHex = '#ef4444';
      } else {
        colorName = 'Magenta';
        colorHex = '#d946ef';
      }
    }
    else if (h >= 20 && h < 35) { colorName = 'Laranja'; colorHex = '#f97316'; }
    else if (h >= 35 && h < 70) { colorName = 'Amarelo'; colorHex = '#fbbf24'; }
    else if (h >= 70 && h < 165) { colorName = 'Verde'; colorHex = '#22c55e'; }
    else if (h >= 165 && h < 190) { colorName = 'Ciano'; colorHex = '#06b6d4'; }
    else if (h >= 190 && h < 260) { colorName = 'Azul'; colorHex = '#3b82f6'; }
    else if (h >= 260 && h < 290) { colorName = 'Roxo'; colorHex = '#a855f7'; }
    
    if (ambientProfile.light < 35) confidence = Math.max(75, confidence - 10);
    return { name: colorName, color: colorHex, confidence };
  }
  
  function addToBuffer(hsv, rgb) {
    colorBuffer.push({ hsv, rgb });
    if (colorBuffer.length > BUFFER_SIZE) colorBuffer.shift();
  }
  
  function getStableColor() {
    if (colorBuffer.length < 3) return null;
    const filteredBuffer = filterOutliers(colorBuffer);
    if (filteredBuffer.length === 0) return null;
    
    let avgH = 0, avgS = 0, avgV = 0, avgR = 0, avgG = 0, avgB = 0;
    let sinSum = 0, cosSum = 0;
    
    filteredBuffer.forEach(item => {
      const radH = item.hsv.h * Math.PI / 180;
      sinSum += Math.sin(radH);
      cosSum += Math.cos(radH);
      avgS += item.hsv.s;
      avgV += item.hsv.v;
      avgR += item.rgb.r;
      avgG += item.rgb.g;
      avgB += item.rgb.b;
    });
    
    const len = filteredBuffer.length;
    avgH = Math.atan2(sinSum / len, cosSum / len) * 180 / Math.PI;
    if (avgH < 0) avgH += 360;
    avgS /= len; avgV /= len;
    avgR = Math.round(avgR / len);
    avgG = Math.round(avgG / len);
    avgB = Math.round(avgB / len);
    
    return { hsv: { h: avgH, s: avgS, v: avgV }, rgb: { r: avgR, g: avgG, b: avgB } };
  }
  
  function filterOutliers(buffer) {
    if (buffer.length < 5) return buffer;
    const vValues = buffer.map(item => item.hsv.v).sort((a, b) => a - b);
    const median = vValues[Math.floor(vValues.length / 2)];
    return buffer.filter(item => Math.abs(item.hsv.v - median) < 30);
  }
  
  function detectObjectChange(newRGB) {
    if (!lastStableRGB.r && !lastStableRGB.g && !lastStableRGB.b) return false;
    const deltaR = Math.abs(newRGB.r - lastStableRGB.r);
    const deltaG = Math.abs(newRGB.g - lastStableRGB.g);
    const deltaB = Math.abs(newRGB.b - lastStableRGB.b);
    const rgbDistance = Math.sqrt(deltaR * deltaR + deltaG * deltaG + deltaB * deltaB);
    return rgbDistance > RGB_CHANGE_THRESHOLD;
  }
  
  // MODIFICAÇÃO 2: Função aprimorada de decisão de atualização com contador de frames
  function shouldUpdateColor(newHue, newColorName, newRGB, newSat, newVariance) {
    if (!lastStableColorName) return true;
    if (detectObjectChange(newRGB)) {
      consecutiveFrameCounter = 0;
      return true;
    }
    if (Math.abs(newVariance - lastStableVariance) > 10) return true;
    
    if (newColorName !== lastStableColorName) {
      let diff = Math.abs(newHue - lastStableHue);
      if (diff > 180) diff = 360 - diff;
      const hueDiffSignificant = diff >= HYSTERESIS_THRESHOLD;
      const saturationChange = Math.abs(newSat - (colorBuffer[colorBuffer.length - 1]?.hsv.s || 0)) > 18;
      
      if (hueDiffSignificant || saturationChange) {
        consecutiveFrameCounter++;
        // Só atualizar se a nova cor persistir por MIN_CONSECUTIVE_FRAMES frames
        return consecutiveFrameCounter >= MIN_CONSECUTIVE_FRAMES;
      } else {
        consecutiveFrameCounter = 0;
        return false;
      }
    }
    
    consecutiveFrameCounter = 0;
    return true;
  }
  
  function samplePixels() {
    const vw = video.videoWidth, vh = video.videoHeight;
    if (!vw || !vh) return null;
    const cw = video.clientWidth, ch = video.clientHeight;
    const scale = Math.max(cw / vw, ch / vh);
    const offsetX = (vw * scale - cw) / 2;
    const offsetY = (vh * scale - ch) / 2;
    const nativeCX = Math.round((cw / 2 + offsetX) / scale);
    const nativeCY = Math.round((ch / 2 + offsetY) / scale);
    const nativeSample = Math.max(1, Math.round(SAMPLE_SIZE / scale));
    
    canvas.width = vw; canvas.height = vh;
    ctx.drawImage(video, 0, 0);
    
    const x0 = Math.max(0, nativeCX - nativeSample);
    const y0 = Math.max(0, nativeCY - nativeSample);
    const data = ctx.getImageData(x0, y0, nativeSample * 2, nativeSample * 2).data;
    
    let rSum = 0, gSum = 0, bSum = 0, count = 0;
    for (let i = 0; i < data.length; i += 4) {
      rSum += data[i]; gSum += data[i + 1]; bSum += data[i + 2]; count++;
    }
    return { r: Math.round(rSum / count), g: Math.round(gSum / count), b: Math.round(bSum / count) };
  }
  
  function toggleAudio() {
    if (!systemOn) return;
    if (window.speechSynthesis) window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
    audioEnabled = !audioEnabled;
    const btn = document.getElementById('btn-audio');
    if (audioEnabled) {
      btn.textContent = '🔊 Áudio'; btn.classList.add('audio-on');
    } else {
      btn.textContent = '🔇 Áudio'; btn.classList.remove('audio-on');
      if (window.speechSynthesis) window.speechSynthesis.cancel();
      if (stableTimer) { clearTimeout(stableTimer); stableTimer = null; }
      pendingName = ''; lastSpokenName = '';
    }
  }
  
  function toggleUniversalMode() {
    if (!systemOn) return;
    universalMode = !universalMode;
    const btn = document.getElementById('btn-universal');
    btn.textContent = universalMode ? '⭐ Universal' : '☆ Universal';
    btn.classList.toggle('universal-on', universalMode);
    lastSpokenName = ''; pendingName = '';
    if (stableTimer) { clearTimeout(stableTimer); stableTimer = null; }
  }
  
  function speakColor(name) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    setTimeout(() => {
      if (!audioEnabled) return;
      const utt = new SpeechSynthesisUtterance(name);
      utt.lang = 'pt-BR'; utt.rate = 1.1; utt.pitch = 1.0;
      window.speechSynthesis.speak(utt);
    }, 60);
  }
  
  function triggerAudioIfChanged(name) {
    if (!audioEnabled) return;
    if (name === lastSpokenName) {
      if (pendingName !== name && stableTimer) {
        clearTimeout(stableTimer); stableTimer = null; pendingName = '';
      }
      return;
    }
    if (name !== pendingName) {
      pendingName = name;
      if (stableTimer) clearTimeout(stableTimer);
      stableTimer = setTimeout(() => {
        if (!audioEnabled) { stableTimer = null; return; }
        lastSpokenName = pendingName;
        speakColor(pendingName);
        stableTimer = null;
      }, STABLE_SPEECH_MS);
    }
  }
  
  function update() {
    if (!running || video.readyState < 2) {
      requestAnimationFrame(update);
      return;
    }
    
    if (!systemOn) {
      requestAnimationFrame(update);
      return;
    }
    
    const pixels = samplePixels();
    if (!pixels) {
      requestAnimationFrame(update);
      return;
    }
    
    const { r, g, b } = pixels;
    const rawHsv = rgbToHSV(r, g, b);
    detectAmbientLight(rawHsv.v, { r, g, b });
    
    addToBuffer(rawHsv, { r, g, b });
    
    const stable = getStableColor();
    if (!stable) {
      requestAnimationFrame(update);
      return;
    }
    
    const variance = calculateVariance(colorBuffer);
    const classification = universalMode 
      ? classifyColorUniversal(stable.hsv, stable.rgb, variance)
      : classifyColorSimple(stable.hsv, stable.rgb, variance);
    
    if (classification.name !== lastStableColorName && lastStableColorName !== '') {
      mismatchCounter++;
    } else {
      mismatchCounter = 0;
    }
    
    const forceUpdate = mismatchCounter >= MISMATCH_FORCE_UPDATE;
    
    if (forceUpdate || shouldUpdateColor(stable.hsv.h, classification.name, stable.rgb, stable.hsv.s, variance)) {
      if (forceUpdate) {
        colorBuffer = colorBuffer.slice(-3);
        mismatchCounter = 0;
        consecutiveFrameCounter = 0;
      }
      
      if (detectObjectChange(stable.rgb)) {
        colorBuffer = colorBuffer.slice(-2);
        consecutiveFrameCounter = 0;
      }
      
      lastStableColorName = classification.name;
      lastStableHue = stable.hsv.h;
      lastStableRGB = { ...stable.rgb };
      lastStableVariance = variance;
      
      document.getElementById('color-name').textContent = classification.name;
      document.getElementById('color-name').style.color = classification.color;
      document.getElementById('confidence-display').textContent = `${classification.confidence}%`;
      document.getElementById('confidence-display').style.color = 
        classification.confidence > 95 ? '#6a6' : 
        classification.confidence > 85 ? '#fa0' : '#f66';
      
      triggerAudioIfChanged(classification.name);
    }
    
    document.getElementById('rgb-line').innerHTML =
      `<span class="lbl">R:</span>${stable.rgb.r} <span class="lbl">G:</span>${stable.rgb.g} <span class="lbl">B:</span>${stable.rgb.b}`;
    document.getElementById('hsv-line').innerHTML =
      `<span class="lbl">H:</span>${stable.hsv.h.toFixed(0)}° <span class="lbl">S:</span>${stable.hsv.s.toFixed(0)}% <span class="lbl">V:</span>${stable.hsv.v.toFixed(0)}%`;
    document.getElementById('color-swatch').style.background =
      `rgb(${stable.rgb.r},${stable.rgb.g},${stable.rgb.b})`;
    
    requestAnimationFrame(update);
  }
  
  async function getDevices() {
    const devs = await navigator.mediaDevices.enumerateDevices();
    devices = devs.filter(d => d.kind === 'videoinput');
  }
  
  async function openCamera(preferredDeviceId) {
    if (stream) stream.getTracks().forEach(t => t.stop());
    const tryOpen = async (constraints) => {
      stream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = stream;
    };
    if (preferredDeviceId) {
      try {
        await tryOpen({ video: { deviceId: { exact: preferredDeviceId }, width: { ideal: 1920 }, height: { ideal: 1080 } } });
        return;
      } catch (_) {}
    }
    try {
      await tryOpen({ video: { facingMode: { exact: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } } });
      return;
    } catch (_) {}
    try {
      await tryOpen({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } });
      return;
    } catch (_) {}
    try {
      await tryOpen({ video: true });
    } catch (e) {
      alert('Erro ao acessar a câmera: ' + e.message);
    }
  }
  
  async function startCamera() {
    if (!systemOn) return;
    document.getElementById('start-overlay').style.display = 'none';
    await getDevices();
    await openCamera();
    running = true;
    requestAnimationFrame(update);
  }
  
  async function switchCamera() {
    if (!systemOn) return;
    if (devices.length < 2) {
      alert('Apenas uma câmera disponível.');
      return;
    }
    deviceIndex = (deviceIndex + 1) % devices.length;
    await openCamera(devices[deviceIndex].deviceId);
  }
  
  function calibrate() {
    if (!systemOn) return;
    if (!running) {
      alert('Inicie a câmera primeiro.');
      return;
    }
    
    const stable = getStableColor();
    if (!stable) {
      alert('Aguarde a estabilização da imagem...');
      return;
    }
    
    ambientProfile.whiteV = stable.hsv.v;
    ambientProfile.grayZone = {
      min: 0,
      max: Math.min(stable.hsv.v - 18, 62)
    };
    
    whiteReference = {
      hsv: { ...stable.hsv },
      rgb: { ...stable.rgb }
    };
    isCalibrated = true;
    
    document.getElementById('color-name').textContent = 'Branco';
    document.getElementById('color-name').style.color = '#ffffff';
    
    const btn = document.getElementById('btn-calibrate');
    btn.textContent = '✓ Calibrado';
    btn.classList.add('calibrated');
    
    document.getElementById('base-info').textContent =
      `Base: Branco V:${stable.hsv.v.toFixed(0)}% | Cinza≤${ambientProfile.grayZone.max.toFixed(0)}%`;
    
    colorBuffer = [];
    lastStableColorName = 'Branco';
    lastStableHue = stable.hsv.h;
    lastStableRGB = { ...stable.rgb };
    mismatchCounter = 0;
    consecutiveFrameCounter = 0;
    
    if (audioEnabled) {
      speakColor('Calibrado');
    }
    
    console.log('✓ Calibração:', ambientProfile, 'RGB Ref:', whiteReference.rgb);
  }
</script>
