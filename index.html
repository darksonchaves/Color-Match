<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ColorMatch Pro - Ultra Performance</title>
    <style>
        :root { --accent: #00ffcc; --bg: #0a0a0a; }
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: #fff; overflow: hidden; }
        
        /* Interface Minimalista para Performance */
        .ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; }
        .top-bar { background: rgba(0,0,0,0.7); padding: 15px; pointer-events: auto; display: flex; justify-content: space-between; align-items: center; }
        
        video { width: 100vw; height: 100vh; object-fit: cover; }
        
        /* Mira de Precisão */
        #reticle { 
            position: absolute; top: 50%; left: 50%; width: 60px; height: 60px; 
            transform: translate(-50%, -50%); border: 2px solid var(--accent);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        #reticle::after { content: ''; width: 4px; height: 4px; background: var(--accent); border-radius: 50%; }

        .data-display { background: rgba(0,0,0,0.85); padding: 20px; pointer-events: auto; border-top: 1px solid #333; }
        #colorName { font-size: 32px; font-weight: bold; color: var(--accent); display: block; margin-bottom: 5px; }
        #colorDetails { font-family: monospace; font-size: 14px; color: #888; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: 1px solid #444; background: #222; color: #fff; border-radius: 6px; font-weight: bold; }
        button.active { background: var(--accent); color: #000; border-color: var(--accent); }
    </style>
</head>
<body>

<div class="ui-overlay">
    <div class="top-bar">
        <span>COLORMIDIA v4.0</span>
        <button onclick="toggleVoice()" id="voiceBtn" style="width: auto; padding: 5px 15px;">🔊 Áudio: ON</button>
    </div>

    <div id="reticle"></div>

    <div class="data-display">
        <span id="colorName">ANALISANDO...</span>
        <div id="colorDetails">RGB: 0, 0, 0 | LUX: 0%</div>
        <div class="btn-group">
            <button onclick="setMode('live')" id="btn-live" class="active">REAL-TIME</button>
            <button onclick="toggleFlash()">FLASH</button>
            <button onclick="location.reload()">RESET</button>
        </div>
    </div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="procCanvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const colorName = document.getElementById('colorName');
    const colorDetails = document.getElementById('colorDetails');
    const voiceBtn = document.getElementById('voiceBtn');
    
    let isVoice = true;
    let lastSpoken = "";
    let streamTrack = null;

    // Configurações de Hardware Máximo
    async function init() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { 
                    facingMode: "environment",
                    width: { ideal: 1920 },
                    height: { ideal: 1080 },
                    frameRate: { ideal: 60 }
                }
            });
            video.srcObject = stream;
            streamTrack = stream.getVideoTracks()[0];
            processFrame();
        } catch (e) {
            colorName.innerText = "ERRO DE CÂMERA";
        }
    }

    function processFrame() {
        if (video.paused || video.ended) return;

        const canvas = document.getElementById('procCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        // Amostragem de área 20x20 para simular a fóvea humana
        const size = 20;
        canvas.width = size;
        canvas.height = size;

        // Captura central
        const sx = (video.videoWidth / 2) - (size / 2);
        const sy = (video.videoHeight / 2) - (size / 2);

        ctx.drawImage(video, sx, sy, size, size, 0, 0, size, size);
        const imgData = ctx.getImageData(0, 0, size, size).data;

        let r = 0, g = 0, b = 0;
        for (let i = 0; i < imgData.length; i += 4) {
            r += imgData[i];
            g += imgData[i+1];
            b += imgData[i+2];
        }
        
        const count = imgData.length / 4;
        analyzeColor(Math.floor(r/count), Math.floor(g/count), Math.floor(b/count));

        requestAnimationFrame(processFrame);
    }

    function analyzeColor(r, g, b) {
        // Lógica de Interpretação Humana (Foco em Intensidade)
        const max = Math.max(r, g, b);
        const min = Math.min(r, g, b);
        const delta = max - min;
        const brightness = (max / 255) * 100;

        // Conversão HSL para identificar a ALMA da cor
        let h = 0;
        if (delta !== 0) {
            if (max === r) h = ((g - b) / delta) % 6;
            else if (max === g) h = (b - r) / delta + 2;
            else h = (r - g) / delta + 4;
            h = Math.round(h * 60);
            if (h < 0) h += 360;
        }

        const s = max === 0 ? 0 : (delta / max) * 100;

        let name = "";

        // Tabela de Percepção Humana Real
        if (brightness < 12) name = "Preto";
        else if (brightness > 85 && s < 10) name = "Branco";
        else if (s < 12) name = "Cinza";
        else {
            if (h >= 345 || h < 15) name = "Vermelho";
            else if (h >= 15 && h < 45) name = "Laranja";
            else if (h >= 45 && h < 75) name = "Amarelo";
            else if (h >= 75 && h < 160) name = "Verde";
            else if (h >= 160 && h < 250) name = "Azul";
            else if (h >= 250 && h < 300) name = "Roxo";
            else name = "Rosa";
        }

        colorName.innerText = name.toUpperCase();
        colorDetails.innerText = `RGB: ${r},${g},${b} | SAT: ${Math.round(s)}% | LUX: ${Math.round(brightness)}%`;
        
        if (name !== lastSpoken && isVoice) {
            speak(name);
        }
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'pt-BR';
        msg.rate = 1.2;
        window.speechSynthesis.speak(msg);
        lastSpoken = text;
    }

    function toggleVoice() {
        isVoice = !isVoice;
        voiceBtn.innerText = isVoice ? "🔊 Áudio: ON" : "🔇 Áudio: OFF";
    }

    async function toggleFlash() {
        if (!streamTrack) return;
        const caps = streamTrack.getCapabilities();
        if (caps.torch) {
            const settings = streamTrack.getSettings();
            await streamTrack.applyConstraints({ advanced: [{ torch: !settings.torch }] });
        }
    }

    window.onload = init;
</script>
</body>
</html>
