<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch</title>
<style>
body { text-align:center; font-family:Arial; background:#111; color:#fff; }
video { width:90%; border-radius:10px; }
#colorBox { width:120px; height:120px; margin:15px auto; border-radius:10px; border:2px solid #fff; }
</style>
</head>
<body>

<h2>Toque na tela para capturar a cor 🎨</h2>

<video id="video" autoplay playsinline></video> <canvas id="canvas" style="display:none;"></canvas>

<div id="colorBox"></div>
<p id="colorText">---</p>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// CÂMERA TRASEIRA
navigator.mediaDevices.getUserMedia({
  video: { facingMode: { ideal: "environment" } }
})
.then(stream => video.srcObject = stream)
.catch(err => alert("Erro câmera: " + err));

// CONVERTER PARA NOME DA COR (HSL)
function getColorName(r, g, b) {

  r /= 255;
  g /= 255;
  b /= 255;

  const max = Math.max(r, g, b);
  const min = Math.min(r, g, b);
  let h, s, l;

  l = (max + min) / 2;

  if (max === min) {
    h = s = 0;
  } else {
    const d = max - min;

    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);

    switch (max) {
      case r: h = ((g - b) / d) % 6; break;
      case g: h = (b - r) / d + 2; break;
      case b: h = (r - g) / d + 4; break;
    }

    h *= 60;
    if (h < 0) h += 360;
  }

  s *= 100;
  l *= 100;

  // tons neutros
  if (s < 10) {
    if (l > 85) return "Branco";
    if (l < 15) return "Preto";
    return "Cinza";
  }

  // cores principais
  if (h >= 0 && h < 15) return "Vermelho";
  if (h >= 15 && h < 45) return "Laranja";
  if (h >= 45 && h < 70) return "Amarelo";
  if (h >= 70 && h < 160) return "Verde";
  if (h >= 160 && h < 260) return "Azul";
  if (h >= 260 && h < 320) return "Roxo";
  if (h >= 320 && h <= 360) return "Rosa";

  return "Indefinida";
}

// CAPTURA AO TOCAR
video.addEventListener('click', (e) => {

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  const rect = video.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);

  // MÉDIA DE PIXELS (MAIOR PRECISÃO)
  const pixelData = ctx.getImageData(x, y, 5, 5).data;

  let r = 0, g = 0, b = 0;

  for (let i = 0; i < pixelData.length; i += 4) {
    r += pixelData[i];
    g += pixelData[i + 1];
    b += pixelData[i + 2];
  }

  const total = pixelData.length / 4;

  r = Math.floor(r / total);
  g = Math.floor(g / total);
  b = Math.floor(b / total);

  const color = `rgb(${r}, ${g}, ${b})`;
  const colorName = getColorName(r, g, b);

  document.getElementById('colorBox').style.background = color;
  document.getElementById('colorText').innerText = color + " - " + colorName;
});
</script>

</body>
</html>
