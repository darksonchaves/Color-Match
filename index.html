<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro – Stable Engine</title>

<style>
body {
  text-align:center;
  font-family:Arial;
  background:#111;
  color:#fff;
  margin:0;
}

#wrap {
  position:relative;
  display:inline-block;
}

video {
  width:90%;
  border-radius:10px;
}

canvas {
  display:none;
}

#cross {
  position:absolute;
  width:20px;
  height:20px;
  border:2px solid #00ffcc;
  border-radius:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
  display:none;
}

.point {
  position:absolute;
  width:14px;
  height:14px;
  border-radius:50%;
  pointer-events:none;
  border:2px solid;
}

#p1 { border-color:lime; display:none; }
#p2 { border-color:red; display:none; }

button {
  padding:10px;
  margin:5px;
}
</style>
</head>

<body>

<h2>ColorMatch Pro – Stable Engine</h2>

<button onclick="setMode('static')">Estático</button>
<button onclick="setMode('compare')">Comparativo</button>
<button onclick="toggleVoice()">🔊 Áudio</button>

<div id="wrap">
  <video id="video" autoplay playsinline></video>

  <canvas id="canvasA"></canvas>

  <div id="cross"></div>
  <div id="p1" class="point"></div>
  <div id="p2" class="point"></div>
</div>

<p id="txt">Selecione um modo</p>

<script>

const video = document.getElementById("video");
const canvasA = document.getElementById("canvasA");
const ctxA = canvasA.getContext("2d");

let mode = "static";
let voice = true;

let stepCompare = 0;
let sampleA = null;

/* ================= VOZ ================= */
function speak(text){
  if(!voice) return;
  speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = "pt-BR";
  setTimeout(()=>speechSynthesis.speak(msg), 60);
}

/* ================= CAMERA ================= */
navigator.mediaDevices.getUserMedia({
  video:{facingMode:"environment"}
}).then(stream=>{
  video.srcObject = stream;
});

/* ================= SEGURANÇA DE FRAME ================= */
function isReady(){
  return video.videoWidth > 0 && video.videoHeight > 0;
}

/* ================= LAB ================= */
function rgbToLab(r,g,b){
  r/=255; g/=255; b/=255;

  [r,g,b]=[r,g,b].map(v=>
    v>0.04045?Math.pow((v+0.055)/1.055,2.4):v/12.92
  );

  let x=r*0.4124+g*0.3576+b*0.1805;
  let y=r*0.2126+g*0.7152+b*0.0722;
  let z=r*0.0193+g*0.1192+b*0.9505;

  x/=0.95047; y/=1; z/=1.08883;

  [x,y,z]=[x,y,z].map(v=>v>0.008856?Math.cbrt(v):(7.787*v)+(16/116));

  return {
    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)
  };
}

/* ================= ΔE ================= */
function deltaE(a,b){
  return Math.sqrt(
    (a.L-b.L)**2 +
    (a.a-b.a)**2 +
    (a.b-b.b)**2
  );
}

/* ================= DETECÇÃO ================= */
const colors = [
  {n:"Preto",lab:rgbToLab(10,10,10)},
  {n:"Branco",lab:rgbToLab(245,245,245)},
  {n:"Cinza",lab:rgbToLab(128,128,128)},
  {n:"Vermelho",lab:rgbToLab(220,60,60)},
  {n:"Verde",lab:rgbToLab(60,200,60)},
  {n:"Azul",lab:rgbToLab(60,80,220)}
];

function detect(r,g,b){
  const lab = rgbToLab(r,g,b);

  let best={n:"Indef",d:999};

  for(const c of colors){
    const d=deltaE(lab,c.lab);
    if(d<best.d) best={n:c.n,d};
  }

  return best.n;
}

/* ================= CAPTURA SEGURA ================= */
function capture(x,y){

  if(!isReady()) return "Carregando...";

  canvasA.width = video.videoWidth;
  canvasA.height = video.videoHeight;

  ctxA.drawImage(video,0,0);

  const s=10;

  const d = ctxA.getImageData(
    Math.floor(x)-s,
    Math.floor(y)-s,
    s*2,
    s*2
  ).data;

  let r=0,g=0,b=0,c=0;

  for(let i=0;i<d.length;i+=4){
    r+=d[i];
    g+=d[i+1];
    b+=d[i+2];
    c++;
  }

  return detect(r/c,g/c,b/c);
}

/* ================= CLICK ================= */
video.addEventListener("click",(e)=>{

  if(!isReady()) return;

  const rect = video.getBoundingClientRect();

  const x = (e.clientX - rect.left) * (video.videoWidth / rect.width);
  const y = (e.clientY - rect.top) * (video.videoHeight / rect.height);

  const cross = document.getElementById("cross");
  cross.style.left = e.clientX + "px";
  cross.style.top = e.clientY + "px";
  cross.style.display = "block";

  /* ================= STATIC ================= */
  if(mode==="static"){
    const name = capture(x,y);

    document.getElementById("txt").innerText =
      "STATIC: " + name;

    speak(name);
  }

  /* ================= COMPARE ESTÁVEL ================= */
  if(mode==="compare"){

    if(stepCompare===0){

      sampleA = capture(x,y);

      document.getElementById("p1").style.left = e.clientX+"px";
      document.getElementById("p1").style.top = e.clientY+"px";
      document.getElementById("p1").style.display = "block";

      document.getElementById("txt").innerText =
        "Referência fixada: " + sampleA;

      stepCompare = 1;

    } else {

      const sampleB = capture(x,y);

      document.getElementById("p2").style.left = e.clientX+"px";
      document.getElementById("p2").style.top = e.clientY+"px";
      document.getElementById("p2").style.display = "block";

      const sim = Math.max(0,100 - deltaE(
        rgbToLab(120,120,120),
        rgbToLab(120,120,120)
      ));

      const text =
        `Ref: ${sampleA} | Atual: ${sampleB} | Similaridade: ${sim.toFixed(1)}%`;

      document.getElementById("txt").innerText = text;
      speak(text);

      stepCompare = 0;
    }
  }
});

/* ================= MODE ================= */
function setMode(m){

  mode = m;
  stepCompare = 0;
  sampleA = null;

  document.getElementById("p1").style.display = "none";
  document.getElementById("p2").style.display = "none";
  document.getElementById("cross").style.display = "none";

  document.getElementById("txt").innerText = "Modo: " + m.toUpperCase();
}

/* ================= VOZ ================= */
function toggleVoice(){
  voice = !voice;
  alert("Áudio: " + (voice ? "ON" : "OFF"));
}

</script>

</body>
</html>
