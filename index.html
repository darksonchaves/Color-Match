<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ColorMatch Pro - v26.0 Universal</title>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: #fff; overflow: hidden; text-align: center; }
        #header { 
            position: absolute; top: 0; width: 100%; z-index: 20;
            background: rgba(10, 10, 10, 0.95); display: flex; justify-content: center; 
            padding: 10px 0; gap: 5px; border-bottom: 1px solid #333; flex-wrap: wrap;
        }
        button { 
            background: #222; color: #fff; border: 1px solid #444; padding: 8px 12px; 
            border-radius: 5px; font-size: 10px; font-weight: bold; cursor: pointer;
        }
        .active { background: #007bff !important; }
        .univ-on { background: #ffc107 !important; color: #000; } /* Cor destaque para Modo Universal */
        
        #video-container { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #crosshair { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border: 2px solid #fff; border-radius: 50%; pointer-events: none; z-index: 10;
        }
        .mira-livre { width: 40px; height: 40px; }
        .mira-padrao { width: 30vw; height: 30vw; border: 3px dashed #fff; }

        #ui-overlay { position: absolute; bottom: 30px; width: 100%; z-index: 20; }
        #color-name { font-size: 50px; font-weight: 900; text-shadow: 2px 2px 10px #000; }
    </style>
</head>
<body>

<div id="header">
    <button onclick="toggleSystem()" id="btnPower">SISTEMA: OFF</button>
    <button onclick="toggleUniversal()" id="btnUniv">MODO UNIVERSAL: OFF</button>
    <button onclick="calibrate()" id="btnCalib">CALIBRAR</button>
    <button onclick="setMode('LIVRE')" id="btnLivre">MODO LIVRE</button>
    <button onclick="setMode('PADRAO')" id="btnPadrao">MODO PADRÃO</button>
</div>

<div id="video-container">
    <video id="v" autoplay playsinline muted></video>
    <div id="crosshair" class="mira-livre"></div>
</div>

<div id="ui-overlay">
    <div id="color-name">STANDBY</div>
</div>

<canvas id="c" style="display:none;"></canvas>

<script>
    const v = document.getElementById('v'), c = document.getElementById('c'), ctx = c.getContext('2d');
    const colorTxt = document.getElementById('color-name'), cross = document.getElementById('crosshair');

    let active = false, universalMode = false, mode = 'LIVRE';
    let balance = { r: 1, g: 1, b: 1 };
    let history = [];

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => v.srcObject = s);

    function toggleSystem() { 
        active = !active; 
        document.getElementById('btnPower').classList.toggle('active', active);
        document.getElementById('btnPower').innerText = `SISTEMA: ${active ? 'ON' : 'OFF'}`;
    }

    function toggleUniversal() {
        universalMode = !universalMode;
        const btn = document.getElementById('btnUniv');
        btn.classList.toggle('univ-on', universalMode);
        btn.innerText = `MODO UNIVERSAL: ${universalMode ? 'ON' : 'OFF'}`;
    }

    function setMode(m) {
        mode = m;
        document.getElementById('btnLivre').classList.toggle('active', m === 'LIVRE');
        document.getElementById('btnPadrao').classList.toggle('active', m === 'PADRAO');
        cross.className = (m === 'LIVRE' ? 'mira-livre' : 'mira-padrao');
    }

    function calibrate() {
        if(!active) return;
        c.width = v.videoWidth; c.height = v.videoHeight;
        ctx.drawImage(v, 0, 0);
        const p = ctx.getImageData(v.videoWidth/2, v.videoHeight/2, 1, 1).data;
        const brightness = (p[0] + p[1] + p[2]) / 3;
        // Força o ponto central a ser o novo "branco/neutro"
        balance.r = brightness / Math.max(p[0], 1);
        balance.g = brightness / Math.max(p[1], 1);
        balance.b = brightness / Math.max(p[2], 1);
    }

    function getFinalColor(r, g, b) {
        // Aplica Calibração de Luz Ambiente
        r *= balance.r; g *= balance.g; b *= balance.b;

        // Conversão para HSL para precisão de matiz
        let r1 = r/255, g1 = g/255, b1 = b/255;
        let max = Math.max(r1, g1, b1), min = Math.min(r1, g1, b1);
        let h, s, l = (max + min) / 2;

        if(max === min) h = s = 0;
        else {
            let d = max - min;
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            if(max === r1) h = (g1 - b1) / d + (g1 < b1 ? 6 : 0);
            else if(max === g1) h = (b1 - r1) / d + 2;
            else h = (r1 - g1) / d + 4;
            h *= 60;
        }

        // LÓGICA MODO UNIVERSAL (ESPECTRO PRIMÁRIO)
        if (universalMode) {
            if (l < 0.1) return "PRETO";
            if (s < 0.15) return "BRANCO"; // Corrigido: Neutros agora são Branco na base
            
            if (h < 20 || h >= 330) return "VERMELHO";
            if (h >= 20 && h < 50) return "LARANJA";
            if (h >= 50 && h < 70) return "AMARELO";
            if (h >= 70 && h < 160) return "VERDE";
            if (h >= 160 && h < 260) return "AZUL";
            if (h >= 260 && h < 330) return "ROXO";
            return "ESPECTRO";
        }

        // MODO NORMAL (Interpretação padrão)
        if (l < 0.1) return "PRETO";
        if (l > 0.8 && s < 0.2) return "BRANCO";
        if (s < 0.1) return "CINZA";
        return "AJUSTANDO";
    }

    function loop() {
        if (active && v.videoWidth > 0) {
            c.width = v.videoWidth; c.height = v.videoHeight;
            ctx.drawImage(v, 0, 0);
            let s = (mode === 'LIVRE' ? 10 : 100);
            const p = ctx.getImageData(v.videoWidth/2 - s/2, v.videoHeight/2 - s/2, s, s).data;
            let r=0, g=0, b=0;
            for(let i=0; i<p.length; i+=4) { r+=p[i]; g+=p[i+1]; b+=p[i+2]; }
            let res = getFinalColor(r/(p.length/4), g/(p.length/4), b/(p.length/4));
            
            history.push(res);
            if(history.length > 10) history.shift();
            colorTxt.innerText = history.every(v => v === res) ? res : "ALINHANDO";
        }
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
