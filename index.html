<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro – Raw Sensor Mode</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
  text-align:center;
}

video {
  width:90%;
  border-radius:10px;
}

canvas {
  width:90%;
  border-radius:10px;
  background:#222;
}

button {
  padding:10px;
  margin:5px;
}

#cross {
  position:fixed;
  top:50%;
  left:50%;
  width:26px;
  height:26px;
  transform:translate(-50%,-50%);
  border:2px solid #00ffcc;
  border-radius:50%;
  display:none;
  pointer-events:none;
}
</style>
</head>

<body>

<h2>ColorMatch Pro – Raw Sensor Mode</h2>

<button onclick="setMode('static')">Estático</button>
<button onclick="setMode('move')">Movimento</button>
<button onclick="setMode('compare')">Comparar</button>
<button onclick="toggleVoice()">🔊 Áudio</button>

<video id="video" autoplay playsinline></video>

<canvas id="canvasA"></canvas>
<canvas id="canvasB"></canvas>

<div id="cross"></div>

<p id="txt">Iniciando...</p>

<script>

const video = document.getElementById("video");
const ctxA = canvasA.getContext("2d");
const ctxB = canvasB.getContext("2d");

let mode = "static";
let voice = true;

let lastSpeak = "";

/* CAMERA */
navigator.mediaDevices.getUserMedia({
  video:{facingMode:"environment"}
}).then(s=>{
  video.srcObject = s;
});

/* VOZ */
function speak(t){
  if(!voice) return;
  speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance(t);
  msg.lang = "pt-BR";
  speechSynthesis.speak(msg);
}

/* ================= CAPTURA SENSOR PURA ================= */
function captureRaw(x,y){

  canvasA.width = video.videoWidth;
  canvasA.height = video.videoHeight;

  ctxA.drawImage(video,0,0);

  const s = 10;
  const data = ctxA.getImageData(x-s,y-s,s*2,s*2).data;

  let r=0,g=0,b=0,c=0;

  for(let i=0;i<data.length;i+=4){
    r += data[i];
    g += data[i+1];
    b += data[i+2];
    c++;
  }

  return {
    r: Math.round(r/c),
    g: Math.round(g/c),
    b: Math.round(b/c)
  };
}

/* ================= NOME DA COR ================= */
function getColorName(r,g,b){

  if(r < 40 && g < 40 && b < 40) return "Preto";
  if(r > 220 && g > 220 && b > 220) return "Branco";

  if(r > 200 && g < 80 && b < 80) return "Vermelho";
  if(r > 200 && g > 120 && b < 80) return "Laranja";
  if(r > 220 && g > 200 && b < 100) return "Amarelo";

  if(g > 180 && r < 120 && b < 120) return "Verde";
  if(b > 180 && r < 120 && g < 120) return "Azul";

  if(r > 200 && g < 120 && b > 150) return "Rosa";
  if(r > 130 && b > 150 && g < 120) return "Roxo";
  if(r > 100 && g > 60 && b < 60) return "Marrom";

  return "Indefinido";
}

/* FORMATAÇÃO */
function formatSignal(sig){
  return getColorName(sig.r,sig.g,sig.b);
}

/* ================= MOVIMENTO ================= */
function moveLoop(){

  if(mode !== "move") return;

  const sig = captureRaw(
    video.videoWidth/2,
    video.videoHeight/2
  );

  const color = formatSignal(sig);

  document.getElementById("txt").innerText =
    "Movimento: " + color;

  if(color !== lastSpeak){
    speak(color);
    lastSpeak = color;
  }

  requestAnimationFrame(moveLoop);
}

/* ================= MODO ================= */
function setMode(m){

  mode = m;

  document.getElementById("cross").style.display =
    (m === "move") ? "block" : "none";

  document.getElementById("txt").innerText =
    "Modo: " + m.toUpperCase();

  if(m === "move") moveLoop();
}

/* ================= CLIQUE ================= */
video.addEventListener("click",(e)=>{

  const rect = video.getBoundingClientRect();

  const x = (e.clientX-rect.left)*(video.videoWidth/rect.width);
  const y = (e.clientY-rect.top)*(video.videoHeight/rect.height);

  const sig = captureRaw(x,y);
  const color = formatSignal(sig);

  if(mode === "static"){
    document.getElementById("txt").innerText =
      "Estático: " + color;

    speak(color);
  }

  if(mode === "compare"){

    if(!window.A){
      window.A = sig;
      document.getElementById("txt").innerText =
        "A: " + color;
    } else {
      window.B = sig;

      const result =
        `A(${getColorName(window.A.r,window.A.g,window.A.b)}) → ` +
        `B(${getColorName(window.B.r,window.B.g,window.B.b)})`;

      document.getElementById("txt").innerText = result;
      speak(result);

      window.A = null;
      window.B = null;
    }
  }
});

/* VOZ */
function toggleVoice(){
  voice = !voice;
  alert("Áudio: " + (voice ? "ON" : "OFF"));
}

</script>

</body>
</html>
