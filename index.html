<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max Sensor Fidelity Engine</title>

<style>
body { text-align:center; font-family:Arial; background:#111; color:#fff; }
video { width:90%; border-radius:10px; }
#colorBox { width:120px; height:120px; margin:15px auto; border-radius:10px; border:2px solid #fff; }
</style>
</head>

<body>

<h2>Sensor Max Fidelity 📷</h2>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<div id="colorBox"></div>
<p id="colorText">---</p>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// -------------------------
// CAMERA (SEM PROCESSAMENTO)
// -------------------------
navigator.mediaDevices.getUserMedia({
  video: { facingMode: { ideal: "environment" } }
}).then(stream => video.srcObject = stream);

// -------------------------
// CAPTURA MÁXIMA DO SENSOR
// (sem correção, sem interpretação)
// -------------------------
function captureMax(callback){

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  const size = 25;
  const cx = canvas.width/2;
  const cy = canvas.height/2;

  const data = ctx.getImageData(cx-size,cy-size,size*2,size*2).data;

  let r=0,g=0,b=0;
  let count=0;

  for(let i=0;i<data.length;i+=4){

    const rr = data[i];
    const gg = data[i+1];
    const bb = data[i+2];

    // só remove pixels inválidos extremos (sensor noise real)
    if(rr === 0 && gg === 0 && bb === 0) continue;
    if(rr === 255 && gg === 255 && bb === 255) continue;

    r += rr;
    g += gg;
    b += bb;

    count++;
  }

  if(count === 0) return;

  callback(
    r/count,
    g/count,
    b/count
  );
}

// -------------------------
// EXIBIÇÃO DIRETA (SEM INTERPRETAÇÃO)
// -------------------------
function render(r,g,b){

  const color = `rgb(${r},${g},${b})`;

  document.getElementById('colorBox').style.background = color;

  document.getElementById('colorText').innerText =
    `RAW SENSOR → ${color}`;
}

// -------------------------
// CLICK
// -------------------------
video.addEventListener('click',()=>{

  captureMax((r,g,b)=>{

    render(
      Math.round(r),
      Math.round(g),
      Math.round(b)
    );

  });

});
</script>

</body>
</html>
