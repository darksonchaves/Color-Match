<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ColorMatch Pro - v16.0 Iris Engine</title>
    <style>
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; overflow: hidden; text-align: center; }
        #header { 
            position: absolute; top: 0; width: 100%; z-index: 20;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px);
            display: flex; justify-content: center; padding: 12px 0; gap: 6px;
            border-bottom: 1px solid #333; flex-wrap: wrap;
        }
        button { 
            background: #1a1a1a; color: #777; border: 1px solid #444;
            padding: 10px 12px; border-radius: 8px; font-weight: bold; font-size: 9px;
            text-transform: uppercase; transition: 0.2s;
        }
        .active { background: #00ffcc !important; color: #000 !important; border-color: #00ffcc; box-shadow: 0 0 15px rgba(0,255,204,0.4); }
        .univ-active { background: #ffaa00 !important; color: #000 !important; border-color: #ffaa00; }

        #video-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        #crosshair { 
            position: absolute; border: 2px dashed rgba(255,255,255,0.4); border-radius: 50%;
            pointer-events: none; transition: all 0.2s; z-index: 10;
        }
        .mira-livre { width: 45px; height: 45px; border-style: solid !important; }
        .mira-padrao { width: 32vw; height: 32vw; }
        .locked { border-color: #00ffcc !important; background: rgba(0,255,204,0.1); box-shadow: 0 0 25px #00ffcc; }

        #ui-overlay { 
            position: absolute; bottom: 0; width: 100%; padding: 40px 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.98)); z-index: 20;
        }
        #color-name { font-size: 44px; font-weight: 900; text-transform: uppercase; color: #222; min-height: 50px; }
        .active-text { color: #00ffcc !important; text-shadow: 0 0 20px rgba(0,255,204,0.5); }
        #debug { font-size: 10px; color: #555; margin-top: 10px; font-family: monospace; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="header">
    <button onclick="toggleSystem()" id="btnPower">SISTEMA: OFF</button>
    <button onclick="calibrate()" id="btnCalib">CALIBRAR IRIS (SULFITE)</button>
    <button onclick="setMode('LIVRE')" id="btnLivre">LIVRE</button>
    <button onclick="setMode('PADRAO')" id="btnPadrao">PADRÃO</button>
    <button onclick="toggleUniv()" id="btnUniv">UNIVERSAL: OFF</button>
</div>

<div id="video-container">
    <video id="v" autoplay playsinline muted></video>
    <div id="crosshair" class="mira-livre"></div>
</div>

<div id="ui-overlay">
    <div id="color-name">DISJUNTOR OFF</div>
    <div id="debug">Aguardando ativação do sistema...</div>
</div>

<canvas id="c" style="display:none;"></canvas>

<script>
    const v = document.getElementById('v'), c = document.getElementById('c'), ctx = c.getContext('2d', {willReadFrequently:true});
    const colorTxt = document.getElementById('color-name'), debugTxt = document.getElementById('debug'), cross = document.getElementById('crosshair');

    let mode = 'LIVRE', active = false, isUniv = false, lastSpeach = "", isSpeaking = false;
    // Iris Coefficients (Multiplicadores de correção)
    let iris = { r: 1, g: 1, b: 1 }; 
    let history = [];

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => v.srcObject = s);

    function toggleSystem() { 
        active = !active; 
        const btn = document.getElementById('btnPower');
        btn.classList.toggle('active', active);
        btn.innerText = `SISTEMA: ${active ? 'ON' : 'OFF'}`;
        if(!active) resetUI(); else speak("Sistema Online");
    }

    function toggleUniv() {
        isUniv = !isUniv;
        document.getElementById('btnUniv').classList.toggle('univ-active', isUniv);
        document.getElementById('btnUniv').innerText = `UNIVERSAL: ${isUniv ? 'ON' : 'OFF'}`;
        speak(isUniv ? "Modo Universal Ativo" : "Modo Normal");
    }

    function setMode(m) {
        mode = m;
        document.getElementById('btnLivre').classList.toggle('active', m === 'LIVRE');
        document.getElementById('btnPadrao').classList.toggle('active', m === 'PADRAO');
        cross.className = (m === 'LIVRE' ? 'mira-livre' : 'mira-padrao');
        speak(m);
    }

    function calibrate() {
        if(!active) return;
        const d = sample(v.videoWidth/2, v.videoHeight/2, 60);
        const avg = (d.r + d.g + d.b) / 3;
        
        if(avg < 30) {
            speak("Ambiente muito escuro");
            return;
        }

        // MEMÓRIA DA IRIS: Calcula quanto cada canal precisa ser multiplicado para chegar ao branco puro (255)
        // Isso "abate" a influência da cor da lâmpada.
        iris.r = avg / d.r;
        iris.g = avg / d.g;
        iris.b = avg / d.b;

        speak("Iris Calibrada");
    }

    function sample(x, y, s) {
        c.width = v.videoWidth; c.height = v.videoHeight;
        ctx.drawImage(v, 0, 0);
        const data = ctx.getImageData(Math.max(0, x - s/2), Math.max(0, y - s/2), s, s).data;
        let r=0, g=0, b=0;
        for(let i=0; i<data.length; i+=4) { r += data[i]; g += data[i+1]; b += data[i+2]; }
        const total = data.length/4;
        return { r: r/total, g: g/total, b: b/total };
    }

    function processColor(rawR, rawG, rawB) {
        // Aplica correção da Iris (Abatimento da luz ambiente)
        let r = rawR * iris.r;
        let g = rawG * iris.g;
        let b = rawB * iris.b;

        // Limite de segurança
        r = Math.min(255, r); g = Math.min(255, g); b = Math.min(255, b);

        const bri = (r + g + b) / 3;
        
        // Conversão para HSL para análise de Matiz
        const rNorm = r/255, gNorm = g/255, bNorm = b/255;
        const max=Math.max(rNorm,gNorm,bNorm), min=Math.min(rNorm,gNorm,bNorm), d=max-min;
        let h, s, l=(max+min)/2;

        if(d===0) h=s=0;
        else {
            s = l>0.5 ? d/(2-max-min) : d/(max+min);
            if(max===rNorm) h=(gNorm-bNorm)/d+(gNorm<bNorm?6:0); 
            else if(max===gNorm) h=(bNorm-rNorm)/d+2; 
            else h=(rNorm-gNorm)/d+4;
            h/=6;
        }
        return { h: h*360, s: s*100, l: l*100, bri: bri };
    }

    function getColorName(h, s, l, bri) {
        // REGRA DA IRIS PARA PRETO: Se o brilho caiu muito abaixo da referência calibrada
        if (bri < 25) return "Preto"; 
        
        // REGRA PARA CINZA E BRANCO (Baixa saturação)
        if (s < 18) {
            if (bri < 65) return "Preto"; // Ajuste para preto fiel
            if (bri > 185) return "Branco";
            return "Cinza";
        }

        // Ajustes finos para evitar confusão Laranja/Amarelo
        if (h < 15 || h > 348) return bri < 80 ? "Vermelho Escuro" : "Vermelho";
        if (h < 44) {
            if (s > 70 && bri > 170) return "Laranja"; // Laranja vibrante
            return bri < 75 ? "Marrom" : "Laranja";
        }
        if (h < 68) return "Amarelo";
        if (h < 165) return bri < 85 ? "Verde Escuro" : "Verde";
        if (h < 258) return "Azul";
        if (h < 305) return "Roxo";
        return "Rosa";
    }

    function loop() {
        if (v.videoWidth > 0 && active) {
            const x = v.videoWidth/2, y = v.videoHeight/2;
            const raw = sample(x, y, 22);
            const data = processColor(raw.r, raw.g, raw.b);

            let canShow = true;
            if (mode === 'PADRAO') {
                const step = (v.videoWidth * 0.13);
                const check = [sample(x, y-step, 8), sample(x, y+step, 8), sample(x-step, y, 8), sample(x+step, y, 8)];
                
                const valid = check.filter(p => {
                    const pD = processColor(p.r, p.g, p.b);
                    return Math.abs(pD.h - data.h) < 22 || (data.s < 15 && pD.s < 15);
                }).length;

                if (valid < 3) {
                    canShow = false;
                    colorTxt.innerText = "ALINHANDO...";
                    colorTxt.className = "";
                    cross.classList.remove('locked');
                }
            }

            if (canShow) {
                const currentName = getColorName(data.h, data.s, data.l, data.bri);
                
                // Estabilização por "Moda" (mais frames no modo universal)
                const depth = isUniv ? 15 : 7;
                history.push(currentName);
                if(history.length > depth) history.shift();
                
                const stableName = history.sort((a,b) => history.filter(v=>v===a).length - history.filter(v=>v===b).length).pop();
                
                colorTxt.innerText = stableName;
                colorTxt.className = "active-text";
                cross.classList.add('locked');
                
                debugTxt.innerText = `H:${Math.round(data.h)}° S:${Math.round(data.s)}% B:${Math.round(data.bri)} | IRIS: OK`;
                
                if(stableName !== lastSpeach) speak(stableName);
            }
        }
        requestAnimationFrame(loop);
    }

    function speak(t) {
        if(!t || isSpeaking) return;
        speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang='pt-BR'; m.rate=1.4;
        m.onstart=()=>isSpeaking=true; m.onend=()=>isSpeaking=false;
        speechSynthesis.speak(m); lastSpeach=t;
    }

    function resetUI() {
        colorTxt.innerText = "DISJUNTOR OFF"; colorTxt.className = "";
        cross.classList.remove('locked');
        debugTxt.innerText = "SISTEMA EM STANDBY";
        history = []; lastSpeach = "";
    }

    loop();
</script>
</body>
</html>
