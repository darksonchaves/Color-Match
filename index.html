<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
ColorMatch Pro – OEM MultiBrand Edition
</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
  text-align:center;
}

h2{
  margin-top:15px;
  padding:0 10px;
}

video{
  width:92%;
  border-radius:12px;
  border:2px solid #333;
  background:#000;
  object-fit:cover;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#222;
  color:#fff;
  font-size:15px;
}

button:hover{
  background:#333;
}

button.active{
  background:#004d40;
}

#panel{
  display:flex;
  justify-content:space-around;
  flex-wrap:wrap;
  margin-top:15px;
}

.box{
  width:45%;
  min-width:160px;
}

canvas{
  width:100%;
  border-radius:10px;
  background:#222;
}

#cross{
  position:fixed;
  top:50%;
  left:50%;
  width:28px;
  height:28px;
  transform:translate(-50%,-50%);
  border:2px solid #00ffcc;
  border-radius:50%;
  display:none;
  pointer-events:none;
  z-index:999;
}

#solidStatus{
  margin-top:12px;
  font-size:15px;
  color:#00ffcc;
}

#txt{
  margin-top:15px;
  font-size:18px;
  padding:10px;
  line-height:1.5;
}

.good{
  color:#00ff99;
}

.bad{
  color:#ff6666;
}

.warn{
  color:#ffcc00;
}

</style>

</head>

<body>

<h2>
ColorMatch Pro – OEM MultiBrand Edition
</h2>

<button id="btnStatic" onclick="setMode('static')">
Estático
</button>

<button id="btnMove" onclick="setMode('move')">
Movimento
</button>

<button id="btnUniversal" onclick="setMode('universal')">
Universal Sólido
</button>

<button id="btnUniversalMove" onclick="setMode('universalMove')">
Universal Live
</button>

<button onclick="toggleFlash()">
⚡ Flash
</button>

<button onclick="toggleVoice()">
🔊 Áudio
</button>

<br><br>

<video
id="video"
autoplay
playsinline
muted
webkit-playsinline>
</video>

<div id="cross"></div>

<div id="solidStatus">
Inicializando sistema...
</div>

<div id="panel">

  <div class="box">
    <canvas id="canvasA"></canvas>
    <div>Leitura</div>
  </div>

  <div class="box">
    <canvas id="canvasB"></canvas>
    <div>Resultado</div>
  </div>

</div>

<p id="txt">
Inicializando câmera...
</p>

<script>

/* ================================================= */
/* ELEMENTOS */
/* ================================================= */

const video =
document.getElementById("video");

const canvasA =
document.getElementById("canvasA");

const canvasB =
document.getElementById("canvasB");

const ctxA =
canvasA.getContext(
  "2d",
  {willReadFrequently:true}
);

const ctxB =
canvasB.getContext(
  "2d",
  {willReadFrequently:true}
);

const txt =
document.getElementById("txt");

const solidStatus =
document.getElementById("solidStatus");

const cross =
document.getElementById("cross");

/* ================================================= */
/* CONTROLE */
/* ================================================= */

let mode = "universal";

let voice = true;

let streamTrack = null;

let flashOn = false;

let universalLoopRunning = false;

/* ================================================= */
/* CORES UNIVERSAIS */
/* ================================================= */

const universalColors = [

{
  name:"BRANCO",
  rgb:{r:255,g:255,b:255}
},

{
  name:"PRETO",
  rgb:{r:0,g:0,b:0}
},

{
  name:"CINZA",
  rgb:{r:128,g:128,b:128}
},

{
  name:"VERMELHO",
  rgb:{r:255,g:0,b:0}
},

{
  name:"ROSA",
  rgb:{r:255,g:105,b:180}
},

{
  name:"AZUL",
  rgb:{r:0,g:0,b:255}
},

{
  name:"VERDE",
  rgb:{r:0,g:255,b:0}
},

{
  name:"AMARELO",
  rgb:{r:255,g:255,b:0}
},

{
  name:"LARANJA",
  rgb:{r:255,g:140,b:0}
},

{
  name:"ROXO",
  rgb:{r:128,g:0,b:128}
},

{
  name:"MARROM",
  rgb:{r:101,g:67,b:33}
}

];

/* ================================================= */
/* CAMERA */
/* ================================================= */

async function startCamera(){

  try{

    solidStatus.innerHTML =
    "Solicitando câmera...";

    const stream =

    await navigator.mediaDevices
    .getUserMedia({

      video:{
        facingMode:{
          ideal:"environment"
        },

        width:{
          ideal:1280
        },

        height:{
          ideal:720
        }
      },

      audio:false

    });

    video.srcObject = stream;

    streamTrack =
    stream.getVideoTracks()[0];

    await video.play();

    solidStatus.innerHTML =
    "Sistema pronto";

    txt.innerHTML =
    "<span class='good'>Câmera iniciada com sucesso</span>";

  }

  catch(e){

    console.log(e);

    solidStatus.innerHTML =
    "Falha na câmera";

    txt.innerHTML =
    "<span class='bad'>Falha ao acessar câmera</span>";

  }

}

window.addEventListener(
  "load",
  startCamera
);

/* ================================================= */
/* VOZ */
/* ================================================= */

function speak(text){

  if(!voice) return;

  if(!window.speechSynthesis) return;

  speechSynthesis.cancel();

  const msg =
  new SpeechSynthesisUtterance(text);

  msg.lang = "pt-BR";

  speechSynthesis.speak(msg);

}

/* ================================================= */
/* FLASH */
/* ================================================= */

async function toggleFlash(){

  if(!streamTrack){

    alert("Câmera não iniciada");
    return;
  }

  try{

    const capabilities =
    streamTrack.getCapabilities();

    if(!capabilities.torch){

      alert("Flash não suportado");
      return;
    }

    flashOn = !flashOn;

    await streamTrack.applyConstraints({

      advanced:[
        {
          torch:flashOn
        }
      ]

    });

  }

  catch(e){

    flashOn = false;

    alert("Falha no flash");

  }

}

/* ================================================= */
/* RGB -> LAB */
/* ================================================= */

function rgbToLab(r,g,b){

  r/=255;
  g/=255;
  b/=255;

  [r,g,b]=[r,g,b].map(v=>

    v>0.04045
    ? Math.pow((v+0.055)/1.055,2.4)
    : v/12.92

  );

  let x =
  r*0.4124 +
  g*0.3576 +
  b*0.1805;

  let y =
  r*0.2126 +
  g*0.7152 +
  b*0.0722;

  let z =
  r*0.0193 +
  g*0.1192 +
  b*0.9505;

  x/=0.95047;
  y/=1;
  z/=1.08883;

  [x,y,z]=[x,y,z].map(v=>

    v>0.008856
    ? Math.cbrt(v)
    : (7.787*v)+(16/116)

  );

  return{

    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)

  };

}

function deltaE(a,b){

  return Math.sqrt(

    (a.L-b.L)**2 +
    (a.a-b.a)**2 +
    (a.b-b.b)**2

  );

}

/* ================================================= */
/* PREPARA LAB */
/* ================================================= */

universalColors.forEach(item=>{

  item.lab = rgbToLab(
    item.rgb.r,
    item.rgb.g,
    item.rgb.b
  );

});

/* ================================================= */
/* CAPTURA */
/* ================================================= */

function captureRaw(){

  if(
    !video.videoWidth ||
    !video.videoHeight
  ){

    return null;

  }

  canvasA.width =
  video.videoWidth;

  canvasA.height =
  video.videoHeight;

  ctxA.drawImage(
    video,
    0,
    0,
    video.videoWidth,
    video.videoHeight
  );

  const centerX =
  Math.floor(video.videoWidth/2);

  const centerY =
  Math.floor(video.videoHeight/2);

  const samples = [];

  const area = 18;

  for(let sy=-area; sy<=area; sy+=3){

    for(let sx=-area; sx<=area; sx+=3){

      const px = centerX + sx;
      const py = centerY + sy;

      if(
        px < 0 ||
        py < 0 ||
        px >= video.videoWidth ||
        py >= video.videoHeight
      ){
        continue;
      }

      const data =
      ctxA.getImageData(
        px,
        py,
        1,
        1
      ).data;

      samples.push({

        r:data[0],
        g:data[1],
        b:data[2]

      });

    }

  }

  if(samples.length === 0){
    return null;
  }

  let r=0,g=0,b=0;

  samples.forEach(s=>{

    r += s.r;
    g += s.g;
    b += s.b;

  });

  r = Math.round(r/samples.length);
  g = Math.round(g/samples.length);
  b = Math.round(b/samples.length);

  let variance = 0;

  samples.forEach(s=>{

    variance +=

    Math.abs(s.r-r) +
    Math.abs(s.g-g) +
    Math.abs(s.b-b);

  });

  variance =
  variance / samples.length;

  return{
    r,
    g,
    b,
    variance
  };

}

/* ================================================= */
/* PREVIEW */
/* ================================================= */

function drawPreview(r,g,b){

  canvasA.width = 200;
  canvasA.height = 200;

  ctxA.fillStyle =
  rgb(${r},${g},${b});

  ctxA.fillRect(
    0,
    0,
    200,
    200
  );

  canvasB.width = 200;
  canvasB.height = 200;

  ctxB.fillStyle =
  rgb(${r},${g},${b});

  ctxB.fillRect(
    0,
    0,
    200,
    200
  );

}

/* ================================================= */
/* MOTOR UNIVERSAL */
/* ================================================= */

function detectUniversal(sig){

  if(sig.variance > 22){

    return{
      blocked:true
    };

  }

  const targetLab =
  rgbToLab(
    sig.r,
    sig.g,
    sig.b
  );

  let best = null;

  let bestDelta = 999;

  for(const color of universalColors){

    const d =
    deltaE(
      targetLab,
      color.lab
    );

    if(d < bestDelta){

      bestDelta = d;
      best = color;

    }

  }

  /* ========================================= */
  /* DIFERENCIAÇÃO ROSA x VERMELHO */
  /* ========================================= */

  const hueBias =
  sig.b > 90 &&
  sig.r > 140 &&
  sig.g < 180;

  if(
    best.name === "VERMELHO" &&
    hueBias
  ){

    best =
    universalColors.find(
      c=>c.name==="ROSA"
    );

  }

  return{

    blocked:false,
    match:best,
    delta:bestDelta

  };

}

/* ================================================= */
/* ANALISADOR */
/* ================================================= */

function analyzeUniversal(){

  const sig = captureRaw();

  if(!sig){
    return;
  }

  drawPreview(
    sig.r,
    sig.g,
    sig.b
  );

  const result =
  detectUniversal(sig);

  if(result.blocked){

    txt.innerHTML =

    "<span class='warn'>SUPERFÍCIE INSTÁVEL OU REFLEXIVA</span>";

    solidStatus.innerHTML =
    "Aguardando superfície sólida";

    return;
  }

  const similarity =

  Math.max(
    0,
    100 - result.delta
  ).toFixed(1);

  txt.innerHTML =

  "<span class='good'>"
  +
  result.match.name
  +
  "<br>"
  +
  similarity
  +
  "%"
  +
  "</span>";

  solidStatus.innerHTML =
  "Leitura sólida aprovada";

}

/* ================================================= */
/* LOOP UNIVERSAL */
/* ================================================= */

function universalMoveLoop(){

  if(mode !== "universalMove"){

    universalLoopRunning = false;
    return;

  }

  analyzeUniversal();

  requestAnimationFrame(
    universalMoveLoop
  );

}

/* ================================================= */
/* MODOS */
/* ================================================= */

function clearButtons(){

  document
  .querySelectorAll("button")
  .forEach(btn=>{

    btn.classList.remove("active");

  });

}

function setMode(m){

  mode = m;

  clearButtons();

  if(m==="static"){
    btnStatic.classList.add("active");
  }

  if(m==="move"){
    btnMove.classList.add("active");
  }

  if(m==="universal"){
    btnUniversal.classList.add("active");
  }

  if(m==="universalMove"){
    btnUniversalMove.classList.add("active");
  }

  cross.style.display =

  (
    m==="move" ||
    m==="universalMove"
  )

  ? "block"
  : "none";

  txt.innerHTML =

  "<span class='good'>Modo "
  +
  m.toUpperCase()
  +
  " ativado</span>";

  if(
    m==="universalMove" &&
    !universalLoopRunning
  ){

    universalLoopRunning = true;

    universalMoveLoop();

  }

}

/* ================================================= */
/* CLIQUE */
/* ================================================= */

video.addEventListener(
  "click",
  ()=>{

    if(mode==="universal"){

      analyzeUniversal();

    }

  }
);

/* ================================================= */
/* AUDIO */
/* ================================================= */

function toggleVoice(){

  voice = !voice;

  alert(

    "Áudio: "
    +
    (voice ? "ON" : "OFF")

  );

}

/* ================================================= */
/* INICIAL */
/* ================================================= */

setMode("universal");

</script>

</body>
</html>
