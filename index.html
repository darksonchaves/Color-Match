<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro – Enhanced Precision Engine</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
  text-align:center;
}

video {
  width:90%;
  border-radius:10px;
}

button {
  padding:10px;
  margin:5px;
}

#panel {
  display:flex;
  justify-content:space-around;
  flex-wrap:wrap;
  margin-top:10px;
}

.box {
  width:45%;
  min-width:160px;
}

canvas {
  width:100%;
  border-radius:10px;
  background:#222;
}

#centerCross {
  position:fixed;
  top:50%;
  left:50%;
  width:26px;
  height:26px;
  transform:translate(-50%,-50%);
  border:2px solid #00ffcc;
  border-radius:50%;
  display:none;
  pointer-events:none;
}
</style>
</head>

<body>

<h2>ColorMatch Pro – Precision Engine</h2>

<button onclick="setMode('static')">Estático</button>
<button onclick="setMode('move')">Movimento</button>
<button onclick="setMode('compare')">Comparar</button>
<button onclick="toggleVoice()">🔊 Áudio</button>

<br>

<video id="video" autoplay playsinline></video>

<div id="centerCross"></div>

<div id="panel">
  <div class="box">
    <canvas id="canvasA"></canvas>
    <div>Referência</div>
  </div>

  <div class="box">
    <canvas id="canvasB"></canvas>
    <div>Comparação</div>
  </div>
</div>

<p id="txt">Selecione um modo</p>

<script>

const video = document.getElementById("video");
const canvasA = document.getElementById("canvasA");
const canvasB = document.getElementById("canvasB");
const ctxA = canvasA.getContext("2d");
const ctxB = canvasB.getContext("2d");

let mode="static";
let voice=true;

let step=0;
let sampleA=null;
let sampleB=null;

/* ================= CAMERA ================= */
navigator.mediaDevices.getUserMedia({
  video:{facingMode:"environment"}
}).then(stream=>{
  video.srcObject = stream;
});

/* ================= VOZ ================= */
function speak(t){
  if(!voice) return;
  speechSynthesis.cancel();
  const m=new SpeechSynthesisUtterance(t);
  m.lang="pt-BR";
  speechSynthesis.speak(m);
}

/* ================= WHITE BALANCE (CHAVE DA PRECISÃO) ================= */
function normalizeRGB(r,g,b){
  const avg = (r+g+b)/3;
  return [
    r/avg,
    g/avg,
    b/avg
  ];
}

/* ================= LAB MELHORADO ================= */
function rgbToLab(r,g,b){

  [r,g,b] = normalizeRGB(r,g,b);

  r=Math.min(1,r); g=Math.min(1,g); b=Math.min(1,b);

  r = r>0.04045?Math.pow((r+0.055)/1.055,2.4):r/12.92;
  g = g>0.04045?Math.pow((g+0.055)/1.055,2.4):g/12.92;
  b = b>0.04045?Math.pow((b+0.055)/1.055,2.4):b/12.92;

  let x=r*0.4124+g*0.3576+b*0.1805;
  let y=r*0.2126+g*0.7152+b*0.0722;
  let z=r*0.0193+g*0.1192+b*0.9505;

  x/=0.95047; y/=1; z/=1.08883;

  [x,y,z]=[x,y,z].map(v=>v>0.008856?Math.cbrt(v):(7.787*v)+(16/116));

  return {
    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)
  };
}

/* ================= ΔE COM PESO PERCEPTUAL ================= */
function deltaE(a,b){

  const dL = (a.L-b.L)*0.8;
  const da = (a.a-b.a)*1.2;
  const db = (a.b-b.b)*1.2;

  return Math.sqrt(dL*dL + da*da + db*db);
}

/* ================= CORES REFINADAS ================= */
const ref = [
  {n:"Preto",lab:rgbToLab(10,10,10)},
  {n:"Branco",lab:rgbToLab(245,245,245)},
  {n:"Cinza",lab:rgbToLab(128,128,128)},
  {n:"Vermelho",lab:rgbToLab(220,60,60)},
  {n:"Verde",lab:rgbToLab(60,200,60)},
  {n:"Azul",lab:rgbToLab(40,90,230)},
  {n:"Amarelo",lab:rgbToLab(250,230,70)},
  {n:"Laranja",lab:rgbToLab(250,140,60)},
  {n:"Rosa",lab:rgbToLab(240,120,180)},
  {n:"Roxo",lab:rgbToLab(140,60,200)},
  {n:"Marrom",lab:rgbToLab(120,80,50)}
];

/* ================= DETECÇÃO MAIS ESTÁVEL ================= */
function detect(r,g,b){

  const lab = rgbToLab(r,g,b);

  let best={n:"Indef",d:999};

  for(const c of ref){
    const d=deltaE(lab,c.lab);
    if(d<best.d) best={n:c.n,d};
  }

  return best;
}

/* ================= CAPTURA MAIS LIMPA ================= */
function capture(ctx,x,y){

  ctx.canvas.width=video.videoWidth;
  ctx.canvas.height=video.videoHeight;

  ctx.drawImage(video,0,0);

  const s=18; // ↑ mais estabilidade

  const d=ctx.getImageData(x-s,y-s,s*2,s*2).data;

  let r=0,g=0,b=0,c=0;

  for(let i=0;i<d.length;i+=4){
    r+=d[i];
    g+=d[i+1];
    b+=d[i+2];
    c++;
  }

  return detect(r/c,g/c,b/c);
}

/* ================= MODOS ================= */
function setMode(m){
  mode=m;
  step=0;
  sampleA=null;
  sampleB=null;

  document.getElementById("centerCross").style.display =
    (m==="move") ? "block" : "none";

  document.getElementById("txt").innerText="Modo: "+m;
}

/* ================= MOVIMENTO ================= */
function moveLoop(){
  if(mode!=="move") return;

  const s = capture(ctxA,video.videoWidth/2,video.videoHeight/2);

  document.getElementById("txt").innerText =
    "Movimento: "+s.n;

  if(last!==s.n){
    speak(s.n);
    last=s.n;
  }

  requestAnimationFrame(moveLoop);
}

let last="";

/* ================= CLIQUE ================= */
video.addEventListener("click",(e)=>{

  const rect=video.getBoundingClientRect();

  const x=(e.clientX-rect.left)*(video.videoWidth/rect.width);
  const y=(e.clientY-rect.top)*(video.videoHeight/rect.height);

  if(mode==="static"){

    const s=capture(ctxA,x,y);

    document.getElementById("txt").innerText =
      "Estático: "+s.n;

    speak(s.n);
  }

  if(mode==="compare"){

    if(step===0){

      sampleA=capture(ctxA,x,y);

      step=1;
    }

    else{

      sampleB=capture(ctxB,x,y);

      const sim = Math.max(0,100 - deltaE(sampleA.lab,sampleB.lab));

      const text =
        `${sampleA.n} → ${sampleB.n} | ${sim.toFixed(1)}%`;

      document.getElementById("txt").innerText=text;
      speak(text);

      step=0;
    }
  }
});

/* ================= INIT ================= */
function toggleVoice(){
  voice=!voice;
}

</script>

</body>
</html>
