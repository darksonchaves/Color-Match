<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro – Raw Sensor Precision</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
  text-align:center;
}

video{
  width:90%;
  border-radius:10px;
}

button{
  padding:10px;
  margin:5px;
}

#panel{
  display:flex;
  justify-content:space-around;
  flex-wrap:wrap;
  margin-top:10px;
}

.box{
  width:45%;
  min-width:160px;
}

canvas{
  width:100%;
  border-radius:10px;
  background:#222;
}

#cross{
  position:fixed;
  top:50%;
  left:50%;
  width:26px;
  height:26px;
  transform:translate(-50%,-50%);
  border:2px solid #00ffcc;
  border-radius:50%;
  display:none;
  pointer-events:none;
  z-index:999;
}

</style>
</head>

<body>

<h2>ColorMatch Pro – Raw Sensor Precision</h2>

<button onclick="setMode('static')">Estático</button>
<button onclick="setMode('move')">Movimento</button>
<button onclick="setMode('compare')">Comparar</button>
<button onclick="toggleVoice()">🔊 Áudio</button>

<br>

<video id="video" autoplay playsinline></video>

<div id="cross"></div>

<div id="panel">

  <div class="box">
    <canvas id="canvasA"></canvas>
    <div>Referência</div>
  </div>

  <div class="box">
    <canvas id="canvasB"></canvas>
    <div>Comparação</div>
  </div>

</div>

<p id="txt">Iniciando...</p>

<script>

/* ================= ELEMENTOS ================= */

const video = document.getElementById("video");

const canvasA = document.getElementById("canvasA");
const canvasB = document.getElementById("canvasB");

const ctxA = canvasA.getContext("2d");
const ctxB = canvasB.getContext("2d");

const cross = document.getElementById("cross");

/* ================= CONTROLES ================= */

let mode = "static";
let voice = true;

let lastSpeak = "";

let compareA = null;
let compareALab = null;

let compareStep = 0;

/* ================= CAMERA ================= */

navigator.mediaDevices.getUserMedia({
  video:{
    facingMode:"environment"
  }
}).then(stream=>{

  video.srcObject = stream;

});

/* ================= VOZ ================= */

function speak(text){

  if(!voice) return;

  speechSynthesis.cancel();

  const msg = new SpeechSynthesisUtterance(text);

  msg.lang = "pt-BR";

  speechSynthesis.speak(msg);
}

/* ================= RGB -> LAB ================= */

function rgbToLab(r,g,b){

  r/=255;
  g/=255;
  b/=255;

  [r,g,b]=[r,g,b].map(v=>
    v>0.04045
    ? Math.pow((v+0.055)/1.055,2.4)
    : v/12.92
  );

  let x =
    r*0.4124 +
    g*0.3576 +
    b*0.1805;

  let y =
    r*0.2126 +
    g*0.7152 +
    b*0.0722;

  let z =
    r*0.0193 +
    g*0.1192 +
    b*0.9505;

  x/=0.95047;
  y/=1;
  z/=1.08883;

  [x,y,z]=[x,y,z].map(v=>
    v>0.008856
    ? Math.cbrt(v)
    : (7.787*v)+(16/116)
  );

  return{
    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)
  };
}

/* ================= DELTA E ================= */

function deltaE(a,b){

  return Math.sqrt(
    (a.L-b.L)**2 +
    (a.a-b.a)**2 +
    (a.b-b.b)**2
  );
}

/* ================= CAPTURA ================= */

function captureRaw(x,y){

  canvasA.width = video.videoWidth;
  canvasA.height = video.videoHeight;

  ctxA.drawImage(video,0,0);

  const s = 12;

  const data = ctxA.getImageData(
    x-s,
    y-s,
    s*2,
    s*2
  ).data;

  let r=0,g=0,b=0,c=0;

  for(let i=0;i<data.length;i+=4){

    r += data[i];
    g += data[i+1];
    b += data[i+2];

    c++;
  }

  r = Math.round(r/c);
  g = Math.round(g/c);
  b = Math.round(b/c);

  return {r,g,b};
}

/* ================= RGB -> HSL ================= */

function rgbToHsl(r,g,b){

  r/=255;
  g/=255;
  b/=255;

  const max = Math.max(r,g,b);
  const min = Math.min(r,g,b);

  let h,s,l;

  l = (max+min)/2;

  if(max===min){

    h=0;
    s=0;

  }else{

    const d = max-min;

    s = l>0.5
      ? d/(2-max-min)
      : d/(max+min);

    switch(max){

      case r:
        h=(g-b)/d+(g<b?6:0);
      break;

      case g:
        h=(b-r)/d+2;
      break;

      case b:
        h=(r-g)/d+4;
      break;
    }

    h/=6;
  }

  return{
    h:h*360,
    s:s*100,
    l:l*100
  };
}

/* ================= IDENTIFICAÇÃO ================= */

function getColorName(r,g,b){

  const hsl = rgbToHsl(r,g,b);

  const h = hsl.h;
  const s = hsl.s;
  const l = hsl.l;

  if(l < 12){
    return "Preto";
  }

  if(l > 90 && s < 15){
    return "Branco";
  }

  if(s < 12){
    return "Cinza";
  }

  if(
    h >= 15 &&
    h <= 40 &&
    l < 45
  ){
    return "Marrom";
  }

  if(
    h <= 12 ||
    h >= 345
  ){
    return "Vermelho";
  }

  if(
    h > 12 &&
    h <= 40
  ){
    return "Laranja";
  }

  if(
    h > 40 &&
    h <= 70
  ){
    return "Amarelo";
  }

  if(
    h > 70 &&
    h <= 165
  ){
    return "Verde";
  }

  if(
    h > 165 &&
    h <= 255
  ){
    return "Azul";
  }

  if(
    h > 255 &&
    h <= 315
  ){
    return "Roxo";
  }

  if(
    h > 315 &&
    h < 345
  ){
    return "Rosa";
  }

  return "Indefinido";
}

/* ================= TEXTO ================= */

function signalText(sig){

  return getColorName(
    sig.r,
    sig.g,
    sig.b
  );
}

/* ================= MOVIMENTO ================= */

function moveLoop(){

  if(mode !== "move") return;

  const sig = captureRaw(
    video.videoWidth/2,
    video.videoHeight/2
  );

  const color = signalText(sig);

  document.getElementById("txt").innerText =
    "Movimento: " + color;

  if(color !== lastSpeak){

    speak(color);

    lastSpeak = color;
  }

  requestAnimationFrame(moveLoop);
}

/* ================= MODOS ================= */

function setMode(m){

  mode = m;

  lastSpeak = "";

  compareA = null;
  compareALab = null;
  compareStep = 0;

  ctxA.clearRect(0,0,canvasA.width,canvasA.height);
  ctxB.clearRect(0,0,canvasB.width,canvasB.height);

  cross.style.display =
    (m === "move" || m === "compare")
    ? "block"
    : "none";

  document.getElementById("txt").innerText =
    "Modo: " + m.toUpperCase();

  if(m === "move"){
    moveLoop();
  }
}

/* ================= CLIQUE ================= */

video.addEventListener("click",(e)=>{

  const rect = video.getBoundingClientRect();

  const x =
    (e.clientX - rect.left)
    *
    (video.videoWidth / rect.width);

  const y =
    (e.clientY - rect.top)
    *
    (video.videoHeight / rect.height);

  const sig = captureRaw(x,y);

  const color = signalText(sig);

  /* ================= ESTÁTICO ================= */

  if(mode === "static"){

    document.getElementById("txt").innerText =
      "Estático: " + color;

    speak(color);
  }

  /* ================= COMPARAÇÃO ================= */

  if(mode === "compare"){

    if(compareStep === 0){

      compareA = sig;

      compareALab = rgbToLab(
        sig.r,
        sig.g,
        sig.b
      );

      canvasA.width = video.videoWidth;
      canvasA.height = video.videoHeight;

      ctxA.drawImage(video,0,0);

      ctxA.beginPath();

      ctxA.arc(
        x,
        y,
        14,
        0,
        Math.PI*2
      );

      ctxA.lineWidth = 4;
      ctxA.strokeStyle = "lime";

      ctxA.stroke();

      document.getElementById("txt").innerText =
        "Referência: " + color;

      compareStep = 1;

    }else{

      const compareB = sig;

      const compareBLab = rgbToLab(
        compareB.r,
        compareB.g,
        compareB.b
      );

      canvasB.width = video.videoWidth;
      canvasB.height = video.videoHeight;

      ctxB.drawImage(video,0,0);

      ctxB.beginPath();

      ctxB.arc(
        x,
        y,
        14,
        0,
        Math.PI*2
      );

      ctxB.lineWidth = 4;
      ctxB.strokeStyle = "red";

      ctxB.stroke();

      const similarity =
        Math.max(
          0,
          100 - deltaE(compareALab,compareBLab)
        );

      const result =
        signalText(compareA)
        +
        " → "
        +
        signalText(compareB)
        +
        " | "
        +
        similarity.toFixed(1)
        +
        "% similar";

      document.getElementById("txt").innerText =
        result;

      speak(result);

      compareA = null;
      compareALab = null;

      compareStep = 0;
    }
  }
});

/* ================= ÁUDIO ================= */

function toggleVoice(){

  voice = !voice;

  alert(
    "Áudio: "
    +
    (voice ? "ON" : "OFF")
  );
}

</script>

</body>
</html>
