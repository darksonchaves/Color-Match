<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro - Sincronia Total</title>
<style>
  body{ margin:0; font-family: sans-serif; background:#050505; color:#fff; text-align:center; overflow:hidden; }
  #header{ padding: 10px; background: #111; border-bottom: 1px solid #333; }
  video{ width:100%; max-height: 70vh; object-fit: cover; }
  button{ padding:15px; margin:5px; border-radius:10px; border:none; background:#222; color:white; font-weight:bold; }
  .active{ background:#00ffcc; color:#000; }
  #cross{ position:fixed; top:50%; left:50%; width:40px; height:40px; transform:translate(-50%,-50%); border:3px solid #00ffcc; border-radius:50%; pointer-events:none; }
  #display{ font-size: 32px; font-weight: 900; color: #00ffcc; margin: 20px 0; text-transform: uppercase; }
</style>
</head>
<body>

<div id="header">
  <button onclick="toggleUniv()" id="btnU">MODO: OFF</button>
  <button onclick="calibrate()">CALIBRAR</button>
  <button onclick="toggleVoice()" id="btnV">ÁUDIO: ON</button>
</div>

<video id="v" autoplay playsinline muted></video>
<div id="cross"></div>
<div id="display">AGUARDANDO...</div>

<canvas id="c" style="display:none;"></canvas>

<script>
const video = document.getElementById('v');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', {willReadFrequently: true});
const display = document.getElementById('display');

let isUniv = false, isVoice = true, isSpeaking = false;
let lastColor = "", stableCount = 0;
let offset = {r:255, g:255, b:255};

navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(s => video.srcObject = s);

function calibrate() {
    const data = getRGB();
    offset = {r: data.r, g: data.g, b: data.b};
    speak("Calibrado");
}

function getRGB() {
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    // Pegando área central 20x20 para suavizar o metalizado
    const d = ctx.getImageData(video.videoWidth/2 - 10, video.videoHeight/2 - 10, 20, 20).data;
    let r=0, g=0, b=0;
    for(let i=0; i<d.length; i+=4){ r+=d[i]; g+=d[i+1]; b+=d[i+2]; }
    return { r: r/(d.length/4), g: g/(d.length/4), b: b/(d.length/4) };
}

function solveColor(r, g, b) {
    // Normalização baseada na calibração
    let nr = (r * 255) / offset.r;
    let ng = (g * 255) / offset.g;
    let nb = (b * 255) / offset.b;
    
    // Converte para HSL para lógica mais "humana"
    let r1=nr/255, g1=ng/255, b1=nb/255;
    const max=Math.max(r1,g1,b1), min=Math.min(r1,g1,b1), d=max-min;
    let h, s, l=(max+min)/2;
    if(d===0) h=s=0; else {
        s = l>0.5 ? d/(2-max-min) : d/(max+min);
        if(max===r1) h=(g1-b1)/d+(g1<b1?6:0); else if(max===g1) h=(b1-r1)/d+2; else h=(r1-g1)/d+4;
        h*=60;
    }

    if (l < 0.15) return "Preto";
    if (l > 0.85 && s < 0.2) return "Branco";
    if (s < 0.15) return "Cinza";
    
    if (h < 15 || h > 345) return (l < 0.45 && s > 0.5) ? "Vermelho Escuro" : "Vermelho";
    if (h < 45) return "Laranja";
    if (h < 75) return "Amarelo";
    if (h < 165) return "Verde";
    if (h < 260) return "Azul";
    if (h < 300) return "Roxo";
    return "Rosa";
}

function loop() {
    if(video.videoWidth) {
        const rgb = getRGB();
        const colorName = solveColor(rgb.r, rgb.g, rgb.b);

        if(isUniv) {
            display.innerText = colorName;
            // Sincronia: Só fala se o nome estiver estável no visor
            if(colorName === lastColor) {
                stableCount++;
                if(stableCount === 25) speak(colorName);
            } else {
                lastColor = colorName;
                stableCount = 0;
            }
        } else {
            display.innerText = `R:${Math.round(rgb.r)} G:${Math.round(rgb.g)} B:${rgb.b}`;
        }
    }
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function speak(t) {
    if(!isVoice || isSpeaking) return;
    isSpeaking = true;
    const u = new SpeechSynthesisUtterance(t);
    u.lang = 'pt-BR';
    u.onend = () => isSpeaking = false;
    speechSynthesis.speak(u);
}

function toggleUniv() { 
    isUniv = !isUniv; 
    document.getElementById('btnU').classList.toggle('active');
    document.getElementById('btnU').innerText = isUniv ? "MODO: ON" : "MODO: OFF";
}
function toggleVoice() { 
    isVoice = !isVoice; 
    document.getElementById('btnV').classList.toggle('active');
}
</script>
</body>
</html>
