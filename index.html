<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro - Global Engine v2</title>
<style>
  body{ margin:0; font-family: 'Segoe UI', sans-serif; background:#000; color:#fff; text-align:center; overflow:hidden; }
  #header{ padding: 10px; background: #111; display: flex; justify-content: center; gap: 8px; border-bottom: 1px solid #333; }
  #video-container { position: relative; width: 100%; height: 65vh; background: #000; overflow: hidden; }
  video{ width: 100%; height: 100%; object-fit: contain; }
  button{ padding:10px 14px; border-radius:8px; border:none; background:#222; color:white; font-weight:bold; cursor:pointer; }
  .active{ background:#00ffcc !important; color:#000 !important; }
  #cross{ 
    position:absolute; top:50%; left:50%; width:44px; height:44px; 
    transform:translate(-50%,-50%); border:2px solid #00ffcc; 
    border-radius:50%; pointer-events:none; z-index: 10; 
  }
  #cross::after { content: ''; position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: #00ffcc; border-radius: 50%; transform: translate(-50%, -50%); }
  #display{ font-size: 42px; font-weight: 900; color: #00ffcc; margin: 15px 0; text-transform: uppercase; min-height: 50px; }
  .info { color: #888; font-size: 11px; }
</style>
</head>
<body>

<div id="header">
  <button onclick="toggleUniv()" id="btnU">UNIVERSAL: OFF</button>
  <button onclick="calibrate()">CALIBRAR</button>
  <button onclick="toggleVoice()" id="btnV" class="active">🔊 ÁUDIO: ON</button>
</div>

<div id="video-container">
  <video id="v" autoplay playsinline muted></video>
  <div id="cross"></div>
</div>

<div id="display">AGUARDANDO...</div>
<div id="stats" class="info">PROCESSAMENTO DE CORES REALISTAS</div>

<canvas id="c" style="display:none;"></canvas>

<script>
const video = document.getElementById('v');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', {willReadFrequently: true});
const display = document.getElementById('display');
const stats = document.getElementById('stats');

let isUniv = false, isVoice = true;
let lastColor = "", stableCount = 0;
let offset = {r:255, g:255, b:255};

navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment", width: {ideal: 1280} }
}).then(s => { video.srcObject = s; });

function speak(t) {
    if(!isVoice || !isUniv) return;
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(t);
    msg.lang = 'pt-BR';
    msg.rate = 1.3;
    window.speechSynthesis.speak(msg);
}

function calibrate() {
    const data = getCenterColor();
    offset = {r: data.r, g: data.g, b: data.b};
    speak("Calibrado");
}

function getCenterColor() {
    if (canvas.width !== video.videoWidth) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
    }
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const x = canvas.width / 2;
    const y = canvas.height / 2;
    const d = ctx.getImageData(x - 4, y - 4, 9, 9).data; // Amostragem 9x9 para maior fidelidade
    let r=0, g=0, b=0;
    for(let i=0; i<d.length; i+=4){ r+=d[i]; g+=d[i+1]; b+=d[i+2]; }
    const total = d.length/4;
    return { r: r/total, g: g/total, b: b/total };
}

function solveColor(r, g, b) {
    // Normalização baseada na calibração
    let nr = (r / (offset.r || 255)) * 255;
    let ng = (g / (offset.g || 255)) * 255;
    let nb = (b / (offset.b || 255)) * 255;
    
    const max = Math.max(nr, ng, nb);
    const min = Math.min(nr, ng, nb);
    const chroma = max - min;
    const lum = (max + min) / 510;

    // Cálculo do Matiz (Hue)
    let h = 0;
    if (chroma !== 0) {
        if (max === nr) h = ((ng - nb) / chroma) % 6;
        else if (max === ng) h = (nb - nr) / chroma + 2;
        else h = (nr - ng) / chroma + 4;
        h = Math.round(h * 60);
        if (h < 0) h += 360;
    }

    // --- LÓGICA DE DECISÃO MELHORADA ---

    // 1. Detecção de Neutros (Melhorada para evitar Preto/Cinza falso)
    if (lum < 0.18) return "Preto";
    if (chroma < 25) { // Se a "força" da cor for baixa, é cinza ou branco
        return (lum > 0.75) ? "Branco" : "Cinza";
    }

    // 2. O GRANDE CONFLITO: Vermelho vs Rosa
    if (h < 22 || h > 330) {
        // ROSA: Fisicamente, o Rosa tem muito mais 'luz branca' (Verde e Azul misturados)
        // Se a média de Verde e Azul for alta comparada ao Vermelho, é Rosa.
        const whiteMix = (ng + nb) / 2;
        if (whiteMix > 110 || (lum > 0.45 && chroma < 160)) {
            return "Rosa";
        }
        return (lum < 0.35) ? "Vermelho Escuro" : "Vermelho";
    }

    // 3. Roxo vs Rosa (Transição)
    if (h >= 265 && h <= 300) return "Roxo";
    if (h > 300 && h <= 330) return "Rosa";

    // 4. Outras Cores
    if (h >= 22 && h < 48) return (lum < 0.4) ? "Marrom" : "Laranja";
    if (h >= 48 && h < 68) return "Amarelo";
    if (h >= 68 && h < 155) return "Verde";
    if (h >= 155 && h < 265) return "Azul";

    return "Analizando...";
}

function mainLoop() {
    if(video.videoWidth) {
        const rgb = getCenterColor();
        const colorName = solveColor(rgb.r, rgb.g, rgb.b);

        if(isUniv) {
            display.innerText = colorName;
            if(colorName === lastColor && colorName !== "Analizando...") {
                stableCount++;
                if(stableCount === 12) speak(colorName); // Mais rápido para feedback imediato
            } else {
                lastColor = colorName;
                stableCount = 0;
            }
            stats.innerText = `R:${Math.round(rgb.r)} G:${Math.round(rgb.g)} B:${Math.round(rgb.b)} | LUM: ${Math.round((rgb.r+rgb.g+rgb.b)/7.65)}%`;
        } else {
            display.innerText = `RGB: ${Math.round(rgb.r)},${Math.round(rgb.g)},${Math.round(rgb.b)}`;
        }
    }
    requestAnimationFrame(mainLoop);
}

function toggleUniv() { 
    isUniv = !isUniv; 
    const btn = document.getElementById('btnU');
    btn.classList.toggle('active');
    btn.innerText = isUniv ? "UNIVERSAL: ON" : "UNIVERSAL: OFF";
    if(isUniv) speak("Modo Universal");
    stableCount = 0;
}

function toggleVoice() { 
    isVoice = !isVoice; 
    document.getElementById('btnV').classList.toggle('active');
    if(!isVoice) window.speechSynthesis.cancel();
}

requestAnimationFrame(mainLoop);
</script>
</body>
</html>
