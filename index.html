<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"


<title>
ColorMatch Pro – OEM MultiBrand Edition
</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
  text-align:center;
}

h2{
  margin-top:15px;
}

video{
  width:92%;
  border-radius:12px;
  border:2px solid #333;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#222;
  color:#fff;
}

button:hover{
  background:#333;
}
input,select{
  padding:10px;
  border-radius:8px;
  border:none;
  margin:5px;
  width:90%;
  max-width:420px;
}

#panel{
  display:flex;
  justify-content:space-around;
  flex-wrap:wrap;
  margin-top:15px;
}

.box{
  width:45%;
  min-width:160px;
}

canvas{
  width:100%;
  border-radius:10px;
  background:#222;
}

#cross{
  position:fixed;
  top:50%;
  left:50%;
  width:26px;
  height:26px;
  transform:translate(-50%,-50%);
  border:2px solid #00ffcc;
  border-radius:50%;
  display:none;
  pointer-events:none;
  z-index:999;
}
#databasePanel{
  margin-top:20px;
  padding:15px;
  background:#181818;
  border-top:2px solid #333;
}

#resultList{
  margin-top:10px;
  text-align:left;
  width:90%;
  max-width:700px;
  margin-left:auto;
  margin-right:auto;
  background:#1f1f1f;
  border-radius:10px;
  padding:10px;
}

.item{
  padding:10px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

.item:hover{
  background:#2c2c2c;
}

.colorBox{
  width:18px;
  height:18px;
  display:inline-block;
  border-radius:50%;
  margin-right:8px;
  border:1px solid #fff;
  vertical-align:middle;
}
.selectedColor{
  background:#004d40 !important;
}

#txt{
  margin-top:15px;
  font-size:18px;
  padding:10px;
}

#universalPanel{
  margin-top:15px;
  padding:10px;
  background:#181818;
  border-top:2px solid #333;
}

</style>

</head>

<body>

<h2>
ColorMatch Pro – OEM MultiBrand Edition
</h2>
<button onclick="setMode('static')">
Estático
</button>

<button onclick="setMode('move')">
Movimento
</button>

<button onclick="setMode('comparePoint')">
Comparar Ponto a Ponto
</button>

<button onclick="setMode('compareDatabase')">
Comparar Base de Dados
</button>

<button onclick="analyzeOEM()">
🎨 OEM Scan
</button>

<button onclick="toggleFlash()">
⚡ Flash
</button>

<button onclick="toggleVoice()">
🔊 Áudio
</button>

<br><br>
<div id="universalPanel">

<h3>
Modo Universal
</h3>

<button
id="universalBtn"
onclick="toggleUniversalMode()"

Universal OFF
</button>

<p
style="
font-size:14px;
color:#aaa;
"

Leitura real do sensor
sem compensação artificial
</p>

</div>
<video
id="video"
autoplay
playsinline
</video>


<div id="cross"></div>

<div id="panel">

  <div class="box">

    <canvas id="canvasA"></canvas>

    <div>
    Referência
    </div>

  </div>

  <div class="box">

    <canvas id="canvasB"></canvas>

    <div>
    Comparação
    </div>

  </div>

</div>
<div id="databasePanel">

<h3>
Pesquisa OEM
</h3>

<input
type="text"
id="brandSearch"
placeholder="Digite a montadora..."
oninput="searchBrand()"


<br>

<select
id="modelSelect"
onchange="showModelColors()"


<option value="">
Selecione o modelo
</option>

</select>

<div id="resultList"></div>

</div>
<p id="txt">
Inicializando...
</p>

<script>

/* ================= ELEMENTOS ================= */

const video =
document.getElementById("video");

const canvasA =
document.getElementById("canvasA");

const canvasB =
document.getElementById("canvasB");

const ctxA =
canvasA.getContext("2d");

const ctxB =
canvasB.getContext("2d");

const cross =
document.getElementById("cross");

const txt =
document.getElementById("txt");
/* ================= CONTROLE ================= */

let mode = "static";

let voice = true;

let lastSpeak = "";

let compareA = null;

let compareALab = null;

let compareStep = 0;

let selectedDatabaseColor = null;

/* ================= UNIVERSAL ================= */

let universalMode = false;

/* ================= FLASH ================= */

let streamTrack = null;

let flashOn = false;

let flashBusy = false;

let processingPaused = false;
/* ================= DATABASE ================= */

const database = {

  Toyota:[
    {
      name:"Super White",
      rgb:[245,245,240]
    },
    {
      name:"Black Mica",
      rgb:[20,20,20]
    }
  ],

  Honda:[
    {
      name:"Taffeta White",
      rgb:[250,250,245]
    },
    {
      name:"Crystal Black",
      rgb:[15,15,15]
    }
  ]

};
/* ================= CAMERA ================= */

navigator.mediaDevices
.getUserMedia({

  video:{
    facingMode:"environment"
  }

})

.then(stream=>{

  video.srcObject = stream;

  streamTrack =
  stream.getVideoTracks()[0];

  txt.innerHTML =
  "Câmera iniciada";

})

.catch(()=>{

  txt.innerHTML =
  "Erro ao acessar câmera";

});
/* ================= VOZ ================= */

function speak(text){

  if(!voice) return;

  if(lastSpeak === text) return;

  if(speechSynthesis.speaking) return;

  lastSpeak = text;

  const msg =
  new SpeechSynthesisUtterance(text);

  msg.lang = "pt-BR";

  speechSynthesis.speak(msg);

}

/* ================= TOGGLE VOICE ================= */

function toggleVoice(){

  voice = !voice;

  lastSpeak = "";

  txt.innerHTML =

  voice
  ?
  "Áudio ativado"
  :
  "Áudio desativado";

}
/* ================= MODOS ================= */

function setMode(newMode){

  mode = newMode;

  compareStep = 0;

  lastSpeak = "";

  txt.innerHTML =
  "Modo atual: " + mode;

  if(
    mode === "comparePoint" ||
    mode === "compareDatabase"
  ){
    cross.style.display = "block";
  }else{
    cross.style.display = "none";
  }

}

/* ================= UNIVERSAL ================= */

function toggleUniversalMode(){

  universalMode = !universalMode;

  const btn =
  document.getElementById("universalBtn");

  if(universalMode){

    btn.innerHTML =
    "Universal ON";

    btn.classList.add("activeMode");

  }else{

    btn.innerHTML =
    "Universal OFF";

    btn.classList.remove("activeMode");

  }

}
/* ================= FLASH ================= */

async function toggleFlash(){

  if(flashBusy) return;

  if(!streamTrack){

    alert("Câmera não iniciada");
    return;
  }

  flashBusy = true;

  try{

    const capabilities =
    streamTrack.getCapabilities();

    if(!capabilities.torch){

      alert("Flash não suportado");

      flashBusy = false;
      return;
    }

    flashOn = !flashOn;

    await streamTrack.applyConstraints({

      advanced:[
        {
          torch:flashOn
        }
      ]

    });

  }catch(e){

    alert("Falha no flash");

  }

  setTimeout(()=>{

    flashBusy = false;

  },500);

}
/* ================= RGB -> LAB ================= */

function rgbToLab(r,g,b){

  r /= 255;
  g /= 255;
  b /= 255;

  r = r > 0.04045
  ?
  Math.pow((r + 0.055)/1.055,2.4)
  :
  r/12.92;

  g = g > 0.04045
  ?
  Math.pow((g + 0.055)/1.055,2.4)
  :
  g/12.92;

  b = b > 0.04045
  ?
  Math.pow((b + 0.055)/1.055,2.4)
  :
  b/12.92;
  let x =
  (r*0.4124 + g*0.3576 + b*0.1805)/0.95047;

  let y =
  (r*0.2126 + g*0.7152 + b*0.0722)/1.00000;

  let z =
  (r*0.0193 + g*0.1192 + b*0.9505)/1.08883;

  return {

    l:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)

  };

}

/* ================= DELTA E ================= */

function deltaE(labA,labB){

  return Math.sqrt(

    Math.pow(labA.l-labB.l,2)+
    Math.pow(labA.a-labB.a,2)+
    Math.pow(labA.b-labB.b,2)

  );

}
/* ================= CAPTURA ================= */

function captureCenter(){

  const temp =
  document.createElement("canvas");

  temp.width =
  video.videoWidth;

  temp.height =
  video.videoHeight;

  const tctx =
  temp.getContext("2d");

  tctx.drawImage(video,0,0);

  const x =
  temp.width / 2;

  const y =
  temp.height / 2;

  const data =
  tctx.getImageData(
    x,
    y,
    1,
    1
  ).data;

  return {

    r:data[0],
    g:data[1],
    b:data[2]

  };

}
/* ================= DETECÇÃO ================= */

function detectSimpleColor(r,g,b){

  if(r > 200 && g > 200 && b > 200){
    return "Branco";
  }

  if(r < 50 && g < 50 && b < 50){
    return "Preto";
  }

  if(r > g && r > b){
    return "Vermelho";
  }

  if(g > r && g > b){
    return "Verde";
  }

  if(b > r && b > g){
    return "Azul";
  }

  return "Cor detectada";

}

/* ================= OEM ================= */

function analyzeOEM(){

  const rgb =
  captureCenter();

  const colorName =
  detectSimpleColor(
    rgb.r,
    rgb.g,
    rgb.b
  );

  txt.innerHTML =
  "OEM Scan: " + colorName;

  speak(colorName);

}
/* ================= LOOP ================= */

setInterval(()=>{

  if(processingPaused) return;

  if(
    !video.videoWidth ||
    video.readyState < 2
  ){
    return;
  }

  const rgb =
  captureCenter();

  canvasA.width = 120;
  canvasA.height = 120;

  ctxA.fillStyle = `
  rgb(
    ${rgb.r},
    ${rgb.g},
    ${rgb.b}
  )
  `;

  ctxA.fillRect(
    0,
    0,
    120,
    120
  );

  if(mode === "move"){

    const colorName =
    detectSimpleColor(
      rgb.r,
      rgb.g,
      rgb.b
    );

    txt.innerHTML =
    "Movimento: " + colorName;

    speak(colorName);

  }

},500);

</script>

</body>
</html>
