<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro - Universal v7.5 (Deep Spectrum)</title>
<style>
  body{ margin:0; font-family: 'Segoe UI', sans-serif; background:#000; color:#fff; text-align:center; overflow:hidden; }
  #header{ padding: 12px; background: #0a0a0a; display: flex; justify-content: center; gap: 10px; border-bottom: 2px solid #1a1a1a; }
  #video-container { position: relative; width: 100%; height: 65vh; background: #000; }
  video{ width: 100%; height: 100%; object-fit: contain; }
  button{ padding:12px 18px; border-radius:10px; border:none; background:#1a1a1a; color:#888; font-weight:bold; cursor:pointer; transition: 0.4s; border: 1px solid #333; }
  .active{ background:#00ffcc !important; color:#000 !important; box-shadow: 0 0 20px rgba(0,255,204,0.3); border: 1px solid #00ffcc; }
  #cross{ position:absolute; top:50%; left:50%; width:30px; height:30px; transform:translate(-50%,-50%); border:2px dashed #00ffcc; border-radius:50%; pointer-events:none; z-index: 10; }
  #display{ font-size: 52px; font-weight: 900; color: #00ffcc; margin: 20px 0; text-transform: uppercase; letter-spacing: -2px; }
  .info { color: #555; font-size: 10px; letter-spacing: 2px; font-weight: bold; }
</style>
</head>
<body>

<div id="header">
  <button onclick="toggleUniv()" id="btnU">UNIVERSAL: OFF</button>
  <button onclick="calibrate()">CALIBRAR AMBIENTE</button>
  <button onclick="toggleVoice()" id="btnV" class="active">ÁUDIO</button>
</div>

<div id="video-container">
  <video id="v" autoplay playsinline muted></video>
  <div id="cross"></div>
</div>

<div id="display">PRONTO</div>
<div id="stats" class="info">V7.5 | MOTOR DE SUBTRAÇÃO DE BRILHO</div>

<canvas id="c" style="display:none;"></canvas>

<script>
const video = document.getElementById('v');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', {willReadFrequently: true});
const display = document.getElementById('display');
const stats = document.getElementById('stats');

let isUniv = false, isVoice = true, lastColor = "", stableCount = 0;
let offset = {r:255, g:255, b:255}, colorHistory = []; 

navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment", width: {ideal: 1280}, frameRate: {ideal: 60} }
}).then(s => { video.srcObject = s; });

function speak(t) {
    if(!isVoice || !isUniv) return;
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(t);
    msg.lang = 'pt-BR';
    msg.rate = 1.6;
    window.speechSynthesis.speak(msg);
}

function calibrate() {
    const data = getCenterColor();
    offset = {r: data.r, g: data.g, b: data.b};
    speak("Ambiente Calibrado");
}

function getCenterColor() {
    if (canvas.width !== video.videoWidth) {
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    }
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const x = canvas.width / 2, y = canvas.height / 2;
    // Amostragem em Cruz para evitar ruído de um único pixel
    const d = ctx.getImageData(x - 4, y - 4, 8, 8).data;
    let r=0, g=0, b=0, v=0;
    for(let i=0; i<d.length; i+=4){
        // Filtro de Rejeição de Brilho Extremo (Specular Highlights)
        if ((d[i]+d[i+1]+d[i+2])/3 < 242) {
            r += d[i]; g += d[i+1]; b += d[i+2]; v++;
        }
    }
    return v > 0 ? { r: r/v, g: g/v, b: b/v } : { r: 128, g: 128, b: 128 };
}

function solveColor(r, g, b) {
    // 1. COMPENSAÇÃO DE EXPOSIÇÃO (Câmara Escura Virtual)
    const rawLum = (r + g + b) / 3;
    let factor = 1.0;
    if (rawLum > 150) factor = 150 / rawLum; // Reduz o ganho se estiver muito claro
    
    let nr = r * factor;
    let ng = g * factor;
    let nb = b * factor;

    // 2. NORMALIZAÇÃO POR CALIBRAÇÃO
    nr = (nr / (offset.r || 255)) * 255;
    ng = (ng / (offset.g || 255)) * 255;
    nb = (nb / (offset.b || 255)) * 255;

    const max = Math.max(nr, ng, nb);
    const min = Math.min(nr, ng, nb);
    const chroma = max - min;
    const brightness = (nr + ng + nb) / 3;

    // 3. CÁLCULO DE MATIZ (HUE)
    let h = 0;
    if (chroma > 0) {
        if (max === nr) h = (ng - nb) / chroma + (ng < nb ? 6 : 0);
        else if (max === ng) h = (nb - nr) / chroma + 2;
        else h = (nr - ng) / chroma + 4;
        h *= 60;
    }

    // 4. LÓGICA DE PIGMENTO ESTÁVEL
    
    // Filtro de Neutros (Preto, Cinza, Branco) com trava de brilho
    if (chroma < 22) {
        if (brightness < 45) return "Preto";
        if (brightness > 210) return "Branco";
        return "Cinza";
    }

    // Zonas de Cor (Espectro Primário)
    if (h < 15 || h > 345) {
        // Se houver muito azul proporcional ao vermelho sob luz forte, é Rosa
        if (nb > nr * 0.45 && brightness > 100) return "Rosa";
        return (brightness < 70) ? "Vermelho Escuro" : "Vermelho";
    }
    
    if (h >= 15 && h < 45) return (brightness < 80) ? "Marrom" : "Laranja";
    if (h >= 45 && h < 65) return "Amarelo";
    
    if (h >= 65 && h < 158) {
        return (brightness < 70) ? "Verde Escuro" : "Verde";
    }
    
    if (h >= 158 && h < 265) {
        // Separação Turquesa/Verde Água de Azul
        if (h < 190 && ng > nb * 0.8) return "Verde"; 
        return "Azul";
    }
    
    if (h >= 265 && h < 315) {
        // Roxo vs Rosa (O Roxo precisa ter Azul dominante)
        if (nr > nb * 1.2) return "Rosa";
        return "Roxo";
    }
    
    if (h >= 315 && h <= 345) return "Rosa";

    return "Lendo...";
}

function getStableColor(newColor) {
    colorHistory.push(newColor);
    if (colorHistory.length > 25) colorHistory.shift();
    return colorHistory.sort((a,b) =>
          colorHistory.filter(v => v===a).length - colorHistory.filter(v => v===b).length
    ).pop();
}

function mainLoop() {
    if(video.videoWidth > 0) {
        const rgb = getCenterColor();
        const colorName = getStableColor(solveColor(rgb.r, rgb.g, rgb.b));

        if(isUniv) {
            display.innerText = colorName;
            if(colorName === lastColor && colorName !== "Lendo...") {
                stableCount++;
                if(stableCount === 25) speak(colorName);
            } else { lastColor = colorName; stableCount = 0; }
        } else {
            display.innerText = "STANDBY";
            stats.innerText = `LUZ: ${Math.round((rgb.r+rgb.g+rgb.b)/3)}`;
        }
    }
    requestAnimationFrame(mainLoop);
}

function toggleUniv() { 
    isUniv = !isUniv; 
    const btn = document.getElementById('btnU');
    btn.classList.toggle('active');
    btn.innerText = isUniv ? "UNIVERSAL: ON" : "UNIVERSAL: OFF";
    if(isUniv) { speak("Modo espectro ativado"); colorHistory = []; }
}

function toggleVoice() { 
    isVoice = !isVoice; 
    document.getElementById('btnV').classList.toggle('active');
}

requestAnimationFrame(mainLoop);
</script>
</body>
</html>
