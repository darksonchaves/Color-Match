<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ColorMatch Pro - v17.0 Precision Peak</title>
    <style>
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; overflow: hidden; text-align: center; }
        #header { 
            position: absolute; top: 0; width: 100%; z-index: 20;
            background: rgba(10, 10, 10, 0.96); backdrop-filter: blur(12px);
            display: flex; justify-content: center; padding: 12px 0; gap: 8px;
            border-bottom: 1px solid #333; flex-wrap: wrap;
        }
        button { 
            background: #1a1a1a; color: #888; border: 1px solid #444;
            padding: 10px 14px; border-radius: 8px; font-weight: bold; font-size: 9px;
            text-transform: uppercase; transition: 0.2s; letter-spacing: 0.5px;
        }
        .active { background: #00ffcc !important; color: #000 !important; border-color: #00ffcc; box-shadow: 0 0 15px rgba(0,255,204,0.4); }
        .univ-active { background: #ffaa00 !important; color: #000 !important; border-color: #ffaa00; }

        #video-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        #crosshair { 
            position: absolute; border: 2px dashed rgba(255,255,255,0.4); border-radius: 50%;
            pointer-events: none; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10;
        }
        .mira-livre { width: 45px; height: 45px; border-style: solid !important; }
        .mira-padrao { width: 34vw; height: 34vw; }
        .locked { border-color: #00ffcc !important; background: rgba(0,255,204,0.12); box-shadow: 0 0 30px #00ffcc; }

        #ui-overlay { 
            position: absolute; bottom: 0; width: 100%; padding: 45px 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.98) 40%); z-index: 20;
        }
        #color-name { font-size: 46px; font-weight: 900; text-transform: uppercase; color: #222; min-height: 60px; letter-spacing: -1px; }
        .active-text { color: #00ffcc !important; text-shadow: 0 0 25px rgba(0,255,204,0.5); }
        #debug { font-size: 10px; color: #666; margin-top: 12px; font-family: 'Courier New', monospace; font-weight: bold; }
    </style>
</head>
<body>

<div id="header">
    <button onclick="toggleSystem()" id="btnPower">SISTEMA: OFF</button>
    <button onclick="calibrate()" id="btnCalib">CALIBRAR ÍRIS</button>
    <button onclick="setMode('LIVRE')" id="btnLivre">MOVIMENTO LIVRE</button>
    <button onclick="setMode('PADRAO')" id="btnPadrao">MOVIMENTO PADRÃO</button>
    <button onclick="toggleUniv()" id="btnUniv">UNIVERSAL: OFF</button>
</div>

<div id="video-container">
    <video id="v" autoplay playsinline muted></video>
    <div id="crosshair" class="mira-livre"></div>
</div>

<div id="ui-overlay">
    <div id="color-name">DISJUNTOR OFF</div>
    <div id="debug">SISTEMA EM STANDBY</div>
</div>

<canvas id="c" style="display:none;"></canvas>

<script>
    const v = document.getElementById('v'), c = document.getElementById('c'), ctx = c.getContext('2d', {willReadFrequently:true});
    const colorTxt = document.getElementById('color-name'), debugTxt = document.getElementById('debug'), cross = document.getElementById('crosshair');

    let mode = 'LIVRE', active = false, isUniv = false, lastSpeach = "", isSpeaking = false;
    let iris = { r: 1, g: 1, b: 1 }; 
    let history = [], lastRawColor = {h:0, s:0, l:0};

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", focusMode: "continuous" } }).then(s => v.srcObject = s);

    function toggleSystem() { 
        active = !active; 
        const btn = document.getElementById('btnPower');
        btn.classList.toggle('active', active);
        btn.innerText = `SISTEMA: ${active ? 'ON' : 'OFF'}`;
        if(!active) resetUI(); else speak("Sistema Pronto");
    }

    function toggleUniv() {
        isUniv = !isUniv;
        const btn = document.getElementById('btnUniv');
        btn.classList.toggle('univ-active', isUniv);
        btn.innerText = `UNIVERSAL: ${isUniv ? 'ON' : 'OFF'}`;
        speak(isUniv ? "Modo Universal" : "Modo Normal");
    }

    function setMode(m) {
        mode = m;
        document.getElementById('btnLivre').classList.toggle('active', m === 'LIVRE');
        document.getElementById('btnPadrao').classList.toggle('active', m === 'PADRAO');
        cross.className = (m === 'LIVRE' ? 'mira-livre' : 'mira-padrao');
        speak(m === 'LIVRE' ? "Livre" : "Padrão");
    }

    function calibrate() {
        if(!active) return;
        const d = sample(v.videoWidth/2, v.videoHeight/2, 70);
        const avg = (d.r + d.g + d.b) / 3;
        
        if(avg < 25) {
            speak("Erro: Pouca luz");
            return;
        }

        iris.r = avg / d.r;
        iris.g = avg / d.g;
        iris.b = avg / d.b;
        speak("Íris Calibrada");
    }

    function sample(x, y, s) {
        c.width = v.videoWidth; c.height = v.videoHeight;
        ctx.drawImage(v, 0, 0);
        const data = ctx.getImageData(Math.max(0, x - s/2), Math.max(0, y - s/2), s, s).data;
        let r=0, g=0, b=0;
        for(let i=0; i<data.length; i+=4) { r += data[i]; g += data[i+1]; b += data[i+2]; }
        const total = data.length/4;
        return { r: r/total, g: g/total, b: b/total };
    }

    function processColor(rawR, rawG, rawB) {
        let r = Math.min(255, rawR * iris.r);
        let g = Math.min(255, rawG * iris.g);
        let b = Math.min(255, rawB * iris.b);

        const bri = (r + g + b) / 3;
        const rN = r/255, gN = g/255, bN = b/255;
        const max = Math.max(rN, gN, bN), min = Math.min(rN, gN, bN), d = max - min;
        let h, s, l = (max + min) / 2;

        if (d === 0) h = s = 0;
        else {
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            if (max === rN) h = (gN - bN) / d + (gN < bN ? 6 : 0);
            else if (max === gN) h = (bN - rN) / d + 2;
            else h = (rN - gN) / d + 4;
            h /= 6;
        }
        return { h: h * 360, s: s * 100, l: l * 100, bri: bri };
    }

    function getColorName(h, s, l, bri) {
        // Trava de escuridão absoluta
        if (bri < 22) return "Preto"; 

        // Estabilização de cores neutras
        if (s < 18) {
            if (bri < 60) return "Preto";
            if (bri > 190) return "Branco";
            return "Cinza";
        }

        // Lógica de Espectro Primário para Modo Universal (Âncoras de Matiz)
        if (h < 15 || h > 348) return bri < 75 ? "Vermelho Escuro" : "Vermelho";
        if (h < 45) return bri < 70 ? "Marrom" : "Laranja";
        if (h < 68) return "Amarelo";
        
        // ZONA DO VERDE: Ajustada para evitar confusão com azul desbotado
        if (h < 160) return bri < 80 ? "Verde Escuro" : "Verde";
        
        // ZONA DO AZUL: Alargada para capturar todos os tons de azul no Modo Universal
        if (h < 262) return "Azul"; 
        
        if (h < 310) return "Roxo";
        return "Rosa";
    }

    function loop() {
        if (v.videoWidth > 0 && active) {
            const x = v.videoWidth/2, y = v.videoHeight/2;
            const raw = sample(x, y, 25);
            const data = processColor(raw.r, raw.g, raw.b);

            // FILTRO DE HISTERESE: Só processa se a mudança for significativa
            const diff = Math.abs(data.h - lastRawColor.h) + Math.abs(data.s - lastRawColor.s);
            if (diff < 1.5) { // Estabiliza o sensor parado
                requestAnimationFrame(loop);
                return;
            }
            lastRawColor = data;

            let canShow = true;
            if (mode === 'PADRAO') {
                const step = (v.videoWidth * 0.14);
                const check = [sample(x, y-step, 10), sample(x, y+step, 10), sample(x-step, y, 10), sample(x+step, y, 10)];
                const valid = check.filter(p => {
                    const pD = processColor(p.r, p.g, p.b);
                    return Math.abs(pD.h - data.h) < 25 || (data.s < 15 && pD.s < 15);
                }).length;

                if (valid < 3) {
                    canShow = false;
                    colorTxt.innerText = "ALINHANDO...";
                    colorTxt.className = "";
                    cross.classList.remove('locked');
                }
            }

            if (canShow) {
                const currentName = getColorName(data.h, data.s, data.l, data.bri);
                const depth = isUniv ? 18 : 8; // Mais frames no Universal para 100% de precisão
                history.push(currentName);
                if(history.length > depth) history.shift();
                
                const stableName = history.sort((a,b) => history.filter(v=>v===a).length - history.filter(v=>v===b).length).pop();
                
                colorTxt.innerText = stableName;
                colorTxt.className = "active-text";
                cross.classList.add('locked');
                
                debugTxt.innerText = `H:${Math.round(data.h)} S:${Math.round(data.s)} B:${Math.round(data.bri)} | UNV:${isUniv?'ON':'OFF'}`;
                
                if(stableName !== lastSpeach) speak(stableName);
            }
        }
        requestAnimationFrame(loop);
    }

    function speak(t) {
        if(!t || isSpeaking) return;
        speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang='pt-BR'; m.rate=1.5;
        m.onstart=()=>isSpeaking=true; m.onend=()=>isSpeaking=false;
        speechSynthesis.speak(m); lastSpeach=t;
    }

    function resetUI() {
        colorTxt.innerText = "DISJUNTOR OFF"; colorTxt.className = "";
        cross.classList.remove('locked');
        debugTxt.innerText = "SISTEMA EM STANDBY";
        history = []; lastSpeach = "";
    }

    loop();
</script>
</body>
</html>
