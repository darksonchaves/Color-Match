<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro – Raw Sensor Mode</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
  text-align:center;
}

video {
  width:90%;
  border-radius:10px;
}

canvas {
  width:90%;
  border-radius:10px;
  background:#222;
}

button {
  padding:10px;
  margin:5px;
}

#cross {
  position:fixed;
  top:50%;
  left:50%;
  width:26px;
  height:26px;
  transform:translate(-50%,-50%);
  border:2px solid #00ffcc;
  border-radius:50%;
  display:none;
  pointer-events:none;
}
</style>
</head>

<body>

<h2>ColorMatch Pro – Raw Sensor Mode</h2>

<button onclick="setMode('static')">Estático</button>
<button onclick="setMode('move')">Movimento</button>
<button onclick="setMode('compare')">Comparar</button>
<button onclick="toggleVoice()">🔊 Áudio</button>

<video id="video" autoplay playsinline></video>

<canvas id="canvasA"></canvas>
<canvas id="canvasB"></canvas>

<div id="cross"></div>

<p id="txt">Iniciando...</p>

<script>

const video = document.getElementById("video");
const ctxA = canvasA.getContext("2d");
const ctxB = canvasB.getContext("2d");

let mode = "static";
let voice = true;

let lastSpeak = "";
let lastFrameData = "";

/* CAMERA */
navigator.mediaDevices.getUserMedia({
  video:{facingMode:"environment"}
}).then(s=>{
  video.srcObject = s;
});

/* VOZ */
function speak(t){
  if(!voice) return;
  speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance(t);
  msg.lang = "pt-BR";
  speechSynthesis.speak(msg);
}

/* ================= CAPTURA SENSOR PURA ================= */
function captureRaw(x,y){

  canvasA.width = video.videoWidth;
  canvasA.height = video.videoHeight;

  ctxA.drawImage(video,0,0);

  const s = 10;
  const data = ctxA.getImageData(x-s,y-s,s*2,s*2).data;

  let r=0,g=0,b=0,c=0;

  for(let i=0;i<data.length;i+=4){
    r += data[i];
    g += data[i+1];
    b += data[i+2];
    c++;
  }

  r = Math.round(r/c);
  g = Math.round(g/c);
  b = Math.round(b/c);

  return {r,g,b};
}

/* FORMATAÇÃO SIMPLES DE SAÍDA */
function formatSignal(sig){
  return `R:${sig.r} G:${sig.g} B:${sig.b}`;
}

/* ================= MOVIMENTO (MIRA CENTRAL) ================= */
function moveLoop(){

  if(mode !== "move") return;

  const sig = captureRaw(
    video.videoWidth/2,
    video.videoHeight/2
  );

  const text = formatSignal(sig);

  document.getElementById("txt").innerText =
    "Movimento: " + text;

  if(text !== lastSpeak){
    speak(text);
    lastSpeak = text;
  }

  requestAnimationFrame(moveLoop);
}

/* ================= MODO ================= */
function setMode(m){

  mode = m;

  document.getElementById("cross").style.display =
    (m === "move") ? "block" : "none";

  document.getElementById("txt").innerText =
    "Modo: " + m.toUpperCase();

  if(m === "move") moveLoop();
}

/* ================= CLIQUE ================= */
video.addEventListener("click",(e)=>{

  const rect = video.getBoundingClientRect();

  const x = (e.clientX-rect.left)*(video.videoWidth/rect.width);
  const y = (e.clientY-rect.top)*(video.videoHeight/rect.height);

  const sig = captureRaw(x,y);
  const text = formatSignal(sig);

  if(mode === "static"){
    document.getElementById("txt").innerText =
      "Estático: " + text;

    speak(text);
  }

  if(mode === "compare"){

    if(!window.A){
      window.A = sig;
      document.getElementById("txt").innerText =
        "A capturado: " + text;
    } else {
      window.B = sig;

      const result =
        `A(${window.A.r},${window.A.g},${window.A.b}) → ` +
        `B(${window.B.r},${window.B.g},${window.B.b})`;

      document.getElementById("txt").innerText = result;
      speak(result);

      window.A = null;
      window.B = null;
    }
  }
});

/* VOZ */
function toggleVoice(){
  voice = !voice;
  alert("Áudio: " + (voice ? "ON" : "OFF"));
}

</script>

</body>
</html>
