<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"


<title>
ColorMatch Pro – OEM MultiBrand Edition

<style>

body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
  text-align:center;
}

h2{
  margin-top:15px;
  font-size:28px;
}

video{
  width:92%;
  max-width:900px;

  border-radius:12px;
  border:2px solid #333;
  object-fit:cover;
  background:#000;
}

button{
  padding:10px 14px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#222;
  color:#fff;
  font-size:15px;
}

button:hover{
  background:#333;
}

.activeMode{
  background:#00695c !important;
}

input,select{
  padding:10px;
  border-radius:8px;
  border:none;
  margin:5px;
  width:90%;
  max-width:420px;
}

#panel{
  display:flex;
  justify-content:space-around;
  flex-wrap:wrap;
  margin-top:15px;
}

.box{
  width:45%;

}

canvas{
  width:100%;
  height:140px;
  border-radius:10px;
  background:#222;
}

#cross{
  position:fixed;
  top:50%;
  left:50%;
  width:26px;
  height:26px;
  transform:translate(-50%,-50%);
  border:2px solid #00ffcc;
  border-radius:50%;
  display:none;
  pointer-events:none;
  z-index:999;
}

#databasePanel{
  margin-top:20px;
  padding:15px;
  background:#181818;
  border-top:2px solid #333;
}

#resultList{
  margin-top:10px;
  text-align:left;
  width:90%;
  max-width:700px;
  margin-left:auto;
  margin-right:auto;
  background:#1f1f1f;
  border-radius:10px;
  padding:10px;
}

.item{
  padding:10px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

.item:hover{
  background:#2c2c2c;
}

.colorBox{
  width:18px;
  height:18px;
  display:inline-block;
  border-radius:50%;
  margin-right:8px;

  vertical-align:middle;

#txt{
  margin-top:15px;

  padding:10px;

}

  margin-top:15px;
  padding:10px;
  background:#181818;

</head>

<body>

<h2>
ColorMatch Pro – OEM MultiBrand Edition
</h2>

<button onclick="setMode('static')">
Estático
</button>

<button onclick="setMode('move')">
Movimento
</button>

<button onclick="setMode('comparePoint')">
Comparar Ponto a Ponto
</button>

<button onclick="setMode('compareDatabase')">
Comparar Base de Dados
</button>

<button onclick="analyzeOEM()">
🎨 OEM Scan
</button>

<button onclick="toggleFlash()">
⚡ Flash
</button>

<button onclick="toggleVoice()">
🔊 Áudio
</button>

<br><br>

<div id="universalPanel">

<h3>
Modo Universal
</h3>

<button
id="universalBtn"
onclick="toggleUniversalMode()"

Universal OFF
</button>

<p style="font-size:14px;color:#aaa;">
Reconhecimento puro baseado na leitura real da câmera
</p>

</div>

<video
id="video"
autoplay
playsinline
muted
</video>


<div id="cameraStatus">
Aguardando câmera...
</div>

<div id="cross"></div>

<div id="panel">

<div class="box">
<canvas id="canvasA"></canvas>
<div>Referência</div>
</div>

<div class="box">
<canvas id="canvasB"></canvas>
<div>Comparação</div>
</div>

</div>

<div id="databasePanel">

<h3>
Pesquisa OEM
</h3>

<input
type="text"
id="brandSearch"
placeholder="Digite a montadora..."
oninput="searchBrand()"


<br>

<select
id="modelSelect"
onchange="showModelColors()"


<option value="">
Selecione o modelo
</option>

</select>

<div id="resultList"></div>

</div>

<p id="txt">
Inicializando câmera...
</p>

<script>

/* ================= ELEMENTOS ================= */

const video =
document.getElementById("video");

const canvasA =
document.getElementById("canvasA");

const canvasB =
document.getElementById("canvasB");

const ctxA =
canvasA.getContext(
"2d",
{willReadFrequently:true}
);

const ctxB =
canvasB.getContext(
"2d",
{willReadFrequently:true}
);

const cross =
document.getElementById("cross");

const txt =
document.getElementById("txt");

const cameraStatus =
document.getElementById("cameraStatus");

/* ================= CONTROLE ================= */

let mode = "static";

let voice = true;

let universalMode = false;

let moveRunning = false;

let compareA = null;

let compareALab = null;

let compareStep = 0;

let selectedDatabaseColor = null;

/* ================= AUDIO ================= */

let currentSpokenColor = "";

let isSpeaking = false;

/* ================= ESTABILIDADE ================= */

let detectedColor = "";

let stableFrames = 0;

const MIN_STABLE_FRAMES = 8;

/* ================= FLASH ================= */

let streamTrack = null;

let flashOn = false;

let flashBusy = false;

let processingPaused = false;

/* ================= CAMERA ================= */

navigator.mediaDevices.getUserMedia({

  video:{
    facingMode:{
      ideal:"environment"
    },
    width:{ideal:1280},
    height:{ideal:720}
  },

  audio:false

})

.then(stream=>{

  video.srcObject = stream;

  streamTrack =
  stream.getVideoTracks()[0];

  video.play()

  .then(()=>{

    cameraStatus.innerText =
    "Câmera ativa";

    txt.innerText =
    "Câmera iniciada com sucesso";

  })

  .catch(()=>{

    cameraStatus.innerText =
    "Falha ao iniciar vídeo";

  });

})

.catch((e)=>{

  console.error(e);

  cameraStatus.innerText =
  "Falha ao iniciar câmera";

  txt.innerText =
  "Erro ao acessar câmera";

  alert(
    "Permita acesso à câmera no navegador"
  );

});

/* ================= VOZ ================= */

function speak(text){

  if(!voice) return;

  if(!text) return;

  if(text === currentSpokenColor){
    return;
  }

  currentSpokenColor = text;

  speechSynthesis.cancel();

  const msg =
  new SpeechSynthesisUtterance(text);

  msg.lang = "pt-BR";

  msg.rate = 1.0;

  msg.pitch = 1;

  msg.volume = 1;

  isSpeaking = true;

  msg.onend = ()=>{

    isSpeaking = false;
  };

  msg.onerror = ()=>{

    isSpeaking = false;
  };

  speechSynthesis.speak(msg);
}

/* ================= TOGGLE AUDIO ================= */

function toggleVoice(){

  voice = !voice;

  speechSynthesis.cancel();

  currentSpokenColor = "";

  isSpeaking = false;

  alert(
    "Áudio: " +
    (voice ? "ON" : "OFF")
  );
}

/* ================= UNIVERSAL ================= */

function toggleUniversalMode(){

  universalMode = !universalMode;

  const btn =
  document.getElementById("universalBtn");

  stableFrames = 0;

  detectedColor = "";

  currentSpokenColor = "";

  if(universalMode){

    btn.innerText =
    "Universal ON";

    btn.classList.add(
      "activeMode"
    );

    txt.innerText =
    "Modo universal ativado";

  }else{

    btn.innerText =
    "Universal OFF";

    btn.classList.remove(
      "activeMode"
    );

    txt.innerText =
    "Modo universal desativado";
  }
}

/* ================= FLASH ================= */

async function toggleFlash(){

  if(flashBusy) return;

  if(!streamTrack){

    alert("Câmera não iniciada");
    return;
  }

  flashBusy = true;

  processingPaused = true;

  try{

    const capabilities =
    streamTrack.getCapabilities();

    if(!capabilities.torch){

      alert(
        "Flash não suportado"
      );

      processingPaused = false;

      flashBusy = false;

      return;
    }

    flashOn = !flashOn;

    await streamTrack.applyConstraints({

      advanced:[
        {
          torch:flashOn
        }
      ]

    });

  }catch(e){

    console.error(e);

    flashOn = false;

    alert("Falha no flash");
  }

  processingPaused = false;

  setTimeout(()=>{

    flashBusy = false;

  },300);
}

/* ================= RGB -> HSL ================= */

function rgbToHsl(r,g,b){

  r/=255;
  g/=255;
  b/=255;

  const max =
  Math.max(r,g,b);

  const min =
  Math.min(r,g,b);

  let h,s,l;

  l = (max+min)/2;

  if(max===min){

    h = 0;
    s = 0;

  }else{

    const d = max-min;

    s =
    l>0.5
    ? d/(2-max-min)
    : d/(max+min);

    switch(max){

      case r:
      h = (g-b)/d + (g<b?6:0);
      break;

      case g:
      h = (b-r)/d + 2;
      break;

      case b:
      h = (r-g)/d + 4;
      break;
    }

    h /= 6;
  }

  return{
    h:h*360,
    s:s*100,
    l:l*100
  };
}

</script>

</body>
</html>
