<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro - v8.6 Lentes Blindadas</title>
<style>
  body{ margin:0; font-family: 'Segoe UI', sans-serif; background:#000; color:#fff; text-align:center; overflow:hidden; }
  #header{ padding: 12px; background: #0a0a0a; display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; border-bottom: 2px solid #1a1a1a; }
  #video-container { position: relative; width: 100%; height: 60vh; background: #000; }
  video{ width: 100%; height: 100%; object-fit: contain; }
  button{ padding:10px 12px; border-radius:8px; border:none; background:#1a1a1a; color:#888; font-weight:bold; cursor:pointer; border: 1px solid #333; font-size: 10px; }
  .active{ background:#00ffcc !important; color:#000 !important; border: 1px solid #00ffcc; }
  .lock-active { background:#ff3366 !important; color:#fff !important; border: 1px solid #ff3366; }
  
  #cross{ 
    position:absolute; top:50%; left:50%; 
    transform:translate(-50%,-50%); 
    border:2px solid rgba(255,255,255,0.4); 
    border-radius: 50%; pointer-events:none; z-index: 10;
    transition: all 0.3s ease;
  }
  .cross-locked { width: 100px; height: 100px; border-style: dashed; }
  .cross-free { width: 25px; height: 25px; border-style: solid; border-color: #00ffcc; }
  .cross-valid { border: 4px solid #00ffcc !important; box-shadow: 0 0 30px #00ffcc; background: rgba(0,255,204,0.15); }

  #display{ font-size: 48px; font-weight: 900; color: #444; margin: 15px 0; height: 60px; text-transform: uppercase; }
  .display-valid { color: #00ffcc !important; text-shadow: 0 0 10px rgba(0,255,204,0.3); }
  #status-bar { font-size: 11px; color: #ff3366; font-weight: bold; height: 20px; letter-spacing: 1px; }
</style>
</head>
<body>

<div id="header">
  <button onclick="toggleUniv()" id="btnU">SISTEMA: OFF</button>
  <button onclick="toggleLock()" id="btnL" class="lock-active">TRAVA 12CM: ON</button>
  <button onclick="calibrate()">RE-CALIBRAR</button>
  <button onclick="toggleVoice()" id="btnV" class="active">ÁUDIO</button>
</div>

<div id="video-container">
  <video id="v" autoplay playsinline muted></video>
  <div id="cross" class="cross-locked"></div>
</div>

<div id="status-bar">AGUARDANDO</div>
<div id="display">---</div>

<canvas id="c" style="display:none;"></canvas>

<script>
const video = document.getElementById('v');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', {willReadFrequently: true});
const display = document.getElementById('display');
const statusBar = document.getElementById('status-bar');
const cross = document.getElementById('cross');

let isUniv = false, isVoice = true, isLocked = true, lastColor = "", stableCount = 0;
let offset = {r:255, g:255, b:255}, history = []; 

navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment", width: {ideal: 1280}, focusMode: "continuous" }
}).then(s => { video.srcObject = s; });

function speak(t) {
    if(!isVoice || !isUniv) return;
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(t);
    msg.lang = 'pt-BR'; msg.rate = 1.7;
    window.speechSynthesis.speak(msg);
}

function toggleLock() {
    isLocked = !isLocked;
    document.getElementById('btnL').classList.toggle('lock-active');
    document.getElementById('btnL').innerText = isLocked ? "TRAVA 12CM: ON" : "TRAVA 12CM: OFF";
    cross.className = isLocked ? "cross-locked" : "cross-free";
    resetSystem();
}

function resetSystem() {
    history = [];
    display.innerText = "STANDBY";
    display.classList.remove("display-valid");
}

function calibrate() {
    const data = getCenterColor(30); 
    offset = {r: data.r, g: data.g, b: data.b};
    speak("Branco ajustado");
}

function getCenterColor(size = 20) {
    if (canvas.width !== video.videoWidth) {
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    }
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const x = canvas.width / 2, y = canvas.height / 2;
    const d = ctx.getImageData(x - (size/2), y - (size/2), size, size).data;
    let r=0, g=0, b=0, count=0;
    for(let i=0; i<d.length; i+=4){
        r += d[i]; g += d[i+1]; b += d[i+2]; count++;
    }
    return { r: r/count, g: g/count, b: b/count };
}

function solveColor(r, g, b) {
    // Normalização Inteligente
    let nr = (r / offset.r) * 255;
    let ng = (g / offset.g) * 255;
    let nb = (b / offset.b) * 255;

    const max = Math.max(nr, ng, nb);
    const min = Math.min(nr, ng, nb);
    const chroma = max - min;
    const brightness = (nr + ng + nb) / 3;

    // RIGOR DE DISTÂNCIA 12CM (Melhorado para evitar confusão)
    if (isLocked) {
        // Agora o sistema aceita PRETO REAL (muito escuro) mesmo com croma baixo
        const isDeepBlack = (brightness < 30 && chroma < 12);
        const isVivid = (chroma > 70); // Reduzi de 85 para 70 para ser mais fiel à realidade da lente a 12cm

        if (!isDeepBlack && !isVivid) {
            statusBar.innerText = "SINAL FRACO - APROXIME OU MELHORE A LUZ";
            statusBar.style.color = "#ff3366";
            cross.classList.remove("cross-valid");
            return "BLOQUEADO";
        }
    }
    
    statusBar.innerText = isLocked ? "DISTÂNCIA CORRETA" : "MODO LIVRE";
    statusBar.style.color = "#00ffcc";
    cross.classList.add("cross-valid");

    // Lógica Espectral Anti-Ruído
    let h = 0;
    if (chroma > 0) {
        if (max === nr) h = (ng - nb) / chroma + (ng < nb ? 6 : 0);
        else if (max === ng) h = (nb - nr) / chroma + 2;
        else h = (nr - ng) / chroma + 4;
        h *= 60;
    }

    // Filtro para cores neutras (Preto/Cinza/Branco) mais rigoroso
    if (chroma < 15) {
        if (brightness < 40) return "Preto";
        if (brightness > 200) return "Branco";
        return "Cinza";
    }

    // Correção Laranja vs Rosa vs Vermelho
    if (h < 20 || h > 340) {
        // Se houver muito azul relativo, é rosa. Se for escuro, é vermelho.
        if (nb > nr * 0.55) return "Rosa"; 
        return (brightness < 90) ? "Vermelho Escuro" : "Vermelho";
    }
    
    if (h >= 20 && h < 45) {
        // Se o verde for muito alto, é laranja. Se o azul subir, vira rosa.
        if (nb > ng) return "Rosa";
        return (brightness < 70) ? "Marrom" : "Laranja";
    }

    if (h >= 45 && h < 65) return "Amarelo";
    if (h >= 65 && h < 160) return (brightness < 80) ? "Verde Escuro" : "Verde";
    if (h >= 160 && h < 260) return "Azul";
    if (h >= 260 && h < 320) return "Roxo";
    
    return "Rosa";
}

function mainLoop() {
    if(video.videoWidth > 0) {
        const rgb = getCenterColor(isLocked ? 40 : 15); // Amostragem maior no 12cm
        const rawColor = solveColor(rgb.r, rgb.g, rgb.b);
        
        // Estabilização de Histórico (Média de 15 frames para evitar saltos de cor)
        if (rawColor !== "BLOQUEADO") {
            history.push(rawColor);
            if (history.length > 15) history.shift();
        }

        const stableColor = history.sort((a,b) =>
            history.filter(v => v===a).length - history.filter(v => v===b).length
        ).pop() || "---";

        if(isUniv) {
            display.innerText = stableColor;
            display.classList.toggle("display-valid", stableColor !== "BLOQUEADO" && stableColor !== "---");
            
            if(stableColor !== "BLOQUEADO" && stableColor === lastColor) {
                stableCount++;
                if(stableCount === 20) speak(stableColor);
            } else { lastColor = stableColor; stableCount = 0; }
        } else {
            display.innerText = "STANDBY";
        }
    }
    requestAnimationFrame(mainLoop);
}

function toggleUniv() { 
    isUniv = !isUniv; 
    document.getElementById('btnU').classList.toggle('active');
    btnU.innerText = isUniv ? "SISTEMA: ON" : "SISTEMA: OFF";
    if(isUniv) speak("Iniciado");
}

function toggleVoice() { 
    isVoice = !isVoice; 
    document.getElementById('btnV').classList.toggle('active');
}

requestAnimationFrame(mainLoop);
</script>
</body>
</html>
