<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Análise Colorimétrica em Tempo Real</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  #header {
    background: rgba(15,15,30,0.9);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(100,100,255,0.2);
    z-index: 10;
  }
  #header h1 {
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 2px;
    color: #7b8cde;
    text-transform: uppercase;
  }
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  #camera-container {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }
  #videoEl {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  #canvasEl {
    display: none;
  }
  #reticle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60px;
    height: 60px;
    pointer-events: none;
  }
  .reticle-h {
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    height: 1px;
    background: rgba(120,220,255,0.8);
    transform: translateY(-50%);
  }
  .reticle-v {
    position: absolute;
    left: 50%;
    top: 0;
    height: 100%;
    width: 1px;
    background: rgba(120,220,255,0.8);
    transform: translateX(-50%);
  }
  .reticle-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 20px;
    height: 20px;
    border: 1px solid rgba(120,220,255,0.6);
  }
  #panel {
    width: 280px;
    background: rgba(12,12,25,0.97);
    border-left: 1px solid rgba(100,100,255,0.15);
    display: flex;
    flex-direction: column;
    padding: 20px 16px;
    gap: 16px;
    overflow-y: auto;
  }
  .panel-section {
    background: rgba(30,30,60,0.5);
    border: 1px solid rgba(100,100,255,0.15);
    border-radius: 10px;
    padding: 14px;
  }
  .panel-section h3 {
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #7b8cde;
    margin-bottom: 10px;
  }
  .data-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .data-label {
    font-size: 0.75rem;
    color: #888;
  }
  .data-value {
    font-size: 0.85rem;
    font-weight: 600;
    font-family: 'Courier New', monospace;
    color: #dde;
  }
  #color-swatch {
    width: 100%;
    height: 60px;
    border-radius: 8px;
    margin-bottom: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    transition: background 0.3s ease;
  }
  #color-name {
    text-align: center;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 1px;
  }
  #delta-e-display {
    text-align: center;
    font-size: 0.75rem;
    color: #888;
    margin-top: 4px;
  }
  .btn {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s ease;
  }
  #btn-calibrate {
    background: linear-gradient(135deg, #2a2a6e, #3a3a9e);
    color: #aac;
    border: 1px solid rgba(100,100,255,0.3);
  }
  #btn-calibrate:hover {
    background: linear-gradient(135deg, #3a3a8e, #5a5abe);
    color: #eef;
  }
  #btn-calibrate.calibrated {
    background: linear-gradient(135deg, #1a4a2e, #2a7a4e);
    border-color: rgba(50,200,100,0.4);
    color: #8fc;
  }
  #btn-camera {
    background: linear-gradient(135deg, #2a1a3e, #4a2a6e);
    color: #bac;
    border: 1px solid rgba(180,100,255,0.3);
  }
  #btn-camera:hover {
    background: linear-gradient(135deg, #3a2a5e, #6a4a9e);
    color: #edf;
  }
  #base-info {
    font-size: 0.7rem;
    color: #556;
    text-align: center;
    min-height: 16px;
  }
  #start-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 5;
    gap: 16px;
  }
  #start-overlay p {
    color: #778;
    font-size: 0.9rem;
  }
  #btn-start {
    padding: 14px 32px;
    background: linear-gradient(135deg, #3a3a9e, #7b5ce8);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  #btn-start:hover { transform: scale(1.05); }
</style>
</head>
<body>
<div id="header">
  <h1>&#9632; Análise Colorimétrica</h1>
  <span style="font-size:0.7rem;color:#445;letter-spacing:1px;">CIE L*a*b* D65</span>
</div>
<div id="main">
  <div id="camera-container">
    <video id="videoEl" autoplay playsinline muted></video>
    <canvas id="canvasEl"></canvas>
    <div id="reticle">
      <div class="reticle-h"></div>
      <div class="reticle-v"></div>
      <div class="reticle-box"></div>
    </div>
    <div id="start-overlay">
      <p>Clique para iniciar a câmera</p>
      <button id="btn-start" onclick="startCamera()">&#9654; Iniciar Câmera</button>
    </div>
  </div>
  <div id="panel">
    <div class="panel-section">
      <h3>&#9632; Cor Detectada</h3>
      <div id="color-swatch" style="background:#1a1a2e;"></div>
      <div id="color-name" style="color:#445;">Aguardando câmera...</div>
      <div id="delta-e-display"></div>
    </div>
    <div class="panel-section">
      <h3>&#9632; Valores RGB</h3>
      <div class="data-row"><span class="data-label">R</span><span class="data-value" id="val-r">---</span></div>
      <div class="data-row"><span class="data-label">G</span><span class="data-value" id="val-g">---</span></div>
      <div class="data-row"><span class="data-label">B</span><span class="data-value" id="val-b">---</span></div>
    </div>
    <div class="panel-section">
      <h3>&#9632; CIE L*a*b* (D65)</h3>
      <div class="data-row"><span class="data-label">L*</span><span class="data-value" id="val-L">---</span></div>
      <div class="data-row"><span class="data-label">a*</span><span class="data-value" id="val-a">---</span></div>
      <div class="data-row"><span class="data-label">b*</span><span class="data-value" id="val-bb">---</span></div>
    </div>
    <div class="panel-section">
      <h3>&#9632; Base Neutra Calibrada</h3>
      <div id="base-info">Não calibrado</div>
    </div>
    <button class="btn" id="btn-calibrate" onclick="calibrate()">&#9670; Calibrar Fundo</button>
    <button class="btn" id="btn-camera" onclick="switchCamera()">&#8635; Alternar Câmera</button>
  </div>
</div>
<script>
  const video = document.getElementById('videoEl');
  const canvas = document.getElementById('canvasEl');
  const ctx = canvas.getContext('2d');

  let stream = null;
  let devices = [];
  let deviceIndex = 0;
  let running = false;
  let base = null; // calibrated neutral base {L, a, b}
  const SAMPLE = 10; // half-size of sampling area
  const DELTA_E_THRESHOLD = 12;

  // Gamma correction: sRGB -> linear
  function linearize(c) {
    const v = c / 255;
    return v <= 0.04045 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  }

  // sRGB linear -> XYZ D65
  function rgbToXYZ(r, g, b) {
    const rl = linearize(r), gl = linearize(g), bl = linearize(b);
    return {
      X: (0.4124564 * rl + 0.3575761 * gl + 0.1804375 * bl) * 100,
      Y: (0.2126729 * rl + 0.7151522 * gl + 0.0721750 * bl) * 100,
      Z: (0.0193339 * rl + 0.1191920 * gl + 0.9503041 * bl) * 100
    };
  }

  // XYZ -> CIE L*a*b* D65
  function xyzToLab(X, Y, Z) {
    const Xn = 95.047, Yn = 100.000, Zn = 108.883;
    const e = 0.008856, k = 903.3;
    function f(t) {
      return t > e ? Math.cbrt(t) : (k * t + 16) / 116;
    }
    const fx = f(X / Xn), fy = f(Y / Yn), fz = f(Z / Zn);
    return {
      L: 116 * fy - 16,
      a: 500 * (fx - fy),
      b: 200 * (fy - fz)
    };
  }

  function rgbToLab(r, g, b) {
    const xyz = rgbToXYZ(r, g, b);
    return xyzToLab(xyz.X, xyz.Y, xyz.Z);
  }

  function deltaE(lab1, lab2) {
    return Math.sqrt(
      Math.pow(lab1.L - lab2.L, 2) +
      Math.pow(lab1.a - lab2.a, 2) +
      Math.pow(lab1.b - lab2.b, 2)
    );
  }

  function classifyColor(lab, dE) {
    const { L, a, b } = lab;
    if (base && dE < DELTA_E_THRESHOLD) {
      return { name: 'Incolor / Outro', color: '#778899' };
    }
    if (a > 20 && L <= 85 && L > 15) {
      return { name: 'Vermelho Ótimo', color: '#e03040' };
    }
    if (a > 8 && a <= 20 && L > (base ? base.L : 40)) {
      return { name: 'Rosa / Transição', color: '#e07090' };
    }
    if (L > 85) {
      return { name: 'Reflexo / Saturado', color: '#ccd0e0' };
    }
    return { name: 'Indefinido', color: '#445566' };
  }

  function samplePixels() {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    const cx = Math.floor(canvas.width / 2);
    const cy = Math.floor(canvas.height / 2);
    const data = ctx.getImageData(cx - SAMPLE, cy - SAMPLE, SAMPLE * 2, SAMPLE * 2).data;
    let rSum = 0, gSum = 0, bSum = 0, count = 0;
    for (let i = 0; i < data.length; i += 4) {
      rSum += data[i]; gSum += data[i+1]; bSum += data[i+2]; count++;
    }
    return {
      r: Math.round(rSum / count),
      g: Math.round(gSum / count),
      b: Math.round(bSum / count)
    };
  }

  function update() {
    if (!running || video.readyState < 2) { requestAnimationFrame(update); return; }
    const { r, g, b } = samplePixels();
    const lab = rgbToLab(r, g, b);
    const dE = base ? deltaE(lab, base) : 999;
    const classification = classifyColor(lab, dE);

    document.getElementById('val-r').textContent = r;
    document.getElementById('val-g').textContent = g;
    document.getElementById('val-b').textContent = b;
    document.getElementById('val-L').textContent = lab.L.toFixed(2);
    document.getElementById('val-a').textContent = lab.a.toFixed(2);
    document.getElementById('val-bb').textContent = lab.b.toFixed(2);
    document.getElementById('color-swatch').style.background = `rgb(${r},${g},${b})`;
    document.getElementById('color-name').textContent = classification.name;
    document.getElementById('color-name').style.color = classification.color;
    if (base) {
      document.getElementById('delta-e-display').textContent = `ΔE = ${dE.toFixed(2)} (limiar: ${DELTA_E_THRESHOLD})`;
    }
    requestAnimationFrame(update);
  }

  async function getDevices() {
    const devs = await navigator.mediaDevices.enumerateDevices();
    devices = devs.filter(d => d.kind === 'videoinput');
  }

  async function startCamera() {
    document.getElementById('start-overlay').style.display = 'none';
    await getDevices();
    await openCamera();
    running = true;
    requestAnimationFrame(update);
  }

  async function openCamera() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); }
    const constraints = devices.length > 0
      ? { video: { deviceId: { exact: devices[deviceIndex].deviceId }, width: { ideal: 1280 }, height: { ideal: 720 } } }
      : { video: { facingMode: 'environment' } };
    try {
      stream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = stream;
    } catch (e) {
      alert('Erro ao acessar a câmera: ' + e.message);
    }
  }

  async function switchCamera() {
    if (devices.length < 2) { alert('Apenas uma câmera disponível.'); return; }
    deviceIndex = (deviceIndex + 1) % devices.length;
    await openCamera();
  }

  function calibrate() {
    if (!running) { alert('Inicie a câmera primeiro.'); return; }
    const { r, g, b } = samplePixels();
    base = rgbToLab(r, g, b);
    const btn = document.getElementById('btn-calibrate');
    btn.textContent = '✓ Base Calibrada';
    btn.classList.add('calibrated');
    document.getElementById('base-info').textContent =
      `L*=${base.L.toFixed(1)}  a*=${base.a.toFixed(1)}  b*=${base.b.toFixed(1)}`;
  }
</script>
</body>
</html>
