<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAW Color Touch Reader</title>

<style>
body { text-align:center; font-family:Arial; background:#111; color:#fff; }
video { width:90%; border-radius:10px; }
#colorBox { width:120px; height:120px; margin:15px auto; border-radius:10px; border:2px solid #fff; }
</style>
</head>

<body>

<h2>RAW Color Touch Reader 📷</h2>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<div id="colorBox"></div>
<p id="colorText">Toque na imagem para capturar cor</p>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let lastTouch = { x: 0, y: 0 };

// -------------------------
// CAMERA RAW
// -------------------------
navigator.mediaDevices.getUserMedia({
  video: { facingMode: { ideal: "environment" } }
}).then(stream => video.srcObject = stream);

// -------------------------
// CAPTURA NO PONTO TOCADO
// -------------------------
function captureAt(x, y, callback){

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  const size = 10;

  const data = ctx.getImageData(x-size, y-size, size*2, size*2).data;

  let r=0,g=0,b=0;
  let count=0;

  for(let i=0;i<data.length;i+=4){

    const rr = data[i];
    const gg = data[i+1];
    const bb = data[i+2];

    // filtro mínimo (não altera cor, só remove erro extremo)
    if(rr === 0 && gg === 0 && bb === 0) continue;

    r += rr;
    g += gg;
    b += bb;

    count++;
  }

  if(count === 0) return;

  callback(r/count, g/count, b/count);
}

// -------------------------
// CLASSIFICAÇÃO SIMPLES E ESTÁVEL
// -------------------------
function getColorName(r,g,b){

  const brightness = (r+g+b)/3;
  const max = Math.max(r,g,b);
  const min = Math.min(r,g,b);
  const diff = max - min;

  if(brightness < 40) return "Preto";
  if(brightness > 220) return "Branco";
  if(diff < 18) return "Cinza";

  if(max === r) return "Vermelho";
  if(max === g) return "Verde";
  if(max === b) return "Azul";

  if(r > 180 && g > 160) return "Amarelo";
  if(r > 200 && g > 120) return "Laranja";
  if(r > 120 && b > 120) return "Roxo";

  return "Indefinido";
}

// -------------------------
// RENDER
// -------------------------
function render(r,g,b){

  const color = `rgb(${r},${g},${b})`;
  const name = getColorName(r,g,b);

  document.getElementById('colorBox').style.background = color;

  document.getElementById('colorText').innerText =
    `${name} | RAW: ${Math.round(r)}, ${Math.round(g)}, ${Math.round(b)}`;
}

// -------------------------
// TOQUE NA TELA (POSIÇÃO REAL)
// -------------------------
video.addEventListener('click', (event)=>{

  const rect = video.getBoundingClientRect();

  const scaleX = video.videoWidth / rect.width;
  const scaleY = video.videoHeight / rect.height;

  const x = (event.clientX - rect.left) * scaleX;
  const y = (event.clientY - rect.top) * scaleY;

  captureAt(x, y, (r,g,b)=>{

    render(r,g,b);

  });

});
</script>

</body>
</html>
