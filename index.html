<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
ColorMatch Pro – OEM MultiBrand Edition
</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
  text-align:center;
}

h2{
  margin-top:15px;
}

video{
  width:92%;
  border-radius:12px;
  border:2px solid #333;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#222;
  color:#fff;
}

button:hover{
  background:#333;
}

input,select{
  padding:10px;
  border-radius:8px;
  border:none;
  margin:5px;
  width:90%;
  max-width:420px;
}

#panel{
  display:flex;
  justify-content:space-around;
  flex-wrap:wrap;
  margin-top:15px;
}

.box{
  width:45%;
  min-width:160px;
}

canvas{
  width:100%;
  border-radius:10px;
  background:#222;
}

#cross{
  position:fixed;
  top:50%;
  left:50%;
  width:26px;
  height:26px;
  transform:translate(-50%,-50%);
  border:2px solid #00ffcc;
  border-radius:50%;
  display:none;
  pointer-events:none;
  z-index:999;
}

#databasePanel{
  margin-top:20px;
  padding:15px;
  background:#181818;
  border-top:2px solid #333;
}

#resultList{
  margin-top:10px;
  text-align:left;
  width:90%;
  max-width:700px;
  margin-left:auto;
  margin-right:auto;
  background:#1f1f1f;
  border-radius:10px;
  padding:10px;
}

.item{
  padding:10px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

.item:hover{
  background:#2c2c2c;
}

.colorBox{
  width:18px;
  height:18px;
  display:inline-block;
  border-radius:50%;
  margin-right:8px;
  border:1px solid #fff;
  vertical-align:middle;
}

.selectedColor{
  background:#004d40 !important;
}

#txt{
  margin-top:15px;
  font-size:18px;
  padding:10px;
}

#universalBox{
  margin-top:15px;
  background:#181818;
  padding:12px;
  border-top:2px solid #333;
}

.modeActive{
  background:#00695c !important;
}

</style>
</head>

<body>

<h2>
ColorMatch Pro – OEM MultiBrand Edition
</h2>

<button onclick="setMode('static')">
Estático
</button>

<button onclick="setMode('move')">
Movimento
</button>

<button onclick="setMode('comparePoint')">
Comparar Ponto a Ponto
</button>

<button onclick="setMode('compareDatabase')">
Comparar Base de Dados
</button>

<button onclick="analyzeOEM()">
🎨 OEM Scan
</button>

<button onclick="toggleFlash()">
⚡ Flash
</button>

<button onclick="toggleVoice()">
🔊 Áudio
</button>

<br><br>

<!-- MODOS UNIVERSAIS -->

<div id="universalBox">

<h3>
Modos Universais
</h3>

<button id="universalBtn" onclick="toggleUniversalMode()">
Modo Universal OFF
</button>

<p style="font-size:14px;color:#aaa;">
Filtro OEM inteligente ativo somente na leitura da cor.
Sem alterar estrutura principal do sistema.
</p>

</div>

<video id="video" autoplay playsinline></video>

<div id="cross"></div>

<div id="panel">

<div class="box">
<canvas id="canvasA"></canvas>
<div>Referência</div>
</div>

<div class="box">
<canvas id="canvasB"></canvas>
<div>Comparação</div>
</div>

</div>

<div id="databasePanel">

<h3>
Pesquisa OEM
</h3>

<input
type="text"
id="brandSearch"
placeholder="Digite a montadora..."
oninput="searchBrand()"


<br>

<select id="modelSelect" onchange="showModelColors()">

<option value="">
Selecione o modelo
</option>

</select>

<div id="resultList"></div>

</div>

<p id="txt">
Inicializando...
</p>

<script>

/* ================= ELEMENTOS ================= */

const video =
document.getElementById("video");

const canvasA =
document.getElementById("canvasA");

const canvasB =
document.getElementById("canvasB");

const ctxA =
canvasA.getContext("2d");

const ctxB =
canvasB.getContext("2d");

const cross =
document.getElementById("cross");

const txt =
document.getElementById("txt");

/* ================= CONTROLE ================= */

let mode = "static";

let voice = true;

let compareA = null;

let compareALab = null;

let compareStep = 0;

let selectedDatabaseColor = null;

/* ================= UNIVERSAL ================= */

let universalMode = false;

/* ================= FLASH ================= */

let streamTrack = null;

let flashOn = false;

let flashBusy = false;

let processingPaused = false;

/* ================= DATABASE OEM ================= */

const database = {

  Toyota:[
    {
      name:"Super White",
      rgb:[240,240,235]
    },
    {
      name:"Black Mica",
      rgb:[20,20,20]
    }
  ],

  Honda:[
    {
      name:"Taffeta White",
      rgb:[245,245,240]
    },
    {
      name:"Crystal Black",
      rgb:[15,15,15]
    }
  ],

  BMW:[
    {
      name:"Alpine White",
      rgb:[250,250,248]
    },
    {
      name:"Mineral Grey",
      rgb:[90,90,90]
    }
  ]

};

/* ================= CAMERA ================= */

navigator.mediaDevices.getUserMedia({

  video:{
    facingMode:"environment"
  }

})

.then(stream=>{

  video.srcObject = stream;

  streamTrack =
  stream.getVideoTracks()[0];

})

.catch(()=>{

  alert("Erro ao acessar câmera");

});

/* ================= VOZ ================= */

function speak(text){

  if(!voice) return;

  speechSynthesis.cancel();

  const msg =
  new SpeechSynthesisUtterance(text);

  msg.lang = "pt-BR";

  speechSynthesis.speak(msg);
}

/* ================= MODO ================= */

function setMode(newMode){

  mode = newMode;

  compareStep = 0;

  txt.innerHTML =
  "Modo atual: " + newMode;

  if(
    mode === "comparePoint" ||
    mode === "compareDatabase"
  ){
    cross.style.display = "block";
  }else{
    cross.style.display = "none";
  }

}

/* ================= UNIVERSAL MODE ================= */

function toggleUniversalMode(){

  universalMode = !universalMode;

  const btn =
  document.getElementById("universalBtn");

  if(universalMode){

    btn.innerHTML =
    "Modo Universal ON";

    btn.classList.add("modeActive");

    txt.innerHTML =
    "Filtro universal ativado";

    speak("Modo universal ativado");

  }else{

    btn.innerHTML =
    "Modo Universal OFF";

    btn.classList.remove("modeActive");

    txt.innerHTML =
    "Filtro universal desativado";

    speak("Modo universal desativado");
  }

}

/* ================= FLASH ================= */

async function toggleFlash(){

  if(flashBusy) return;

  if(!streamTrack){

    alert("Câmera não iniciada");
    return;
  }

  flashBusy = true;

  processingPaused = true;

  try{

    const capabilities =
    streamTrack.getCapabilities();

    if(!capabilities.torch){

      alert("Flash não suportado");

      processingPaused = false;
      flashBusy = false;

      return;
    }

    flashOn = !flashOn;

    await streamTrack.applyConstraints({

      advanced:[
        {
          torch:flashOn
        }
      ]

    });

    await new Promise(resolve=>
      setTimeout(resolve,700)
    );

  }catch(e){

    flashOn = false;

    alert("Falha no flash");
  }

  processingPaused = false;

  setTimeout(()=>{
    flashBusy = false;
  },500);
}

/* ================= VOICE ================= */

function toggleVoice(){

  voice = !voice;

  txt.innerHTML =
  voice ?
  "Áudio ativado" :
  "Áudio desativado";

}

/* ================= RGB ================= */

function rgbToLab(r,g,b){

  r /= 255;
  g /= 255;
  b /= 255;

  r = r > 0.04045 ?
  Math.pow((r + 0.055)/1.055,2.4)
  : r/12.92;

  g = g > 0.04045 ?
  Math.pow((g + 0.055)/1.055,2.4)
  : g/12.92;

  b = b > 0.04045 ?
  Math.pow((b + 0.055)/1.055,2.4)
  : b/12.92;

  let x =
  (r*0.4124 + g*0.3576 + b*0.1805)/0.95047;

  let y =
  (r*0.2126 + g*0.7152 + b*0.0722)/1.00000;

  let z =
  (r*0.0193 + g*0.1192 + b*0.9505)/1.08883;

  x = x > 0.008856 ?
  Math.pow(x,1/3)
  : (7.787*x)+(16/116);

  y = y > 0.008856 ?
  Math.pow(y,1/3)
  : (7.787*y)+(16/116);

  z = z > 0.008856 ?
  Math.pow(z,1/3)
  : (7.787*z)+(16/116);

  return {

    l:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)

  };

}

/* ================= DELTA E ================= */

function deltaE(labA,labB){

  return Math.sqrt(

    Math.pow(labA.l-labB.l,2)+
    Math.pow(labA.a-labB.a,2)+
    Math.pow(labA.b-labB.b,2)

  );

}

/* ================= UNIVERSAL FILTER ================= */

function applyUniversalFilter(r,g,b){

  if(!universalMode){

    return {r,g,b};
  }

  // neutralização simples de brilho/reflexo

  const avg =
  (r + g + b)/3;

  const factor =
  128 / avg;

  let nr = r * factor;
  let ng = g * factor;
  let nb = b * factor;

  nr = Math.max(0,Math.min(255,nr));
  ng = Math.max(0,Math.min(255,ng));
  nb = Math.max(0,Math.min(255,nb));

  return {

    r:Math.round(nr),
    g:Math.round(ng),
    b:Math.round(nb)

  };

}

/* ================= CAPTURA ================= */

function captureCenter(){

  const temp =
  document.createElement("canvas");

  temp.width = video.videoWidth;
  temp.height = video.videoHeight;

  const tctx =
  temp.getContext("2d");

  tctx.drawImage(
    video,
    0,
    0
  );

  const x =
  temp.width/2;

  const y =
  temp.height/2;

  const data =
  tctx.getImageData(
    x,
    y,
    1,
    1
  ).data;

  let r = data[0];
  let g = data[1];
  let b = data[2];

  const filtered =
  applyUniversalFilter(r,g,b);

  return {

    r:filtered.r,
    g:filtered.g,
    b:filtered.b

  };

}

/* ================= OEM ================= */

function analyzeOEM(){

  const rgb =
  captureCenter();

  const lab =
  rgbToLab(
    rgb.r,
    rgb.g,
    rgb.b
  );

  let best = null;

  let bestDelta = 999;

  Object.keys(database).forEach(brand=>{

    database[brand].forEach(color=>{

      const lab2 =
      rgbToLab(
        color.rgb[0],
        color.rgb[1],
        color.rgb[2]
      );

      const d =
      deltaE(lab,lab2);

      if(d < bestDelta){

        bestDelta = d;

        best = {

          brand,
          name:color.name,
          delta:d

        };

      }

    });

  });

  txt.innerHTML =

  `
  Melhor Match OEM:
  <br><br>
  ${best.brand}
  <br>
  ${best.name}
  <br><br>
  DeltaE:
  ${best.delta.toFixed(2)}
  `;

  speak(
    "Melhor correspondência encontrada"
  );

}

/* ================= PESQUISA ================= */

function searchBrand(){

  const search =
  document
  .getElementById("brandSearch")
  .value
  .toLowerCase();

  const modelSelect =
  document.getElementById("modelSelect");

  modelSelect.innerHTML =
  <option value="">Selecione o modelo</option>;

  Object.keys(database).forEach(brand=>{

    if(
      brand.toLowerCase()
      .includes(search)
    ){

      const option =
      document.createElement("option");

      option.value = brand;
      option.innerHTML = brand;

      modelSelect.appendChild(option);

    }

  });

}

/* ================= MOSTRAR CORES ================= */

function showModelColors(){

  const brand =
  document.getElementById("modelSelect").value;

  const result =
  document.getElementById("resultList");

  result.innerHTML = "";

  if(!database[brand]) return;

  database[brand].forEach(color=>{

    const div =
    document.createElement("div");

    div.className = "item";

    div.innerHTML = `

      <span
      class="colorBox"
      style="
      background:rgb(
      ${color.rgb[0]},
      ${color.rgb[1]},
      ${color.rgb[2]}
      )">
      </span>

      ${color.name}

    `;

    result.appendChild(div);

  });

}

/* ================= LOOP ================= */

setInterval(()=>{

  if(processingPaused) return;

  if(
    !video.videoWidth
  ) return;

  const rgb =
  captureCenter();

  canvasA.width = 120;
  canvasA.height = 120;

  ctxA.fillStyle = `
  rgb(
    ${rgb.r},
    ${rgb.g},
    ${rgb.b}
  )
  `;

  ctxA.fillRect(
    0,
    0,
    120,
    120
  );

},200);

</script>

</body>
</html>
