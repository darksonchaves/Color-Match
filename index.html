<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro - v12.0 High Performance</title>
<style>
  body{ margin:0; font-family: Arial, sans-serif; background:#0a0a0a; color:#fff; text-align:center; overflow-x:hidden; }
  #header{ padding: 12px; background: #111; border-bottom: 2px solid #333; display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; position: sticky; top: 0; z-index: 1000; }
  
  button{ padding:12px 15px; border:none; border-radius:8px; cursor:pointer; background:#222; color:#fff; font-weight: bold; font-size: 11px; transition: 0.2s; }
  .activeMode { background: #00695c !important; box-shadow: 0 0 10px #00ffcc; }
  .univActive { background: #ffaa00 !important; color: #000 !important; }

  #video-wrap { position: relative; width: 94%; margin: 15px auto; border-radius: 15px; border: 3px solid #333; overflow: hidden; height: 50vh; }
  video{ width: 100%; height: 100%; object-fit: cover; }
  
  #cross{ 
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); 
    border-radius:50%; pointer-events:none; z-index:10;
  }
  .cross-livre { width: 30px; height: 30px; border: 2px solid #00ffcc; }
  .cross-padrao { width: 42vw; height: 42vw; border: 3px dashed rgba(255,255,255,0.5); }
  .locked { border-color: #00ffcc !important; background: rgba(0,255,204,0.1); box-shadow: 0 0 25px #00ffcc; }

  #display-box { margin: 20px auto; width: 90%; }
  #txt{ font-size: 32px; font-weight: 900; color: #444; text-transform: uppercase; letter-spacing: 1px; min-height: 45px; }
  .txt-active { color: #00ffcc !important; }
  #status-bar { font-size: 12px; color: #666; margin-top: 5px; font-weight: bold; }
</style>
</head>
<body>

<div id="header">
  <button id="btnUniv" onclick="toggleUniv()">MODO UNIVERSAL: OFF</button>
  <button id="btnLivre" onclick="setMode('LIVRE')" class="activeMode">MOV. LIVRE</button>
  <button id="btnPadrao" onclick="setMode('PADRAO')">MOV. PADRÃO</button>
  <button onclick="toggleFlash()">⚡ FLASH</button>
</div>

<div id="video-wrap">
  <video id="v" autoplay playsinline muted></video>
  <div id="cross" class="cross-livre"></div>
</div>

<div id="display-box">
  <div id="txt">---</div>
  <div id="status-bar">SISTEMA AGUARDANDO COMANDO</div>
</div>

<canvas id="c" style="display:none;"></canvas>

<script>
const v = document.getElementById("v");
const c = document.getElementById("c");
const ctx = c.getContext("2d", {willReadFrequently:true});
const cross = document.getElementById("cross");
const txt = document.getElementById("txt");
const statusBar = document.getElementById("status-bar");

let currentMode = 'LIVRE', isUniv = false, lastAnnounced = "", isSpeaking = false;
let track = null, flash = false;

navigator.mediaDevices.getUserMedia({ video:{ facingMode:"environment", width:1280 } })
.then(s => { v.srcObject = s; track = s.getVideoTracks()[0]; });

function speak(t) {
    if(!t || t === lastAnnounced || isSpeaking) return;
    lastAnnounced = t;
    isSpeaking = true;
    speechSynthesis.cancel();
    const m = new SpeechSynthesisUtterance(t);
    m.lang = "pt-BR"; m.rate = 1.3;
    m.onend = () => isSpeaking = false;
    speechSynthesis.speak(m);
}

function setMode(m) {
    currentMode = m;
    document.getElementById("btnLivre").className = (m==='LIVRE'?'activeMode':'');
    document.getElementById("btnPadrao").className = (m==='PADRAO'?'activeMode':'');
    cross.className = (m==='LIVRE'?'cross-livre':'cross-padrao');
    lastAnnounced = "";
    speak(m === 'LIVRE' ? "Livre" : "Padrão");
}

function toggleUniv() {
    isUniv = !isUniv;
    const b = document.getElementById("btnUniv");
    b.className = (isUniv?'univActive':'');
    b.innerText = `MODO UNIVERSAL: ${isUniv?'ON':'OFF'}`;
    lastAnnounced = "";
    speak(isUniv ? "Espectro Universal" : "RGB");
}

function rgbToHsl(r,g,b){
    r/=255; g/=255; b/=255;
    const max=Math.max(r,g,b), min=Math.min(r,g,b), d=max-min;
    let h=0, s=0, l=(max+min)/2;
    if(d!==0){
        s = l > 0.5 ? d/(2-max-min) : d/(max+min);
        if(max===r) h=(g-b)/d+(g<b?6:0); else if(max===g) h=(b-r)/d+2; else h=(r-g)/d+4;
        h/=6;
    }
    return { h:h*360, s:s*100, l:l*100 };
}

function getBaseColor(r,g,b){
    const hsl = rgbToHsl(r,g,b);
    const {h, s, l} = hsl;
    // Calibragem OEM extraída do seu resgate estável
    if(s <= 14 && l >= 80) return "Branco";
    if(s <= 16 && l <= 18) return "Preto";
    if(s <= 16) return "Cinza";
    if((h >= 0 && h <= 12) || (h >= 345 && h <= 360)) return "Vermelho";
    if(h >= 13 && h <= 38) return "Laranja";
    if(h >= 39 && h <= 68) return "Amarelo";
    if(h >= 69 && h <= 165) return "Verde";
    if(h >= 166 && h < 260) return "Azul";
    if(h >= 260 && h <= 312) return "Roxo";
    if(h >= 313 && h <= 344) return "Rosa";
    return "Indefinido";
}

function engine() {
    if(v.videoWidth > 0){
        c.width = v.videoWidth; c.height = v.videoHeight;
        ctx.drawImage(v, 0, 0);
        const cX = v.videoWidth/2, cY = v.videoHeight/2;
        
        // Amostragem Central
        const p = ctx.getImageData(cX-8, cY-8, 16, 16).data;
        let r=0, g=0, b=0;
        for(let i=0; i<p.length; i+=4){ r+=p[i]; g+=p[i+1]; b+=p[i+2]; }
        r/=(p.length/4); g/=(p.length/4); b/=(p.length/4);

        if(currentMode === 'PADRAO'){
            const rad = (window.innerWidth * 0.42) * (v.videoWidth / window.innerWidth) / 2;
            const pts = [
                ctx.getImageData(cX, cY-rad, 1, 1).data,
                ctx.getImageData(cX, cY+rad, 1, 1).data,
                ctx.getImageData(cX-rad, cY, 1, 1).data,
                ctx.getImageData(cX+rad, cY, 1, 1).data
            ];
            // Validação Estatística: Se 3 dos 4 pontos forem coerentes com o centro, libera.
            const matches = pts.filter(pt => Math.abs(pt[0]-r) + Math.abs(pt[1]-g) + Math.abs(pt[2]-b) < 120).length;
            
            if(matches < 3){
                txt.innerText = "AGUARDANDO"; txt.className = "";
                statusBar.innerText = "ALINHE O OBJETO NO CÍRCULO";
                cross.classList.remove("locked");
                requestAnimationFrame(engine); return;
            }
        }

        cross.classList.add("locked");
        if(isUniv){
            const result = getBaseColor(r,g,b);
            txt.innerText = result;
            txt.className = "txt-active";
            statusBar.innerText = "MODO UNIVERSAL ATIVO";
            speak(result);
        } else {
            txt.innerText = `RGB: ${Math.round(r)},${Math.round(g)},${Math.round(b)}`;
            txt.className = "";
            statusBar.innerText = "LEITURA DE DADOS BRUTOS";
        }
    }
    requestAnimationFrame(engine);
}

async function toggleFlash(){
    if(!track) return;
    flash = !flash;
    await track.applyConstraints({ advanced:[{ torch:flash }] });
}

engine();
</script>
</body>
</html>
