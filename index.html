<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
ColorMatch Pro – Toyota OEM Edition
</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
  text-align:center;
}

video{
  width:90%;
  border-radius:10px;
}

button{
  padding:10px;
  margin:5px;
}

#panel{
  display:flex;
  justify-content:space-around;
  flex-wrap:wrap;
  margin-top:10px;
}

.box{
  width:45%;
  min-width:160px;
}

canvas{
  width:100%;
  border-radius:10px;
  background:#222;
}

#cross{
  position:fixed;
  top:50%;
  left:50%;
  width:26px;
  height:26px;
  transform:translate(-50%,-50%);
  border:2px solid #00ffcc;
  border-radius:50%;
  display:none;
  pointer-events:none;
  z-index:999;
}

</style>
</head>

<body>

<h2>
ColorMatch Pro – Toyota OEM Edition
</h2>

<button onclick="setMode('static')">
Estático
</button>

<button onclick="setMode('move')">
Movimento
</button>

<button onclick="setMode('compare')">
Comparar
</button>

<button onclick="analyzeToyota()">
🚗 Toyota OEM
</button>

<button onclick="toggleFlash()">
⚡ Flash
</button>

<button onclick="toggleVoice()">
🔊 Áudio
</button>

<br>

<video id="video" autoplay playsinline></video>

<div id="cross"></div>

<div id="panel">

  <div class="box">
    <canvas id="canvasA"></canvas>
    <div>Referência</div>
  </div>

  <div class="box">
    <canvas id="canvasB"></canvas>
    <div>Comparação</div>
  </div>

</div>

<p id="txt">
Inicializando...
</p>

<script>

/* ================= ELEMENTOS ================= */

const video =
document.getElementById("video");

const canvasA =
document.getElementById("canvasA");

const canvasB =
document.getElementById("canvasB");

const ctxA =
canvasA.getContext("2d");

const ctxB =
canvasB.getContext("2d");

const cross =
document.getElementById("cross");

/* ================= CONTROLE ================= */

let mode = "static";

let voice = true;

let lastSpeak = "";

let compareA = null;
let compareALab = null;

let compareStep = 0;

/* ================= FLASH ================= */

let streamTrack = null;

let flashOn = false;

let flashBusy = false;

let processingPaused = false;

/* ================= CAMERA ================= */

navigator.mediaDevices.getUserMedia({
  video:{
    facingMode:"environment"
  }
})
.then(stream=>{

  video.srcObject = stream;

  streamTrack =
  stream.getVideoTracks()[0];

})
.catch(()=>{

  alert("Erro ao acessar câmera");

});

/* ================= FLASH ================= */

async function toggleFlash(){

  if(flashBusy) return;

  if(!streamTrack){

    alert("Câmera não iniciada");
    return;
  }

  flashBusy = true;

  processingPaused = true;

  document.getElementById("txt").innerText =
  "Ajustando flash...";

  try{

    const capabilities =
    streamTrack.getCapabilities();

    if(!capabilities.torch){

      alert(
        "Flash não suportado neste dispositivo"
      );

      processingPaused = false;
      flashBusy = false;

      return;
    }

    flashOn = !flashOn;

    await streamTrack.applyConstraints({
      advanced:[
        {
          torch:flashOn
        }
      ]
    });

    await new Promise(resolve=>
      setTimeout(resolve,700)
    );

    document.getElementById("txt").innerText =
    "Flash: "
    +
    (flashOn ? "ON" : "OFF");

  }catch(e){

    flashOn = false;

    alert(
      "Falha ao controlar flash"
    );
  }

  processingPaused = false;

  setTimeout(()=>{

    flashBusy = false;

  },500);
}

/* ================= VOZ ================= */

function speak(text){

  if(!voice) return;

  speechSynthesis.cancel();

  const msg =
  new SpeechSynthesisUtterance(text);

  msg.lang = "pt-BR";

  speechSynthesis.speak(msg);
}

/* ================= RGB -> LAB ================= */

function rgbToLab(r,g,b){

  r/=255;
  g/=255;
  b/=255;

  [r,g,b]=[r,g,b].map(v=>
    v>0.04045
    ? Math.pow((v+0.055)/1.055,2.4)
    : v/12.92
  );

  let x =
  r*0.4124 +
  g*0.3576 +
  b*0.1805;

  let y =
  r*0.2126 +
  g*0.7152 +
  b*0.0722;

  let z =
  r*0.0193 +
  g*0.1192 +
  b*0.9505;

  x/=0.95047;
  y/=1;
  z/=1.08883;

  [x,y,z]=[x,y,z].map(v=>
    v>0.008856
    ? Math.cbrt(v)
    : (7.787*v)+(16/116)
  );

  return{
    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)
  };
}

/* ================= DELTA E ================= */

function deltaE(a,b){

  return Math.sqrt(
    (a.L-b.L)**2 +
    (a.a-b.a)**2 +
    (a.b-b.b)**2
  );
}

/* ================= TOYOTA DATABASE ================= */

const toyotaDatabase = [

{
  brand:"Toyota",
  model:"Corolla",
  year:"2024",
  code:"040",
  name:"Super White II",
  rgb:{r:244,g:244,b:241},
  lab:rgbToLab(244,244,241)
},

{
  brand:"Toyota",
  model:"Corolla",
  year:"2024",
  code:"1F7",
  name:"Classic Silver Metallic",
  rgb:{r:169,g:173,b:177},
  lab:rgbToLab(169,173,177)
},

{
  brand:"Toyota",
  model:"Corolla",
  year:"2024",
  code:"1G3",
  name:"Magnetic Gray Metallic",
  rgb:{r:94,g:97,b:102},
  lab:rgbToLab(94,97,102)
},

{
  brand:"Toyota",
  model:"Corolla",
  year:"2024",
  code:"218",
  name:"Midnight Black Metallic",
  rgb:{r:27,g:27,b:27},
  lab:rgbToLab(27,27,27)
},

{
  brand:"Toyota",
  model:"Corolla",
  year:"2024",
  code:"3U5",
  name:"Emotional Red",
  rgb:{r:126,g:31,b:36},
  lab:rgbToLab(126,31,36)
},

{
  brand:"Toyota",
  model:"Corolla",
  year:"2024",
  code:"8X8",
  name:"Blueprint",
  rgb:{r:30,g:58,b:95},
  lab:rgbToLab(30,58,95)
},

{
  brand:"Toyota",
  model:"Hilux",
  year:"2024",
  code:"040",
  name:"Super White II",
  rgb:{r:244,g:244,b:241},
  lab:rgbToLab(244,244,241)
},

{
  brand:"Toyota",
  model:"Hilux",
  year:"2024",
  code:"1G3",
  name:"Graphite Metallic",
  rgb:{r:92,g:95,b:102},
  lab:rgbToLab(92,95,102)
},

{
  brand:"Toyota",
  model:"Hilux",
  year:"2024",
  code:"218",
  name:"Attitude Black",
  rgb:{r:22,g:22,b:22},
  lab:rgbToLab(22,22,22)
},

{
  brand:"Toyota",
  model:"SW4",
  year:"2024",
  code:"070",
  name:"White Pearl",
  rgb:{r:247,g:247,b:244},
  lab:rgbToLab(247,247,244)
}

];

/* ================= TOYOTA MATCH ================= */

function detectToyotaColor(sig){

  const targetLab = rgbToLab(
    sig.r,
    sig.g,
    sig.b
  );

  let best = null;

  let bestDelta = 999;

  for(const color of toyotaDatabase){

    const d = deltaE(
      targetLab,
      color.lab
    );

    if(d < bestDelta){

      bestDelta = d;
      best = color;
    }
  }

  return{
    match:best,
    delta:bestDelta
  };
}

/* ================= CAPTURA ================= */

function captureRaw(x,y){

  if(
    !video.videoWidth ||
    processingPaused
  ){
    return {r:0,g:0,b:0};
  }

  canvasA.width = video.videoWidth;
  canvasA.height = video.videoHeight;

  ctxA.drawImage(video,0,0);

  const s = 12;

  const data = ctxA.getImageData(
    x-s,
    y-s,
    s*2,
    s*2
  ).data;

  let r=0,g=0,b=0,c=0;

  for(let i=0;i<data.length;i+=4){

    r += data[i];
    g += data[i+1];
    b += data[i+2];

    c++;
  }

  r = Math.round(r/c);
  g = Math.round(g/c);
  b = Math.round(b/c);

  return {r,g,b};
}

/* ================= RGB -> HSL ================= */

function rgbToHsl(r,g,b){

  r/=255;
  g/=255;
  b/=255;

  const max = Math.max(r,g,b);
  const min = Math.min(r,g,b);

  let h,s,l;

  l = (max+min)/2;

  if(max===min){

    h=0;
    s=0;

  }else{

    const d = max-min;

    s = l>0.5
    ? d/(2-max-min)
    : d/(max+min);

    switch(max){

      case r:
      h=(g-b)/d+(g<b?6:0);
      break;

      case g:
      h=(b-r)/d+2;
      break;

      case b:
      h=(r-g)/d+4;
      break;
    }

    h/=6;
  }

  return{
    h:h*360,
    s:s*100,
    l:l*100
  };
}

/* ================= IDENTIFICAÇÃO ================= */

function getColorName(r,g,b){

  const hsl = rgbToHsl(r,g,b);

  const h = hsl.h;
  const s = hsl.s;
  const l = hsl.l;

  if(l < 12){
    return "Preto";
  }

  if(l > 90 && s < 15){
    return "Branco";
  }

  if(s < 12){
    return "Cinza";
  }

  if(
    h >= 15 &&
    h <= 40 &&
    l < 45
  ){
    return "Marrom";
  }

  if(
    h <= 12 ||
    h >= 345
  ){
    return "Vermelho";
  }

  if(
    h > 12 &&
    h <= 40
  ){
    return "Laranja";
  }

  if(
    h > 40 &&
    h <= 70
  ){
    return "Amarelo";
  }

  if(
    h > 70 &&
    h <= 165
  ){
    return "Verde";
  }

  if(
    h > 165 &&
    h <= 255
  ){
    return "Azul";
  }

  if(
    h > 255 &&
    h <= 315
  ){
    return "Roxo";
  }

  if(
    h > 315 &&
    h < 345
  ){
    return "Rosa";
  }

  return "Indefinido";
}

/* ================= TEXTO ================= */

function signalText(sig){

  return getColorName(
    sig.r,
    sig.g,
    sig.b
  );
}

/* ================= TOYOTA ANALYZER ================= */

function analyzeToyota(){

  const sig = captureRaw(
    video.videoWidth/2,
    video.videoHeight/2
  );

  const result =
  detectToyotaColor(sig);

  const similarity =
  Math.max(
    0,
    100 - result.delta
  ).toFixed(1);

  const text =
    result.match.brand
    + " | "
    + result.match.model
    + " | "
    + result.match.year
    + " | "
    + result.match.code
    + " | "
    + result.match.name
    + " | "
    + similarity
    + "%";

  document.getElementById("txt").innerText =
  text;

  speak(
    result.match.name
  );
}

/* ================= MOVIMENTO ================= */

function moveLoop(){

  if(mode !== "move") return;

  if(processingPaused){

    requestAnimationFrame(moveLoop);
    return;
  }

  const sig = captureRaw(
    video.videoWidth/2,
    video.videoHeight/2
  );

  const color = signalText(sig);

  document.getElementById("txt").innerText =
  "Movimento: " + color;

  if(color !== lastSpeak){

    speak(color);

    lastSpeak = color;
  }

  requestAnimationFrame(moveLoop);
}

/* ================= MODOS ================= */

function setMode(m){

  mode = m;

  lastSpeak = "";

  compareA = null;
  compareALab = null;

  compareStep = 0;

  ctxA.clearRect(
    0,
    0,
    canvasA.width,
    canvasA.height
  );

  ctxB.clearRect(
    0,
    0,
    canvasB.width,
    canvasB.height
  );

  cross.style.display =
  (m === "move" || m === "compare")
  ? "block"
  : "none";

  document.getElementById("txt").innerText =
  "Modo: " + m.toUpperCase();

  if(m === "move"){
    moveLoop();
  }
}

/* ================= CLIQUE ================= */

video.addEventListener("click",(e)=>{

  if(processingPaused) return;

  const rect =
  video.getBoundingClientRect();

  const x =
  (e.clientX - rect.left)
  *
  (video.videoWidth / rect.width);

  const y =
  (e.clientY - rect.top)
  *
  (video.videoHeight / rect.height);

  const sig = captureRaw(x,y);

  const color = signalText(sig);

  if(mode === "static"){

    document.getElementById("txt").innerText =
    "Estático: " + color;

    speak(color);
  }

  if(mode === "compare"){

    if(compareStep === 0){

      compareA = sig;

      compareALab = rgbToLab(
        sig.r,
        sig.g,
        sig.b
      );

      canvasA.width = video.videoWidth;
      canvasA.height = video.videoHeight;

      ctxA.drawImage(video,0,0);

      ctxA.beginPath();

      ctxA.arc(
        x,
        y,
        14,
        0,
        Math.PI*2
      );

      ctxA.lineWidth = 4;
      ctxA.strokeStyle = "lime";

      ctxA.stroke();

      document.getElementById("txt").innerText =
      "Referência: " + color;

      compareStep = 1;

    }else{

      const compareB = sig;

      const compareBLab = rgbToLab(
        compareB.r,
        compareB.g,
        compareB.b
      );

      canvasB.width = video.videoWidth;
      canvasB.height = video.videoHeight;

      ctxB.drawImage(video,0,0);

      ctxB.beginPath();

      ctxB.arc(
        x,
        y,
        14,
        0,
        Math.PI*2
      );

      ctxB.lineWidth = 4;
      ctxB.strokeStyle = "red";

      ctxB.stroke();

      const similarity =
      Math.max(
        0,
        100 - deltaE(compareALab,compareBLab)
      );

      const result =
      signalText(compareA)
      +
      " → "
      +
      signalText(compareB)
      +
      " | "
      +
      similarity.toFixed(1)
      +
      "% similar";

      document.getElementById("txt").innerText =
      result;

      speak(result);

      compareA = null;
      compareALab = null;

      compareStep = 0;
    }
  }
});

/* ================= ÁUDIO ================= */

function toggleVoice(){

  voice = !voice;

  alert(
    "Áudio: "
    +
    (voice ? "ON" : "OFF")
  );
}

</script>

</body>
</html>
