<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAW Color + Universal Names</title>

<style>
body { text-align:center; font-family:Arial; background:#111; color:#fff; }
video { width:90%; border-radius:10px; }
#colorBox { width:120px; height:120px; margin:15px auto; border-radius:10px; border:2px solid #fff; }
</style>
</head>

<body>

<h2>RAW Sensor + Universal Color Name</h2>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<div id="colorBox"></div>
<p id="colorText">---</p>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// -------------------------
// CAMERA
// -------------------------
navigator.mediaDevices.getUserMedia({
  video: { facingMode: { ideal: "environment" } }
}).then(stream => video.srcObject = stream);

// -------------------------
// CAPTURA RAW (SEM MODIFICAÇÃO)
// -------------------------
function captureRaw(callback){

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  const size = 20;
  const cx = canvas.width/2;
  const cy = canvas.height/2;

  const data = ctx.getImageData(cx-size,cy-size,size*2,size*2).data;

  let r=0,g=0,b=0;
  let count=0;

  for(let i=0;i<data.length;i+=4){

    const rr = data[i];
    const gg = data[i+1];
    const bb = data[i+2];

    const brightness = (rr+gg+bb)/3;

    if(brightness < 2 || brightness > 253) continue;

    r += rr;
    g += gg;
    b += bb;

    count++;
  }

  if(count === 0) return;

  callback(
    r/count,
    g/count,
    b/count
  );
}

// -------------------------
// CLASSIFICAÇÃO UNIVERSAL DE CORES
// (sem correção, só interpretação final)
// -------------------------
function getColorName(r,g,b){

  const brightness = (r+g+b)/3;

  // PRETO / BRANCO / CINZA primeiro (mais confiável)
  if(brightness < 40) return "Preto";
  if(brightness > 220) return "Branco";

  const max = Math.max(r,g,b);
  const min = Math.min(r,g,b);
  const diff = max - min;

  // CINZA
  if(diff < 20) return "Cinza";

  // cores dominantes simples (base universal)
  if(max === r) return "Vermelho";
  if(max === g) return "Verde";
  if(max === b) return "Azul";

  // intermediárias básicas
  if(r > 180 && g > 120) return "Amarelo";
  if(r > 200 && g < 120) return "Laranja";
  if(r > 120 && b > 120) return "Roxo";

  return "Indefinido";
}

// -------------------------
// RENDER FINAL
// -------------------------
function render(r,g,b){

  const color = `rgb(${r},${g},${b})`;
  const name = getColorName(r,g,b);

  document.getElementById('colorBox').style.background = color;

  document.getElementById('colorText').innerText =
    `${name} | RAW: ${Math.round(r)}, ${Math.round(g)}, ${Math.round(b)}`;
}

// -------------------------
// CLICK
// -------------------------
video.addEventListener('click',()=>{

  captureRaw((r,g,b)=>{

    render(r,g,b);

  });

});
</script>

</body>
</html>
