<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro - Final Stage</title>
<style>
  body{ margin:0; font-family: 'Segoe UI', sans-serif; background:#050505; color:#fff; text-align:center; overflow:hidden; }
  #header{ padding: 10px; background: #111; border-bottom: 1px solid #333; display: flex; justify-content: center; gap: 8px; }
  video{ width:100%; max-height: 65vh; object-fit: cover; }
  button{ padding:10px 14px; border-radius:6px; border:none; background:#222; color:white; font-weight:bold; font-size: 11px; text-transform: uppercase; }
  .active{ background:#00ffcc !important; color:#000 !important; }
  #cross{ position:fixed; top:50%; left:50%; width:35px; height:35px; transform:translate(-50%,-50%); border:2px solid #00ffcc; border-radius:50%; pointer-events:none; z-index: 10; }
  #display{ font-size: 42px; font-weight: 900; color: #00ffcc; margin: 10px 0; text-transform: uppercase; height: 50px; }
  .info { color: #888; font-size: 11px; font-family: monospace; }
</style>
</head>
<body>

<div id="header">
  <button onclick="toggleUniv()" id="btnU">UNIVERSAL: OFF</button>
  <button onclick="calibrate()">CALIBRAR BRANCO</button>
  <button onclick="toggleVoice()" id="btnV" class="active">🔊 ÁUDIO: ON</button>
</div>

<video id="v" autoplay playsinline muted></video>
<div id="cross"></div>

<div id="display">INICIANDO...</div>
<div id="stats" class="info">ESTABILIDADE: 0% | RGB: ---</div>

<canvas id="c" style="display:none;"></canvas>

<script>
const video = document.getElementById('v');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', {willReadFrequently: true});
const display = document.getElementById('display');
const stats = document.getElementById('stats');

let isUniv = false, isVoice = true, isSpeaking = false;
let lastColor = "", stableCount = 0;
let offset = {r:255, g:255, b:255};

navigator.mediaDevices.getUserMedia({video:{facingMode:"environment", width: 1280}}).then(s => video.srcObject = s);

function calibrate() {
    const data = getMedianRGB();
    offset = {r: data.r, g: data.g, b: data.b};
    speak("Branco calibrado");
}

// NOVO: Amostragem por Mediana em 9 pontos (melhor para metalizado/reflexo)
function getMedianRGB() {
    if(!video.videoWidth) return {r:0, g:0, b:0};
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    
    const centerX = video.videoWidth / 2;
    const centerY = video.videoHeight / 2;
    const step = 8; // Distância entre pontos de amostragem
    
    let rs = [], gs = [], bs = [];
    
    for(let y = -1; y <= 1; y++) {
        for(let x = -1; x <= 1; x++) {
            const d = ctx.getImageData(centerX + (x*step), centerY + (y*step), 1, 1).data;
            rs.push(d[0]); gs.push(d[1]); bs.push(d[2]);
        }
    }
    
    const median = arr => {
        const s = [...arr].sort((a,b) => a-b);
        return s[4]; // Meio da lista de 9 pontos
    };

    return { r: median(rs), g: median(gs), b: median(bs) };
}

function solveColor(r, g, b) {
    let nr = (r * 255) / (offset.r || 255);
    let ng = (g * 255) / (offset.g || 255);
    let nb = (b * 255) / (offset.b || 255);
    
    let r1=nr/255, g1=ng/255, b1=nb/255;
    const max=Math.max(r1,g1,b1), min=Math.min(r1,g1,b1), d=max-min;
    let h, s, l=(max+min)/2;
    if(d===0) h=s=0; else {
        s = l>0.5 ? d/(2-max-min) : d/(max+min);
        if(max===r1) h=(g1-b1)/d+(g1<b1?6:0); else if(max===g1) h=(b1-r1)/d+2; else h=(r1-g1)/d+4;
        h*=60;
    }

    // --- REFINAMENTO DE QUADRANTES (FASE 1 FINAL) ---
    
    // 1. Ajuste Preto/Cinza (Fundamental para o carregador e sombras)
    if (l < 0.18) return "Preto";
    if (s < 0.12) return (l > 0.7) ? "Branco" : "Cinza";
    
    // 2. Ajuste do Vermelho (Metalizado do Creme Dental)
    if (h < 15 || h > 345) {
        return (l < 0.35) ? "Vermelho Escuro" : "Vermelho";
    }
    
    // 3. Ajuste Amarelo vs Laranja (O segredo da sombra do isqueiro)
    // Se o Verde (G) for forte, seguramos no Amarelo
    let yellowThreshold = (l < 0.5) ? 40 : 46; 
    if (h >= 15 && h < yellowThreshold) return "Laranja";
    if (h >= yellowThreshold && h < 72) return "Amarelo";
    
    // 4. Ajuste Roxo vs Rosa (O dilema do vídeo 2)
    // Expandimos o Roxo para evitar que caia no Rosa
    if (h >= 255 && h < 295) return "Roxo";
    if (h >= 295 && h < 345) return "Rosa";

    if (h >= 72 && h < 160) return "Verde";
    if (h >= 160 && h < 255) return "Azul";
    
    return "Indefinido";
}

function mainLoop() {
    if(video.videoWidth) {
        const rgb = getMedianRGB();
        const colorName = solveColor(rgb.r, rgb.g, rgb.b);

        if(isUniv) {
            // Histérese: Só atualiza se houver confiança
            if(colorName === lastColor) {
                stableCount++;
                if(stableCount === 20) speak(colorName);
            } else {
                // Se a cor mudou, esperamos um pouco antes de trocar no visor
                if(stableCount > 5) { // Pequeno delay para evitar tremulação
                    display.innerText = colorName;
                }
                lastColor = colorName;
                stableCount = 0;
            }
            stats.innerText = `ESTABILIDADE: ${Math.min(100, stableCount*5)}% | RGB: ${Math.round(rgb.r)},${Math.round(rgb.g)},${Math.round(rgb.b)}`;
        } else {
            display.innerText = `RGB: ${Math.round(rgb.r)},${Math.round(rgb.g)},${Math.round(rgb.b)}`;
        }
    }
    requestAnimationFrame(mainLoop);
}

function speak(t) {
    if(!isVoice || isSpeaking || t === "Indefinido") return;
    isSpeaking = true;
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(t);
    msg.lang = 'pt-BR';
    msg.rate = 1.2;
    msg.onend = () => isSpeaking = false;
    window.speechSynthesis.speak(msg);
}

function toggleUniv() { 
    isUniv = !isUniv; 
    document.getElementById('btnU').classList.toggle('active');
    document.getElementById('btnU').innerText = isUniv ? "UNIVERSAL: ON" : "UNIVERSAL: OFF";
}

function toggleVoice() { 
    isVoice = !isVoice; 
    document.getElementById('btnV').classList.toggle('active');
}

requestAnimationFrame(mainLoop);
</script>
</body>
</html>
