<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motor de Cor - Compensação de Brilho v2.0</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  #header {
    background: rgba(10,10,20,0.88);
    padding: 5px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(100,100,255,0.15);
    z-index: 30;
    position: relative;
    flex-shrink: 0;
  }
  #btn-system {
    padding: 5px 12px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    transition: all 0.2s ease;
  }
  #btn-system.system-on {
    background: linear-gradient(135deg, #1a4a2e, #2a7a4e);
    color: #6effa0;
    border: 1px solid rgba(60,200,100,0.45);
    box-shadow: 0 0 8px rgba(60,200,100,0.25);
  }
  #btn-system.system-off {
    background: linear-gradient(135deg, #3a1a1a, #5a2020);
    color: #ff5050;
    border: 1px solid rgba(200,50,50,0.45);
    box-shadow: 0 0 8px rgba(200,50,50,0.2);
  }
  #top-bar {
    background: rgba(8,8,20,0.86);
    border-bottom: 1px solid rgba(100,100,255,0.12);
    padding: 5px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 25;
    position: relative;
    flex-shrink: 0;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    flex-wrap: wrap;
  }
  #color-swatch {
    width: 28px;
    height: 28px;
    border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.12);
    flex-shrink: 0;
    transition: background 0.25s ease;
    box-shadow: 0 0 8px rgba(0,0,0,0.5);
  }
  #color-name {
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.4px;
    min-width: 120px;
  }
  #confidence-display {
    font-size: 0.58rem;
    color: #6a6;
    white-space: nowrap;
  }
  .sep {
    color: rgba(100,100,255,0.3);
    font-size: 0.7rem;
    flex-shrink: 0;
  }
  .data-inline {
    font-size: 0.64rem;
    font-family: 'Courier New', monospace;
    color: #aab;
    white-space: nowrap;
  }
  .data-inline .lbl { color: #558; margin-right: 1px; }
  #base-info {
    font-size: 0.58rem;
    color: #446;
    white-space: nowrap;
  }
  .btn-top {
    padding: 4px 8px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    transition: all 0.18s ease;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-top:disabled {
    opacity: 0.25;
    cursor: not-allowed;
  }
  #btn-calibrate-white {
    background: linear-gradient(135deg, #2a2a6e, #3a3a9e);
    color: #aac;
    border: 1px solid rgba(100,100,255,0.3);
  }
  #btn-calibrate-white:hover:not(:disabled) { background: linear-gradient(135deg, #3a3a8e, #5a5abe); color: #eef; }
  #btn-calibrate-white.calibrated {
    background: linear-gradient(135deg, #1a4a2e, #2a7a4e);
    border-color: rgba(50,200,100,0.4);
    color: #8fc;
  }
  #btn-calibrate-black {
    background: linear-gradient(135deg, #2a2a2a, #3a3a3a);
    color: #aaa;
    border: 1px solid rgba(100,100,100,0.3);
  }
  #btn-calibrate-black:hover:not(:disabled) { background: linear-gradient(135deg, #3a3a3a, #5a5a5a); color: #ddd; }
  #btn-calibrate-black.calibrated {
    background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
    border-color: rgba(200,200,200,0.4);
    color: #fff;
  }
  #btn-reset-white {
    background: linear-gradient(135deg, #3a2a2a, #5a3a3a);
    color: #d99;
    border: 1px solid rgba(200,100,100,0.3);
  }
  #btn-reset-white:hover:not(:disabled) { background: linear-gradient(135deg, #4a3a3a, #6a4a4a); color: #faa; }
  #btn-reset-black {
    background: linear-gradient(135deg, #2a2a3a, #3a3a5a);
    color: #99d;
    border: 1px solid rgba(100,100,200,0.3);
  }
  #btn-reset-black:hover:not(:disabled) { background: linear-gradient(135deg, #3a3a4a, #4a4a6a); color: #aaf; }
  #btn-camera {
    background: linear-gradient(135deg, #2a1a3e, #4a2a6e);
    color: #bac;
    border: 1px solid rgba(180,100,255,0.3);
  }
  #btn-camera:hover:not(:disabled) { background: linear-gradient(135deg, #3a2a5e, #6a4a9e); color: #edf; }
  #btn-audio {
    background: linear-gradient(135deg, #1a1a2e, #2a2a3e);
    color: #446;
    border: 1px solid rgba(100,100,150,0.2);
  }
  #btn-audio:hover:not(:disabled) { background: linear-gradient(135deg, #252535, #353550); color: #778; }
  #btn-audio.audio-on {
    background: linear-gradient(135deg, #163a1e, #1f6030);
    color: #6effa0;
    border: 1px solid rgba(60,200,100,0.45);
    box-shadow: 0 0 6px rgba(60,200,100,0.2);
  }
  #btn-universal {
    background: linear-gradient(135deg, #1a1a2e, #2a2a3e);
    color: #446;
    border: 1px solid rgba(100,100,150,0.2);
  }
  #btn-universal:hover:not(:disabled) { background: linear-gradient(135deg, #252535, #353550); color: #778; }
  #btn-universal.universal-on {
    background: linear-gradient(135deg, #3a2a1e, #6a4a30);
    color: #ffa060;
    border: 1px solid rgba(200,100,60,0.45);
    box-shadow: 0 0 6px rgba(200,100,60,0.2);
  }
  #main {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #camera-container {
    position: absolute;
    inset: 0;
    background: #000;
  }
  #videoEl {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
  }
  #canvasEl { display: none; }
  #reticle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60px;
    height: 60px;
    pointer-events: none;
    z-index: 20;
  }
  .reticle-h {
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    height: 2px;
    background: rgba(120,220,255,0.9);
    transform: translateY(-50%);
    box-shadow: 0 0 4px rgba(120,220,255,0.5);
  }
  .reticle-v {
    position: absolute;
    left: 50%;
    top: 0;
    height: 100%;
    width: 2px;
    background: rgba(120,220,255,0.9);
    transform: translateX(-50%);
    box-shadow: 0 0 4px rgba(120,220,255,0.5);
  }
  .reticle-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 22px;
    height: 22px;
    border: 1.5px solid rgba(120,220,255,0.5);
  }
  .reticle-sample-circle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1px dashed rgba(120,220,255,0.55);
  }
  .reticle-dot {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(120,220,255,0.9);
    box-shadow: 0 0 4px rgba(120,220,255,0.8);
  }
  #start-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 30;
    gap: 14px;
  }
  #start-overlay p { color: #778; font-size: 0.88rem; }
  #btn-start {
    padding: 13px 30px;
    background: linear-gradient(135deg, #3a3a9e, #7b5ce8);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  #btn-start:hover { transform: scale(1.05); }
  
  @media (max-width: 768px) {
    #header { padding: 4px 8px; }
    #btn-system { font-size: 0.6rem; padding: 4px 9px; }
    #top-bar { gap: 6px; padding: 4px 8px; }
    .btn-top { padding: 3px 6px; font-size: 0.55rem; }
    #color-name { font-size: 0.74rem; min-width: 100px; }
    .data-inline { font-size: 0.58rem; }
    #base-info { font-size: 0.54rem; }
  }
</style>
</head>
<body>
<div id="header">
  <button id="btn-system" class="system-on" onclick="toggleSystem()">SISTEMA/ON</button>
  <span style="font-size:0.6rem;color:#334;letter-spacing:1px;">Compensação de Brilho v2.0 · Ultra Preciso</span>
</div>
<div id="top-bar">
  <div id="color-swatch" style="background:#1a1a2e;"></div>
  <div id="color-name" style="color:#445;">Aguardando...</div>
  <div id="confidence-display"></div>
  <span class="sep">│</span>
  <div class="data-inline" id="hsv-line">
    <span class="lbl">H:</span>--- &nbsp;<span class="lbl">S:</span>--- &nbsp;<span class="lbl">V:</span>---
  </div>
  <span class="sep">│</span>
  <div class="data-inline" id="rgb-line">
    <span class="lbl">R:</span>--- &nbsp;<span class="lbl">G:</span>--- &nbsp;<span class="lbl">B:</span>---
  </div>
  <span class="sep">│</span>
  <div id="base-info">Base: não calibrada</div>
  <span class="sep">│</span>
  <button class="btn-top" id="btn-calibrate-white" onclick="calibrateWhite()">&#9670; Cal. Branco</button>
  <button class="btn-top" id="btn-calibrate-black" onclick="calibrateBlack()">&#9670; Cal. Preto</button>
  <button class="btn-top" id="btn-reset-white" onclick="resetWhite()">&#10006; Reset Branco</button>
  <button class="btn-top" id="btn-reset-black" onclick="resetBlack()">&#10006; Reset Preto</button>
  <button class="btn-top" id="btn-camera"    onclick="switchCamera()">&#8635; Câmera</button>
  <button class="btn-top" id="btn-audio"     onclick="toggleAudio()">&#128263; Áudio</button>
  <button class="btn-top" id="btn-universal" onclick="toggleUniversalMode()">&#9733; Universal</button>
</div>
<div id="main">
  <div id="camera-container">
    <video id="videoEl" autoplay playsinline muted></video>
    <canvas id="canvasEl"></canvas>
    <div id="reticle">
      <div class="reticle-h"></div>
      <div class="reticle-v"></div>
      <div class="reticle-box"></div>
      <div class="reticle-sample-circle"></div>
      <div class="reticle-dot"></div>
    </div>
    <div id="start-overlay">
      <p>Toque para iniciar a câmera</p>
      <button id="btn-start" onclick="startCamera()">&#9654; Iniciar Câmera</button>
    </div>
  </div>
</div>
<script>
  const video = document.getElementById('videoEl');
  const canvas = document.getElementById('canvasEl');
  const ctx = canvas.getContext('2d');
  
  let stream = null, devices = [], deviceIndex = 0, running = false, universalMode = false;
  let systemOn = true;
  
  let whiteCalibration = null;
  let blackCalibration = null;
  let isWhiteCalibrated = false;
  let isBlackCalibrated = false;
  
  const SAMPLE_SIZE = 2;
  const BUFFER_SIZE = 8;
  const HYSTERESIS_THRESHOLD = 6;
  const RGB_CHANGE_THRESHOLD = 55;
  
  let colorBuffer = [];
  let lastStableColorName = '';
  let lastStableHue = 0;
  let lastStableRGB = { r: 0, g: 0, b: 0 };
  let lastStableVariance = 0;
  
  let mismatchCounter = 0;
  const MISMATCH_FORCE_UPDATE = 5;
  
  let audioEnabled = false, lastSpokenName = '', pendingName = '', stableTimer = null;
  const STABLE_SPEECH_MS = 600;
  
  let consecutiveFrameCounter = 0;
  const MIN_CONSECUTIVE_FRAMES = 7;
  
  function toggleSystem() {
    systemOn = !systemOn;
    const btn = document.getElementById('btn-system');
    const btns = ['btn-calibrate-white', 'btn-calibrate-black', 'btn-reset-white', 'btn-reset-black', 'btn-camera', 'btn-audio', 'btn-universal'];
    
    if (systemOn) {
      btn.textContent = 'SISTEMA/ON';
      btn.className = 'system-on';
      btns.forEach(id => document.getElementById(id).disabled = false);
    } else {
      btn.textContent = 'SISTEMA/OFF';
      btn.className = 'system-off';
      btns.forEach(id => document.getElementById(id).disabled = true);
      if (window.speechSynthesis) window.speechSynthesis.cancel();
      if (stableTimer) { clearTimeout(stableTimer); stableTimer = null; }
      document.getElementById('color-name').textContent = '---';
      document.getElementById('color-name').style.color = '#445';
      document.getElementById('confidence-display').textContent = '';
      document.getElementById('hsv-line').innerHTML = '<span class="lbl">H:</span>--- &nbsp;<span class="lbl">S:</span>--- &nbsp;<span class="lbl">V:</span>---';
      document.getElementById('rgb-line').innerHTML = '<span class="lbl">R:</span>--- &nbsp;<span class="lbl">G:</span>--- &nbsp;<span class="lbl">B:</span>---';
      document.getElementById('color-swatch').style.background = '#1a1a2e';
    }
  }
  
  function rgbToHSV(r, g, b) {
    r /= 255; g /= 255; b /= 255;
    const max = Math.max(r, g, b), min = Math.min(r, g, b), delta = max - min;
    let h = 0, s = 0, v = max;
    if (delta !== 0) {
      s = delta / max;
      if (max === r) h = ((g - b) / delta + (g < b ? 6 : 0)) / 6;
      else if (max === g) h = ((b - r) / delta + 2) / 6;
      else h = ((r - g) / delta + 4) / 6;
    }
    return { h: h * 360, s: s * 100, v: v * 100 };
  }
  
  function normalizeV(vRaw) {
    if (!isWhiteCalibrated || !isBlackCalibrated) {
      return vRaw;
    }
    
    const vWhite = whiteCalibration.hsv.v;
    const vBlack = blackCalibration.hsv.v;
    
    const vNormalized = ((vRaw - vBlack) / (vWhite - vBlack)) * 100;
    
    return Math.max(0, Math.min(100, vNormalized));
  }
  
  function calculateVariance(buffer) {
    if (buffer.length < 3) return 0;
    const values = buffer.map(item => item.hsv.v);
    const mean = values.reduce((a, b) => a + b, 0) / values.length;
    const variance = values.reduce((sum, val) => sum + Math.pow(val - mean, 2), 0) / values.length;
    return Math.sqrt(variance);
  }
  
  function isCalibrationWhite(hsv, rgb) {
    if (!isWhiteCalibrated || !whiteCalibration) return false;
    
    const base = whiteCalibration;
    
    const dr = rgb.r - base.rgb.r;
    const dg = rgb.g - base.rgb.g;
    const db = rgb.b - base.rgb.b;
    const rgbDistance = Math.sqrt(dr*dr + dg*dg + db*db);
    
    const vDiff = Math.abs(hsv.v - base.hsv.v);
    const isSLow = hsv.s <= 30;
    
    if (rgbDistance <= 50 || (vDiff <= 15 && isSLow)) {
      return true;
    }
    
    if (hsv.v >= base.hsv.v && hsv.s <= 20) {
      return true;
    }
    
    return false;
  }
  
  function isCalibrationBlack(hsv, rgb) {
    if (!isBlackCalibrated || !blackCalibration) return false;
    
    const base = blackCalibration;
    
    const dr = rgb.r - base.rgb.r;
    const dg = rgb.g - base.rgb.g;
    const db = rgb.b - base.rgb.b;
    const rgbDistance = Math.sqrt(dr*dr + dg*dg + db*db);
    
    const vDiff = Math.abs(hsv.v - base.hsv.v);
    const isSLow = hsv.s <= 35;
    
    if (rgbDistance <= 40 || (vDiff <= 12 && isSLow)) {
      return true;
    }
    
    const maxRGB = Math.max(rgb.r, rgb.g, rgb.b);
    if (maxRGB <= base.rgb.r + 20 && maxRGB <= base.rgb.g + 20 && maxRGB <= base.rgb.b + 20 && hsv.s <= 35) {
      return true;
    }
    
    return false;
  }
  
  // FUNÇÃO MATEMÁTICA UNIVERSAL: ROSA vs VERMELHO (usando PROPORÇÕES)
  function distinguishRedFromPink(rgb, h, s, v) {
    const r = rgb.r;
    const g = rgb.g;
    const b = rgb.b;
    
    // Validação mínima: R deve ser dominante
    if (r < Math.max(g, b)) {
      return 'Vermelho'; // Fallback
    }
    
    // Calcular proporções (funcionam para qualquer intensidade)
    const avgGB = (g + b) / 2;
    const maxRGB = Math.max(r, g, b);
    
    // PROPORÇÃO CRÍTICA: avgGB / R
    // Rosa: G e B são significativos (55-85% do valor de R)
    // Vermelho: G e B são muito menores (< 50% de R)
    const gbToRRatio = avgGB / r;
    
    // PROPORÇÃO SECUNDÁRIA: Proximidade de G e B
    // Rosa: G e B estão próximos (diferença < 15% do maior)
    // Vermelho: Pode ter diferença maior
    const gbDiff = Math.abs(g - b);
    const gbProximity = gbDiff / maxRGB;
    
    // CRITÉRIO 1: ROSA (qualquer intensidade)
    // - avgGB/R entre 0.55 e 0.85 (G e B significativos)
    // - G e B próximos (diferença < 12% do máximo)
    // - R mínimo de 80 (visível)
    const isPinkByRatio = gbToRRatio >= 0.55 && gbToRRatio <= 0.85;
    const isPinkByProximity = gbProximity < 0.12;
    
    if (isPinkByRatio && isPinkByProximity && r >= 80) {
      return 'Rosa';
    }
    
    // CRITÉRIO 2: VERMELHO PURO
    // - avgGB/R < 0.50 (G e B muito menores)
    // - R mínimo de 100
    const isRedByRatio = gbToRRatio < 0.50;
    
    if (isRedByRatio && r >= 100) {
      return 'Vermelho';
    }
    
    // DESEMPATE: Zona intermediária (0.50 - 0.55)
    // Usar saturação como critério adicional
    // Se S muito alto (> 70%) E avgGB baixo → Vermelho
    // Caso contrário → Rosa
    if (s > 70 && avgGB < r * 0.52) {
      return 'Vermelho';
    }
    
    return 'Rosa';
  }
  
  // FUNÇÃO MATEMÁTICA UNIVERSAL: ROXO vs MAGENTA (usando PROPORÇÕES)
  function distinguishPurpleFromMagenta(rgb, h, s, v) {
    const r = rgb.r;
    const g = rgb.g;
    const b = rgb.b;
    
    const maxRGB = Math.max(r, g, b);
    
    // PROPORÇÃO CRÍTICA: Equilíbrio R/B
    // Magenta: R e B equilibrados (diferença < 20% do maior)
    // Roxo: B dominante (B >= 85% de R)
    const rbDiff = Math.abs(r - b);
    const rbBalance = rbDiff / maxRGB;
    
    // PROPORÇÃO SECUNDÁRIA: B/R
    const bToRRatio = b / Math.max(r, 1); // Evitar divisão por zero
    
    // CRITÉRIO 1: ROXO
    // - B >= 85% de R (azul dominante ou equilibrado)
    // - B >= 80 (componente azul forte)
    // - S >= 35%
    const isPurpleByBlue = bToRRatio >= 0.85;
    const isPurpleByStrongBlue = b >= 80;
    const isPurpleBySaturation = s >= 35;
    
    if (isPurpleByBlue && isPurpleByStrongBlue && isPurpleBySaturation) {
      return 'Roxo';
    }
    
    // CRITÉRIO 2: MAGENTA
    // - Equilíbrio R/B (diferença < 18% do máximo)
    // - Ambos R e B altos (>= 85)
    // - G significativamente menor (< 70% do menor entre R e B)
    const isMagentaByBalance = rbBalance < 0.18;
    const isMagentaByHighRB = r >= 85 && b >= 85;
    const minRB = Math.min(r, b);
    const isMagentaByLowG = g < minRB * 0.70;
    
    if (isMagentaByBalance && isMagentaByHighRB && isMagentaByLowG && s >= 30) {
      return 'Magenta';
    }
    
    // DESEMPATE: Se B é forte → Roxo, senão → Magenta
    return b >= 75 ? 'Roxo' : 'Magenta';
  }
  
  function classifyColorWithRuler(hsv, rgb, variance) {
    const maxRGB = Math.max(rgb.r, rgb.g, rgb.b);
    const avgRGB = (rgb.r + rgb.g + rgb.b) / 3;
    
    if (maxRGB <= 15 || avgRGB <= 10) {
      return { name: 'Preto', color: '#1a1a2a', confidence: 99 };
    }
    
    if (isWhiteCalibrated && isCalibrationWhite(hsv, rgb)) {
      return { name: 'Branco', color: '#ffffff', confidence: 99 };
    }
    
    if (isBlackCalibrated && isCalibrationBlack(hsv, rgb)) {
      return { name: 'Preto', color: '#1a1a2a', confidence: 99 };
    }
    
    const { h, s } = hsv;
    const v = normalizeV(hsv.v);
    
    if (v < 22 && s < 35) {
      return { name: 'Preto', color: '#1a1a2a', confidence: 98 };
    }
    if (maxRGB < 50 && s < 40) {
      return { name: 'Preto', color: '#1a1a2a', confidence: 98 };
    }
    
    if (s < 15) {
      if (isWhiteCalibrated && isBlackCalibrated) {
        if (v >= 85) {
          return { name: 'Branco', color: '#ffffff', confidence: 98 };
        } else if (v <= 20) {
          return { name: 'Preto', color: '#1a1a2a', confidence: 98 };
        } else {
          return { name: 'Cinza', color: '#9999aa', confidence: 96 };
        }
      } else if (isWhiteCalibrated) {
        const baseV = whiteCalibration.hsv.v;
        if (v >= baseV - 10) {
          return { name: 'Branco', color: '#ffffff', confidence: 98 };
        } else if (v < baseV * 0.4) {
          return { name: 'Preto', color: '#1a1a2a', confidence: 98 };
        } else {
          return { name: 'Cinza', color: '#9999aa', confidence: 96 };
        }
      } else {
        if (v >= 72) {
          return { name: 'Branco', color: '#ffffff', confidence: 98 };
        } else if (v <= 28) {
          return { name: 'Preto', color: '#1a1a2a', confidence: 98 };
        }
        return { name: 'Cinza', color: '#9999aa', confidence: 96 };
      }
    }
    
    let baseName = '', baseColor = '', confidence = 98;
    
    // ZONA ROSA/VERMELHO (H: 345-20°) - Usar função proporcional
    if ((h >= 345 || h < 20) && s >= 15) {
      const result = distinguishRedFromPink(rgb, h, s, v);
      baseName = result;
      baseColor = result === 'Rosa' ? '#ff88aa' : '#ef4444';
      confidence = result === 'Rosa' ? 95 : 98;
    }
    // ZONA ROXO/MAGENTA (H: 260-345°) - Usar função proporcional
    else if (h >= 260 && h < 345 && s >= 30) {
      const result = distinguishPurpleFromMagenta(rgb, h, s, v);
      baseName = result;
      baseColor = result === 'Roxo' ? '#a855f7' : '#d946ef';
      confidence = 98;
    }
    else if (h >= 20 && h < 35) {
      baseName = 'Laranja';
      baseColor = '#f97316';
    }
    else if (h >= 35 && h < 70) {
      baseName = 'Amarelo';
      baseColor = '#fbbf24';
    }
    else if (h >= 70 && h < 165) {
      baseName = 'Verde';
      baseColor = '#22c55e';
    }
    else if (h >= 165 && h < 190) {
      baseName = 'Ciano';
      baseColor = '#06b6d4';
    }
    else if (h >= 190 && h < 260) {
      baseName = 'Azul';
      baseColor = '#3b82f6';
    }
    
    let modifier = '';
    if (v < 28) modifier = ' Escuro';
    else if (v > 82 && s < 45) modifier = ' Claro';
    
    return { name: baseName + modifier, color: baseColor, confidence };
  }
  
  function addToBuffer(hsv, rgb) {
    colorBuffer.push({ hsv, rgb });
    if (colorBuffer.length > BUFFER_SIZE) colorBuffer.shift();
  }
  
  function getStableColor() {
    if (colorBuffer.length < 3) return null;
    const filteredBuffer = filterOutliers(colorBuffer);
    if (filteredBuffer.length === 0) return null;
    
    let avgH = 0, avgS = 0, avgV = 0, avgR = 0, avgG = 0, avgB = 0;
    let sinSum = 0, cosSum = 0;
    
    filteredBuffer.forEach(item => {
      const radH = item.hsv.h * Math.PI / 180;
      sinSum += Math.sin(radH);
      cosSum += Math.cos(radH);
      avgS += item.hsv.s;
      avgV += item.hsv.v;
      avgR += item.rgb.r;
      avgG += item.rgb.g;
      avgB += item.rgb.b;
    });
    
    const len = filteredBuffer.length;
    avgH = Math.atan2(sinSum / len, cosSum / len) * 180 / Math.PI;
    if (avgH < 0) avgH += 360;
    avgS /= len; avgV /= len;
    avgR = Math.round(avgR / len);
    avgG = Math.round(avgG / len);
    avgB = Math.round(avgB / len);
    
    return { hsv: { h: avgH, s: avgS, v: avgV }, rgb: { r: avgR, g: avgG, b: avgB } };
  }
  
  function filterOutliers(buffer) {
    if (buffer.length < 5) return buffer;
    const vValues = buffer.map(item => item.hsv.v).sort((a, b) => a - b);
    const median = vValues[Math.floor(vValues.length / 2)];
    return buffer.filter(item => Math.abs(item.hsv.v - median) < 30);
  }
  
  function detectObjectChange(newRGB) {
    if (!lastStableRGB.r && !lastStableRGB.g && !lastStableRGB.b) return false;
    const deltaR = Math.abs(newRGB.r - lastStableRGB.r);
    const deltaG = Math.abs(newRGB.g - lastStableRGB.g);
    const deltaB = Math.abs(newRGB.b - lastStableRGB.b);
    const rgbDistance = Math.sqrt(deltaR * deltaR + deltaG * deltaG + deltaB * deltaB);
    return rgbDistance > RGB_CHANGE_THRESHOLD;
  }
  
  function shouldUpdateColor(newHue, newColorName, newRGB, newSat, newVariance) {
    if (!lastStableColorName) return true;
    if (detectObjectChange(newRGB)) {
      consecutiveFrameCounter = 0;
      return true;
    }
    if (Math.abs(newVariance - lastStableVariance) > 10) return true;
    
    if (newColorName !== lastStableColorName) {
      let diff = Math.abs(newHue - lastStableHue);
      if (diff > 180) diff = 360 - diff;
      const hueDiffSignificant = diff >= HYSTERESIS_THRESHOLD;
      const saturationChange = Math.abs(newSat - (colorBuffer[colorBuffer.length - 1]?.hsv.s || 0)) > 18;
      
      if (hueDiffSignificant || saturationChange) {
        consecutiveFrameCounter++;
        return consecutiveFrameCounter >= MIN_CONSECUTIVE_FRAMES;
      } else {
        consecutiveFrameCounter = 0;
        return false;
      }
    }
    
    consecutiveFrameCounter = 0;
    return true;
  }
  
  function samplePixels() {
    const vw = video.videoWidth, vh = video.videoHeight;
    if (!vw || !vh) return null;
    const cw = video.clientWidth, ch = video.clientHeight;
    const scale = Math.max(cw / vw, ch / vh);
    const offsetX = (vw * scale - cw) / 2;
    const offsetY = (vh * scale - ch) / 2;
    const nativeCX = Math.round((cw / 2 + offsetX) / scale);
    const nativeCY = Math.round((ch / 2 + offsetY) / scale);
    const nativeSample = Math.max(1, Math.round(SAMPLE_SIZE / scale));
    
    canvas.width = vw; canvas.height = vh;
    ctx.drawImage(video, 0, 0);
    
    const x0 = Math.max(0, nativeCX - nativeSample);
    const y0 = Math.max(0, nativeCY - nativeSample);
    const data = ctx.getImageData(x0, y0, nativeSample * 2, nativeSample * 2).data;
    
    let rSum = 0, gSum = 0, bSum = 0, count = 0;
    for (let i = 0; i < data.length; i += 4) {
      rSum += data[i]; gSum += data[i + 1]; bSum += data[i + 2]; count++;
    }
    return { r: Math.round(rSum / count), g: Math.round(gSum / count), b: Math.round(bSum / count) };
  }
  
  function toggleAudio() {
    if (!systemOn) return;
    if (window.speechSynthesis) window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
    audioEnabled = !audioEnabled;
    const btn = document.getElementById('btn-audio');
    if (audioEnabled) {
      btn.textContent = '🔊 Áudio'; btn.classList.add('audio-on');
    } else {
      btn.textContent = '🔇 Áudio'; btn.classList.remove('audio-on');
      if (window.speechSynthesis) window.speechSynthesis.cancel();
      if (stableTimer) { clearTimeout(stableTimer); stableTimer = null; }
      pendingName = ''; lastSpokenName = '';
    }
  }
  
  function toggleUniversalMode() {
    if (!systemOn) return;
    universalMode = !universalMode;
    const btn = document.getElementById('btn-universal');
    btn.textContent = universalMode ? '⭐ Universal' : '☆ Universal';
    btn.classList.toggle('universal-on', universalMode);
    lastSpokenName = ''; pendingName = '';
    if (stableTimer) { clearTimeout(stableTimer); stableTimer = null; }
  }
  
  function speakColor(name) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    setTimeout(() => {
      if (!audioEnabled) return;
      const utt = new SpeechSynthesisUtterance(name);
      utt.lang = 'pt-BR'; utt.rate = 1.1; utt.pitch = 1.0;
      window.speechSynthesis.speak(utt);
    }, 60);
  }
  
  function triggerAudioIfChanged(name) {
    if (!audioEnabled) return;
    if (name === lastSpokenName) {
      if (pendingName !== name && stableTimer) {
        clearTimeout(stableTimer); stableTimer = null; pendingName = '';
      }
      return;
    }
    if (name !== pendingName) {
      pendingName = name;
      if (stableTimer) clearTimeout(stableTimer);
      stableTimer = setTimeout(() => {
        if (!audioEnabled) { stableTimer = null; return; }
        lastSpokenName = pendingName;
        speakColor(pendingName);
        stableTimer = null;
      }, STABLE_SPEECH_MS);
    }
  }
  
  function updateCalibrationStatus() {
    let statusText = 'Base: ';
    
    if (isWhiteCalibrated && isBlackCalibrated) {
      const vRange = whiteCalibration.hsv.v - blackCalibration.hsv.v;
      statusText += `Régua Completa (${vRange.toFixed(0)}% range)`;
    } else if (isWhiteCalibrated) {
      statusText += `Branco V:${whiteCalibration.hsv.v.toFixed(0)}%`;
    } else if (isBlackCalibrated) {
      statusText += `Preto V:${blackCalibration.hsv.v.toFixed(0)}%`;
    } else {
      statusText += 'não calibrada';
    }
    
    document.getElementById('base-info').textContent = statusText;
  }
  
  function update() {
    if (!running || video.readyState < 2) {
      requestAnimationFrame(update);
      return;
    }
    
    if (!systemOn) {
      requestAnimationFrame(update);
      return;
    }
    
    const pixels = samplePixels();
    if (!pixels) {
      requestAnimationFrame(update);
      return;
    }
    
    const { r, g, b } = pixels;
    const rawHsv = rgbToHSV(r, g, b);
    
    addToBuffer(rawHsv, { r, g, b });
    
    const stable = getStableColor();
    if (!stable) {
      requestAnimationFrame(update);
      return;
    }
    
    const variance = calculateVariance(colorBuffer);
    
    const classification = classifyColorWithRuler(stable.hsv, stable.rgb, variance);
    
    if (classification.name !== lastStableColorName && lastStableColorName !== '') {
      mismatchCounter++;
    } else {
      mismatchCounter = 0;
    }
    
    const forceUpdate = mismatchCounter >= MISMATCH_FORCE_UPDATE;
    
    if (forceUpdate || shouldUpdateColor(stable.hsv.h, classification.name, stable.rgb, stable.hsv.s, variance)) {
      if (forceUpdate) {
        colorBuffer = colorBuffer.slice(-3);
        mismatchCounter = 0;
        consecutiveFrameCounter = 0;
      }
      
      if (detectObjectChange(stable.rgb)) {
        colorBuffer = colorBuffer.slice(-2);
        consecutiveFrameCounter = 0;
      }
      
      lastStableColorName = classification.name;
      lastStableHue = stable.hsv.h;
      lastStableRGB = { ...stable.rgb };
      lastStableVariance = variance;
      
      document.getElementById('color-name').textContent = classification.name;
      document.getElementById('color-name').style.color = classification.color;
      document.getElementById('confidence-display').textContent = `${classification.confidence}%`;
      document.getElementById('confidence-display').style.color = 
        classification.confidence > 95 ? '#6a6' : 
        classification.confidence > 85 ? '#fa0' : '#f66';
      
      triggerAudioIfChanged(classification.name);
    }
    
    document.getElementById('rgb-line').innerHTML =
      `<span class="lbl">R:</span>${stable.rgb.r} <span class="lbl">G:</span>${stable.rgb.g} <span class="lbl">B:</span>${stable.rgb.b}`;
    document.getElementById('hsv-line').innerHTML =
      `<span class="lbl">H:</span>${stable.hsv.h.toFixed(0)}° <span class="lbl">S:</span>${stable.hsv.s.toFixed(0)}% <span class="lbl">V:</span>${stable.hsv.v.toFixed(0)}%`;
    document.getElementById('color-swatch').style.background =
      `rgb(${stable.rgb.r},${stable.rgb.g},${stable.rgb.b})`;
    
    requestAnimationFrame(update);
  }
  
  async function getDevices() {
    const devs = await navigator.mediaDevices.enumerateDevices();
    devices = devs.filter(d => d.kind === 'videoinput');
  }
  
  async function openCamera(preferredDeviceId) {
    if (stream) stream.getTracks().forEach(t => t.stop());
    const tryOpen = async (constraints) => {
      stream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = stream;
    };
    if (preferredDeviceId) {
      try {
        await tryOpen({ video: { deviceId: { exact: preferredDeviceId }, width: { ideal: 1920 }, height: { ideal: 1080 } } });
        return;
      } catch (_) {}
    }
    try {
      await tryOpen({ video: { facingMode: { exact: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } } });
      return;
    } catch (_) {}
    try {
      await tryOpen({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } });
      return;
    } catch (_) {}
    try {
      await tryOpen({ video: true });
    } catch (e) {
      alert('Erro ao acessar a câmera: ' + e.message);
    }
  }
  
  async function startCamera() {
    if (!systemOn) return;
    document.getElementById('start-overlay').style.display = 'none';
    await getDevices();
    await openCamera();
    running = true;
    requestAnimationFrame(update);
  }
  
  async function switchCamera() {
    if (!systemOn) return;
    if (devices.length < 2) {
      alert('Apenas uma câmera disponível.');
      return;
    }
    deviceIndex = (deviceIndex + 1) % devices.length;
    await openCamera(devices[deviceIndex].deviceId);
  }
  
  function calibrateWhite() {
    if (!systemOn) return;
    if (!running) {
      alert('Inicie a câmera primeiro.');
      return;
    }
    
    const stable = getStableColor();
    if (!stable) {
      alert('Aguarde a estabilização da imagem...');
      return;
    }
    
    whiteCalibration = {
      hsv: { h: stable.hsv.h, s: stable.hsv.s, v: stable.hsv.v },
      rgb: { r: stable.rgb.r, g: stable.rgb.g, b: stable.rgb.b }
    };
    
    isWhiteCalibrated = true;
    
    document.getElementById('color-name').textContent = 'Branco';
    document.getElementById('color-name').style.color = '#ffffff';
    
    const btn = document.getElementById('btn-calibrate-white');
    btn.textContent = '✓ Branco';
    btn.classList.add('calibrated');
    
    updateCalibrationStatus();
    
    colorBuffer = [];
    lastStableColorName = 'Branco';
    lastStableHue = stable.hsv.h;
    lastStableRGB = { ...stable.rgb };
    lastStableVariance = 0;
    mismatchCounter = 0;
    consecutiveFrameCounter = 0;
    
    if (audioEnabled) {
      speakColor('Branco calibrado');
    }
    
    console.log('═══════════════════════════════════════════════');
    console.log('✓ BRANCO CALIBRADO');
    console.log('   RGB:', whiteCalibration.rgb);
    console.log('   V:', whiteCalibration.hsv.v.toFixed(1) + '%');
    console.log('═══════════════════════════════════════════════');
  }
  
  function calibrateBlack() {
    if (!systemOn) return;
    if (!running) {
      alert('Inicie a câmera primeiro.');
      return;
    }
    
    const stable = getStableColor();
    if (!stable) {
      alert('Aguarde a estabilização da imagem...');
      return;
    }
    
    blackCalibration = {
      hsv: { h: stable.hsv.h, s: stable.hsv.s, v: stable.hsv.v },
      rgb: { r: stable.rgb.r, g: stable.rgb.g, b: stable.rgb.b }
    };
    
    isBlackCalibrated = true;
    
    document.getElementById('color-name').textContent = 'Preto';
    document.getElementById('color-name').style.color = '#1a1a2a';
    
    const btn = document.getElementById('btn-calibrate-black');
    btn.textContent = '✓ Preto';
    btn.classList.add('calibrated');
    
    updateCalibrationStatus();
    
    colorBuffer = [];
    lastStableColorName = 'Preto';
    lastStableHue = stable.hsv.h;
    lastStableRGB = { ...stable.rgb };
    lastStableVariance = 0;
    mismatchCounter = 0;
    consecutiveFrameCounter = 0;
    
    if (audioEnabled) {
      speakColor('Preto calibrado');
    }
    
    console.log('═══════════════════════════════════════════════');
    console.log('✓ PRETO CALIBRADO');
    console.log('   RGB:', blackCalibration.rgb);
    console.log('   V:', blackCalibration.hsv.v.toFixed(1) + '%');
    if (isWhiteCalibrated) {
      const range = whiteCalibration.hsv.v - blackCalibration.hsv.v;
      console.log('   RÉGUA COMPLETA: Range de', range.toFixed(1) + '%');
    }
    console.log('═══════════════════════════════════════════════');
  }
  
  function resetWhite() {
    if (!systemOn) return;
    
    whiteCalibration = null;
    isWhiteCalibrated = false;
    
    const btn = document.getElementById('btn-calibrate-white');
    btn.textContent = '◆ Cal. Branco';
    btn.classList.remove('calibrated');
    
    updateCalibrationStatus();
    
    colorBuffer = [];
    lastStableColorName = '';
    mismatchCounter = 0;
    consecutiveFrameCounter = 0;
    
    if (audioEnabled) {
      speakColor('Branco resetado');
    }
    
    console.log('✗ CALIBRAÇÃO DE BRANCO RESETADA');
  }
  
  function resetBlack() {
    if (!systemOn) return;
    
    blackCalibration = null;
    isBlackCalibrated = false;
    
    const btn = document.getElementById('btn-calibrate-black');
    btn.textContent = '◆ Cal. Preto';
    btn.classList.remove('calibrated');
    
    updateCalibrationStatus();
    
    colorBuffer = [];
    lastStableColorName = '';
    mismatchCounter = 0;
    consecutiveFrameCounter = 0;
    
    if (audioEnabled) {
      speakColor('Preto resetado');
    }
    
    console.log('✗ CALIBRAÇÃO DE PRETO RESETADA');
  }
