<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColorMatch Pro – Fidelity Restored</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #050505; color: #fff; text-align: center; overflow-x: hidden; }
        h2 { margin-top: 15px; font-size: 20px; color: #00ffcc; text-transform: uppercase; }
        
        #videoContainer { 
            position: relative; display: inline-block; width: 95%; max-width: 600px; 
            margin-top: 10px; border-radius: 15px; overflow: hidden; border: 2px solid #333; 
        }
        video { width: 100%; display: block; object-fit: cover; background: #000; }

        .controls { padding: 10px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; background: #111; }
        button { 
            padding: 10px 5px; border: none; border-radius: 6px; cursor: pointer; 
            background: #222; color: #fff; font-weight: bold; font-size: 11px; transition: 0.2s;
        }
        .activeMode { background: #00695c !important; border: 1px solid #00ffcc; }

        #cross { 
            position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; 
            transform: translate(-50%, -50%); display: block; pointer-events: none; z-index: 10; 
        }
        #cross::before, #cross::after { content: ""; position: absolute; background: #00ffcc; opacity: 0.8; }
        #cross::before { left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); }
        #cross::after { top: 50%; left: 0; width: 100%; height: 2px; transform: translateY(-50%); }

        #txt { font-size: 22px; padding: 20px; min-height: 50px; font-weight: bold; color: #00ffcc; background: #000; border-bottom: 3px solid #00ffcc; text-transform: uppercase; }
        
        #hud { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); font-family: monospace; font-size: 10px; padding: 8px; text-align: left; color: #00ffcc; border-radius: 5px; border: 1px solid #444; }

        .pointMarker { position: absolute; width: 16px; height: 16px; border: 2px solid #ffeb3b; border-radius: 50%; transform: translate(-50%, -50%); display: none; }
        #pointB { border-color: #f44336; }
    </style>
</head>
<body>

<h2>ColorMatch Pro – V2.1 Real-World</h2>

<div id="videoContainer">
    <video id="video" autoplay playsinline muted></video>
    <div id="hud">
        RGB: <span id="valRGB">0,0,0</span><br>
        HUE: <span id="valHue">0°</span><br>
        CHROMA: <span id="valChroma">0</span>
    </div>
    <div id="cross"></div>
    <div id="pointA" class="pointMarker"></div>
    <div id="pointB" class="pointMarker"></div>
</div>

<div id="txt">Iniciando Sensor...</div>

<div class="controls">
    <button id="btn-static" onclick="setMode('static')" class="activeMode">Estático</button>
    <button id="btn-move" onclick="setMode('move')">Movimento</button>
    <button id="btn-comparePoint" onclick="setMode('comparePoint')">Comparar</button>
    <button onclick="toggleFlash()">⚡ Flash</button>
    <button onclick="location.reload()" style="background:#444">Reset</button>
</div>

<script>
    const video = document.getElementById("video");
    const txt = document.getElementById("txt");
    const valRGB = document.getElementById("valRGB");
    const valHue = document.getElementById("valHue");
    const valChroma = document.getElementById("valChroma");
    
    let mode = "static";
    let streamTrack = null;
    let lastSpoken = "";
    let compareStep = 0, compareALab = null;

    function speak(t) {
        if (!t || t === lastSpoken) return;
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = "pt-BR";
        window.speechSynthesis.speak(m);
        lastSpoken = t;
    }

    function rgbToLab(r, g, b) {
        const toL = (v) => { v /= 255; return v <= 0.04045 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4); };
        let R = toL(r), G = toL(g), B = toL(b);
        let x = (R * 0.4124 + G * 0.3576 + B * 0.1805) / 0.95047;
        let y = (R * 0.2126 + G * 0.7152 + B * 0.0722) / 1.00000;
        let z = (R * 0.0193 + G * 0.1192 + B * 0.9505) / 1.08883;
        const f = t => t > 0.008856 ? Math.pow(t, 1/3) : (7.787 * t) + (16/116);
        return { L: (116 * f(y)) - 16, a: 500 * (f(x) - f(y)), b: 200 * (f(y) - f(z)), r, g, b };
    }

    function analyzeColor(lab) {
        const { r, g, b, L, a, b: labB } = lab;
        const chroma = Math.sqrt(a**2 + labB**2);
        let hue = Math.atan2(labB, a) * (180 / Math.PI);
        if (hue < 0) hue += 360;

        // Atualiza HUD
        valRGB.innerText = `${Math.round(r)},${Math.round(g)},${Math.round(b)}`;
        valHue.innerText = Math.round(hue) + "°";
        valChroma.innerText = Math.round(chroma);

        // 1. PRIORIDADE MÁXIMA: NEUTROS (Branco/Preto/Cinza)
        // Se a cor for muito clara e tiver pouca saturação (chroma), é branco.
        if (L > 85 && chroma < 18) return "Branco";
        if (L < 15) return "Preto";
        if (chroma < 12) return "Cinza";

        // 2. LÓGICA DE CORES REAIS (Baseada em Hue com refinamento)
        if (hue >= 350 || hue < 12) return "Vermelho";
        if (hue >= 12 && hue < 45) return "Laranja";
        if (hue >= 45 && hue < 70) return "Amarelo";
        if (hue >= 70 && hue < 160) return "Verde";
        if (hue >= 160 && hue < 250) return "Azul";

        // 3. ZONA CRÍTICA: ROXO VS ROSA
        if (hue >= 250 && hue < 350) {
            // No Roxo, o Azul (B) é competitivo ou maior que o Vermelho (R)
            // No Rosa, o Vermelho (R) domina muito o Azul (B)
            const rbRatio = r / (b + 1);
            if (rbRatio > 1.4) return "Rosa";
            if (b > r * 0.6) return "Roxo"; // Se tiver azul suficiente, é roxo
            return (hue < 310) ? "Roxo" : "Rosa";
        }

        return "Cor Indefinida";
    }

    function capture(x, y) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const size = 12; // Kernel balanceado
        canvas.width = size; canvas.height = size;
        const rect = video.getBoundingClientRect();
        const sx = video.videoWidth / rect.width;
        const sy = video.videoHeight / rect.height;
        ctx.drawImage(video, x*sx - size/2, y*sy - size/2, size, size, 0, 0, size, size);
        const data = ctx.getImageData(0,0,size,size).data;
        let r=0, g=0, b=0;
        for(let i=0; i<data.length; i+=4) { r+=data[i]; g+=data[i+1]; b+=data[i+2]; }
        return { r: r/(size*size), g: g/(size*size), b: b/(size*size) };
    }

    async function init() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
        streamTrack = stream.getVideoTracks()[0];
        requestAnimationFrame(loop);
    }

    function loop() {
        if (mode === "move") {
            const rect = video.getBoundingClientRect();
            const rgb = capture(rect.width/2, rect.height/2);
            const lab = rgbToLab(rgb.r, rgb.g, rgb.b);
            const name = analyzeColor(lab);
            txt.innerText = name;
            speak(name);
        }
        requestAnimationFrame(loop);
    }

    video.addEventListener("click", (e) => {
        const rect = video.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const rgb = capture(x, y);
        const lab = rgbToLab(rgb.r, rgb.g, rgb.b);
        const name = analyzeColor(lab);

        if (mode === "static") {
            txt.innerText = name;
            speak(name);
        } else if (mode === "comparePoint") {
            if (compareStep === 0) {
                compareALab = lab;
                document.getElementById("pointA").style.left = x+"px";
                document.getElementById("pointA").style.top = y+"px";
                document.getElementById("pointA").style.display = "block";
                speak("Ponto A: " + name);
                compareStep = 1;
            } else {
                document.getElementById("pointB").style.left = x+"px";
                document.getElementById("pointB").style.top = y+"px";
                document.getElementById("pointB").style.display = "block";
                const dist = Math.sqrt((lab.L-compareALab.L)**2 + (lab.a-compareALab.a)**2 + (lab.b-compareALab.b)**2);
                const sim = Math.max(0, 100 - (dist * 2)).toFixed(1);
                txt.innerText = sim + "% Similar";
                speak(sim + " por cento");
                compareStep = 0;
            }
        }
    });

    function setMode(m) {
        mode = m;
        document.querySelectorAll('button').forEach(b => b.classList.remove('activeMode'));
        document.getElementById('btn-'+m).classList.add('activeMode');
        txt.innerText = "Modo " + m;
    }

    function toggleFlash() {
        if (streamTrack) {
            const settings = streamTrack.getSettings();
            streamTrack.applyConstraints({ advanced: [{ torch: !settings.torch }] });
        }
    }

    init();
</script>
</body>
</html>
