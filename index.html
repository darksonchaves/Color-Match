<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro – Unified Precision Engine</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
  text-align:center;
}

video {
  width:90%;
  border-radius:10px;
}

/* BOTÕES */
button {
  padding:10px;
  margin:5px;
}

/* PAINEL */
#panel {
  display:flex;
  justify-content:space-around;
  flex-wrap:wrap;
  margin-top:10px;
}

.box {
  width:45%;
  min-width:160px;
}

canvas {
  width:100%;
  border-radius:10px;
  background:#222;
}

/* MIRA CENTRAL MOVIMENTO */
#centerCross {
  position:fixed;
  top:50%;
  left:50%;
  width:18px;
  height:18px;
  border:2px solid #00ffcc;
  border-radius:50%;
  transform:translate(-50%,-50%);
  display:none;
  pointer-events:none;
}

/* PONTOS COMPARAÇÃO */
.point {
  position:absolute;
  width:12px;
  height:12px;
  border-radius:50%;
  border:2px solid;
  pointer-events:none;
}

#txt {
  margin-top:10px;
  font-size:15px;
}
</style>
</head>

<body>

<h2>ColorMatch Pro – Unified Engine</h2>

<button onclick="setMode('static')">Estático</button>
<button onclick="setMode('move')">Movimento</button>
<button onclick="setMode('compare')">Comparar</button>
<button onclick="toggleVoice()">🔊 Áudio</button>

<br>

<video id="video" autoplay playsinline></video>

<div id="centerCross"></div>

<div id="panel">
  <div class="box">
    <canvas id="canvasA"></canvas>
    <div>Referência</div>
  </div>

  <div class="box">
    <canvas id="canvasB"></canvas>
    <div>Comparação</div>
  </div>
</div>

<p id="txt">Selecione um modo</p>

<script>

const video = document.getElementById("video");
const canvasA = document.getElementById("canvasA");
const canvasB = document.getElementById("canvasB");

const ctxA = canvasA.getContext("2d");
const ctxB = canvasB.getContext("2d");

const centerCross = document.getElementById("centerCross");

let mode = "static";
let voice = true;

let step = 0;
let sampleA = null;
let sampleB = null;
let lastMove = "";

/* ================= VOZ GLOBAL ================= */
function speak(t){
  if(!voice) return;
  speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance(t);
  msg.lang = "pt-BR";
  speechSynthesis.speak(msg);
}

/* ================= CAMERA ================= */
navigator.mediaDevices.getUserMedia({
  video:{facingMode:"environment"}
}).then(stream=>{
  video.srcObject = stream;
});

/* ================= LAB (PRECISO - NÃO ALTERADO) ================= */
function rgbToLab(r,g,b){
  r/=255; g/=255; b/=255;

  [r,g,b]=[r,g,b].map(v=>
    v>0.04045?Math.pow((v+0.055)/1.055,2.4):v/12.92
  );

  let x=r*0.4124+g*0.3576+b*0.1805;
  let y=r*0.2126+g*0.7152+b*0.0722;
  let z=r*0.0193+g*0.1192+b*0.9505;

  x/=0.95047; y/=1; z/=1.08883;

  [x,y,z]=[x,y,z].map(v=>v>0.008856?Math.cbrt(v):(7.787*v)+(16/116));

  return {
    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)
  };
}

/* ================= ΔE ================= */
function deltaE(a,b){
  return Math.sqrt(
    (a.L-b.L)**2+
    (a.a-b.a)**2+
    (a.b-b.b)**2
  );
}

/* ================= BASE CORES ================= */
const colors = [
  {n:"Preto",lab:rgbToLab(10,10,10)},
  {n:"Branco",lab:rgbToLab(245,245,245)},
  {n:"Cinza",lab:rgbToLab(128,128,128)},
  {n:"Vermelho",lab:rgbToLab(220,60,60)},
  {n:"Verde",lab:rgbToLab(60,200,60)},
  {n:"Azul",lab:rgbToLab(60,80,220)},
  {n:"Amarelo",lab:rgbToLab(240,220,80)},
  {n:"Laranja",lab:rgbToLab(240,150,80)}
];

/* ================= DETECÇÃO ================= */
function detect(r,g,b){
  const lab = rgbToLab(r,g,b);
  let best={n:"Indef",d:999};

  for(const c of colors){
    const d=deltaE(lab,c.lab);
    if(d<best.d) best={n:c.n,d};
  }

  return best;
}

/* ================= CAPTURA ================= */
function capture(ctx,x,y){

  ctx.canvas.width = video.videoWidth;
  ctx.canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  const s=12;
  const d=ctx.getImageData(x-s,y-s,s*2,s*2).data;

  let r=0,g=0,b=0,c=0;

  for(let i=0;i<d.length;i+=4){
    r+=d[i];
    g+=d[i+1];
    b+=d[i+2];
    c++;
  }

  return detect(r/c,g/c,b/c);
}

/* ================= MODO ================= */
function setMode(m){

  mode = m;
  step = 0;
  sampleA = null;
  sampleB = null;

  centerCross.style.display = (m==="move") ? "block" : "none";

  document.getElementById("txt").innerText =
    "Modo: "+m.toUpperCase();

  if(m==="move") moveLoop();
}

/* ================= MOVIMENTO (MANTIDO PRECISO) ================= */
function moveLoop(){

  if(mode!=="move") return;

  const s = capture(ctxA, video.videoWidth/2, video.videoHeight/2);

  const text = "MOVIMENTO: " + s.n;

  document.getElementById("txt").innerText = text;

  if(lastMove !== s.n){
    speak(s.n);
    lastMove = s.n;
  }

  requestAnimationFrame(moveLoop);
}

/* ================= CLICK ================= */
video.addEventListener("click",(e)=>{

  const rect = video.getBoundingClientRect();

  const x = (e.clientX-rect.left)*(video.videoWidth/rect.width);
  const y = (e.clientY-rect.top)*(video.videoHeight/rect.height);

  /* ================= ESTÁTICO ================= */
  if(mode==="static"){
    const s = capture(ctxA,x,y);
    document.getElementById("txt").innerText =
      "Estático: "+s.n;
    speak(s.n);
  }

  /* ================= COMPARAÇÃO (CORRIGIDO COMPLETO) ================= */
  if(mode==="compare"){

    if(step===0){

      sampleA = capture(ctxA,x,y);

      ctxA.beginPath();
      ctxA.arc(x,y,10,0,Math.PI*2);
      ctxA.strokeStyle="lime";
      ctxA.stroke();

      document.getElementById("txt").innerText =
        "Referência: "+sampleA.n;

      step = 1;
    }

    else{

      sampleB = capture(ctxB,x,y);

      ctxB.beginPath();
      ctxB.arc(x,y,10,0,Math.PI*2);
      ctxB.strokeStyle="red";
      ctxB.stroke();

      const sim = Math.max(
        0,
        100 - deltaE(sampleA.lab, sampleB.lab)
      );

      const text =
        `${sampleA.n} → ${sampleB.n} | Similaridade: ${sim.toFixed(1)}%`;

      document.getElementById("txt").innerText = text;

      speak(text);

      step = 0;
    }
  }
});

/* ================= VOZ ================= */
function toggleVoice(){
  voice = !voice;
  alert("Áudio: "+(voice?"ON":"OFF"));
}

</script>

</body>
</html>
