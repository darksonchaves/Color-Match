<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro – Precision Engine v2</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
  text-align:center;
}

video {
  width:90%;
  border-radius:10px;
}

canvas {
  width:90%;
  border-radius:10px;
  background:#222;
}

button {
  padding:10px;
  margin:5px;
}

#cross {
  position:fixed;
  top:50%;
  left:50%;
  width:26px;
  height:26px;
  transform:translate(-50%,-50%);
  border:2px solid #00ffcc;
  border-radius:50%;
  display:none;
  pointer-events:none;
}
</style>
</head>

<body>

<h2>ColorMatch Pro – Precision Engine v2</h2>

<button onclick="setMode('static')">Estático</button>
<button onclick="setMode('move')">Movimento</button>
<button onclick="setMode('compare')">Comparar</button>
<button onclick="toggleVoice()">🔊 Áudio</button>

<video id="video" autoplay playsinline></video>

<canvas id="canvasA"></canvas>
<canvas id="canvasB"></canvas>

<div id="cross"></div>

<p id="txt">Iniciando...</p>

<script>

const video = document.getElementById("video");
const ctxA = canvasA.getContext("2d");
const ctxB = canvasB.getContext("2d");

let mode="static";
let voice=true;

// controle de movimento
let lastSpokenColor = "";
let stableColor = "";
let stabilityCount = 0;

/* CAMERA */
navigator.mediaDevices.getUserMedia({
  video:{facingMode:"environment"}
}).then(s=>{
  video.srcObject=s;
});

/* VOZ */
function speak(t){
  if(!voice) return;
  speechSynthesis.cancel();
  let msg=new SpeechSynthesisUtterance(t);
  msg.lang="pt-BR";
  speechSynthesis.speak(msg);
}

/* LAB */
function rgbToLab(r,g,b){
  r/=255; g/=255; b/=255;

  [r,g,b]=[r,g,b].map(v=>
    v>0.04045?Math.pow((v+0.055)/1.055,2.4):v/12.92
  );

  let x=r*0.4124+g*0.3576+b*0.1805;
  let y=r*0.2126+g*0.7152+b*0.0722;
  let z=r*0.0193+g*0.1192+b*0.9505;

  x/=0.95047; y/=1; z/=1.08883;

  [x,y,z]=[x,y,z].map(v=>v>0.008856?Math.cbrt(v):(7.787*v)+(16/116));

  return {
    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)
  };
}

/* ΔE */
function deltaE(a,b){
  return Math.sqrt(
    (a.L-b.L)**2+
    (a.a-b.a)**2+
    (a.b-b.b)**2
  );
}

/* CORES MAIS PRECISAS (REFORÇADAS) */
const colors=[
  {n:"Preto",lab:rgbToLab(0,0,0)},
  {n:"Branco",lab:rgbToLab(255,255,255)},
  {n:"Cinza",lab:rgbToLab(128,128,128)},

  {n:"Vermelho",lab:rgbToLab(220,30,30)},
  {n:"Laranja",lab:rgbToLab(255,140,40)},
  {n:"Amarelo",lab:rgbToLab(255,230,80)},

  {n:"Verde",lab:rgbToLab(40,200,80)},
  {n:"Azul",lab:rgbToLab(40,80,220)},

  // 🔥 reforço de distinção
  {n:"Rosa",lab:rgbToLab(255,105,180)},
  {n:"Roxo",lab:rgbToLab(130,60,200)},
];

/* DETECÇÃO COM TOLERÂNCIA */
function detect(r,g,b){

  const lab=rgbToLab(r,g,b);

  let best=null;
  let bestD=999;

  for(let c of colors){
    let d=deltaE(lab,c.lab);

    // penaliza cores muito próximas (evita confusão rosa/roxo/vermelho)
    if(d<bestD){
      bestD=d;
      best=c.n;
    }
  }

  // filtro de confiança (IMPORTANTE)
  if(bestD>35) return "Indefinido";

  return best;
}

/* CAPTURA */
function capture(x,y){

  canvasA.width=video.videoWidth;
  canvasA.height=video.videoHeight;

  ctxA.drawImage(video,0,0);

  let s=10;
  let d=ctxA.getImageData(x-s,y-s,s*2,s*2).data;

  let r=0,g=0,b=0,c=0;

  for(let i=0;i<d.length;i+=4){
    r+=d[i];
    g+=d[i+1];
    b+=d[i+2];
    c++;
  }

  return detect(r/c,g/c,b/c);
}

/* MOVIMENTO ULTRA ESTÁVEL */
function moveLoop(){

  if(mode!=="move") return;

  let c=capture(video.videoWidth/2,video.videoHeight/2);

  // estabilidade de leitura (3 frames iguais)
  if(c===stableColor){
    stabilityCount++;
  } else {
    stableColor=c;
    stabilityCount=0;
  }

  if(stabilityCount>=3 && c!==lastSpokenColor){
    speak(c);
    lastSpokenColor=c;
  }

  document.getElementById("txt").innerText=
    "Movimento: "+c;

  requestAnimationFrame(moveLoop);
}

/* MODOS */
function setMode(m){
  mode=m;
  stabilityCount=0;

  document.getElementById("txt").innerText="Modo: "+m;

  if(m==="move") moveLoop();
}

/* VOZ */
function toggleVoice(){
  voice=!voice;
  alert("Áudio: "+(voice?"ON":"OFF"));
}

</script>

</body>
</html>
