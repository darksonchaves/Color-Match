<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#111111" />

<title>ColorMatch Pro – OEM MultiBrand Edition</title>

<style>

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  padding:0;
  font-family:Arial,sans-serif;
  background:#111;
  color:#fff;
  text-align:center;
}

h2{
  margin-top:15px;
  font-size:24px;
}

#controls{
  width:95%;
  margin:auto;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

button{
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#222;
  color:#fff;
  font-size:15px;
  transition:0.2s;
}

button:hover{
  background:#333;
}

button.active{
  background:#00695c;
}

input,select{
  padding:12px;
  border-radius:10px;
  border:none;
  margin:5px;
  width:90%;
  max-width:420px;
  background:#222;
  color:#fff;
}

#videoContainer{
  position:relative;
  width:92%;
  margin:auto;
  overflow:hidden;
  border-radius:14px;
}

video{
  width:100%;
  border-radius:14px;
  border:2px solid #333;
  background:#000;
  object-fit:cover;
}

#cross{
  position:absolute;
  top:50%;
  left:50%;
  width:34px;
  height:34px;
  transform:translate(-50%,-50%);
  border:2px solid #00ffcc;
  border-radius:50%;
  display:none;
  pointer-events:none;
  z-index:999;
  box-shadow:0 0 15px #00ffcc;
}

#panel{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  flex-wrap:wrap;
  margin-top:18px;
  gap:12px;
}

.box{
  width:44%;
  min-width:180px;
}

canvas{
  width:100%;
  border-radius:12px;
  background:#222;
  border:2px solid #333;
}

#databasePanel{
  margin-top:25px;
  padding:18px;
  background:#181818;
  border-top:2px solid #333;
}

#resultList{
  margin-top:12px;
  text-align:left;
  width:92%;
  max-width:760px;
  margin-left:auto;
  margin-right:auto;
  background:#1f1f1f;
  border-radius:12px;
  padding:10px;
}

.item{
  padding:12px;
  border-bottom:1px solid #333;
  cursor:pointer;
  border-radius:8px;
  transition:0.2s;
}

.item:hover{
  background:#2b2b2b;
}

.item.selected{
  background:#004d40;
}

.colorBox{
  width:18px;
  height:18px;
  display:inline-block;
  border-radius:50%;
  margin-right:8px;
  border:1px solid #fff;
  vertical-align:middle;
}

#txt{
  margin:18px auto;
  font-size:18px;
  padding:14px;
  width:92%;
  max-width:850px;
  background:#1b1b1b;
  border-radius:12px;
  border:1px solid #333;
  line-height:1.5;
}

.statusGood{
  color:#00ff99;
}

.statusMedium{
  color:#ffcc00;
}

.statusBad{
  color:#ff6666;
}

@media(max-width:700px){

  .box{
    width:92%;
  }

  h2{
    font-size:20px;
  }

}

</style>

</head>

<body>

<h2>ColorMatch Pro – OEM MultiBrand Edition</h2>

<div id="controls">

<button id="btnStatic" onclick="setMode('static')">
Estático
</button>

<button id="btnMove" onclick="setMode('move')">
Movimento
</button>

<button id="btnCompare" onclick="setMode('comparePoint')">
Comparar Pontos
</button>

<button id="btnDatabase" onclick="setMode('compareDatabase')">
Comparar OEM
</button>

<button onclick="analyzeOEM()">
🎨 OEM Scan
</button>

<button onclick="toggleFlash()">
⚡ Flash
</button>

<button onclick="toggleVoice()">
🔊 Áudio
</button>

</div>

<br>

<div id="videoContainer">

<video id="video" autoplay playsinline muted></video>

<div id="cross"></div>

</div>

<div id="panel">

<div class="box">
<canvas id="canvasA"></canvas>
<div>Referência</div>
</div>

<div class="box">
<canvas id="canvasB"></canvas>
<div>Comparação</div>
</div>

</div>

<div id="databasePanel">

<h3>Pesquisa OEM</h3>

<input
type="text"
id="brandSearch"
placeholder="Digite a montadora..."
oninput="searchBrand()"
>

<br>

<select id="modelSelect" onchange="showModelColors()">
<option value="">Selecione o modelo</option>
</select>

<div id="resultList"></div>

</div>

<p id="txt">Inicializando câmera...</p>

<script>

const video = document.getElementById("video");
const canvasA = document.getElementById("canvasA");
const canvasB = document.getElementById("canvasB");

const ctxA = canvasA.getContext("2d", {
  willReadFrequently:true
});

const ctxB = canvasB.getContext("2d", {
  willReadFrequently:true
});

const cross = document.getElementById("cross");
const txt = document.getElementById("txt");

let mode = "static";
let voice = true;
let compareStep = 0;
let compareALab = null;
let selectedDatabaseColor = null;
let streamTrack = null;
let flashOn = false;
let flashBusy = false;
let processingPaused = false;

/* ================= NOVO CONTROLE AUDIO MOVIMENTO ================= */

let lastSpokenColor = "";
let lastSpeakTime = 0;
let movementVoiceEnabled = true;

/* ================= DATABASE ================= */

const oemDatabase = [

{
brand:"Toyota",
model:"Corolla",
year:"2024",
code:"040",
name:"Super White II",
rgb:{r:244,g:244,b:241}
},

{
brand:"Toyota",
model:"Corolla",
year:"2024",
code:"1F7",
name:"Classic Silver Metallic",
rgb:{r:169,g:173,b:177}
},

{
brand:"Toyota",
model:"Corolla",
year:"2024",
code:"218",
name:"Midnight Black Metallic",
rgb:{r:27,g:27,b:27}
},

{
brand:"Toyota",
model:"Corolla",
year:"2024",
code:"3U5",
name:"Emotional Red",
rgb:{r:126,g:31,b:36}
}

];

/* ================= CAMERA ================= */

async function startCamera(){

  try{

    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      throw new Error("Camera API indisponível");
    }

    const stream = await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:{ ideal:"environment" },
        width:{ ideal:1920 },
        height:{ ideal:1080 }
      },
      audio:false
    });

    video.srcObject = stream;

    await video.play();

    streamTrack = stream.getVideoTracks()[0];

    txt.innerHTML = `
    <span class='statusGood'>
    Câmera iniciada com sucesso
    </span>`;

  }catch(e){

    console.error(e);

    txt.innerHTML = `
    <span class='statusBad'>
    Erro ao acessar câmera
    </span>`;

    alert("Permita acesso à câmera para continuar");
  }
}

startCamera();

/* ================= VOZ ================= */

function speak(text){

  if(!voice) return;

  if(!window.speechSynthesis) return;

  speechSynthesis.cancel();

  const msg = new SpeechSynthesisUtterance(text);

  msg.lang = "pt-BR";

  speechSynthesis.speak(msg);
}

/* ================= FLASH ================= */

async function toggleFlash(){

  if(flashBusy) return;

  if(!streamTrack){
    alert("Câmera não iniciada");
    return;
  }

  flashBusy = true;
  processingPaused = true;

  try{

    const capabilities = streamTrack.getCapabilities();

    if(!capabilities.torch){

      alert("Flash não suportado neste aparelho");

      processingPaused = false;
      flashBusy = false;

      return;
    }

    flashOn = !flashOn;

    await streamTrack.applyConstraints({
      advanced:[{ torch:flashOn }]
    });

    txt.innerHTML = flashOn
    ? "<span class='statusGood'>Flash ativado</span>"
    : "<span class='statusMedium'>Flash desativado</span>";

  }catch(e){

    console.error(e);

    flashOn = false;

    alert("Falha ao controlar o flash");
  }

  processingPaused = false;

  setTimeout(()=>{
    flashBusy = false;
  },500);
}

/* ================= RGB -> LAB ================= */

function rgbToLab(r,g,b){

  r/=255;
  g/=255;
  b/=255;

  [r,g,b] = [r,g,b].map(v =>
    v > 0.04045
    ? Math.pow((v+0.055)/1.055,2.4)
    : v/12.92
  );

  let x = r*0.4124 + g*0.3576 + b*0.1805;
  let y = r*0.2126 + g*0.7152 + b*0.0722;
  let z = r*0.0193 + g*0.1192 + b*0.9505;

  x/=0.95047;
  y/=1;
  z/=1.08883;

  [x,y,z] = [x,y,z].map(v =>
    v > 0.008856
    ? Math.cbrt(v)
    : (7.787*v)+(16/116)
  );

  return {
    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)
  };
}

/* ================= DELTA E ================= */

function deltaE(a,b){

  return Math.sqrt(
    (a.L-b.L)**2 +
    (a.a-b.a)**2 +
    (a.b-b.b)**2
  );
}

/* ================= PREPARA LAB ================= */

oemDatabase.forEach(item => {

  item.lab = rgbToLab(
    item.rgb.r,
    item.rgb.g,
    item.rgb.b
  );

});

/* ================= CAPTURA ================= */

function captureRaw(x,y){

  if(!video.videoWidth || processingPaused){
    return {r:0,g:0,b:0};
  }

  canvasA.width = video.videoWidth;
  canvasA.height = video.videoHeight;

  ctxA.drawImage(video,0,0);

  const s = 12;

  const data = ctxA.getImageData(
    x-s,
    y-s,
    s*2,
    s*2
  ).data;

  let r=0,g=0,b=0,c=0;

  for(let i=0;i<data.length;i+=4){

    r += data[i];
    g += data[i+1];
    b += data[i+2];

    c++;
  }

  r = Math.round(r/c);
  g = Math.round(g/c);
  b = Math.round(b/c);

  drawPreview(r,g,b);

  return { r,g,b };
}

/* ================= PREVIEW ================= */

function drawPreview(r,g,b){

  canvasA.width = 160;
  canvasA.height = 160;

  ctxA.fillStyle = `rgb(${r},${g},${b})`;
  ctxA.fillRect(0,0,160,160);

  ctxA.fillStyle = "#ffffff";
  ctxA.font = "16px Arial";

  ctxA.fillText(`R:${r}`,10,30);
  ctxA.fillText(`G:${g}`,10,55);
  ctxA.fillText(`B:${b}`,10,80);

  canvasB.width = 160;
  canvasB.height = 160;

  ctxB.fillStyle = `rgb(${r},${g},${b})`;
  ctxB.fillRect(0,0,160,160);
}

/* ================= OEM MATCH ================= */

function detectOEM(sig){

  const targetLab = rgbToLab(sig.r,sig.g,sig.b);

  let best = null;
  let bestDelta = 999;

  for(const color of oemDatabase){

    const d = deltaE(targetLab,color.lab);

    if(d < bestDelta){
      bestDelta = d;
      best = color;
    }
  }

  return {
    match:best,
    delta:bestDelta
  };
}

/* ================= ANALYZER ================= */

function analyzeOEM(){

  if(!video.videoWidth){
    alert("A câmera ainda não carregou");
    return;
  }

  const sig = captureRaw(
    video.videoWidth/2,
    video.videoHeight/2
  );

  const result = detectOEM(sig);

  if(!result.match){
    return;
  }

  const similarity = Math.max(
    0,
    100 - result.delta
  ).toFixed(1);

  txt.innerHTML = `
  <span class='statusGood'>
  ${result.match.brand}
  |
  ${result.match.model}
  |
  ${result.match.year}
  |
  ${result.match.code}
  |
  ${result.match.name}
  |
  ${similarity}%
  </span>`;

  speak(result.match.name);
}

/* ================= PESQUISA ================= */

function searchBrand(){

  const brand = document
  .getElementById("brandSearch")
  .value
  .trim()
  .toLowerCase();

  const models = [...new Set(

    oemDatabase
    .filter(item =>
      item.brand.toLowerCase().includes(brand)
    )
    .map(item => item.model)

  )].sort();

  const select = document.getElementById("modelSelect");

  select.innerHTML = `
  <option value="">
  Selecione o modelo
  </option>`;

  models.forEach(model => {

    select.innerHTML += `
    <option value="${model}">
      ${model}
    </option>`;

  });

  document.getElementById("resultList").innerHTML = "";
}

/* ================= MOSTRAR CORES ================= */

function showModelColors(){

  const model = document.getElementById("modelSelect").value;

  const resultList = document.getElementById("resultList");

  resultList.innerHTML = "";

  const colors = oemDatabase
  .filter(item => item.model === model)
  .sort((a,b)=> a.name.localeCompare(b.name));

  colors.forEach((item,index)=>{

    resultList.innerHTML += `

    <div
    class="item"
    id="color_${index}"
    onclick="selectDatabaseColor(${index}, '${item.name}')">

      <span
      class="colorBox"
      style="background:rgb(${item.rgb.r},${item.rgb.g},${item.rgb.b})">
      </span>

      <strong>${item.name}</strong>

      <br>

      Código: ${item.code}

      <br>

      Ano: ${item.year}

      <br>

      Modelo: ${item.model}

      <br>

      Montadora: ${item.brand}

    </div>`;
  });
}

/* ================= SELECIONA COR ================= */

function selectDatabaseColor(index,colorName){

  document.querySelectorAll('.item').forEach(el=>{
    el.classList.remove('selected');
  });

  const selected = document.getElementById(`color_${index}`);

  if(selected){
    selected.classList.add('selected');
  }

  const model = document.getElementById("modelSelect").value;

  const colors = oemDatabase
  .filter(item=>item.model===model)
  .sort((a,b)=>a.name.localeCompare(b.name));

  selectedDatabaseColor = colors[index];

  txt.innerHTML = `
  <span class='statusMedium'>
  Cor OEM selecionada:
  ${colorName}
  </span>`;

  speak(colorName);
}

/* ================= COMPARAR DATABASE ================= */

function compareWithDatabase(sig){

  if(!selectedDatabaseColor){

    alert("Selecione uma cor OEM primeiro");

    return;
  }

  const targetLab = rgbToLab(sig.r,sig.g,sig.b);

  const similarity = Math.max(
    0,
    100 - deltaE(targetLab,selectedDatabaseColor.lab)
  ).toFixed(1);

  let statusClass = "statusBad";

  if(similarity >= 90){
    statusClass = "statusGood";
  }
  else if(similarity >= 70){
    statusClass = "statusMedium";
  }

  txt.innerHTML = `
  <span class='${statusClass}'>
  BASE OEM:
  ${selectedDatabaseColor.name}
  <br>
  Similaridade:
  ${similarity}%
  </span>`;

  speak(`${similarity} porcento similar`);
}

/* ================= MOVIMENTO COM AUDIO ================= */

function moveLoop(){

  if(mode !== "move") return;

  if(processingPaused){
    requestAnimationFrame(moveLoop);
    return;
  }

  const sig = captureRaw(
    video.videoWidth/2,
    video.videoHeight/2
  );

  const result = detectOEM(sig);

  if(result.match){

    const similarity = Math.max(
      0,
      100 - result.delta
    ).toFixed(1);

    txt.innerHTML = `
    <span class='statusGood'>
    ${result.match.name}
    <br>
    Similaridade:
    ${similarity}%
    <br>
    RGB:
    ${sig.r}, ${sig.g}, ${sig.b}
    </span>`;

    /* ================= AUDIO CONTINUO ================= */

    const now = Date.now();

    if(
      movementVoiceEnabled &&
      similarity >= 75 &&
      (
        result.match.name !== lastSpokenColor ||
        now - lastSpeakTime > 2500
      )
    ){

      lastSpokenColor = result.match.name;
      lastSpeakTime = now;

      speak(result.match.name);
    }
  }

  requestAnimationFrame(moveLoop);
}

/* ================= MODOS ================= */

function clearButtons(){

  document.querySelectorAll("button").forEach(btn=>{
    btn.classList.remove("active");
  });
}

function setMode(m){

  mode = m;

  compareStep = 0;
  compareALab = null;

  clearButtons();

  if(m === "static"){
    document.getElementById("btnStatic").classList.add("active");
  }

  if(m === "move"){
    document.getElementById("btnMove").classList.add("active");
  }

  if(m === "comparePoint"){
    document.getElementById("btnCompare").classList.add("active");
  }

  if(m === "compareDatabase"){
    document.getElementById("btnDatabase").classList.add("active");
  }

  cross.style.display = (
    m === "move" ||
    m === "comparePoint" ||
    m === "compareDatabase"
  )
  ? "block"
  : "none";

  txt.innerHTML = `
  <span class='statusGood'>
  Modo ${m.toUpperCase()} ativado
  </span>`;

  if(m === "move"){

    lastSpokenColor = "";
    lastSpeakTime = 0;

    moveLoop();
  }
}

setMode("static");

/* ================= CLIQUE VIDEO ================= */

video.addEventListener("click",(e)=>{

  if(processingPaused) return;

  const rect = video.getBoundingClientRect();

  const x =
  (e.clientX - rect.left)
  *
  (video.videoWidth / rect.width);

  const y =
  (e.clientY - rect.top)
  *
  (video.videoHeight / rect.height);

  const sig = captureRaw(x,y);

  if(mode === "static"){
    analyzeOEM();
  }

  if(mode === "comparePoint"){

    if(compareStep === 0){

      compareALab = rgbToLab(sig.r,sig.g,sig.b);

      compareStep = 1;

      txt.innerHTML = `
      <span class='statusMedium'>
      Primeiro ponto capturado
      </span>`;

      speak("Primeiro ponto capturado");
    }

    else{

      const compareBLab = rgbToLab(sig.r,sig.g,sig.b);

      const similarity = Math.max(
        0,
        100 - deltaE(compareALab,compareBLab)
      ).toFixed(1);

      let statusClass = "statusBad";

      if(similarity >= 90){
        statusClass = "statusGood";
      }
      else if(similarity >= 70){
        statusClass = "statusMedium";
      }

      txt.innerHTML = `
      <span class='${statusClass}'>
      Similaridade:
      ${similarity}%
      </span>`;

      speak(`${similarity} porcento similar`);

      compareStep = 0;
    }
  }

  if(mode === "compareDatabase"){
    compareWithDatabase(sig);
  }

});

/* ================= AUDIO ================= */

function toggleVoice(){

  voice = !voice;

  txt.innerHTML = voice
  ? "<span class='statusGood'>Áudio ativado</span>"
  : "<span class='statusBad'>Áudio desativado</span>";
}

</script>

</body>
</html>
