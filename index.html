<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0b0b0b" />

<title>ColorMatch Pro – OEM MultiBrand Edition</title>

<style>

:root{
  --bg:#0f0f0f;
  --panel:#181818;
  --panel2:#202020;
  --line:#2d2d2d;
  --green:#00d49a;
  --green2:#00ffcc;
  --yellow:#ffcc00;
  --red:#ff5f5f;
  --white:#ffffff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  background:var(--bg);
  color:var(--white);
  font-family:Arial,sans-serif;
  text-align:center;
  overflow-x:hidden;
}

header{
  padding:20px 10px 10px;
}

h1{
  font-size:28px;
  letter-spacing:1px;
}

.sub{
  margin-top:8px;
  color:#aaa;
  font-size:14px;
}

#controls{
  width:95%;
  margin:auto;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
  margin-top:18px;
}

button{
  background:#1f1f1f;
  border:1px solid #333;
  color:#fff;
  padding:12px 16px;
  border-radius:12px;
  cursor:pointer;
  font-size:14px;
  transition:0.2s;
  min-width:130px;
}

button:hover{
  background:#2a2a2a;
}

button.active{
  background:linear-gradient(135deg,#00695c,#00b894);
  border-color:#00ffcc;
}

#videoContainer{
  position:relative;
  width:94%;
  max-width:980px;
  margin:18px auto;
  border-radius:18px;
  overflow:hidden;
  border:2px solid #333;
  background:#000;
  box-shadow:0 0 25px rgba(0,0,0,0.5);
}

video{
  width:100%;
  display:block;
  object-fit:cover;
}

#cross{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:42px;
  height:42px;
  border:3px solid var(--green2);
  border-radius:50%;
  display:none;
  pointer-events:none;
  box-shadow:
  0 0 10px var(--green2),
  0 0 25px var(--green2);
}

#hud{
  position:absolute;
  top:12px;
  left:12px;
  right:12px;
  display:flex;
  justify-content:space-between;
  gap:10px;
  z-index:20;
}

.hudBox{
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.08);
  padding:10px 14px;
  border-radius:12px;
  font-size:13px;
}

#panel{
  width:95%;
  max-width:1000px;
  margin:18px auto;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
}

.card h3{
  margin-bottom:12px;
}

canvas{
  width:100%;
  border-radius:12px;
  border:2px solid #333;
  background:#222;
}

.infoGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:12px;
}

.infoBox{
  background:#1d1d1d;
  border:1px solid #333;
  border-radius:12px;
  padding:12px;
}

.infoTitle{
  color:#999;
  font-size:13px;
}

.infoValue{
  margin-top:6px;
  font-size:18px;
  font-weight:bold;
}

#databasePanel{
  width:95%;
  max-width:1000px;
  margin:25px auto;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:20px;
  padding:20px;
}

#databasePanel h2{
  margin-bottom:15px;
}

input,select{
  width:92%;
  max-width:450px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#222;
  color:#fff;
  margin:8px;
  font-size:15px;
}

#resultList{
  margin-top:20px;
  display:grid;
  gap:10px;
}

.item{
  background:#1f1f1f;
  border:1px solid #333;
  border-radius:14px;
  padding:14px;
  text-align:left;
  cursor:pointer;
  transition:0.2s;
}

.item:hover{
  transform:scale(1.01);
  border-color:#555;
}

.item.selected{
  background:#003d34;
  border-color:#00ffcc;
}

.colorBox{
  width:20px;
  height:20px;
  border-radius:50%;
  display:inline-block;
  vertical-align:middle;
  margin-right:8px;
  border:1px solid #fff;
}

#txt{
  width:95%;
  max-width:1000px;
  margin:20px auto 40px;
  background:#161616;
  border:1px solid #333;
  border-radius:16px;
  padding:18px;
  font-size:18px;
  line-height:1.5;
}

.statusGood{
  color:#00ff99;
}

.statusMedium{
  color:#ffcc00;
}

.statusBad{
  color:#ff6666;
}

#liveBar{
  width:100%;
  height:8px;
  background:#222;
  border-radius:999px;
  overflow:hidden;
  margin-top:12px;
}

#liveFill{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,#00ff99,#00ffcc);
  transition:0.2s;
}

footer{
  padding:20px;
  color:#666;
  font-size:13px;
}

@media(max-width:780px){

  h1{
    font-size:22px;
  }

  #panel{
    grid-template-columns:1fr;
  }

  .infoGrid{
    grid-template-columns:1fr;
  }

  button{
    width:100%;
  }

}

</style>

</head>

<script>

const video = document.getElementById("video");
const canvasA = document.getElementById("canvasA");
const canvasB = document.getElementById("canvasB");

const ctxA = canvasA.getContext("2d",{willReadFrequently:true});
const ctxB = canvasB.getContext("2d",{willReadFrequently:true});

const txt = document.getElementById("txt");
const cross = document.getElementById("cross");

const rgbValue = document.getElementById("rgbValue");
const hexValue = document.getElementById("hexValue");
const colorName = document.getElementById("colorName");
const similarityValue = document.getElementById("similarityValue");
const precisionText = document.getElementById("precisionText");
const liveFill = document.getElementById("liveFill");
const modeText = document.getElementById("modeText");

let mode = "static";
let voice = true;

let compareStep = 0;
let compareALab = null;

let selectedDatabaseColor = null;

let streamTrack = null;
let flashOn = false;
let processingPaused = false;
let flashBusy = false;

let lastSpokenColor = "";
let lastSpeakTime = 0;

/* ================= OEM DATABASE ================= */

const oemDatabase = [

{
brand:"Toyota",
model:"Corolla",
year:"2024",
code:"040",
name:"Super White II",
rgb:{r:244,g:244,b:241}
},

{
brand:"Toyota",
model:"Corolla",
year:"2024",
code:"1F7",
name:"Classic Silver Metallic",
rgb:{r:169,g:173,b:177}
},

{
brand:"Toyota",
model:"Corolla",
year:"2024",
code:"218",
name:"Midnight Black Metallic",
rgb:{r:27,g:27,b:27}
},

{
brand:"Toyota",
model:"Corolla",
year:"2024",
code:"3U5",
name:"Emotional Red",
rgb:{r:126,g:31,b:36}
}

];

/* ================= UNIVERSAL ================= */

const universalColors = [

{
name:"Branco",
rgb:{r:255,g:255,b:255}
},

{
name:"Preto",
rgb:{r:0,g:0,b:0}
},

{
name:"Cinza",
rgb:{r:128,g:128,b:128}
},

{
name:"Prata",
rgb:{r:192,g:192,b:192}
},

{
name:"Vermelho",
rgb:{r:255,g:0,b:0}
},

{
name:"Azul",
rgb:{r:0,g:0,b:255}
},

{
name:"Verde",
rgb:{r:0,g:255,b:0}
},

{
name:"Amarelo",
rgb:{r:255,g:255,b:0}
},

{
name:"Laranja",
rgb:{r:255,g:165,b:0}
},

{
name:"Roxo",
rgb:{r:128,g:0,b:128}
},

{
name:"Marrom",
rgb:{r:101,g:67,b:33}
}

];

/* ================= CAMERA ================= */

async function startCamera(){

  try{

    const stream = await navigator.mediaDevices.getUserMedia({

      video:{
        facingMode:{ideal:"environment"},
        width:{ideal:1920},
        height:{ideal:1080}
      },

      audio:false

    });

    video.srcObject = stream;

    await video.play();

    streamTrack = stream.getVideoTracks()[0];

    txt.innerHTML = `
    <span class='statusGood'>
    Câmera iniciada com sucesso
    </span>`;

  }catch(e){

    console.error(e);

    txt.innerHTML = `
    <span class='statusBad'>
    Falha ao acessar câmera
    </span>`;

    alert("Permita acesso à câmera");

  }

}

startCamera();

/* ================= AUDIO ================= */

function speak(text){

  if(!voice) return;

  if(!window.speechSynthesis) return;

  speechSynthesis.cancel();

  const msg = new SpeechSynthesisUtterance(text);

  msg.lang = "pt-BR";

  speechSynthesis.speak(msg);

}

/* ================= FLASH ================= */

async function toggleFlash(){

  if(flashBusy) return;

  if(!streamTrack){
    alert("Câmera não iniciada");
    return;
  }

  flashBusy = true;
  processingPaused = true;

  try{

    const capabilities = streamTrack.getCapabilities();

    if(!capabilities.torch){

      alert("Flash não suportado");

      processingPaused = false;
      flashBusy = false;

      return;
    }

    flashOn = !flashOn;

    await streamTrack.applyConstraints({
      advanced:[{torch:flashOn}]
    });

    txt.innerHTML = flashOn
    ? "<span class='statusGood'>Flash ativado</span>"
    : "<span class='statusMedium'>Flash desativado</span>";

  }catch(e){

    console.error(e);

    alert("Falha ao controlar flash");
  }

  processingPaused = false;

  setTimeout(()=>{
    flashBusy = false;
  },500);

}

/* ================= RGB TO HEX ================= */

function rgbToHex(r,g,b){

  return "#" + [r,g,b]
  .map(v=>v.toString(16).padStart(2,"0"))
  .join("")
  .toUpperCase();

}

/* ================= RGB TO LAB ================= */

function rgbToLab(r,g,b){

  r/=255;
  g/=255;
  b/=255;

  [r,g,b] = [r,g,b].map(v =>
    v > 0.04045
    ? Math.pow((v+0.055)/1.055,2.4)
    : v/12.92
  );

  let x = r*0.4124 + g*0.3576 + b*0.1805;
  let y = r*0.2126 + g*0.7152 + b*0.0722;
  let z = r*0.0193 + g*0.1192 + b*0.9505;

  x/=0.95047;
  y/=1;
  z/=1.08883;

  [x,y,z] = [x,y,z].map(v =>
    v > 0.008856
    ? Math.cbrt(v)
    : (7.787*v)+(16/116)
  );

  return {
    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)
  };

}

/* ================= DELTA ================= */

function deltaE(a,b){

  return Math.sqrt(
    (a.L-b.L)**2 +
    (a.a-b.a)**2 +
    (a.b-b.b)**2
  );

}

/* ================= PREPARE LAB ================= */

oemDatabase.forEach(item=>{

  item.lab = rgbToLab(
    item.rgb.r,
    item.rgb.g,
    item.rgb.b
  );

});

universalColors.forEach(item=>{

  item.lab = rgbToLab(
    item.rgb.r,
    item.rgb.g,
    item.rgb.b
  );

});

/* ================= CAPTURE ================= */

function captureRaw(x,y){

  if(!video.videoWidth || processingPaused){
    return {r:0,g:0,b:0};
  }

  canvasA.width = video.videoWidth;
  canvasA.height = video.videoHeight;

  ctxA.drawImage(video,0,0);

  const s = 12;

  const data = ctxA.getImageData(
    x-s,
    y-s,
    s*2,
    s*2
  ).data;

  let r=0,g=0,b=0,c=0;

  for(let i=0;i<data.length;i+=4){

    r += data[i];
    g += data[i+1];
    b += data[i+2];

    c++;

  }

  r = Math.round(r/c);
  g = Math.round(g/c);
  b = Math.round(b/c);

  drawPreview(r,g,b);

  return {r,g,b};

}

/* ================= PREVIEW ================= */

function drawPreview(r,g,b){

  canvasA.width = 200;
  canvasA.height = 200;

  ctxA.fillStyle = `rgb(${r},${g},${b})`;
  ctxA.fillRect(0,0,200,200);

  canvasB.width = 200;
  canvasB.height = 200;

  ctxB.fillStyle = `rgb(${r},${g},${b})`;
  ctxB.fillRect(0,0,200,200);

  rgbValue.innerHTML = `${r}, ${g}, ${b}`;

  hexValue.innerHTML = rgbToHex(r,g,b);

}

/* ================= OEM DETECT ================= */

function detectOEM(sig){

  const targetLab = rgbToLab(sig.r,sig.g,sig.b);

  let best = null;
  let bestDelta = 999;

  for(const color of oemDatabase){

    const d = deltaE(targetLab,color.lab);

    if(d < bestDelta){

      bestDelta = d;
      best = color;

    }

  }

  return {
    match:best,
    delta:bestDelta
  };

}

/* ================= UNIVERSAL DETECT ================= */

function detectUniversal(sig){

  const targetLab = rgbToLab(sig.r,sig.g,sig.b);

  let best = null;
  let bestDelta = 999;

  for(const color of universalColors){

    const d = deltaE(targetLab,color.lab);

    if(d < bestDelta){

      bestDelta = d;
      best = color;

    }

  }

  return {
    match:best,
    delta:bestDelta
  };

}

/* ================= UI UPDATE ================= */

function updateUI(name,similarity){

  colorName.innerHTML = name;

  similarityValue.innerHTML = similarity + "%";

  precisionText.innerHTML = similarity + "%";

  liveFill.style.width = similarity + "%";

}

/* ================= OEM ANALYZE ================= */

function analyzeOEM(){

  const sig = captureRaw(
    video.videoWidth/2,
    video.videoHeight/2
  );

  const result = detectOEM(sig);

  const similarity = Math.max(
    0,
    100 - result.delta
  ).toFixed(1);

  updateUI(
    result.match.name,
    similarity
  );

  txt.innerHTML = `
  <span class='statusGood'>
  ${result.match.brand}
  |
  ${result.match.model}
  |
  ${result.match.name}
  |
  ${similarity}%
  </span>`;

  speak(result.match.name);

}

/* ================= UNIVERSAL ANALYZE ================= */

function analyzeUniversal(){

  const sig = captureRaw(
    video.videoWidth/2,
    video.videoHeight/2
  );

  const result = detectUniversal(sig);

  const similarity = Math.max(
    0,
    100 - result.delta
  ).toFixed(1);

  updateUI(
    result.match.name,
    similarity
  );

  txt.innerHTML = `
  <span class='statusGood'>
  Cor:
  ${result.match.name}
  <br>
  Similaridade:
  ${similarity}%
  </span>`;

  speak(result.match.name);

}

/* ================= OEM LIVE ================= */

function moveLoop(){

  if(mode !== "move") return;

  if(processingPaused){

    requestAnimationFrame(moveLoop);
    return;

  }

  const sig = captureRaw(
    video.videoWidth/2,
    video.videoHeight/2
  );

  const result = detectOEM(sig);

  const similarity = Math.max(
    0,
    100 - result.delta
  ).toFixed(1);

  updateUI(
    result.match.name,
    similarity
  );

  txt.innerHTML = `
  <span class='statusGood'>
  ${result.match.name}
  <br>
  Similaridade:
  ${similarity}%
  </span>`;

  const now = Date.now();

  if(
    similarity >= 75 &&
    (
      result.match.name !== lastSpokenColor ||
      now - lastSpeakTime > 2500
    )
  ){

    lastSpokenColor = result.match.name;
    lastSpeakTime = now;

    speak(result.match.name);

  }

  requestAnimationFrame(moveLoop);

}

/* ================= UNIVERSAL LIVE ================= */

function universalMoveLoop(){

  if(mode !== "universalMove") return;

  if(processingPaused){

    requestAnimationFrame(universalMoveLoop);
    return;

  }

  const sig = captureRaw(
    video.videoWidth/2,
    video.videoHeight/2
  );

  const result = detectUniversal(sig);

  const similarity = Math.max(
    0,
    100 - result.delta
  ).toFixed(1);

  updateUI(
    result.match.name,
    similarity
  );

  txt.innerHTML = `
  <span class='statusGood'>
  ${result.match.name}
  <br>
  Similaridade:
  ${similarity}%
  </span>`;

  requestAnimationFrame(universalMoveLoop);

}

/* ================= SEARCH ================= */

function searchBrand(){

  const brand = document
  .getElementById("brandSearch")
  .value
  .trim()
  .toLowerCase();

  const models = [...new Set(

    oemDatabase
    .filter(item =>
      item.brand.toLowerCase().includes(brand)
    )
    .map(item => item.model)

  )].sort();

  const select = document.getElementById("modelSelect");

  select.innerHTML = `
  <option value="">
  Selecione o modelo
  </option>`;

  models.forEach(model=>{

    select.innerHTML += `
    <option value="${model}">
    ${model}
    </option>`;

  });

  document.getElementById("resultList").innerHTML = "";

}

/* ================= SHOW COLORS ================= */

function showModelColors(){

  const model = document.getElementById("modelSelect").value;

  const resultList = document.getElementById("resultList");

  resultList.innerHTML = "";

  const colors = oemDatabase
  .filter(item => item.model === model);

  colors.forEach((item,index)=>{

    resultList.innerHTML += `

    <div
    class="item"
    id="color_${index}"
    onclick="selectDatabaseColor(${index},'${item.name}')">

      <span
      class="colorBox"
      style="background:rgb(${item.rgb.r},${item.rgb.g},${item.rgb.b})">
      </span>

      <strong>${item.name}</strong>

      <br>

      Código: ${item.code}

      <br>

      Ano: ${item.year}

    </div>
    `;

  });

}

/* ================= SELECT COLOR ================= */

function selectDatabaseColor(index,colorName){

  document.querySelectorAll(".item").forEach(el=>{
    el.classList.remove("selected");
  });

  const selected = document.getElementById(`color_${index}`);

  if(selected){
    selected.classList.add("selected");
  }

  const model = document.getElementById("modelSelect").value;

  const colors = oemDatabase
  .filter(item=>item.model===model);

  selectedDatabaseColor = colors[index];

  txt.innerHTML = `
  <span class='statusMedium'>
  Cor OEM selecionada:
  ${colorName}
  </span>`;

  speak(colorName);

}

/* ================= COMPARE OEM ================= */

function compareWithDatabase(sig){

  if(!selectedDatabaseColor){

    alert("Selecione uma cor OEM primeiro");
    return;

  }

  const targetLab = rgbToLab(sig.r,sig.g,sig.b);

  const similarity = Math.max(
    0,
    100 - deltaE(
      targetLab,
      selectedDatabaseColor.lab
    )
  ).toFixed(1);

  updateUI(
    selectedDatabaseColor.name,
    similarity
  );

  txt.innerHTML = `
  <span class='statusGood'>
  BASE OEM:
  ${selectedDatabaseColor.name}
  <br>
  Similaridade:
  ${similarity}%
  </span>`;

  speak(`${similarity} porcento similar`);

}

/* ================= MODES ================= */

function clearButtons(){

  document.querySelectorAll("button").forEach(btn=>{
    btn.classList.remove("active");
  });

}

function setMode(m){

  mode = m;

  compareStep = 0;
  compareALab = null;

  lastSpokenColor = "";
  lastSpeakTime = 0;

  clearButtons();

  if(m === "static"){
    btnStatic.classList.add("active");
    modeText.innerHTML = "OEM ESTÁTICO";
  }

  if(m === "move"){
    btnMove.classList.add("active");
    modeText.innerHTML = "OEM LIVE";
  }

  if(m === "universal"){
    btnUniversal.classList.add("active");
    modeText.innerHTML = "UNIVERSAL";
  }

  if(m === "universalMove"){
    btnUniversalMove.classList.add("active");
    modeText.innerHTML = "UNIVERSAL LIVE";
  }

  if(m === "comparePoint"){
    btnCompare.classList.add("active");
    modeText.innerHTML = "COMPARAR PONTOS";
  }

  if(m === "compareDatabase"){
    btnDatabase.classList.add("active");
    modeText.innerHTML = "COMPARAR OEM";
  }

  cross.style.display = (
    m === "move" ||
    m === "universalMove" ||
    m === "comparePoint" ||
    m === "compareDatabase"
  )
  ? "block"
  : "none";

  txt.innerHTML = `
  <span class='statusGood'>
  Modo ${m.toUpperCase()} ativado
  </span>`;

  if(m === "move"){
    moveLoop();
  }

  if(m === "universalMove"){
    universalMoveLoop();
  }

}

setMode("static");

/* ================= VIDEO CLICK ================= */

video.addEventListener("click",(e)=>{

  if(processingPaused) return;

  const rect = video.getBoundingClientRect();

  const x =
  (e.clientX - rect.left)
  *
  (video.videoWidth / rect.width);

  const y =
  (e.clientY - rect.top)
  *
  (video.videoHeight / rect.height);

  const sig = captureRaw(x,y);

  if(mode === "static"){
    analyzeOEM();
  }

  if(mode === "universal"){
    analyzeUniversal();
  }

  if(mode === "comparePoint"){

    if(compareStep === 0){

      compareALab = rgbToLab(
        sig.r,
        sig.g,
        sig.b
      );

      compareStep = 1;

      txt.innerHTML = `
      <span class='statusMedium'>
      Primeiro ponto capturado
      </span>`;

      speak("Primeiro ponto capturado");

    }else{

      const compareBLab = rgbToLab(
        sig.r,
        sig.g,
        sig.b
      );

      const similarity = Math.max(
        0,
        100 - deltaE(compareALab,compareBLab)
      ).toFixed(1);

      updateUI(
        "Comparação",
        similarity
      );

      txt.innerHTML = `
      <span class='statusGood'>
      Similaridade:
      ${similarity}%
      </span>`;

      speak(`${similarity} porcento similar`);

      compareStep = 0;

    }

  }

  if(mode === "compareDatabase"){
    compareWithDatabase(sig);
  }

});

/* ================= AUDIO ================= */

function toggleVoice(){

  voice = !voice;

  txt.innerHTML = voice
  ? "<span class='statusGood'>Áudio ativado</span>"
  : "<span class='statusBad'>Áudio desativado</span>";

}
