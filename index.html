<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ColorMatch Pro - v19.4 Final Stability</title>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: #fff; overflow: hidden; text-align: center; }
        #header { 
            position: absolute; top: 0; width: 100%; z-index: 20;
            background: rgba(0, 0, 0, 0.9); display: flex; justify-content: center; padding: 10px 0; gap: 5px;
            border-bottom: 1px solid #333;
        }
        button { 
            background: #222; color: #fff; border: 1px solid #444;
            padding: 8px 12px; border-radius: 5px; font-size: 10px; font-weight: bold;
        }
        .active { background: #007bff !important; border-color: #007bff; }
        #video-container { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border: 2px solid #fff; border-radius: 50%; width: 50px; height: 50px; pointer-events: none; z-index: 10;
        }
        .locked { border-color: #00ffcc !important; box-shadow: 0 0 15px #00ffcc; }
        #ui-overlay { position: absolute; bottom: 50px; width: 100%; z-index: 20; }
        #color-name { font-size: 50px; font-weight: bold; color: #fff; text-shadow: 2px 2px 10px #000; }
    </style>
</head>
<body>

<div id="header">
    <button onclick="toggleSystem()" id="btnPower">SISTEMA: OFF</button>
    <button onclick="calibrate()" id="btnCalib">CALIBRAR</button>
    <button onclick="toggleUniv()" id="btnUniv">UNIVERSAL: OFF</button>
</div>

<div id="video-container">
    <video id="v" autoplay playsinline muted></video>
    <div id="crosshair"></div>
</div>

<div id="ui-overlay">
    <div id="color-name">STANDBY</div>
</div>

<canvas id="c" style="display:none;"></canvas>

<script>
    const v = document.getElementById('v'), c = document.getElementById('c'), ctx = c.getContext('2d');
    const colorTxt = document.getElementById('color-name'), cross = document.getElementById('crosshair');

    let active = false, isUniv = false, lastSpeach = "", history = [];
    let iris = { r: 1, g: 1, b: 1 };

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => v.srcObject = s);

    function toggleSystem() {
        active = !active;
        document.getElementById('btnPower').classList.toggle('active', active);
        document.getElementById('btnPower').innerText = `SISTEMA: ${active ? 'ON' : 'OFF'}`;
    }

    function toggleUniv() {
        isUniv = !isUniv;
        document.getElementById('btnUniv').classList.toggle('active', isUniv);
        document.getElementById('btnUniv').innerText = `UNIVERSAL: ${isUniv ? 'ON' : 'OFF'}`;
    }

    function calibrate() {
        if(!active) return;
        c.width = v.videoWidth; c.height = v.videoHeight;
        ctx.drawImage(v, 0, 0);
        const p = ctx.getImageData(v.videoWidth/2, v.videoHeight/2, 1, 1).data;
        iris.r = 255 / p[0]; iris.g = 255 / p[1]; iris.b = 255 / d[2];
        speak("Calibrado");
    }

    function rgbToHsl(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        const max = Math.max(r, g, b), min = Math.min(r, g, b);
        let h, s, l = (max + min) / 2;
        if (max === min) h = s = 0;
        else {
            const d = max - min;
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            switch (max) {
                case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                case g: h = (b - r) / d + 2; break;
                case b: h = (r - g) / d + 4; break;
            }
            h /= 6;
        }
        return [h * 360, s * 100, l * 100];
    }

    function getName(r, g, b) {
        const [h, s, l] = rgbToHsl(r * iris.r, g * iris.g, b * iris.b);
        
        if (l < 18) return "Preto";
        if (l > 85 && s < 15) return "Branco";
        if (s < 15) return "Cinza";

        if (h < 15 || h > 345) return l < 40 ? "Vermelho Escuro" : "Vermelho";
        if (h >= 15 && h < 45) return l < 40 ? "Marrom" : "Laranja";
        if (h >= 45 && h < 68) return "Amarelo"; // Faixa de Amarelo PROTEGIDA
        if (h >= 68 && h < 165) return l < 40 ? "Verde Escuro" : "Verde";
        if (h >= 165 && h < 260) return "Azul";
        if (h >= 260 && h < 300) return "Roxo";
        if (h >= 300 && h < 345) return "Rosa";

        return "Indefinido";
    }

    function loop() {
        if (active && v.videoWidth > 0) {
            c.width = v.videoWidth; c.height = v.videoHeight;
            ctx.drawImage(v, 0, 0);
            const p = ctx.getImageData(v.videoWidth/2, v.videoHeight/2, 1, 1).data;
            const name = getName(p[0], p[1], p[2]);

            history.push(name);
            if(history.length > 25) history.shift();
            
            const counts = {};
            history.forEach(x => counts[x] = (counts[x] || 0) + 1);
            const winner = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);

            if (counts[winner] > 20) {
                colorTxt.innerText = winner;
                cross.classList.add('locked');
                if (winner !== lastSpeach) { speak(winner); lastSpeach = winner; }
            } else {
                colorTxt.innerText = "ANALISANDO...";
                cross.classList.remove('locked');
            }
        }
        requestAnimationFrame(loop);
    }

    function speak(t) {
        const u = new SpeechSynthesisUtterance(t);
        u.lang = 'pt-BR'; u.rate = 1.5;
        window.speechSynthesis.speak(u);
    }

    loop();
</script>
</body>
</html>
