<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
ColorMatch Pro – OEM MultiBrand Edition
</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
  text-align:center;
}

h2{
  margin-top:15px;
}

video{
  width:92%;
  border-radius:12px;
  border:2px solid #333;
  object-fit:cover;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#222;
  color:#fff;
}

button:hover{
  background:#333;
}

.activeMode{
  background:#00695c !important;
}

input,select{
  padding:10px;
  border-radius:8px;
  border:none;
  margin:5px;
  width:90%;
  max-width:420px;
}

#panel{
  display:flex;
  justify-content:space-around;
  flex-wrap:wrap;
  margin-top:15px;
}

.box{
  width:45%;

}

canvas{
  width:100%;
  border-radius:10px;
  background:#222;
}

#cross{
  position:fixed;
  top:50%;
  left:50%;
  width:26px;
  height:26px;
  transform:translate(-50%,-50%);
  border:2px solid #00ffcc;
  border-radius:50%;
  display:none;
  pointer-events:none;
  z-index:999;
}

#databasePanel{
  margin-top:20px;
  padding:15px;
  background:#181818;
  border-top:2px solid #333;
}

#resultList{
  margin-top:10px;
  text-align:left;
  width:90%;
  max-width:700px;
  margin-left:auto;
  margin-right:auto;
  background:#1f1f1f;
  border-radius:10px;
  padding:10px;
}

.item{
  padding:10px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

.item:hover{
  background:#2c2c2c;
}

.colorBox{
  width:18px;
  height:18px;
  display:inline-block;
  border-radius:50%;
  margin-right:8px;
  border:1px solid #fff;
  vertical-align:middle;
}

#txt{
  margin-top:15px;
  font-size:18px;
  padding:10px;
}

#universalPanel{
  margin-top:15px;
  padding:10px;
  background:#181818;
  border-top:2px solid #333;
}

</style>

</head>

<body>

<h2>
ColorMatch Pro – OEM MultiBrand Edition
</h2>

<button onclick="setMode('static')">
Estático
</button>

<button onclick="setMode('move')">
Movimento
</button>

<button onclick="setMode('comparePoint')">
Comparar Ponto a Ponto
</button>

<button onclick="setMode('compareDatabase')">
Comparar Base de Dados
</button>

<button onclick="analyzeOEM()">
🎨 OEM Scan
</button>

<button onclick="toggleFlash()">
⚡ Flash
</button>

<button onclick="toggleVoice()">
🔊 Áudio
</button>

<br><br>

<div id="universalPanel">

<h3>
Modo Universal
</h3>

<button id="universalBtn" onclick="toggleUniversalMode()">
Universal OFF
</button>

<p style="font-size:14px;color:#aaa;">
Reconhecimento puro baseado na leitura real da câmera
</p>

</div>

<video id="video" autoplay playsinline muted></video>

<div id="cross"></div>

<div id="panel">

<div class="box">
<canvas id="canvasA"></canvas>
<div>Referência</div>
</div>

<div class="box">
<canvas id="canvasB"></canvas>
<div>Comparação</div>
</div>

</div>

<div id="databasePanel">

<h3>
Pesquisa OEM
</h3>

<input
type="text"
id="brandSearch"
placeholder="Digite a montadora..."
oninput="searchBrand()"
>

<br>

<select id="modelSelect" onchange="showModelColors()">

<option value="">
Selecione o modelo
</option>

</select>

<div id="resultList"></div>

</div>

<p id="txt">
Inicializando...
</p>

<script>

/* ================= ELEMENTOS ================= */

const video =
document.getElementById("video");

const canvasA =
document.getElementById("canvasA");

const canvasB =
document.getElementById("canvasB");

const ctxA =
canvasA.getContext(
"2d",
{willReadFrequently:true}
);

const ctxB =
canvasB.getContext(
"2d",
{willReadFrequently:true}
);

const cross =
document.getElementById("cross");

const txt =
document.getElementById("txt");

/* ================= CONTROLE ================= */

let mode = "static";

let voice = true;

let universalMode = false;

let moveRunning = false;

let compareA = null;

let compareALab = null;

let compareStep = 0;

let selectedDatabaseColor = null;

/* ================= AUDIO ESTÁVEL ================= */

/*
CORREÇÃO OFICIAL:
- elimina repetição infinita
- elimina sobreposição
- elimina áudio misturado
- elimina travamentos Android TTS
- impede spam contínuo
*/

let speechQueue = [];

let speechRunning = false;

let lastSpokenText = "";

let lastSpeechTime = 0;

const speechCooldown = 1800;

/* ===== estabilidade ===== */

let stableColor = "";

let stableFrames = 0;

const MIN_STABLE_FRAMES = 10;

/* ================= FLASH ================= */

let streamTrack = null;

let flashOn = false;

let flashBusy = false;

let processingPaused = false;

/* ================= CAMERA ================= */

navigator.mediaDevices.getUserMedia({

  video:{
    facingMode:{
      ideal:"environment"
    }
  },

  audio:false

})

.then(stream=>{

  video.srcObject = stream;

  streamTrack =
  stream.getVideoTracks()[0];

})

.catch(()=>{

  alert("Erro ao acessar câmera");

});

/* ================= PROCESSADOR DE VOZ ================= */

function processSpeechQueue(){

  if(!voice) return;

  if(speechRunning) return;

  if(speechQueue.length === 0) return;

  speechRunning = true;

  const text =
  speechQueue.shift();

  const msg =
  new SpeechSynthesisUtterance(text);

  msg.lang = "pt-BR";

  msg.rate = 1.10;

  msg.pitch = 1;

  msg.volume = 1;

  msg.onend = ()=>{

    speechRunning = false;

    setTimeout(()=>{

      processSpeechQueue();

    },250);
  };

  msg.onerror = ()=>{

    speechRunning = false;

    setTimeout(()=>{

      processSpeechQueue();

    },300);
  };

  speechSynthesis.speak(msg);
}

/* ================= FALA ================= */

function speak(text){

  if(!voice) return;

  if(!text) return;

  const now = Date.now();

/* ===== evita repetição ===== */

  if(
    text === lastSpokenText &&
    now - lastSpeechTime < speechCooldown
  ){
    return;
  }

  lastSpokenText = text;

  lastSpeechTime = now;

/* ===== impede fila infinita ===== */

  if(speechQueue.length > 1){

    speechQueue = [
      speechQueue[speechQueue.length - 1]
    ];
  }

  speechQueue.push(text);

  processSpeechQueue();
}

/* ================= TOGGLE AUDIO ================= */

function toggleVoice(){

  voice = !voice;

  speechSynthesis.cancel();

  speechQueue = [];

  speechRunning = false;

  lastSpokenText = "";

  stableColor = "";

  stableFrames = 0;

  alert(
    "Áudio: " +
    (voice ? "ON" : "OFF")
  );
}

/* ================= UNIVERSAL ================= */

function toggleUniversalMode(){

  universalMode = !universalMode;

  const btn =
  document.getElementById("universalBtn");

  if(universalMode){

    btn.innerText =
    "Universal ON";

    btn.classList.add("activeMode");

    txt.innerText =
    "Modo universal ativado";

    speak(
      "Modo universal ativado"
    );

  }else{

    btn.innerText =
    "Universal OFF";

    btn.classList.remove("activeMode");

    txt.innerText =
    "Modo universal desativado";

    speak(
      "Modo universal desativado"
    );
  }
}

/* ================= FLASH ================= */

async function toggleFlash(){

  if(flashBusy) return;

  if(!streamTrack){

    alert("Câmera não iniciada");
    return;
  }

  flashBusy = true;

  processingPaused = true;

  try{

    const capabilities =
    streamTrack.getCapabilities();

    if(!capabilities.torch){

      alert("Flash não suportado");

      processingPaused = false;

      flashBusy = false;

      return;
    }

    flashOn = !flashOn;

    await streamTrack.applyConstraints({

      advanced:[
        {
          torch:flashOn
        }
      ]

    });

    await new Promise(resolve=>
      setTimeout(resolve,300)
    );

  }catch(e){

    flashOn = false;

    alert("Falha no flash");
  }

  processingPaused = false;

  setTimeout(()=>{

    flashBusy = false;

  },250);
}

/* ================= RGB -> HSL ================= */

function rgbToHsl(r,g,b){

  r /= 255;
  g /= 255;
  b /= 255;

  const max =
  Math.max(r,g,b);

  const min =
  Math.min(r,g,b);

  let h,s,l;

  l = (max + min) / 2;

  if(max === min){

    h = 0;
    s = 0;

  }else{

    const d = max - min;

    s =
    l > 0.5
    ? d / (2 - max - min)
    : d / (max + min);

    switch(max){

      case r:
      h =
      (g - b) / d +
      (g < b ? 6 : 0);
      break;

      case g:
      h =
      (b - r) / d + 2;
      break;

      case b:
      h =
      (r - g) / d + 4;
      break;
    }

    h /= 6;
  }

  return{

    h:h * 360,
    s:s * 100,
    l:l * 100
  };
}

/* ================= RGB -> LAB ================= */

function rgbToLab(r,g,b){

  r/=255;
  g/=255;
  b/=255;

  [r,g,b]=[r,g,b].map(v=>

    v>0.04045
    ? Math.pow((v+0.055)/1.055,2.4)
    : v/12.92

  );

  let x =
  r*0.4124 +
  g*0.3576 +
  b*0.1805;

  let y =
  r*0.2126 +
  g*0.7152 +
  b*0.0722;

  let z =
  r*0.0193 +
  g*0.1192 +
  b*0.9505;

  x/=0.95047;
  y/=1;
  z/=1.08883;

  [x,y,z]=[x,y,z].map(v=>

    v>0.008856
    ? Math.cbrt(v)
    : (7.787*v)+(16/116)

  );

  return{

    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)

  };
}

/* ================= DELTA E ================= */

function deltaE(a,b){

  return Math.sqrt(

    (a.L-b.L)**2 +
    (a.a-b.a)**2 +
    (a.b-b.b)**2

  );
}

/* ================= DATABASE ================= */

const oemDatabase = [

{
  brand:"Toyota",
  model:"Corolla",
  year:"2024",
  code:"040",
  name:"Super White II",
  rgb:{r:244,g:244,b:241}
},

{
  brand:"Toyota",
  model:"Corolla",
  year:"2024",
  code:"1F7",
  name:"Classic Silver Metallic",
  rgb:{r:169,g:173,b:177}
},

{
  brand:"Toyota",
  model:"Corolla",
  year:"2024",
  code:"218",
  name:"Midnight Black Metallic",
  rgb:{r:27,g:27,b:27}
},

{
  brand:"Toyota",
  model:"Corolla",
  year:"2024",
  code:"3U5",
  name:"Emotional Red",
  rgb:{r:126,g:31,b:36}
}

];

/* ================= PREPARA LAB ================= */

oemDatabase.forEach(item=>{

  item.lab = rgbToLab(
    item.rgb.r,
    item.rgb.g,
    item.rgb.b
  );

});

/* ================= CAPTURA ================= */

function captureRaw(x,y){

  if(
    !video.videoWidth ||
    processingPaused
  ){
    return {r:0,g:0,b:0};
  }

  canvasA.width =
  video.videoWidth;

  canvasA.height =
  video.videoHeight;

  ctxA.drawImage(video,0,0);

  const s = 12;

  const data = ctxA.getImageData(

    x-s,
    y-s,
    s*2,
    s*2

  ).data;

  let r=0,g=0,b=0,c=0;

  for(let i=0;i<data.length;i+=4){

    r += data[i];
    g += data[i+1];
    b += data[i+2];

    c++;
  }

  return{

    r:Math.round(r/c),
    g:Math.round(g/c),
    b:Math.round(b/c)

  };
}

/* ================= DETECTOR UNIVERSAL ================= */

function detectUniversalColor(r,g,b){

  const hsl =
  rgbToHsl(r,g,b);

  const h = hsl.h;

  const s = hsl.s;

  const l = hsl.l;

  if(
    s <= 12 &&
    l >= 84
  ){
    return "Branco";
  }

  if(
    s <= 15 &&
    l <= 16
  ){
    return "Preto";
  }

  if(
    s <= 15
  ){
    return "Cinza";
  }

  if(
    (h >= 0 && h <= 12) ||
    (h >= 345 && h <= 360)
  ){
    return "Vermelho";
  }

  if(
    h >= 312 &&
    h <= 344
  ){
    return "Rosa";
  }

  if(
    h >= 13 &&
    h <= 38
  ){
    return "Laranja";
  }

  if(
    h >= 39 &&
    h <= 68
  ){
    return "Amarelo";
  }

  if(
    h >= 69 &&
    h <= 165
  ){
    return "Verde";
  }

  if(
    h >= 166 &&
    h <= 260
  ){
    return "Azul";
  }

  if(
    h >= 261 &&
    h <= 311
  ){
    return "Roxo";
  }

  return "";
}

/* ================= OEM MATCH ================= */

function detectOEM(sig){

  const targetLab =
  rgbToLab(sig.r,sig.g,sig.b);

  let best = null;

  let bestDelta = 999;

  for(const color of oemDatabase){

    const d =
    deltaE(targetLab,color.lab);

    if(d < bestDelta){

      bestDelta = d;

      best = color;
    }
  }

  return{
    match:best,
    delta:bestDelta
  };
}

/* ================= ANALYZER ================= */

function analyzeOEM(){

  const sig = captureRaw(
    video.videoWidth/2,
    video.videoHeight/2
  );

  const result =
  detectOEM(sig);

  const similarity =
  Math.max(
    0,
    100 - result.delta
  ).toFixed(1);

  const text =

  result.match.brand
  + " | "
  + result.match.model
  + " | "
  + result.match.year
  + " | "
  + result.match.code
  + " | "
  + result.match.name
  + " | "
  + similarity
  + "%";

  txt.innerText = text;

  speak(result.match.name);
}

/* ================= MOVIMENTO ================= */

function moveLoop(){

  if(mode !== "move"){

    moveRunning = false;
    return;
  }

  if(processingPaused){

    requestAnimationFrame(moveLoop);
    return;
  }

  const sig = captureRaw(

    video.videoWidth/2,
    video.videoHeight/2

  );

  if(universalMode){

    const colorName =
    detectUniversalColor(
      sig.r,
      sig.g,
      sig.b
    );

    txt.innerText =
    colorName === ""
    ? "Movimento: analisando..."
    : "Movimento: " + colorName;

/* ===== estabilidade real ===== */

    if(colorName !== ""){

      if(colorName === stableColor){

        stableFrames++;

      }else{

        stableColor = colorName;

        stableFrames = 0;
      }

      if(
        stableFrames >=
        MIN_STABLE_FRAMES
      ){

        speak(colorName);

        stableFrames = 0;
      }
    }

  }else{

    txt.innerText =
    `RGB: ${sig.r}, ${sig.g}, ${sig.b}`;
  }

  requestAnimationFrame(moveLoop);
}

/* ================= MODOS ================= */

function setMode(m){

  mode = m;

  compareStep = 0;

  compareA = null;

  compareALab = null;

  speechQueue = [];

  speechRunning = false;

  stableColor = "";

  stableFrames = 0;

  speechSynthesis.cancel();

  cross.style.display =

  (
    m === "move" ||
    m === "comparePoint" ||
    m === "compareDatabase"
  )

  ? "block"
  : "none";

  if(m === "comparePoint"){

    txt.innerText =
    "Modo: COMPARAR PONTO A PONTO";
  }

  else if(m === "compareDatabase"){

    txt.innerText =
    "Modo: COMPARAR COM BASE DE DADOS";
  }

  else{

    txt.innerText =
    "Modo: " + m.toUpperCase();
  }

  if(
    m === "move" &&
    !moveRunning
  ){

    moveRunning = true;

    moveLoop();
  }
}

</script>

</body>
</html>
