<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro - Pureza v7</title>
<style>
  body{ margin:0; font-family: 'Segoe UI', sans-serif; background:#000; color:#fff; text-align:center; overflow:hidden; }
  #header{ padding: 12px; background: #0a0a0a; display: flex; justify-content: center; gap: 10px; border-bottom: 2px solid #1a1a1a; }
  #video-container { position: relative; width: 100%; height: 65vh; background: #000; }
  video{ width: 100%; height: 100%; object-fit: contain; }
  button{ padding:12px 18px; border-radius:10px; border:none; background:#1a1a1a; color:#888; font-weight:bold; cursor:pointer; transition: 0.4s; border: 1px solid #333; }
  .active{ background:#00ffcc !important; color:#000 !important; box-shadow: 0 0 20px rgba(0,255,204,0.3); border: 1px solid #00ffcc; }
  #cross{ 
    position:absolute; top:50%; left:50%; width:30px; height:30px; 
    transform:translate(-50%,-50%); border:2px dashed #00ffcc; 
    border-radius:50%; pointer-events:none; z-index: 10;
  }
  #display{ font-size: 46px; font-weight: 900; color: #00ffcc; margin: 20px 0; text-transform: uppercase; }
  .info { color: #555; font-size: 10px; letter-spacing: 2px; font-weight: bold; }
</style>
</head>
<body>

<div id="header">
  <button onclick="toggleUniv()" id="btnU">PIGMENTO PURO</button>
  <button onclick="calibrate()">CALIBRAR BASE</button>
  <button onclick="toggleVoice()" id="btnV" class="active">ÁUDIO</button>
</div>

<div id="video-container">
  <video id="v" autoplay playsinline muted></video>
  <div id="cross"></div>
</div>

<div id="display">AGUARDANDO...</div>
<div id="stats" class="info">ENGINE V7: FILTRO DE PIGMENTO ATIVO</div>

<canvas id="c" style="display:none;"></canvas>

<script>
const video = document.getElementById('v');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', {willReadFrequently: true});
const display = document.getElementById('display');
const stats = document.getElementById('stats');

let isUniv = false, isVoice = true, lastColor = "", stableCount = 0;
let offset = {r:255, g:255, b:255}, colorHistory = []; 

navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment", width: {ideal: 1920}, frameRate: {ideal: 60} }
}).then(s => { video.srcObject = s; });

function speak(t) {
    if(!isVoice || !isUniv) return;
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(t);
    msg.lang = 'pt-BR';
    msg.rate = 1.4;
    window.speechSynthesis.speak(msg);
}

function calibrate() {
    const data = getCenterColor();
    offset = {r: data.r, g: data.g, b: data.b};
    speak("Pigmento calibrado");
}

function getCenterColor() {
    if (canvas.width !== video.videoWidth) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
    }
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const x = canvas.width / 2, y = canvas.height / 2;
    const d = ctx.getImageData(x - 5, y - 5, 10, 10).data;
    let r=0, g=0, b=0, count=0;
    for(let i=0; i<d.length; i+=4){
        if ((d[i]+d[i+1]+d[i+2])/3 < 252) { // Ignora puros reflexos
            r += d[i]; g += d[i+1]; b += d[i+2]; count++;
        }
    }
    return count > 0 ? { r: r/count, g: g/count, b: b/count } : { r: 128, g: 128, b: 128 };
}

function solveColor(r, g, b) {
    // 1. Normalização de Balanço (Modo Espectrofotômetro)
    let nr = (r / (offset.r || 255)) * 255;
    let ng = (g / (offset.g || 255)) * 255;
    let nb = (b / (offset.b || 255)) * 255;
    
    const lum = (0.299 * nr + 0.587 * ng + 0.114 * nb) / 255;
    const max = Math.max(nr, ng, nb);
    const min = Math.min(nr, ng, nb);
    const chroma = max - min;

    let h = 0;
    if (chroma !== 0) {
        if (max === nr) h = ((ng - nb) / chroma) % 6;
        else if (max === ng) h = (nb - nr) / chroma + 2;
        else h = (nr - ng) / chroma + 4;
        h = Math.round(h * 60); if (h < 0) h += 360;
    }

    // --- LÓGICA DE FILTRAGEM DE PIGMENTO V7 ---

    // Correção Preto/Cinza/Azul (O sensor tende a "azular" o preto)
    if (lum < 0.18) {
        // Se a diferença entre Azul e Vermelho for pequena no escuro, é Preto.
        if (nb - nr < 15) return "Preto";
        if (lum < 0.12) return "Preto";
    }
    
    // Filtro de Neutros (Cinza/Branco)
    if (chroma < 20) {
        if (lum > 0.85) return "Branco";
        if (lum < 0.25) return "Preto";
        return "Cinza";
    }

    // Refino Rosa vs Roxo (Foco no canal Vermelho)
    if (h >= 260 && h <= 320) {
        // Se o Vermelho for muito presente (>70% do Azul), o pigmento pende para o Rosa
        if (nr > nb * 0.7) return "Rosa";
        return "Roxo";
    }

    // Rosa em Matiz de Vermelho
    if (h < 20 || h > 320) {
        if (lum > 0.45 && ng > nb) return "Rosa";
        return (lum < 0.35) ? "Vermelho Escuro" : "Vermelho";
    }

    if (h >= 20 && h < 45) return (lum < 0.35) ? "Marrom" : "Laranja";
    if (h >= 45 && h < 65) return "Amarelo";
    if (h >= 65 && h < 155) return "Verde";
    if (h >= 155 && h < 260) return "Azul";

    return "Analisando...";
}

function getStableColor(newColor) {
    colorHistory.push(newColor);
    if (colorHistory.length > 10) colorHistory.shift();
    return colorHistory.sort((a,b) =>
          colorHistory.filter(v => v===a).length - colorHistory.filter(v => v===b).length
    ).pop();
}

function mainLoop() {
    if(video.videoWidth > 0) {
        const rgb = getCenterColor();
        const colorName = getStableColor(solveColor(rgb.r, rgb.g, rgb.b));
        if(isUniv) {
            display.innerText = colorName;
            if(colorName === lastColor && colorName !== "Analisando...") {
                stableCount++;
                if(stableCount === 12) speak(colorName);
            } else { lastColor = colorName; stableCount = 0; }
        } else {
            display.innerText = "PRONTO";
            stats.innerText = `R:${Math.round(rgb.r)} G:${Math.round(rgb.g)} B:${Math.round(rgb.b)}`;
        }
    }
    requestAnimationFrame(mainLoop);
}

function toggleUniv() { 
    isUniv = !isUniv; 
    document.getElementById('btnU').classList.toggle('active');
    if(isUniv) { speak("Modo pigmento ativado"); colorHistory = []; }
}

function toggleVoice() { 
    isVoice = !isVoice; 
    document.getElementById('btnV').classList.toggle('active');
}

requestAnimationFrame(mainLoop);
</script>
</body>
</html>
