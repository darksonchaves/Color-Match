<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ColorMatch Pro - v15.0 Precision</title>
    <style>
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; overflow: hidden; text-align: center; }
        #header { 
            position: absolute; top: 0; width: 100%; z-index: 20;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px);
            display: flex; justify-content: center; padding: 12px 0; gap: 6px;
            border-bottom: 1px solid #333; flex-wrap: wrap;
        }
        button { 
            background: #1a1a1a; color: #777; border: 1px solid #444;
            padding: 10px 12px; border-radius: 8px; font-weight: bold; font-size: 9px;
            text-transform: uppercase; transition: 0.2s;
        }
        .active { background: #00ffcc !important; color: #000 !important; border-color: #00ffcc; box-shadow: 0 0 15px rgba(0,255,204,0.4); }
        .univ-active { background: #ffaa00 !important; color: #000 !important; border-color: #ffaa00; }

        #video-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        #crosshair { 
            position: absolute; border: 2px dashed rgba(255,255,255,0.4); border-radius: 50%;
            pointer-events: none; transition: all 0.2s; z-index: 10;
        }
        .mira-livre { width: 40px; height: 40px; border-style: solid !important; }
        .mira-padrao { width: 30vw; height: 30vw; }
        .locked { border-color: #00ffcc !important; background: rgba(0,255,204,0.1); box-shadow: 0 0 25px #00ffcc; }

        #ui-overlay { 
            position: absolute; bottom: 0; width: 100%; padding: 40px 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.98)); z-index: 20;
        }
        #color-name { font-size: 44px; font-weight: 900; text-transform: uppercase; color: #222; }
        .active-text { color: #00ffcc !important; }
        #debug { font-size: 11px; color: #555; margin-top: 10px; font-family: monospace; }
    </style>
</head>
<body>

<div id="header">
    <button onclick="toggleSystem()" id="btnPower">SISTEMA: OFF</button>
    <button onclick="calibrate()" id="btnCalib">CALIBRAR BRANCO</button>
    <button onclick="setMode('LIVRE')" id="btnLivre">LIVRE</button>
    <button onclick="setMode('PADRAO')" id="btnPadrao">PADRÃO</button>
    <button onclick="toggleUniv()" id="btnUniv">UNIVERSAL: OFF</button>
</div>

<div id="video-container">
    <video id="v" autoplay playsinline muted></video>
    <div id="crosshair" class="mira-livre"></div>
</div>

<div id="ui-overlay">
    <div id="color-name">DISJUNTOR OFF</div>
    <div id="debug">LIGUE O SISTEMA PARA INICIAR</div>
</div>

<canvas id="c" style="display:none;"></canvas>

<script>
    const v = document.getElementById('v'), c = document.getElementById('c'), ctx = c.getContext('2d', {willReadFrequently:true});
    const colorTxt = document.getElementById('color-name'), debugTxt = document.getElementById('debug'), cross = document.getElementById('crosshair');

    let mode = 'LIVRE', active = false, isUniv = false, lastSpeach = "", isSpeaking = false;
    let white = { r: 255, g: 255, b: 255 }, history = [];

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => v.srcObject = s);

    function toggleSystem() { 
        active = !active; 
        const btn = document.getElementById('btnPower');
        btn.classList.toggle('active', active);
        btn.innerText = `SISTEMA: ${active ? 'ON' : 'OFF'}`;
        if(!active) resetUI(); else speak("Sistema Iniciado");
    }

    function toggleUniv() {
        isUniv = !isUniv;
        const btn = document.getElementById('btnUniv');
        btn.classList.toggle('univ-active', isUniv);
        btn.innerText = `UNIVERSAL: ${isUniv ? 'ON' : 'OFF'}`;
        speak(isUniv ? "Modo Universal" : "Modo Normal");
    }

    function setMode(m) {
        mode = m;
        document.getElementById('btnLivre').classList.toggle('active', m === 'LIVRE');
        document.getElementById('btnPadrao').classList.toggle('active', m === 'PADRAO');
        cross.className = (m === 'LIVRE' ? 'mira-livre' : 'mira-padrao');
        speak(m);
    }

    function calibrate() {
        if(!active) return;
        const d = sample(v.videoWidth/2, v.videoHeight/2, 60);
        // Proteção para não calibrar no escuro total
        if((d.r + d.g + d.b) / 3 < 30) {
            speak("Luz insuficiente para calibrar");
            return;
        }
        white = { r: d.r, g: d.g, b: d.b };
        speak("Branco Calibrado");
    }

    function sample(x, y, s) {
        c.width = v.videoWidth; c.height = v.videoHeight;
        ctx.drawImage(v, 0, 0);
        const data = ctx.getImageData(x - s/2, y - s/2, s, s).data;
        let r=0, g=0, b=0;
        for(let i=0; i<data.length; i+=4) { r += data[i]; g += data[i+1]; b += data[i+2]; }
        const total = data.length/4;
        return { r: r/total, g: g/total, b: b/total };
    }

    function rgbToHsl(r, g, b) {
        // Aplicação do Offset de Calibragem
        r = Math.min(255, (r / white.r) * 255);
        g = Math.min(255, (g / white.g) * 255);
        b = Math.min(255, (b / white.b) * 255);

        const bri = (r + g + b) / 3;
        r/=255; g/=255; b/=255;
        const max=Math.max(r,g,b), min=Math.min(r,g,b), d=max-min;
        let h, s, l=(max+min)/2;
        if(d===0) h=s=0;
        else {
            s = l>0.5 ? d/(2-max-min) : d/(max+min);
            if(max===r) h=(g-b)/d+(g<b?6:0); else if(max===g) h=(b-r)/d+2; else h=(r-g)/d+4;
            h/=6;
        }
        return { h: h*360, s: s*100, l: l*100, bri: bri };
    }

    function getColorName(h, s, l, bri) {
        // AJUSTE PONTO 3: Filtro de Escuridão Real (Evita o Verde Escuro falso ao tapar a lente)
        if (bri < 20) return "Preto"; 
        
        if (s < 15) {
            if (bri < 45) return "Preto";
            if (bri > 200) return "Branco";
            return "Cinza";
        }

        // Diagnóstico de Espectro Primário (Refinado)
        if (h < 15 || h > 345) return bri < 70 ? "Vermelho Escuro" : "Vermelho";
        if (h < 42) return bri < 60 ? "Marrom" : "Laranja";
        if (h < 65) return "Amarelo";
        if (h < 165) return bri < 75 ? "Verde Escuro" : "Verde";
        if (h < 260) return "Azul";
        if (h < 305) return "Roxo";
        return "Rosa";
    }

    function loop() {
        if (v.videoWidth > 0 && active) {
            const x = v.videoWidth/2, y = v.videoHeight/2;
            const core = sample(x, y, 20);
            const hsl = rgbToHsl(core.r, core.g, core.b);

            let ready = true;
            if (mode === 'PADRAO') {
                const dist = (v.videoWidth * 0.12);
                const pts = [sample(x, y-dist, 8), sample(x, y+dist, 8), sample(x-dist, y, 8), sample(x+dist, y, 8)];
                
                // Validação de cor consistente
                const valid = pts.filter(p => {
                    const pH = rgbToHsl(p.r, p.g, p.b);
                    return Math.abs(pH.h - hsl.h) < 20 || (hsl.s < 15 && pH.s < 15);
                }).length;

                if (valid < 3) {
                    ready = false;
                    colorTxt.innerText = "ALINHANDO...";
                    colorTxt.className = "";
                    cross.classList.remove('locked');
                }
            }

            if (ready) {
                const name = getColorName(hsl.h, hsl.s, hsl.l, hsl.bri);
                
                // Modo Universal força a estabilidade máxima
                const historySize = isUniv ? 12 : 6;
                history.push(name); if(history.length > historySize) history.shift();
                
                const stable = history.sort((a,b) => history.filter(v=>v===a).length - history.filter(v=>v===b).length).pop();
                
                colorTxt.innerText = stable;
                colorTxt.className = "active-text";
                cross.classList.add('locked');
                debugTxt.innerText = `MODO: ${isUniv?'UNIVERSAL':'NORMAL'} | H:${Math.round(hsl.h)} S:${Math.round(hsl.s)} B:${Math.round(hsl.bri)}`;
                
                if(stable !== lastSpeach) speak(stable);
            }
        }
        requestAnimationFrame(loop);
    }

    function speak(t) {
        if(!t || isSpeaking) return;
        speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang='pt-BR'; m.rate=1.4;
        m.onstart=()=>isSpeaking=true; m.onend=()=>isSpeaking=false;
        speechSynthesis.speak(m); lastSpeach=t;
    }

    function resetUI() {
        colorTxt.innerText = "DISJUNTOR OFF"; colorTxt.className = "";
        cross.classList.remove('locked');
        debugTxt.innerText = "LIGUE O SISTEMA PARA INICIAR";
        history = []; lastSpeach = "";
    }

    loop();
</script>
</body>
</html>
