<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ColorMatch Pro - v14.0 Optimized</title>
    <style>
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; overflow: hidden; text-align: center; }
        #header { 
            position: absolute; top: 0; width: 100%; z-index: 20;
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(10px);
            display: flex; justify-content: center; padding: 12px 0; gap: 8px;
            border-bottom: 1px solid #333;
        }
        button { 
            background: #1a1a1a; color: #888; border: 1px solid #444;
            padding: 10px 15px; border-radius: 8px; font-weight: bold; font-size: 10px;
            text-transform: uppercase; transition: 0.2s;
        }
        .active { background: #00ffcc !important; color: #000 !important; border-color: #00ffcc; box-shadow: 0 0 15px rgba(0,255,204,0.4); }

        #video-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* MIRA OTIMIZADA */
        #crosshair { 
            position: absolute; border: 2px dashed rgba(255,255,255,0.4); border-radius: 50%;
            pointer-events: none; transition: all 0.2s ease-in-out; z-index: 10;
        }
        .mira-livre { width: 40px; height: 40px; border-style: solid !important; }
        .mira-padrao { width: 35vw; height: 35vw; } /* Reduzi de 50 para 35 para evitar bordas reflexivas */
        .locked { border-color: #00ffcc !important; background: rgba(0,255,204,0.1); box-shadow: 0 0 25px #00ffcc; }

        #ui-overlay { 
            position: absolute; bottom: 0; width: 100%; padding: 30px 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.95)); z-index: 20;
        }
        #color-name { font-size: 42px; font-weight: 900; text-transform: uppercase; color: #333; transition: 0.3s; }
        .active-text { color: #00ffcc !important; text-shadow: 0 0 15px rgba(0,255,204,0.6); }
        #debug { font-size: 11px; color: #666; margin-top: 8px; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="header">
    <button onclick="calibrate()" id="btnCalib">CALIBRAR</button>
    <button onclick="setMode('LIVRE')" id="btnLivre" class="active">LIVRE</button>
    <button onclick="setMode('PADRAO')" id="btnPadrao">PADRÃO</button>
    <button onclick="toggleSystem()" id="btnPower">ON/OFF</button>
</div>

<div id="video-container">
    <video id="v" autoplay playsinline muted></video>
    <div id="crosshair" class="mira-livre"></div>
</div>

<div id="ui-overlay">
    <div id="color-name">---</div>
    <div id="debug">SISTEMA PRONTO</div>
</div>

<canvas id="c" style="display:none;"></canvas>

<script>
    const v = document.getElementById('v'), c = document.getElementById('c'), ctx = c.getContext('2d', {willReadFrequently:true});
    const colorTxt = document.getElementById('color-name'), debugTxt = document.getElementById('debug'), cross = document.getElementById('crosshair');

    let mode = 'LIVRE', active = false, lastSpeach = "", isSpeaking = false;
    let white = { r: 255, g: 255, b: 255 }, history = [];

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => v.srcObject = s);

    function toggleSystem() { 
        active = !active; 
        document.getElementById('btnPower').classList.toggle('active', active);
        if(!active) resetUI();
    }

    function setMode(m) {
        mode = m;
        document.getElementById('btnLivre').classList.toggle('active', m === 'LIVRE');
        document.getElementById('btnPadrao').classList.toggle('active', m === 'PADRAO');
        cross.className = (m === 'LIVRE' ? 'mira-livre' : 'mira-padrao');
        speak(m);
    }

    function calibrate() {
        const d = sample(v.videoWidth/2, v.videoHeight/2, 40);
        white = { r: d.r, g: d.g, b: d.b };
        speak("Calibrado");
    }

    function sample(x, y, s) {
        c.width = v.videoWidth; c.height = v.videoHeight;
        ctx.drawImage(v, 0, 0);
        const data = ctx.getImageData(x - s/2, y - s/2, s, s).data;
        let r=0, g=0, b=0;
        for(let i=0; i<data.length; i+=4) { r += data[i]; g += data[i+1]; b += data[i+2]; }
        return { r: r/(data.length/4), g: g/(data.length/4), b: b/(data.length/4) };
    }

    function rgbToHsl(r, g, b) {
        r = Math.min(255, (r/white.r)*255); g = Math.min(255, (g/white.g)*255); b = Math.min(255, (b/white.b)*255);
        r/=255; g/=255; b/=255;
        const max=Math.max(r,g,b), min=Math.min(r,g,b), d=max-min;
        let h, s, l=(max+min)/2;
        if(d===0) h=s=0;
        else {
            s = l>0.5 ? d/(2-max-min) : d/(max+min);
            if(max===r) h=(g-b)/d+(g<b?6:0); else if(max===g) h=(b-r)/d+2; else h=(r-g)/d+4;
            h/=6;
        }
        return { h: h*360, s: s*100, l: l*100, v: max*255 };
    }

    function getColorName(h, s, l, v) {
        if (s < 14) {
            if (v < 45) return "Preto";
            if (v > 195) return "Branco";
            return "Cinza";
        }
        if (h < 15 || h > 345) return v < 90 ? "Vermelho Escuro" : "Vermelho";
        if (h < 42) return v < 80 ? "Marrom" : "Laranja";
        if (h < 68) return "Amarelo";
        if (h < 155) return v < 85 ? "Verde Escuro" : "Verde";
        if (h < 255) return "Azul";
        if (h < 305) return "Roxo";
        return "Rosa";
    }

    function loop() {
        if (v.videoWidth > 0 && active) {
            const x = v.videoWidth/2, y = v.videoHeight/2;
            const core = sample(x, y, 20);
            const hsl = rgbToHsl(core.r, core.g, core.b);

            let canRead = true;
            if (mode === 'PADRAO') {
                const dist = (v.videoWidth * 0.15); // Mira menor para evitar bordas
                const pts = [sample(x, y-dist, 10), sample(x, y+dist, 10), sample(x-dist, y, 10), sample(x+dist, y, 10)];
                
                // Validação tolerante a brilho: foca no HUE (cor), ignora se um ponto estiver mais claro (reflexo)
                const validPoints = pts.filter(p => {
                    const pHsl = rgbToHsl(p.r, p.g, p.b);
                    return Math.abs(pHsl.h - hsl.h) < 25 || (hsl.s < 15 && pHsl.s < 15);
                }).length;

                if (validPoints < 3) {
                    canRead = false;
                    colorTxt.innerText = "ALINHANDO...";
                    colorTxt.className = "";
                    cross.classList.remove('locked');
                }
            }

            if (canRead) {
                const name = getColorName(hsl.h, hsl.s, hsl.l, hsl.v);
                history.push(name); if(history.length > 8) history.shift();
                const stable = history.sort((a,b) => history.filter(v=>v===a).length - history.filter(v=>v===b).length).pop();
                
                colorTxt.innerText = stable;
                colorTxt.className = "active-text";
                cross.classList.add('locked');
                debugTxt.innerText = `H:${Math.round(hsl.h)}° S:${Math.round(hsl.s)}% B:${Math.round(hsl.v)}`;
                if(stable !== lastSpeach) speak(stable);
            }
        }
        requestAnimationFrame(loop);
    }

    function speak(t) {
        if(!t || isSpeaking) return;
        speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang='pt-BR'; m.rate=1.3;
        m.onstart=()=>isSpeaking=true; m.onend=()=>isSpeaking=false;
        speechSynthesis.speak(m); lastSpeach=t;
    }

    function resetUI() {
        colorTxt.innerText = "---"; colorTxt.className = "";
        cross.classList.remove('locked');
        debugTxt.innerText = "SISTEMA PAUSADO";
    }

    loop();
</script>
</body>
</html>
