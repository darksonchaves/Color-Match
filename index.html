<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro LAB v2</title>

<style>
body { text-align:center; font-family:Arial; background:#111; color:#fff; }
video { width:90%; border-radius:10px; }
#colorBox { width:120px; height:120px; margin:15px auto; border-radius:10px; border:2px solid #fff; }
button { padding:10px; margin:10px; }
</style>
</head>

<body>

<h2>ColorMatch Pro 🎯 v2 (Engine)</h2>

<button onclick="calibrate()">Calibrar Branco</button>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<div id="colorBox"></div>
<p id="colorText">---</p>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let whiteRef = null;

// -------------------------
// CÂMERA
// -------------------------
navigator.mediaDevices.getUserMedia({
  video: { facingMode: { ideal: "environment" } }
})
.then(stream => video.srcObject = stream);

// -------------------------
// CALIBRAÇÃO (WHITE BALANCE BASE)
// -------------------------
function calibrate() {
  captureRaw((r,g,b)=>{
    whiteRef = {r,g,b};
    alert("White balance calibrado");
  });
}

// -------------------------
// NORMALIZAÇÃO DE ILUMINAÇÃO (GRAY WORLD + WHITE REF)
// -------------------------
function normalizeLight(r,g,b){

  // evita divisão por zero
  const ref = whiteRef || {r:255,g:255,b:255};

  let nr = r / ref.r;
  let ng = g / ref.g;
  let nb = b / ref.b;

  // gray world correction leve (normalização luminância)
  const avg = (nr + ng + nb) / 3;

  nr = nr / avg;
  ng = ng / avg;
  nb = nb / avg;

  return {
    r: Math.min(255, nr * 255),
    g: Math.min(255, ng * 255),
    b: Math.min(255, nb * 255)
  };
}

// -------------------------
// RGB -> LAB (mantido otimizado)
// -------------------------
function rgbToLab(r,g,b){

  r/=255; g/=255; b/=255;

  [r,g,b]=[r,g,b].map(v=>{
    return v>0.04045?Math.pow((v+0.055)/1.055,2.4):v/12.92;
  });

  let x=r*0.4124 + g*0.3576 + b*0.1805;
  let y=r*0.2126 + g*0.7152 + b*0.0722;
  let z=r*0.0193 + g*0.1192 + b*0.9505;

  x/=0.95047; y/=1.00000; z/=1.08883;

  [x,y,z]=[x,y,z].map(v=>{
    return v>0.008856?Math.cbrt(v):(7.787*v)+(16/116);
  });

  return {
    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)
  };
}

// -------------------------
// DELTA E (perceptual distance)
// -------------------------
function deltaE(lab1, lab2){
  return Math.sqrt(
    (lab1.L-lab2.L)**2 +
    (lab1.a-lab2.a)**2 +
    (lab1.b-lab2.b)**2
  );
}

// -------------------------
// BASE DE CORES
// -------------------------
const colorBase = [
  {name:"Vermelho", lab:rgbToLab(255,0,0)},
  {name:"Verde", lab:rgbToLab(0,255,0)},
  {name:"Azul", lab:rgbToLab(0,0,255)},
  {name:"Amarelo", lab:rgbToLab(255,255,0)},
  {name:"Laranja", lab:rgbToLab(255,165,0)},
  {name:"Roxo", lab:rgbToLab(128,0,128)},
  {name:"Rosa", lab:rgbToLab(255,192,203)},
  {name:"Marrom", lab:rgbToLab(139,69,19)},
  {name:"Branco", lab:rgbToLab(255,255,255)},
  {name:"Preto", lab:rgbToLab(0,0,0)},
  {name:"Cinza", lab:rgbToLab(128,128,128)}
];

// -------------------------
// DETECÇÃO (ROBUSTA)
// -------------------------
function detectColor(r,g,b){

  const lab = rgbToLab(r,g,b);

  let min = Infinity;
  let result = "Indefinida";

  for(const c of colorBase){
    const d = deltaE(lab, c.lab);
    if(d < min){
      min = d;
      result = c.name;
    }
  }

  return result;
}

// -------------------------
// CAPTURA ROBUSTA (MEDIANA + MULTI SAMPLE)
// -------------------------
function captureRaw(callback){

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  const size = 20;
  const x = canvas.width/2;
  const y = canvas.height/2;

  const data = ctx.getImageData(x-size,y-size,size*2,size*2).data;

  let pixels = [];

  for(let i=0;i<data.length;i+=4){
    pixels.push([data[i], data[i+1], data[i+2]]);
  }

  // ordenação por luminância
  pixels.sort((a,b)=>{
    return (a[0]+a[1]+a[2]) - (b[0]+b[1]+b[2]);
  });

  // REMOVE EXTREMOS (outliers reais)
  const cut = Math.floor(pixels.length * 0.2);
  pixels = pixels.slice(cut, pixels.length - cut);

  // MEDIANA ESTÁVEL
  let r=0,g=0,b=0;

  for(const p of pixels){
    r += p[0];
    g += p[1];
    b += p[2];
  }

  r = r / pixels.length;
  g = g / pixels.length;
  b = b / pixels.length;

  const norm = normalizeLight(r,g,b);

  callback(norm.r, norm.g, norm.b);
}

// -------------------------
// CLIQUE (DETECÇÃO FINAL)
// -------------------------
video.addEventListener('click', ()=>{

  captureRaw((r,g,b)=>{

    const color = `rgb(${r},${g},${b})`;
    const name = detectColor(r,g,b);

    document.getElementById('colorBox').style.background = color;
    document.getElementById('colorText').innerText =
      `${color} - ${name}`;
  });
});

</script>

</body>
</html>
