<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Análise Colorimétrica em Tempo Real</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  #header {
    background: rgba(10,10,20,0.75);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(100,100,255,0.15);
    z-index: 10;
    position: relative;
  }
  #header h1 {
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 2px;
    color: #7b8cde;
    text-transform: uppercase;
  }
  #main {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #camera-container {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }
  #videoEl {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  #canvasEl {
    display: none;
  }

  /* ── Mira centralizada ── */
  #reticle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60px;
    height: 60px;
    pointer-events: none;
    z-index: 4;
  }
  .reticle-h {
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    height: 1px;
    background: rgba(120,220,255,0.8);
    transform: translateY(-50%);
  }
  .reticle-v {
    position: absolute;
    left: 50%;
    top: 0;
    height: 100%;
    width: 1px;
    background: rgba(120,220,255,0.8);
    transform: translateX(-50%);
  }
  .reticle-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 20px;
    height: 20px;
    border: 1px solid rgba(120,220,255,0.6);
  }

  /* ── Painel flutuante compacto — canto inferior esquerdo ── */
  #panel {
    position: absolute;
    bottom: 20px;
    left: 20px;
    width: 230px;
    background: rgba(8,8,20,0.82);
    border: 1px solid rgba(100,100,255,0.2);
    border-radius: 10px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 6;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  /* Swatch de cor + nome */
  #color-swatch {
    width: 100%;
    height: 36px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.08);
    transition: background 0.3s ease;
  }
  #color-name {
    text-align: center;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    line-height: 1.1;
  }
  #delta-e-display {
    text-align: center;
    font-size: 0.62rem;
    color: #667;
    margin-top: 1px;
  }

  /* Linhas de dados compactadas */
  .data-compact {
    font-size: 0.68rem;
    font-family: 'Courier New', monospace;
    color: #bbc;
    line-height: 1.6;
    letter-spacing: 0.2px;
  }
  .data-compact span.lbl {
    color: #668;
    margin-right: 2px;
  }

  /* Base calibrada */
  #base-info {
    font-size: 0.62rem;
    color: #556;
    text-align: center;
    min-height: 14px;
  }
  .section-title {
    font-size: 0.58rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #7b8cde;
    margin-bottom: 3px;
  }
  hr.divider {
    border: none;
    border-top: 1px solid rgba(100,100,255,0.1);
  }

  /* Botões compactos */
  .btn {
    width: 100%;
    padding: 7px;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    transition: all 0.2s ease;
  }
  #btn-calibrate {
    background: linear-gradient(135deg, #2a2a6e, #3a3a9e);
    color: #aac;
    border: 1px solid rgba(100,100,255,0.3);
  }
  #btn-calibrate:hover {
    background: linear-gradient(135deg, #3a3a8e, #5a5abe);
    color: #eef;
  }
  #btn-calibrate.calibrated {
    background: linear-gradient(135deg, #1a4a2e, #2a7a4e);
    border-color: rgba(50,200,100,0.4);
    color: #8fc;
  }
  #btn-camera {
    background: linear-gradient(135deg, #2a1a3e, #4a2a6e);
    color: #bac;
    border: 1px solid rgba(180,100,255,0.3);
  }
  #btn-camera:hover {
    background: linear-gradient(135deg, #3a2a5e, #6a4a9e);
    color: #edf;
  }

  /* Overlay de início */
  #start-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 8;
    gap: 16px;
  }
  #start-overlay p {
    color: #778;
    font-size: 0.9rem;
  }
  #btn-start {
    padding: 14px 32px;
    background: linear-gradient(135deg, #3a3a9e, #7b5ce8);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  #btn-start:hover { transform: scale(1.05); }
</style>
</head>
<body>
<div id="header">
  <h1>&#9632; Análise Colorimétrica</h1>
  <span style="font-size:0.65rem;color:#445;letter-spacing:1px;">CIE L*a*b* · D65</span>
</div>

<div id="main">
  <div id="camera-container">
    <video id="videoEl" autoplay playsinline muted></video>
    <canvas id="canvasEl"></canvas>

    <!-- Mira centralizada -->
    <div id="reticle">
      <div class="reticle-h"></div>
      <div class="reticle-v"></div>
      <div class="reticle-box"></div>
    </div>

    <!-- Overlay de início -->
    <div id="start-overlay">
      <p>Clique para iniciar a câmera</p>
      <button id="btn-start" onclick="startCamera()">&#9654; Iniciar Câmera</button>
    </div>
  </div>

  <!-- Painel flutuante compacto -->
  <div id="panel">
    <!-- Cor detectada -->
    <div id="color-swatch" style="background:#1a1a2e;"></div>
    <div id="color-name" style="color:#445;">Aguardando câmera...</div>
    <div id="delta-e-display"></div>

    <hr class="divider">

    <!-- RGB compacto -->
    <div class="section-title">RGB</div>
    <div class="data-compact" id="rgb-line">
      <span class="lbl">R:</span>--- &nbsp;<span class="lbl">G:</span>--- &nbsp;<span class="lbl">B:</span>---
    </div>

    <!-- Lab compacto -->
    <div class="section-title">CIE L*a*b*</div>
    <div class="data-compact" id="lab-line">
      <span class="lbl">L*:</span>--- &nbsp;<span class="lbl">a*:</span>--- &nbsp;<span class="lbl">b*:</span>---
    </div>

    <hr class="divider">

    <!-- Base calibrada -->
    <div class="section-title">Base Neutra</div>
    <div id="base-info">Não calibrado</div>

    <!-- Botões -->
    <button class="btn" id="btn-calibrate" onclick="calibrate()">&#9670; Calibrar Fundo</button>
    <button class="btn" id="btn-camera" onclick="switchCamera()">&#8635; Alternar Câmera</button>
  </div>
</div>

<script>
  const video   = document.getElementById('videoEl');
  const canvas  = document.getElementById('canvasEl');
  const ctx     = canvas.getContext('2d');

  let stream      = null;
  let devices     = [];
  let deviceIndex = 0;
  let running     = false;
  let base        = null; // base neutra calibrada {L, a, b}

  const SAMPLE           = 10;   // meia-largura da área amostrada (px)
  const DELTA_E_THRESHOLD = 12;

  // ── Conversões coloriméritricas ──────────────────────────────────────────

  function linearize(c) {
    const v = c / 255;
    return v <= 0.04045 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  }

  function rgbToXYZ(r, g, b) {
    const rl = linearize(r), gl = linearize(g), bl = linearize(b);
    return {
      X: (0.4124564 * rl + 0.3575761 * gl + 0.1804375 * bl) * 100,
      Y: (0.2126729 * rl + 0.7151522 * gl + 0.0721750 * bl) * 100,
      Z: (0.0193339 * rl + 0.1191920 * gl + 0.9503041 * bl) * 100
    };
  }

  function xyzToLab(X, Y, Z) {
    const Xn = 95.047, Yn = 100.000, Zn = 108.883;
    const e = 0.008856, k = 903.3;
    function f(t) { return t > e ? Math.cbrt(t) : (k * t + 16) / 116; }
    const fx = f(X / Xn), fy = f(Y / Yn), fz = f(Z / Zn);
    return { L: 116 * fy - 16, a: 500 * (fx - fy), b: 200 * (fy - fz) };
  }

  function rgbToLab(r, g, b) {
    const xyz = rgbToXYZ(r, g, b);
    return xyzToLab(xyz.X, xyz.Y, xyz.Z);
  }

  function deltaE(lab1, lab2) {
    return Math.sqrt(
      Math.pow(lab1.L - lab2.L, 2) +
      Math.pow(lab1.a - lab2.a, 2) +
      Math.pow(lab1.b - lab2.b, 2)
    );
  }

  /**
   * Classifica a cor usando métricas CIE L*a*b* D65.
   * Ordem de avaliação: Incolor → Reflexo → Roxo → Azul → Vermelho → Rosa → Amarelo → Indefinido
   */
  function classifyColor(lab, dE) {
    const { L, a, b } = lab;

    // 1. Incolor / Fundo calibrado
    if (base && dE < DELTA_E_THRESHOLD)
      return { name: 'Incolor / Outro', color: '#778899' };

    // 2. Reflexo / Saturado (luminosidade muito alta)
    if (L > 85)
      return { name: 'Reflexo / Saturado', color: '#ccd0e0' };

    // 3. Roxo / Violeta: a* positivo E b* marcadamente negativo
    if (a > 10 && b < -10)
      return { name: 'Roxo / Violeta', color: '#a855f7' };

    // 4. Azul: b* fortemente negativo (independente de a*)
    if (b < -20)
      return { name: 'Azul', color: '#3b82f6' };

    // 5. Vermelho Ótimo: a* fortemente positivo e b* moderadamente positivo
    if (a > 20 && b > 0 && L > 15 && L <= 85)
      return { name: 'Vermelho Ótimo', color: '#e03040' };

    // 6. Rosa / Transição: a* moderado
    if (a >= 8 && a <= 20)
      return { name: 'Rosa / Transição', color: '#e07090' };

    // 7. Amarelo: b* fortemente positivo e a* neutro ou levemente positivo
    if (b > 25 && a < 20)
      return { name: 'Amarelo', color: '#facc15' };

    // 8. Indefinido
    return { name: 'Indefinido', color: '#445566' };
  }

  // ── Amostragem de pixels ─────────────────────────────────────────────────

  function samplePixels() {
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    const cx   = Math.floor(canvas.width  / 2);
    const cy   = Math.floor(canvas.height / 2);
    const data = ctx.getImageData(cx - SAMPLE, cy - SAMPLE, SAMPLE * 2, SAMPLE * 2).data;
    let rSum = 0, gSum = 0, bSum = 0, count = 0;
    for (let i = 0; i < data.length; i += 4) {
      rSum += data[i]; gSum += data[i + 1]; bSum += data[i + 2]; count++;
    }
    return {
      r: Math.round(rSum / count),
      g: Math.round(gSum / count),
      b: Math.round(bSum / count)
    };
  }

  // ── Feedback de áudio (speechSynthesis) ─────────────────────────────────

  let lastSpokenName  = '';       // último nome falado
  let pendingName     = '';       // nome candidato aguardando estabilidade
  let stableTimer     = null;     // timer de debounce
  const STABLE_MS     = 1500;     // ms que a cor precisa ser estável antes de falar

  function speakColor(name) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();                 // cancela fala anterior
    const utt = new SpeechSynthesisUtterance(name);
    utt.lang  = 'pt-BR';
    utt.rate  = 1.0;
    utt.pitch = 1.0;
    window.speechSynthesis.speak(utt);
  }

  function triggerAudioIfChanged(name) {
    if (name === lastSpokenName) {
      // Mesma cor: cancela qualquer timer pendente de outra cor
      if (pendingName !== name && stableTimer) {
        clearTimeout(stableTimer);
        stableTimer  = null;
        pendingName  = '';
      }
      return;
    }
    // Cor diferente: inicia ou reinicia o timer de estabilidade
    if (name !== pendingName) {
      pendingName = name;
      if (stableTimer) clearTimeout(stableTimer);
      stableTimer = setTimeout(() => {
        // Só fala se a cor ainda for a mesma após o período de estabilidade
        lastSpokenName = pendingName;
        speakColor(pendingName);
        stableTimer = null;
      }, STABLE_MS);
    }
  }

  // ── Loop de atualização ──────────────────────────────────────────────────

  function update() {
    if (!running || video.readyState < 2) { requestAnimationFrame(update); return; }
    const { r, g, b } = samplePixels();
    const lab          = rgbToLab(r, g, b);
    const dE           = base ? deltaE(lab, base) : 999;
    const cls          = classifyColor(lab, dE);

    // RGB em linha única
    document.getElementById('rgb-line').innerHTML =
      `<span class="lbl">R:</span>${r} &nbsp;<span class="lbl">G:</span>${g} &nbsp;<span class="lbl">B:</span>${b}`;

    // Lab em linha única
    document.getElementById('lab-line').innerHTML =
      `<span class="lbl">L*:</span>${lab.L.toFixed(1)} &nbsp;<span class="lbl">a*:</span>${lab.a.toFixed(1)} &nbsp;<span class="lbl">b*:</span>${lab.b.toFixed(1)}`;

    document.getElementById('color-swatch').style.background = `rgb(${r},${g},${b})`;
    document.getElementById('color-name').textContent  = cls.name;
    document.getElementById('color-name').style.color  = cls.color;

    if (base) {
      document.getElementById('delta-e-display').textContent =
        `ΔE = ${dE.toFixed(2)} (limiar: ${DELTA_E_THRESHOLD})`;
    }

    // Dispara áudio apenas quando a cor muda e se mantém estável
    triggerAudioIfChanged(cls.name);

    requestAnimationFrame(update);
  }

  // ── Câmera ───────────────────────────────────────────────────────────────

  async function getDevices() {
    const devs = await navigator.mediaDevices.enumerateDevices();
    devices = devs.filter(d => d.kind === 'videoinput');
  }

  /**
   * Tenta abrir a câmera na seguinte ordem de prioridade:
   *  1. Câmera traseira exata  (facingMode: { exact: "environment" })
   *  2. Câmera traseira suave  (facingMode: "environment")
   *  3. Câmera genérica        (video: true)
   */
  async function openCamera(preferredDeviceId = null) {
    if (stream) { stream.getTracks().forEach(t => t.stop()); }

    const tryOpen = async (constraints) => {
      stream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = stream;
    };

    if (preferredDeviceId) {
      // Alternar câmera manualmente por deviceId
      try {
        await tryOpen({ video: { deviceId: { exact: preferredDeviceId }, width: { ideal: 1280 }, height: { ideal: 720 } } });
        return;
      } catch (_) { /* fallthrough */ }
    }

    // 1ª tentativa: câmera traseira exata
    try {
      await tryOpen({ video: { facingMode: { exact: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } } });
      return;
    } catch (_) { /* fallthrough */ }

    // 2ª tentativa: câmera traseira soft
    try {
      await tryOpen({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } });
      return;
    } catch (_) { /* fallthrough */ }

    // 3ª tentativa: qualquer câmera disponível
    try {
      await tryOpen({ video: true });
    } catch (e) {
      alert('Erro ao acessar a câmera: ' + e.message);
    }
  }

  async function startCamera() {
    document.getElementById('start-overlay').style.display = 'none';
    await getDevices();
    await openCamera(); // prioriza câmera traseira automaticamente
    running = true;
    requestAnimationFrame(update);
  }

  async function switchCamera() {
    if (devices.length < 2) { alert('Apenas uma câmera disponível.'); return; }
    deviceIndex = (deviceIndex + 1) % devices.length;
    await openCamera(devices[deviceIndex].deviceId);
  }

  // ── Calibração ───────────────────────────────────────────────────────────

  function calibrate() {
    if (!running) { alert('Inicie a câmera primeiro.'); return; }
    const { r, g, b } = samplePixels();
    base = rgbToLab(r, g, b);
    const btn = document.getElementById('btn-calibrate');
    btn.textContent = '✓ Base Calibrada';
    btn.classList.add('calibrated');
    document.getElementById('base-info').textContent =
      `L*=${base.L.toFixed(1)}  a*=${base.a.toFixed(1)}  b*=${base.b.toFixed(1)}`;
  }
</script>
</body>
</html>
