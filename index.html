<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro LAB</title>
<style>
body { text-align:center; font-family:Arial; background:#111; color:#fff; }
video { width:90%; border-radius:10px; }
#colorBox { width:120px; height:120px; margin:15px auto; border-radius:10px; border:2px solid #fff; }
button { padding:10px; margin:10px; }
</style>
</head>
<body>

<h2>ColorMatch Pro 🎯</h2>
<button onclick="calibrate()">Calibrar Branco</button>

<video id="video" autoplay playsinline></video> <canvas id="canvas" style="display:none;"></canvas>

<div id="colorBox"></div>
<p id="colorText">---</p>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let whiteRef = null;
let history = [];

// câmera
navigator.mediaDevices.getUserMedia({
  video: { facingMode: { ideal: "environment" } }
})
.then(stream => video.srcObject = stream);

// calibração
function calibrate() {
  captureColor((r,g,b)=>{
    whiteRef = {r,g,b};
    alert("Calibrado");
  });
}

// aplicar calibração
function applyCalibration(r,g,b){
  if(!whiteRef) return {r,g,b};

  return {
    r: Math.min(255, r * (255/whiteRef.r)),
    g: Math.min(255, g * (255/whiteRef.g)),
    b: Math.min(255, b * (255/whiteRef.b))
  };
}

// RGB → LAB
function rgbToLab(r,g,b){

  r/=255; g/=255; b/=255;

  [r,g,b]=[r,g,b].map(v=>{
    return v>0.04045?Math.pow((v+0.055)/1.055,2.4):v/12.92;
  });

  let x=r*0.4124 + g*0.3576 + b*0.1805;
  let y=r*0.2126 + g*0.7152 + b*0.0722;
  let z=r*0.0193 + g*0.1192 + b*0.9505;

  x/=0.95047; y/=1.00000; z/=1.08883;

  [x,y,z]=[x,y,z].map(v=>{
    return v>0.008856?Math.pow(v,1/3):(7.787*v)+(16/116);
  });

  return {
    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)
  };
}

// DeltaE
function deltaE(lab1, lab2){
  return Math.sqrt(
    (lab1.L-lab2.L)**2 +
    (lab1.a-lab2.a)**2 +
    (lab1.b-lab2.b)**2
  );
}

// base de cores LAB
const colorBase = [
  {name:"Vermelho", lab:rgbToLab(255,0,0)},
  {name:"Verde", lab:rgbToLab(0,255,0)},
  {name:"Azul", lab:rgbToLab(0,0,255)},
  {name:"Amarelo", lab:rgbToLab(255,255,0)},
  {name:"Laranja", lab:rgbToLab(255,165,0)},
  {name:"Roxo", lab:rgbToLab(128,0,128)},
  {name:"Rosa", lab:rgbToLab(255,192,203)},
  {name:"Marrom", lab:rgbToLab(139,69,19)},
  {name:"Branco", lab:rgbToLab(255,255,255)},
  {name:"Preto", lab:rgbToLab(0,0,0)},
  {name:"Cinza", lab:rgbToLab(128,128,128)}
];

// detectar cor
function detectColor(r,g,b){
  const lab = rgbToLab(r,g,b);

  let min = Infinity;
  let result = "Indefinida";

  colorBase.forEach(c=>{
    const d = deltaE(lab, c.lab);
    if(d < min){
      min = d;
      result = c.name;
    }
  });

  return result;
}

// estabilização
function isStable(r,g,b){
  history.push([r,g,b]);
  if(history.length>5) history.shift();

  let v=0;
  history.forEach(c=>{
    v += Math.abs(c[0]-r)+Math.abs(c[1]-g)+Math.abs(c[2]-b);
  });

  return v<60;
}

// captura avançada
function captureColor(callback){

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  const x = canvas.width/2;
  const y = canvas.height/2;

  const data = ctx.getImageData(x-5,y-5,10,10).data;

  let vals=[];

  for(let i=0;i<data.length;i+=4){
    vals.push([data[i],data[i+1],data[i+2]]);
  }

  vals.sort((a,b)=>(a[0]+a[1]+a[2])-(b[0]+b[1]+b[2]));
  vals = vals.slice(10, vals.length-10);

  let r=0,g=0,b=0;
  vals.forEach(v=>{
    r+=v[0]; g+=v[1]; b+=v[2];
  });

  r=Math.floor(r/vals.length);
  g=Math.floor(g/vals.length);
  b=Math.floor(b/vals.length);

  const calibrated = applyCalibration(r,g,b);

  callback(calibrated.r, calibrated.g, calibrated.b);
}

// clique
video.addEventListener('click', ()=>{

  captureColor((r,g,b)=>{

    if(!isStable(r,g,b)){
      document.getElementById('colorText').innerText="Estabilizando...";
      return;
    }

    const color = `rgb(${r},${g},${b})`;
    const name = detectColor(r,g,b);

    document.getElementById('colorBox').style.background = color;
    document.getElementById('colorText').innerText = color+" - "+name;
  });

});
</script>

</body>
</html>
