<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ColorMatch Pro - v23.0 Biometric Engine</title>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: #fff; overflow: hidden; text-align: center; }
        #header { 
            position: absolute; top: 0; width: 100%; z-index: 20;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px);
            display: flex; justify-content: center; padding: 10px 0; gap: 5px; border-bottom: 1px solid #333; flex-wrap: wrap;
        }
        button { 
            background: #1a1a1a; color: #aaa; border: 1px solid #444; padding: 8px 12px; 
            border-radius: 6px; font-weight: bold; font-size: 10px; text-transform: uppercase; cursor: pointer;
        }
        .active { background: #007bff !important; color: #fff !important; border-color: #007bff; }
        .audio-on { background: #28a745 !important; color: #fff !important; border-color: #28a745; }
        
        #video-container { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #crosshair { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; pointer-events: none; z-index: 10;
        }
        .mira-livre { width: 40px; height: 40px; }
        .mira-padrao { width: 32vw; height: 32vw; border: 2px dashed rgba(255,255,255,0.4); }
        .locked { border-color: #00ffcc !important; box-shadow: 0 0 20px #00ffcc; background: rgba(0,255,204,0.1); }

        #ui-overlay { position: absolute; bottom: 0; width: 100%; padding: 40px 0; background: linear-gradient(transparent, #000 80%); z-index: 20; }
        #color-name { font-size: 50px; font-weight: 900; text-transform: uppercase; color: #444; min-height: 65px; }
        .active-text { color: #00ffcc !important; text-shadow: 0 0 25px rgba(0,255,204,0.6); }
    </style>
</head>
<body>

<div id="header">
    <button onclick="toggleSystem()" id="btnPower">SISTEMA: OFF</button>
    <button onclick="toggleAudio()" id="btnAudio">ÁUDIO: OFF</button>
    <button onclick="calibrate()" id="btnCalib">MARCO ZERO</button>
    <button onclick="setMode('LIVRE')" id="btnLivre">LIVRE</button>
    <button onclick="setMode('PADRAO')" id="btnPadrao">PADRÃO</button>
</div>

<div id="video-container">
    <video id="v" autoplay playsinline muted></video>
    <div id="crosshair" class="mira-livre"></div>
</div>

<div id="ui-overlay">
    <div id="color-name">STANDBY</div>
</div>

<canvas id="c" style="display:none;"></canvas>

<script>
    const v = document.getElementById('v'), c = document.getElementById('c'), ctx = c.getContext('2d', {willReadFrequently:true});
    const colorTxt = document.getElementById('color-name'), cross = document.getElementById('crosshair');

    let active = false, audioActive = false, mode = 'LIVRE';
    let iris = { r: 1, g: 1, b: 1 };
    let history = [], lastSpeach = "", isSpeaking = false;

    // ALVOS PRIMÁRIOS COM COORDENADAS DE ALTA FIDELIDADE
    const TARGETS = [
        { name: "Preto", r: 0, g: 0, b: 0, type: 'n' },
        { name: "Branco", r: 255, g: 255, b: 255, type: 'n' },
        { name: "Cinza", r: 120, g: 120, b: 120, type: 'n' },
        { name: "Vermelho", r: 255, g: 0, b: 0 },
        { name: "Laranja", r: 255, g: 110, b: 0 },
        { name: "Amarelo", r: 255, g: 240, b: 0 },
        { name: "Verde", r: 0, g: 255, b: 0 },
        { name: "Azul", r: 0, g: 60, b: 255 },
        { name: "Roxo", r: 130, g: 0, b: 230 },
        { name: "Rosa", r: 255, g: 90, b: 160 },
        { name: "Marrom", r: 100, g: 50, b: 20 }
    ];

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => v.srcObject = s);

    function toggleSystem() { 
        active = !active; 
        document.getElementById('btnPower').classList.toggle('active', active);
        document.getElementById('btnPower').innerText = `SISTEMA: ${active ? 'ON' : 'OFF'}`;
        if(!active) { colorTxt.innerText = "STANDBY"; colorTxt.className = ""; history = []; }
    }

    function toggleAudio() {
        audioActive = !audioActive;
        const btn = document.getElementById('btnAudio');
        btn.classList.toggle('audio-on', audioActive);
        btn.innerText = `ÁUDIO: ${audioActive ? 'ON' : 'OFF'}`;
        if(audioActive) speak("Áudio ativado");
    }

    function setMode(m) {
        mode = m;
        document.getElementById('btnLivre').classList.toggle('active', m === 'LIVRE');
        document.getElementById('btnPadrao').classList.toggle('active', m === 'PADRAO');
        cross.className = (m === 'LIVRE' ? 'mira-livre' : 'mira-padrao');
        if(audioActive) speak("Modo " + m);
    }

    function calibrate() {
        if(!active) return;
        c.width = v.videoWidth; c.height = v.videoHeight;
        ctx.drawImage(v, 0, 0);
        const p = ctx.getImageData(v.videoWidth/2, v.videoHeight/2, 1, 1).data;
        iris.r = 255 / Math.max(p[0], 1);
        iris.g = 255 / Math.max(p[1], 1);
        iris.b = 255 / Math.max(p[2], 1);
        if(audioActive) speak("Calibrado");
    }

    function getBiometricMatch(r, g, b) {
        // Normalização de Hardware
        r = Math.min(255, r * iris.r);
        g = Math.min(255, g * iris.g);
        b = Math.min(255, b * iris.b);

        let minD = Infinity;
        let winner = "Indefinido";
        const avg = (r + g + b) / 3;
        const sat = Math.sqrt(Math.pow(r-avg,2) + Math.pow(g-avg,2) + Math.pow(b-avg,2));

        for (const t of TARGETS) {
            if (sat < 18 && t.type !== 'n') continue;
            if (sat >= 18 && t.type === 'n') continue;

            // PESO BIOMÉTRICO (Olho Humano ITU-R 601)
            // d = sqrt( 0.299*dR² + 0.587*dG² + 0.114*dB² )
            const d = Math.sqrt(
                0.299 * Math.pow(r - t.r, 2) + 
                0.587 * Math.pow(g - t.g, 2) + 
                0.114 * Math.pow(b - t.b, 2)
            );

            if (d < minD) { minD = d; winner = t.name; }
        }
        return winner;
    }

    function loop() {
        if (active && v.videoWidth > 0) {
            c.width = v.videoWidth; c.height = v.videoHeight;
            ctx.drawImage(v, 0, 0);
            
            let s = (mode === 'LIVRE' ? 6 : 45);
            const p = ctx.getImageData(v.videoWidth/2 - s/2, v.videoHeight/2 - s/2, s, s).data;
            let r=0, g=0, b=0, t=p.length/4;
            for(let i=0; i<p.length; i+=4) { r+=p[i]; g+=p[i+1]; b+=p[i+2]; }
            
            const currentName = getBiometricMatch(r/t, g/t, b/t);
            history.push(currentName);
            if(history.length > 20) history.shift();
            
            const counts = {};
            history.forEach(n => counts[n] = (counts[n] || 0) + 1);
            const top = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);

            if (counts[top] >= 16) {
                if (colorTxt.innerText !== top) {
                    colorTxt.innerText = top;
                    colorTxt.className = "active-text";
                    cross.classList.add('locked');
                    if (audioActive && top !== lastSpeach) speak(top);
                }
            } else {
                colorTxt.innerText = "AJUSTANDO";
                colorTxt.className = "";
                cross.classList.remove('locked');
            }
        }
        requestAnimationFrame(loop);
    }

    function speak(t) {
        if(!audioActive || isSpeaking || !t || t === "AJUSTANDO") return;
        speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'pt-BR';
        m.rate = 1.7;
        m.onstart = () => isSpeaking = true;
        m.onend = () => isSpeaking = false;
        speechSynthesis.speak(m);
        lastSpeach = t;
    }
    loop();
</script>
</body>
</html>
