<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro RAW vFinal</title>

<style>
body { text-align:center; font-family:Arial; background:#111; color:#fff; }
video { width:90%; border-radius:10px; }
#colorBox { width:120px; height:120px; margin:15px auto; border-radius:10px; border:2px solid #fff; }
</style>
</head>

<body>

<h2>RAW Sensor Color Engine (Stable)</h2>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<div id="colorBox"></div>
<p id="colorText">---</p>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// -------------------------
// CAMERA RAW
// -------------------------
navigator.mediaDevices.getUserMedia({
  video: { facingMode: { ideal: "environment" } }
}).then(stream => video.srcObject = stream);

// -------------------------
// CAPTURA BRUTA (SEM ALTERAÇÃO)
// -------------------------
function captureRaw(callback){

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  const size = 20;
  const cx = canvas.width/2;
  const cy = canvas.height/2;

  const data = ctx.getImageData(cx-size,cy-size,size*2,size*2).data;

  let r=0,g=0,b=0;
  let count=0;

  for(let i=0;i<data.length;i+=4){

    const rr = data[i];
    const gg = data[i+1];
    const bb = data[i+2];

    // remove apenas pixels inválidos extremos (não altera cor real)
    if(rr === 0 && gg === 0 && bb === 0) continue;
    if(rr === 255 && gg === 255 && bb === 255) continue;

    r += rr;
    g += gg;
    b += bb;

    count++;
  }

  if(count === 0) return;

  callback(r/count, g/count, b/count);
}

// -------------------------
// CLASSIFICAÇÃO UNIVERSAL ROBUSTA
// (corrigida para tons escuros e variações reais)
// -------------------------
function getColorName(r,g,b){

  const brightness = (r + g + b) / 3;

  const max = Math.max(r,g,b);
  const min = Math.min(r,g,b);
  const diff = max - min;

  // 🔴 PRETO / BRANCO (corrigido para estabilidade real)
  if(brightness < 35 && diff < 25) return "Preto";
  if(brightness > 225 && diff < 25) return "Branco";

  // ⚪ CINZA (faixa intermediária real)
  if(diff < 18) return "Cinza";

  // 🎨 cores principais com saturação real
  const saturation = diff / (brightness + 1);

  // baixa saturação → tons neutros
  if(saturation < 0.25){
    if(brightness < 80) return "Preto Escuro";
    if(brightness > 180) return "Branco Claro";
    return "Cinza";
  }

  // 🔴🔵🟢 classificação principal mais estável
  if(r > g && r > b) return "Vermelho";
  if(g > r && g > b) return "Verde";
  if(b > r && b > g) return "Azul";

  // 🟡🟠🟣 intermediárias mais confiáveis
  if(r > 180 && g > 160) return "Amarelo";
  if(r > 200 && g > 120 && b < 100) return "Laranja";
  if(r > 120 && b > 120) return "Roxo";

  return "Indefinido";
}

// -------------------------
// RENDER FINAL
// -------------------------
function render(r,g,b){

  const color = `rgb(${r},${g},${b})`;
  const name = getColorName(r,g,b);

  document.getElementById('colorBox').style.background = color;

  document.getElementById('colorText').innerText =
    `${name} | RAW: ${Math.round(r)}, ${Math.round(g)}, ${Math.round(b)}`;
}

// -------------------------
// CLICK
// -------------------------
video.addEventListener('click',()=>{

  captureRaw((r,g,b)=>{

    render(r,g,b);

  });

});
</script>

</body>
</html>
