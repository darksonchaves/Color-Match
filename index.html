<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro - v10 Enterprise</title>
<style>
  body{ margin:0; font-family: 'Segoe UI', sans-serif; background:#000; color:#fff; text-align:center; overflow:hidden; }
  #header{ padding: 10px; background: #0a0a0a; display: flex; justify-content: center; flex-wrap: wrap; gap: 5px; border-bottom: 2px solid #1a1a1a; }
  #video-container { position: relative; width: 100%; height: 55vh; background: #000; }
  video{ width: 100%; height: 100%; object-fit: contain; }
  
  button{ padding:8px 6px; border-radius:4px; border:1px solid #444; background:#111; color:#aaa; font-weight:bold; font-size: 9px; cursor:pointer; min-width: 80px; }
  .active-btn{ background:#00ffcc !important; color:#000 !important; border-color:#00ffcc; }
  .univ-on{ background: #ffaa00 !important; color: #000 !important; border-color: #ffaa00; }

  #cross{ 
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); 
    border-radius: 50%; pointer-events:none; z-index: 10;
    transition: all 0.2s ease;
  }
  .cross-livre { width: 40px; height: 40px; border: 2px solid #00ffcc; box-shadow: 0 0 10px #00ffcc; }
  .cross-padrao { width: 45vw; height: 45vw; border: 3px dashed rgba(255,255,255,0.5); }
  .is-valid { border: 6px solid #00ffcc !important; background: rgba(0,255,204,0.1); }

  #display{ font-size: 48px; font-weight: 900; color: #333; margin: 10px 0; height: 60px; text-transform: uppercase; letter-spacing: 2px; }
  .active-text { color: #00ffcc !important; text-shadow: 0 0 15px rgba(0,255,204,0.6); }
  #status{ font-size: 10px; color: #ff3366; font-weight: bold; height: 15px; letter-spacing: 1px; }
</style>
</head>
<body>

<div id="header">
  <button id="btnUniv" onclick="toggleUniv()">UNIVERSAL: OFF</button>
  <button id="btnLivre" onclick="setMode('LIVRE')" class="active-btn">MOV. LIVRE</button>
  <button id="btnPadrao" onclick="setMode('PADRAO')">MOV. PADRÃO</button>
  <button onclick="calibrate()">CALIBRAR</button>
</div>

<div id="video-container">
  <video id="v" autoplay playsinline muted></video>
  <div id="cross" class="cross-livre"></div>
</div>

<div id="status">SISTEMA ATIVO</div>
<div id="display">---</div>

<canvas id="c" style="display:none;"></canvas>

<script>
const video = document.getElementById('v');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', {willReadFrequently: true});
const display = document.getElementById('display');
const status = document.getElementById('status');
const cross = document.getElementById('cross');

let mode = 'LIVRE', isUniv = false, lastAnnounced = "", history = [];
let offset = {r:255, g:255, b:255};

navigator.mediaDevices.getUserMedia({video:{facingMode:"environment", width:1280}}).then(s => video.srcObject = s);

function setMode(m) {
    mode = m;
    document.getElementById('btnLivre').className = (m==='LIVRE'?'active-btn':'');
    document.getElementById('btnPadrao').className = (m==='PADRAO'?'active-btn':'');
    cross.className = (m==='LIVRE'?'cross-livre':'cross-padrao');
    announce(m === 'LIVRE' ? "Modo Livre" : "Modo Padrão");
}

function toggleUniv() {
    isUniv = !isUniv;
    document.getElementById('btnUniv').className = (isUniv?'univ-on':'');
    document.getElementById('btnUniv').innerText = `UNIVERSAL: ${isUniv?'ON':'OFF'}`;
    announce(isUniv ? "Universal Ativado" : "Universal Desativado");
}

function announce(t) {
    if(t === lastAnnounced || !t) return;
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(t);
    msg.lang = 'pt-BR'; msg.rate = 1.7;
    window.speechSynthesis.speak(msg);
    lastAnnounced = t;
}

function getColor(x, y, s=15) {
    if (canvas.width !== video.videoWidth) { canvas.width = video.videoWidth; canvas.height = video.videoHeight; }
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const d = ctx.getImageData(x-(s/2), y-(s/2), s, s).data;
    let r=0, g=0, b=0;
    for(let i=0; i<d.length; i+=4){ r+=d[i]; g+=d[i+1]; b+=d[i+2]; }
    return { r: r/(d.length/4), g: g/(d.length/4), b: b/(d.length/4) };
}

function processColor(rgb) {
    let r = rgb.r, g = rgb.g, b = rgb.b;
    if(isUniv) { r=(r/offset.r)*255; g=(g/offset.g)*255; b=(b/offset.b)*255; }
    
    const max = Math.max(r,g,b), min = Math.min(r,g,b), chroma = max-min, bri = (r+g+b)/3;
    let h = 0;
    if(chroma > 5) {
        if(max===r) h=(g-b)/chroma+(g<b?6:0); else if(max===g) h=(b-r)/chroma+2; else h=(r-g)/chroma+4;
        h*=60;
    }

    if (chroma < 12) {
        if (bri < 30) return "Preto";
        if (bri > 210) return "Branco";
        return "Cinza";
    }

    if (h < 25 || h > 335) return (b > r * 0.6) ? "Rosa" : (bri < 75 ? "Vermelho Escuro" : "Vermelho");
    if (h >= 25 && h < 50) return (bri < 65) ? "Marrom" : "Laranja";
    if (h >= 50 && h < 70) return "Amarelo";
    if (h >= 70 && h < 165) return (bri < 80) ? "Verde Escuro" : "Verde";
    if (h >= 165 && h < 260) return "Azul";
    if (h >= 260 && h < 315) return "Roxo";
    return "Rosa";
}

function loop() {
    if(video.videoWidth > 0) {
        const cX = video.videoWidth/2, cY = video.videoHeight/2;
        const mainRGB = getColor(cX, cY, 20);

        if (mode === 'PADRAO') {
            const rad = (window.innerWidth * 0.45) * (video.videoWidth/window.innerWidth) / 2;
            const samples = [getColor(cX, cY-rad, 10), getColor(cX, cY+rad, 10), getColor(cX-rad, cY, 10), getColor(cX+rad, cY, 10)];
            const diff = (c) => Math.abs(c.r-mainRGB.r) + Math.abs(c.g-mainRGB.g) + Math.abs(c.b-mainRGB.b);
            const score = samples.filter(s => diff(s) < 120).length; // Média estatística (3 de 4 pontos)

            if (score < 3) {
                status.innerText = "ALINHE O OBJETO"; status.style.color = "#ff3366";
                display.innerText = "AGUARDANDO"; display.className = "";
                cross.classList.remove("is-valid");
                requestAnimationFrame(loop); return;
            }
        }

        const res = processColor(mainRGB);
        display.innerText = res;
        display.className = "active-text";
        status.innerText = (mode==='LIVRE'?"LEITURA DINÂMICA":"PADRÃO 12CM");
        status.style.color = "#00ffcc";
        cross.classList.add("is-valid");

        history.push(res);
        if(history.length > 6) history.shift();
        const stable = history.sort((a,b) => history.filter(v=>v===a).length - history.filter(v=>v===b).length).pop();
        if(stable === res) announce(res);
    }
    requestAnimationFrame(loop);
}

function calibrate() {
    const d = getColor(video.videoWidth/2, video.videoHeight/2, 40);
    offset = {r:d.r||255, g:d.g||255, b:d.b||255};
    announce("Calibrado");
}

loop();
</script>
</body>
</html>
