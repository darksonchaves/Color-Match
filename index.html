<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro – Smart Compare</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
  text-align:center;
}

h2 { margin:10px; }

#video {
  width:90%;
  border-radius:10px;
}

/* BOTÕES */
button {
  padding:10px;
  margin:5px;
}

/* PAINEL */
#panel {
  display:flex;
  justify-content:space-around;
  margin-top:15px;
  flex-wrap:wrap;
}

.box {
  width:45%;
  min-width:160px;
}

canvas {
  width:100%;
  border-radius:10px;
  background:#222;
}

.label {
  margin-top:5px;
  font-size:14px;
  color:#aaa;
}

/* RESULTADO */
#result {
  margin-top:15px;
  font-size:16px;
  color:#00ffcc;
}

/* MIRA CENTRAL */
#centerCross {
  position:fixed;
  top:50%;
  left:50%;
  width:30px;
  height:30px;
  transform:translate(-50%,-50%);
  display:none;
  pointer-events:none;
}

#centerCross::before,
#centerCross::after {
  content:"";
  position:absolute;
  background:#00ffcc;
}

#centerCross::before {
  width:30px;
  height:2px;
  top:14px;
}

#centerCross::after {
  width:2px;
  height:30px;
  left:14px;
}
</style>
</head>

<body>

<h2>ColorMatch Pro – Smart Engine</h2>

<button onclick="setMode('static')">Estático</button>
<button onclick="setMode('compare')">Comparar</button>
<button onclick="toggleVoice()">🔊 Áudio</button>

<video id="video" autoplay playsinline></video>

<div id="centerCross"></div>

<div id="panel">

  <div class="box">
    <canvas id="canvasA"></canvas>
    <div class="label">Referência</div>
  </div>

  <div class="box">
    <canvas id="canvasB"></canvas>
    <div class="label">Comparação</div>
  </div>

</div>

<div id="result">Resultado aparecerá aqui</div>

<script>

const video = document.getElementById("video");
const canvasA = document.getElementById("canvasA");
const ctxA = canvasA.getContext("2d");

const canvasB = document.getElementById("canvasB");
const ctxB = canvasB.getContext("2d");

const centerCross = document.getElementById("centerCross");

let mode = "static";
let step = 0;
let voice = true;

let sampleA = null;
let sampleB = null;

/* ================= CAMERA ================= */
navigator.mediaDevices.getUserMedia({
  video:{facingMode:"environment"}
}).then(stream=>{
  video.srcObject = stream;
});

/* ================= VOZ ================= */
function speak(text){
  if(!voice) return;

  speechSynthesis.cancel();

  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = "pt-BR";

  setTimeout(()=>speechSynthesis.speak(msg), 80);
}

/* ================= LAB ================= */
function rgbToLab(r,g,b){
  r/=255; g/=255; b/=255;

  [r,g,b]=[r,g,b].map(v=>
    v>0.04045?Math.pow((v+0.055)/1.055,2.4):v/12.92
  );

  let x=r*0.4124+g*0.3576+b*0.1805;
  let y=r*0.2126+g*0.7152+b*0.0722;
  let z=r*0.0193+g*0.1192+b*0.9505;

  x/=0.95047; y/=1; z/=1.08883;

  [x,y,z]=[x,y,z].map(v=>v>0.008856?Math.cbrt(v):(7.787*v)+(16/116));

  return {
    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)
  };
}

/* ================= ΔE ================= */
function deltaE(a,b){
  return Math.sqrt(
    (a.L-b.L)**2+
    (a.a-b.a)**2+
    (a.b-b.b)**2
  );
}

/* ================= COR ================= */
function detectColor(r,g,b){
  const lab = rgbToLab(r,g,b);

  const ref = [
    {n:"Preto",lab:rgbToLab(10,10,10)},
    {n:"Branco",lab:rgbToLab(245,245,245)},
    {n:"Cinza",lab:rgbToLab(128,128,128)},
    {n:"Vermelho",lab:rgbToLab(220,60,60)},
    {n:"Verde",lab:rgbToLab(60,200,60)},
    {n:"Azul",lab:rgbToLab(60,80,220)}
  ];

  let best = {n:"Indef",d:999};

  for(const c of ref){
    const d = deltaE(lab,c.lab);
    if(d < best.d) best = {n:c.n,d};
  }

  return best.n;
}

/* ================= CAPTURA ================= */
function capture(ctx,x,y){

  const w = video.videoWidth;
  const h = video.videoHeight;

  ctx.canvas.width = w;
  ctx.canvas.height = h;

  ctx.drawImage(video,0,0,w,h);

  const s = 10;

  const data = ctx.getImageData(x-s,y-s,s*2,s*2).data;

  let r=0,g=0,b=0,c=0;

  for(let i=0;i<data.length;i+=4){
    r+=data[i];
    g+=data[i+1];
    b+=data[i+2];
    c++;
  }

  return {
    color: detectColor(r/c,g/c,b/c),
    lab: rgbToLab(r/c,g/c,b/c)
  };
}

/* ================= MODO ================= */
function setMode(m){
  mode = m;
  step = 0;
  sampleA = null;
  sampleB = null;

  centerCross.style.display = (m==="compare") ? "block" : "none";

  document.getElementById("result").innerText =
    "Modo: "+m.toUpperCase();
}

/* ================= CLICK ================= */
video.addEventListener("click",(e)=>{

  const rect = video.getBoundingClientRect();

  const x = (e.clientX-rect.left)*(video.videoWidth/rect.width);
  const y = (e.clientY-rect.top)*(video.videoHeight/rect.height);

  if(mode !== "compare") return;

  /* ================= PRIMEIRA AMOSTRA ================= */
  if(step === 0){

    sampleA = capture(ctxA,x,y);

    document.getElementById("result").innerText =
      "Referência: "+sampleA.color;

    step = 1;
  }

  /* ================= SEGUNDA AMOSTRA ================= */
  else{

    sampleB = capture(ctxB,x,y);

    const d = deltaE(sampleA.lab, sampleB.lab);

    const similarity = Math.max(0,100 - d);

    const text =
      `Ref: ${sampleA.color} | Atual: ${sampleB.color} | ${similarity.toFixed(1)}% similar`;

    document.getElementById("result").innerText = text;

    speak(text);

    step = 0;
  }
});

/* ================= VOZ TOGGLE ================= */
function toggleVoice(){
  voice = !voice;
  alert("Áudio: " + (voice ? "ON" : "OFF"));
}

</script>

</body>
</html>
