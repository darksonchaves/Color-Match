<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ColorMatch Pro - v25.0 Final Engine</title>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: #fff; overflow: hidden; text-align: center; }
        #header { 
            position: absolute; top: 0; width: 100%; z-index: 20;
            background: rgba(15, 15, 15, 0.98); backdrop-filter: blur(10px);
            display: flex; justify-content: center; padding: 12px 0; gap: 8px; border-bottom: 1px solid #444; flex-wrap: wrap;
        }
        button { 
            background: #222; color: #eee; border: 1px solid #555; padding: 10px 15px; 
            border-radius: 8px; font-weight: bold; font-size: 11px; text-transform: uppercase; cursor: pointer;
        }
        .active { background: #007bff !important; border-color: #007bff; }
        .audio-on { background: #28a745 !important; border-color: #28a745; }
        
        #video-container { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #crosshair { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border: 2px solid rgba(255,255,255,0.6); border-radius: 50%; pointer-events: none; z-index: 10;
        }
        .mira-livre { width: 45px; height: 45px; }
        .mira-padrao { width: 35vw; height: 35vw; border: 3px dashed rgba(255,255,255,0.5); }
        .locked { border-color: #00ffcc !important; box-shadow: 0 0 30px #00ffcc; background: rgba(0,255,204,0.15); }

        #ui-overlay { position: absolute; bottom: 0; width: 100%; padding: 50px 0; background: linear-gradient(transparent, #000 80%); z-index: 20; }
        #color-name { font-size: 60px; font-weight: 900; text-transform: uppercase; color: #555; min-height: 75px; letter-spacing: 3px; }
        .active-text { color: #00ffcc !important; text-shadow: 0 0 35px rgba(0,255,204,0.8); }
    </style>
</head>
<body>

<div id="header">
    <button onclick="toggleSystem()" id="btnPower">SISTEMA: OFF</button>
    <button onclick="toggleAudio()" id="btnAudio">ÁUDIO: OFF</button>
    <button onclick="calibrate()" id="btnCalib">MODO CALIBRAR</button>
    <button onclick="setMode('LIVRE')" id="btnLivre">LIVRE</button>
    <button onclick="setMode('PADRAO')" id="btnPadrao">PADRÃO</button>
</div>

<div id="video-container">
    <video id="v" autoplay playsinline muted></video>
    <div id="crosshair" class="mira-livre"></div>
</div>

<div id="ui-overlay">
    <div id="color-name">INATIVO</div>
</div>

<canvas id="c" style="display:none;"></canvas>

<script>
    const v = document.getElementById('v'), c = document.getElementById('c'), ctx = c.getContext('2d', {willReadFrequently:true});
    const colorTxt = document.getElementById('color-name'), cross = document.getElementById('crosshair');

    let active = false, audioActive = false, mode = 'LIVRE';
    let balance = { r: 1, g: 1, b: 1 }; // Ganhos de Calibração
    let history = [], lastSpeach = "", isSpeaking = false;

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", focusMode: "continuous" } }).then(s => v.srcObject = s);

    function toggleSystem() { 
        active = !active; 
        document.getElementById('btnPower').classList.toggle('active', active);
        document.getElementById('btnPower').innerText = `SISTEMA: ${active ? 'ON' : 'OFF'}`;
        if(!active) { colorTxt.innerText = "INATIVO"; colorTxt.className = ""; history = []; }
    }

    function toggleAudio() {
        audioActive = !audioActive;
        const btn = document.getElementById('btnAudio');
        btn.classList.toggle('audio-on', audioActive);
        btn.innerText = `ÁUDIO: ${audioActive ? 'ON' : 'OFF'}`;
        if(audioActive) speak("Áudio Ativado");
    }

    function setMode(m) {
        mode = m;
        document.getElementById('btnLivre').classList.toggle('active', m === 'LIVRE');
        document.getElementById('btnPadrao').classList.toggle('active', m === 'PADRAO');
        cross.className = (m === 'LIVRE' ? 'mira-livre' : 'mira-padrao');
        if(audioActive) speak("Modo " + m);
    }

    function calibrate() {
        if(!active) return;
        c.width = v.videoWidth; c.height = v.videoHeight;
        ctx.drawImage(v, 0, 0);
        const p = ctx.getImageData(v.videoWidth/2, v.videoHeight/2, 1, 1).data;
        // Calcula o multiplicador para forçar o branco/neutro na luz atual
        const avg = (p[0] + p[1] + p[2]) / 3;
        balance.r = avg / Math.max(p[0], 1);
        balance.g = avg / Math.max(p[1], 1);
        balance.b = avg / Math.max(p[2], 1);
        if(audioActive) speak("Ambiente Calibrado");
    }

    function getFinalColor(r, g, b) {
        // 1. Aplicação do Ganho de Calibração (Filtro de Luz Ambiente)
        r = Math.min(255, r * balance.r);
        g = Math.min(255, g * balance.g);
        b = Math.min(255, b * balance.b);

        // 2. Conversão para HSL (Hue, Saturation, Lightness)
        r /= 255; g /= 255; b /= 255;
        const max = Math.max(r, g, b), min = Math.min(r, g, b);
        let h, s, l = (max + min) / 2;

        if (max === min) { h = s = 0; } 
        else {
            const d = max - min;
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            switch (max) {
                case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                case g: h = (b - r) / d + 2; break;
                case b: h = (r - g) / d + 4; break;
            }
            h *= 60;
        }

        // 3. Lógica de Decisão Universal
        if (l < 0.15) return "Preto";
        if (l > 0.85 && s < 0.2) return "Branco";
        if (s < 0.15) return "Cinza";

        // Setores do Círculo Cromático (Estabilidade Total)
        if (h < 15 || h >= 345) return "Vermelho";
        if (h >= 15 && h < 45) return "Laranja";
        if (h >= 45 && h < 75) return "Amarelo";
        if (h >= 75 && h < 160) return "Verde";
        if (h >= 160 && h < 255) return "Azul";
        if (h >= 255 && h < 300) return "Roxo";
        if (h >= 300 && h < 345) return "Rosa";

        // Refinamento para Marrom (Laranja de baixa luminosidade)
        if (h >= 15 && h < 45 && l < 0.4) return "Marrom";

        return "Indefinido";
    }

    function loop() {
        if (active && v.videoWidth > 0) {
            c.width = v.videoWidth; c.height = v.videoHeight;
            ctx.drawImage(v, 0, 0);
            
            let size = (mode === 'LIVRE' ? 10 : 80);
            const p = ctx.getImageData(v.videoWidth/2 - size/2, v.videoHeight/2 - size/2, size, size).data;
            let r=0, g=0, b=0, count=p.length/4;
            for(let i=0; i<p.length; i+=4) { r+=p[i]; g+=p[i+1]; b+=p[i+2]; }
            
            const result = getFinalColor(r/count, g/count, b/count);
            
            history.push(result);
            if(history.length > 15) history.shift();
            
            const votes = {};
            history.forEach(v => votes[v] = (votes[v] || 0) + 1);
            const winner = Object.keys(votes).reduce((a, b) => votes[a] > votes[b] ? a : b);

            if (votes[winner] >= 12) {
                if (colorTxt.innerText !== winner) {
                    colorTxt.innerText = winner;
                    colorTxt.className = "active-text";
                    cross.classList.add('locked');
                    if (audioActive && winner !== lastSpeach) speak(winner);
                }
            } else {
                colorTxt.innerText = "CALCULANDO";
                colorTxt.className = "";
                cross.classList.remove('locked');
            }
        }
        requestAnimationFrame(loop);
    }

    function speak(t) {
        if(!audioActive || isSpeaking || !t || t === "CALCULANDO") return;
        speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'pt-BR'; m.rate = 1.7;
        m.onstart = () => isSpeaking = true;
        m.onend = () => isSpeaking = false;
        speechSynthesis.speak(m);
        lastSpeach = t;
    }
    loop();
</script>
</body>
</html>
