<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Análise Colorimétrica em Tempo Real</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  #header {
    background: rgba(10,10,20,0.75);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(100,100,255,0.15);
    z-index: 10;
    position: relative;
  }
  #header h1 {
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 2px;
    color: #7b8cde;
    text-transform: uppercase;
  }
  #main {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #camera-container {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }
  #videoEl {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  #canvasEl {
    display: none;
  }

  /* ── Mira centralizada física ── */
  #reticle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60px;
    height: 60px;
    pointer-events: none;
    z-index: 4;
  }
  .reticle-h {
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    height: 1px;
    background: rgba(120,220,255,0.8);
    transform: translateY(-50%);
  }
  .reticle-v {
    position: absolute;
    left: 50%;
    top: 0;
    height: 100%;
    width: 1px;
    background: rgba(120,220,255,0.8);
    transform: translateX(-50%);
  }
  .reticle-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 20px;
    height: 20px;
    border: 1px solid rgba(120,220,255,0.6);
  }

  /* ── Painel flutuante compacto ── */
  #panel {
    position: absolute;
    bottom: 20px;
    left: 20px;
    width: 230px;
    background: rgba(8,8,20,0.82);
    border: 1px solid rgba(100,100,255,0.2);
    border-radius: 10px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 6;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  #color-swatch {
    width: 100%;
    height: 36px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.08);
    transition: background 0.1s ease;
  }
  #color-name {
    text-align: center;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    line-height: 1.1;
  }
  #delta-e-display {
    text-align: center;
    font-size: 0.62rem;
    color: #667;
    margin-top: 1px;
  }

  .data-compact {
    font-size: 0.68rem;
    font-family: 'Courier New', monospace;
    color: #bbc;
    line-height: 1.6;
    letter-spacing: 0.2px;
  }
  .data-compact span.lbl {
    color: #668;
    margin-right: 2px;
  }

  #base-info {
    font-size: 0.62rem;
    color: #556;
    text-align: center;
    min-height: 14px;
  }
  .section-title {
    font-size: 0.58rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #7b8cde;
    margin-bottom: 3px;
  }
  hr.divider {
    border: none;
    border-top: 1px solid rgba(100,100,255,0.1);
  }

  .btn {
    width: 100%;
    padding: 7px;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    transition: all 0.2s ease;
  }
  #btn-calibrate {
    background: linear-gradient(135deg, #2a2a6e, #3a3a9e);
    color: #aac;
    border: 1px solid rgba(100,100,255,0.3);
  }
  #btn-calibrate:hover {
    background: linear-gradient(135deg, #3a3a8e, #5a5abe);
    color: #eef;
  }
  #btn-calibrate.calibrated {
    background: linear-gradient(135deg, #1a4a2e, #2a7a4e);
    border-color: rgba(50,200,100,0.4);
    color: #8fc;
  }
  #btn-camera {
    background: linear-gradient(135deg, #2a1a3e, #4a2a6e);
    color: #bac;
    border: 1px solid rgba(180,100,255,0.3);
  }
  #btn-camera:hover {
    background: linear-gradient(135deg, #3a2a5e, #6a4a9e);
    color: #edf;
  }
  #btn-audio {
    background: linear-gradient(135deg, #1a1a2e, #2a2a3e);
    color: #556;
    border: 1px solid rgba(100,100,150,0.2);
  }
  #btn-audio:hover {
    background: linear-gradient(135deg, #252535, #353550);
    color: #889;
  }
  #btn-audio.audio-on {
    background: linear-gradient(135deg, #163a1e, #1f6030);
    color: #6effa0;
    border: 1px solid rgba(60,200,100,0.45);
    box-shadow: 0 0 8px rgba(60,200,100,0.2);
  }
  #btn-audio.audio-on:hover {
    background: linear-gradient(135deg, #1e4e28, #2a8040);
  }

  #btn-universal {
    background: linear-gradient(135deg, #1a1a2e, #2a2a3e);
    color: #556;
    border: 1px solid rgba(100,100,150,0.2);
  }
  #btn-universal:hover {
    background: linear-gradient(135deg, #252535, #353550);
    color: #889;
  }
  #btn-universal.universal-on {
    background: linear-gradient(135deg, #163a1e, #1f6030);
    color: #6effa0;
    border: 1px solid rgba(60,200,100,0.45);
    box-shadow: 0 0 8px rgba(60,200,100,0.2);
  }
  #btn-universal.universal-on:hover {
    background: linear-gradient(135deg, #1e4e28, #2a8040);
  }

  /* Overlay de início */
  #start-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 8;
    gap: 16px;
  }
  #start-overlay p {
    color: #778;
    font-size: 0.9rem;
  }
  #btn-start {
    padding: 14px 32px;
    background: linear-gradient(135deg, #3a3a9e, #7b5ce8);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  #btn-start:hover { transform: scale(1.05); }
</style>
</head>
<body>
<div id="header">
  <h1>&#9632; Análise Colorimétrica</h1>
  <span style="font-size:0.65rem;color:#445;letter-spacing:1px;">CIE L*a*b* · D65</span>
</div>

<div id="main">
  <div id="camera-container">
    <video id="videoEl" autoplay playsinline muted></video>
    <canvas id="canvasEl"></canvas>

    <div id="reticle">
      <div class="reticle-h"></div>
      <div class="reticle-v"></div>
      <div class="reticle-box"></div>
    </div>

    <div id="start-overlay">
      <p>Clique para iniciar a câmera</p>
      <button id="btn-start" onclick="startCamera()">&#9654; Iniciar Câmera</button>
    </div>
  </div>

  <div id="panel">
    <div id="color-swatch" style="background:#1a1a2e;"></div>
    <div id="color-name" style="color:#445;">Aguardando câmera...</div>
    <div id="delta-e-display"></div>

    <hr class="divider">

    <div class="section-title">RGB</div>
    <div class="data-compact" id="rgb-line">
      <span class="lbl">R:</span>--- &nbsp;<span class="lbl">G:</span>--- &nbsp;<span class="lbl">B:</span>---
    </div>

    <div class="section-title">CIE L*a*b*</div>
    <div class="data-compact" id="lab-line">
      <span class="lbl">L*:</span>--- &nbsp;<span class="lbl">a*:</span>--- &nbsp;<span class="lbl">b*:</span>---
    </div>

    <hr class="divider">

    <div class="section-title">Base Neutra</div>
    <div id="base-info">Não calibrado</div>

    <button class="btn" id="btn-calibrate" onclick="calibrate()">&#9670; Calibrar Fundo</button>
    <button class="btn" id="btn-camera" onclick="switchCamera()">&#8635; Alternar Câmera</button>
    <button class="btn" id="btn-audio" onclick="toggleAudio()">&#128263; Áudio: DESLIGADO</button>
    <button class="btn" id="btn-universal" onclick="toggleUniversalMode()">🔇 Modo Universal: DESLIGADO</button>
  </div>
</div>

<script>
  const video   = document.getElementById('videoEl');
  const canvas  = document.getElementById('canvasEl');
  const ctx     = canvas.getContext('2d');

  let stream      = null;
  let devices     = [];
  let deviceIndex = 0;
  let running     = false;
  let base          = null;  
  let universalMode = false; 

  const SAMPLE           = 6;   // Área de amostragem refinada para precisão do alvo
  const DELTA_E_THRESHOLD = 12;

  // ── Conversões Colorimétricas Estáveis ──────────────────────────────────

  function linearize(c) {
    const v = c / 255;
    return v <= 0.04045 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  }

  function rgbToXYZ(r, g, b) {
    const rl = linearize(r), gl = linearize(g), bl = linearize(b);
    return {
      X: (0.4124564 * rl + 0.3575761 * gl + 0.1804375 * bl) * 100,
      Y: (0.2126729 * rl + 0.7151522 * gl + 0.0721750 * bl) * 100,
      Z: (0.0193339 * rl + 0.1191920 * gl + 0.9503041 * bl) * 100
    };
  }

  function xyzToLab(X, Y, Z) {
    const Xn = 95.047, Yn = 100.000, Zn = 108.883;
    const e = 0.008856, k = 903.3;
    function f(t) { return t > e ? Math.cbrt(t) : (k * t + 16) / 116; }
    const fx = f(X / Xn), fy = f(Y / Yn), fz = f(Z / Zn);
    return { L: 116 * fy - 16, a: 500 * (fx - fy), b: 200 * (fy - fz) };
  }

  function rgbToLab(r, g, b) {
    const xyz = rgbToXYZ(r, g, b);
    return xyzToLab(xyz.X, xyz.Y, xyz.Z);
  }

  function deltaE(lab1, lab2) {
    return Math.sqrt(
      Math.pow(lab1.L - lab2.L, 2) +
      Math.pow(lab1.a - lab2.a, 2) +
      Math.pow(lab1.b - lab2.b, 2)
    );
  }

  /**
   * Classificação blindada baseada em quadrantes físicos do espaço CIE L*a*b*
   */
  function classifyColor(lab, dE) {
    const { L, a, b } = lab;

    // 1. Base Calibrada de Fundo (Independente do modo, se o deltaE for menor que o limite, assume o fundo)
    if (base && dE < DELTA_E_THRESHOLD)
      return { name: 'Base Calibrada (Fundo)', color: '#778899' };

    // 2. Isolamento de Brancos de Alta Intensidade / Reflexos de Luz
    if (L > 90)
      return { name: 'Reflexo / Saturado', color: '#ccd0e0' };

    // Se o Modo Universal estiver desligado, segue regras diretas para evitar falsos roxos
    if (!universalMode) {
      if (b < -12 && a < 10) return { name: 'Azul', color: '#3b82f6' };
      if (a < -8) return { name: 'Verde / Verde-Limão', color: '#4ade80' };
      if (b > 15 && a < 5) return { name: 'Amarelo', color: '#facc15' };
      if (a > 15 && b >= 0) return { name: 'Vermelho Ótimo', color: '#e03040' };
      if (a > 10 && b < 0) return { name: 'Roxo / Violeta', color: '#a855f7' };
      return { name: 'Indefinido', color: '#445566' };
    }

    // ── MODO UNIVERSAL ATIVADO RIGOROSO ──
    
    // Roxo / Violeta (b* obrigatoriamente negativo abaixo de -5 e componente a* vermelha ativa)
    if (b < -5 && a > 8)
      return { name: 'Roxo / Violeta', color: '#a855f7' };

    // Azul Puro (Eixo b* negativo profundo, sem traços significativos de a*)
    if (b < -18 && a <= 8)
      return { name: 'Azul', color: '#3b82f6' };

    // Verde / Verde-Limão (Eixo a* negativo predominante)
    if (a < -6 && b > 10)
      return { name: 'Verde / Verde-Limão', color: '#4ade80' };

    // Amarelo (Eixo b* positivo limpo)
    if (b > 18 && a >= -8 && a < 10)
      return { name: 'Amarelo', color: '#facc15' };

    // Vermelho Ótimo (Eixo a* extremamente positivo com b* estabilizado acima de zero)
    if (a > 16 && b >= 2 && L <= 85)
      return { name: 'Vermelho Ótimo', color: '#e03040' };

    // Rosa / Transição
    if (a >= 10 && a <= 22 && b < 5)
      return { name: 'Rosa / Transição', color: '#e07090' };

    return { name: 'Indefinido', color: '#445566' };
  }

  // ── Amostragem de Mapeamento Físico Real (Garante alinhamento com a Mira) ──

  function samplePixels() {
    // Sincroniza as dimensões físicas do canvas com o frame real da câmera
    if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
    }
    
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    // Mapeia matematicamente o centro exato
    const cx = Math.floor(canvas.width / 2);
    const cy = Math.floor(canvas.height / 2);
    
    const data = ctx.getImageData(cx - SAMPLE, cy - SAMPLE, SAMPLE * 2, SAMPLE * 2).data;
    let rSum = 0, gSum = 0, bSum = 0, count = 0;
    
    for (let i = 0; i < data.length; i += 4) {
      rSum += data[i]; 
      gSum += data[i + 1]; 
      bSum += data[i + 2]; 
      count++;
    }
    
    return {
      r: Math.round(rSum / count),
      g: Math.round(gSum / count),
      b: Math.round(bSum / count)
    };
  }

  // ── Controle do Sistema de Áudio sem Atrasos ─────────────────────────────

  let audioEnabled    = false;    
  let lastSpokenName  = '';       
  let pendingName     = '';       
  let stableTimer     = null;     
  const STABLE_MS     = 500; // Resposta rápida para evitar gargalos na fila de áudio

  function toggleAudio() {
    if (window.speechSynthesis) { window.speechSynthesis.speak(new SpeechSynthesisUtterance('')); }
    audioEnabled = !audioEnabled;
    const btn = document.getElementById('btn-audio');
    if (audioEnabled) {
      btn.textContent = '🔊 Áudio: LIGADO';
      btn.classList.add('audio-on');
    } else {
      btn.textContent = '🔇 Áudio: DESLIGADO';
      btn.classList.remove('audio-on');
      if (window.speechSynthesis) window.speechSynthesis.cancel();
      if (stableTimer) { clearTimeout(stableTimer); stableTimer = null; }
      pendingName    = '';
      lastSpokenName = '';
    }
  }

  function toggleUniversalMode() {
    universalMode = !universalMode;
    const btn = document.getElementById('btn-universal');
    if (universalMode) {
      btn.textContent = '🔊 Modo Universal: LIGADO';
      btn.classList.add('universal-on');
    } else {
      btn.textContent = '🔇 Modo Universal: DESLIGADO';
      btn.classList.remove('universal-on');
    }
  }

  function speakColor(name) {
    if (!window.speechSynthesis || !audioEnabled) return;
    window.speechSynthesis.cancel(); // Mata qualquer áudio atrasado na fila antes de falar o novo
    const utt = new SpeechSynthesisUtterance(name);
    utt.lang  = 'pt-BR';
    utt.rate  = 1.1; // Ligeiramente mais rápido para dar resposta em tempo real
    utt.pitch = 1.0;
    window.speechSynthesis.speak(utt);
  }

  function triggerAudioIfChanged(name) {
    if (!audioEnabled) return;         
    if (name === lastSpokenName) {
      if (pendingName !== name && stableTimer) {
        clearTimeout(stableTimer);
        stableTimer = null;
        pendingName = '';
      }
      return;
    }
    if (name !== pendingName) {
      pendingName = name;
      if (stableTimer) clearTimeout(stableTimer);
      stableTimer = setTimeout(() => {
        if (!audioEnabled) { stableTimer = null; return; }
        lastSpokenName = pendingName;
        speakColor(pendingName);
        stableTimer = null;
      }, STABLE_MS);
    }
  }

  // ── Loop Principal ───────────────────────────────────────────────────────

  function update() {
    if (!running || video.readyState < 2) { requestAnimationFrame(update); return; }
    
    const { r, g, b } = samplePixels();
    const lab          = rgbToLab(r, g, b);
    const dE           = base ? deltaE(lab, base) : 999;
    const cls          = classifyColor(lab, dE);

    document.getElementById('rgb-line').innerHTML =
      `<span class="lbl">R:</span>${r} &nbsp;<span class="lbl">G:</span>${g} &nbsp;<span class="lbl">B:</span>${b}`;

    document.getElementById('lab-line').innerHTML =
      `<span class="lbl">L*:</span>${lab.L.toFixed(1)} &nbsp;<span class="lbl">a*:</span>${lab.a.toFixed(1)} &nbsp;<span class="lbl">b*:</span>${lab.b.toFixed(1)}`;

    document.getElementById('color-swatch').style.background = `rgb(${r},${g},${b})`;
    document.getElementById('color-name').textContent  = cls.name;
    document.getElementById('color-name').style.color  = cls.color;

    if (base) {
      document.getElementById('delta-e-display').textContent =
        `ΔE = ${dE.toFixed(2)} (limiar: ${DELTA_E_THRESHOLD})`;
    } else {
      document.getElementById('delta-e-display').textContent = '';
    }

    triggerAudioIfChanged(cls.name);
    requestAnimationFrame(update);
  }

  // ── Inicialização de Câmera Hardware ─────────────────────────────────────

  async function getDevices() {
    const devs = await navigator.mediaDevices.enumerateDevices();
    devices = devs.filter(d => d.kind === 'videoinput');
  }

  async function openCamera(preferredDeviceId = null) {
    if (stream) { stream.getTracks().forEach(t => t.stop()); }

    const tryOpen = async (constraints) => {
      stream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = stream;
    };

    if (preferredDeviceId) {
      try {
        await tryOpen({ video: { deviceId: { exact: preferredDeviceId }, width: { ideal: 1280 }, height: { ideal: 720 } } });
        return;
      } catch (_) {}
    }

    try {
      await tryOpen({ video: { facingMode: { exact: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } } });
      return;
    } catch (_) {}

    try {
      await tryOpen({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } });
      return;
    } catch (_) {}

    try {
      await tryOpen({ video: true });
    } catch (e) {
      alert('Erro ao acessar a câmera: ' + e.message);
    }
  }

  async function startCamera() {
    document.getElementById('start-overlay').style.display = 'none';
    await getDevices();
    await openCamera(); 
    running = true;
    requestAnimationFrame(update);
  }

  async function switchCamera() {
    if (devices.length < 2) { alert('Apenas uma câmera disponível.'); return; }
    deviceIndex = (deviceIndex + 1) % devices.length;
    await openCamera(devices[deviceIndex].deviceId);
  }

  function calibrate() {
    if (!running) { alert('Inicie a câmera primeiro.'); return; }
    const { r, g, b } = samplePixels();
    base = rgbToLab(r, g, b);
    const btn = document.getElementById('btn-calibrate');
    btn.textContent = '✓ Base Calibrada';
    btn.classList.add('calibrated');
    document.getElementById('base-info').textContent =
      `L*=${base.L.toFixed(1)}  a*=${base.a.toFixed(1)}  b*=${base.b.toFixed(1)}`;
  }
</script>
</body>
</html>
