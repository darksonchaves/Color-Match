<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro - Spectral Engine v7.4</title>
<style>
  body{ margin:0; font-family: 'Segoe UI', sans-serif; background:#000; color:#fff; text-align:center; overflow:hidden; }
  #header{ padding: 12px; background: #0a0a0a; display: flex; justify-content: center; gap: 10px; border-bottom: 2px solid #1a1a1a; }
  #video-container { position: relative; width: 100%; height: 65vh; background: #000; }
  video{ width: 100%; height: 100%; object-fit: contain; }
  button{ padding:12px 18px; border-radius:10px; border:none; background:#1a1a1a; color:#888; font-weight:bold; cursor:pointer; transition: 0.4s; border: 1px solid #333; }
  .active{ background:#00ffcc !important; color:#000 !important; box-shadow: 0 0 20px rgba(0,255,204,0.3); border: 1px solid #00ffcc; }
  #cross{ position:absolute; top:50%; left:50%; width:30px; height:30px; transform:translate(-50%,-50%); border:2px dashed #00ffcc; border-radius:50%; pointer-events:none; z-index: 10; }
  #display{ font-size: 48px; font-weight: 900; color: #00ffcc; margin: 20px 0; text-transform: uppercase; }
  .info { color: #444; font-size: 10px; letter-spacing: 2px; font-weight: bold; }
</style>
</head>
<body>

<div id="header">
  <button onclick="toggleUniv()" id="btnU">MODO UNIVERSAL: OFF</button>
  <button onclick="calibrate()">CALIBRAR ESPECTRO</button>
  <button onclick="toggleVoice()" id="btnV" class="active">ÁUDIO: ON</button>
</div>

<div id="video-container">
  <video id="v" autoplay playsinline muted></video>
  <div id="cross"></div>
</div>

<div id="display">AGUARDANDO</div>
<div id="stats" class="info">V7.4: LEITURA DE PIGMENTO PRIMÁRIO</div>

<canvas id="c" style="display:none;"></canvas>

<script>
const video = document.getElementById('v');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', {willReadFrequently: true});
const display = document.getElementById('display');
const stats = document.getElementById('stats');

let isUniv = false, isVoice = true, lastColor = "", stableCount = 0;
let offset = {r:255, g:255, b:255}, colorHistory = []; 

navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment", width: {ideal: 1280}, frameRate: {ideal: 60} }
}).then(s => { video.srcObject = s; });

function speak(t) {
    if(!isVoice || !isUniv) return;
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(t);
    msg.lang = 'pt-BR';
    msg.rate = 1.5;
    window.speechSynthesis.speak(msg);
}

function calibrate() {
    const data = getCenterColor();
    offset = {r: data.r, g: data.g, b: data.b};
    speak("Espectro Calibrado");
}

function getCenterColor() {
    if (canvas.width !== video.videoWidth) {
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    }
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const x = canvas.width / 2, y = canvas.height / 2;
    const d = ctx.getImageData(x - 5, y - 5, 10, 10).data;
    let r=0, g=0, b=0, v=0;
    for(let i=0; i<d.length; i+=4){
        r += d[i]; g += d[i+1]; b += d[i+2]; v++;
    }
    return { r: r/v, g: g/v, b: b/v };
}

function solveColor(r, g, b) {
    // 1. NORMALIZAÇÃO ESPECTRAL (Converte para % de presença de cor)
    const sum = r + g + b + 1;
    let pr = r / sum;
    let pg = g / sum;
    let pb = b / sum;

    // Compensação de Calibração
    const offSum = offset.r + offset.g + offset.b + 1;
    pr /= (offset.r / offSum);
    pg /= (offset.g / offSum);
    pb /= (offset.b / offSum);

    const nSum = pr + pg + pb;
    pr /= nSum; pg /= nSum; pb /= nSum;

    // 2. CÁLCULO DE PUREZA (Chroma) E LUMINÂNCIA
    const maxP = Math.max(pr, pg, pb);
    const minP = Math.min(pr, pg, pb);
    const purity = maxP - minP;
    const brightness = (r + g + b) / 3;

    // 3. MOTOR DE DECISÃO UNIVERSAL (Fiel ao Espectro)
    
    // Trava de Neutros: Preto, Cinza e Branco
    if (purity < 0.08) {
        if (brightness < 55) return "Preto";
        if (brightness > 195) return "Branco";
        return "Cinza";
    }

    // Cálculo do Matiz (Hue) baseado nas proporções normalizadas
    let h = 0;
    if (maxP === pr) h = (pg - pb) / (maxP - minP);
    else if (maxP === pg) h = 2 + (pb - pr) / (maxP - minP);
    else h = 4 + (pr - pg) / (maxP - minP);
    h *= 60; if (h < 0) h += 360;

    // Categorização por Assinatura (Foco em todas as cores)
    if (h < 15 || h > 340) {
        // Diferencia Vermelho de Rosa pela "pobreza" do canal verde
        if (pg > 0.32 && brightness > 120) return "Rosa";
        return (brightness < 80) ? "Vermelho Escuro" : "Vermelho";
    }
    
    if (h >= 15 && h < 45) {
        return (brightness < 100) ? "Marrom" : "Laranja";
    }
    
    if (h >= 45 && h < 70) return "Amarelo";
    
    if (h >= 70 && h < 160) {
        // Verde puro vs tons de floresta
        return (brightness < 70) ? "Verde Escuro" : "Verde";
    }
    
    if (h >= 160 && h < 260) {
        // Azul vs Ciano/Verde Água
        if (h < 185 && pg > 0.35) return "Verde"; // Tons turquesa
        return "Azul";
    }
    
    if (h >= 260 && h < 310) return "Roxo";
    
    if (h >= 310 && h <= 340) return "Rosa";

    return "Analisando...";
}

function getStableColor(newColor) {
    colorHistory.push(newColor);
    if (colorHistory.length > 25) colorHistory.shift(); 
    return colorHistory.sort((a,b) =>
          colorHistory.filter(v => v===a).length - colorHistory.filter(v => v===b).length
    ).pop();
}

function mainLoop() {
    if(video.videoWidth > 0) {
        const rgb = getCenterColor();
        const colorName = getStableColor(solveColor(rgb.r, rgb.g, rgb.b));

        if(isUniv) {
            display.innerText = colorName;
            if(colorName === lastColor && colorName !== "Analisando...") {
                stableCount++;
                if(stableCount === 25) speak(colorName);
            } else { lastColor = colorName; stableCount = 0; }
        } else {
            display.innerText = "PRONTO";
            stats.innerText = `PIGMENTO: ${Math.round(rgb.r)},${Math.round(rgb.g)},${Math.round(rgb.b)}`;
        }
    }
    requestAnimationFrame(mainLoop);
}

function toggleUniv() { 
    isUniv = !isUniv; 
    const btn = document.getElementById('btnU');
    btn.classList.toggle('active');
    btn.innerText = isUniv ? "MODO UNIVERSAL: ON" : "MODO UNIVERSAL: OFF";
    if(isUniv) { speak("Sistema Base Ativado"); colorHistory = []; }
}

function toggleVoice() { 
    isVoice = !isVoice; 
    document.getElementById('btnV').classList.toggle('active');
}

requestAnimationFrame(mainLoop);
</script>
</body>
</html>
