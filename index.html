<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro – Hybrid Vision Engine</title>

<style>
body {
  text-align:center;
  font-family:Arial;
  background:#111;
  color:#fff;
  position:relative;
  margin:0;
}

video {
  width:90%;
  border-radius:10px;
}

#box {
  width:120px;
  height:120px;
  margin:15px auto;
  border-radius:10px;
  border:2px solid #fff;
}

/* snapshot do modo estático */
#snapshot {
  width:90%;
  margin:10px auto;
  border-radius:10px;
  display:none;
  border:2px solid #00ffcc;
}

/* mira live */
#cross {
  position:absolute;
  left:50%;
  top:50%;
  width:22px;
  height:22px;
  border:2px solid #00ffcc;
  border-radius:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
  display:none;
  box-shadow:0 0 10px #00ffcc;
}

/* label live */
#liveLabel {
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%, 30px);
  color:#00ffcc;
  font-weight:bold;
  font-size:14px;
  text-shadow:0 0 8px #000;
  pointer-events:none;
  display:none;
}

button {
  padding:10px;
  margin:5px;
}
</style>
</head>

<body>

<h2>ColorMatch Pro – Hybrid Vision</h2>

<button onclick="setMode('static')">Modo Estático</button>
<button onclick="setMode('live')">Modo Movimento</button>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<!-- 🔥 snapshot visual do modo estático -->
<img id="snapshot"/>

<div id="box"></div>
<p id="txt">Selecione um modo</p>

<div id="cross"></div>
<div id="liveLabel"></div>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const snapshot = document.getElementById("snapshot");
const cross = document.getElementById("cross");
const liveLabel = document.getElementById("liveLabel");

let mode = "static";

// ---------------- CAMERA ----------------
navigator.mediaDevices.getUserMedia({
  video: { facingMode: { ideal: "environment" } }
}).then(s => video.srcObject = s);

// ---------------- LAB ----------------
function rgbToLab(r,g,b){

  r/=255; g/=255; b/=255;

  [r,g,b]=[r,g,b].map(v=>{
    return v>0.04045
      ? Math.pow((v+0.055)/1.055,2.4)
      : v/12.92;
  });

  let x=r*0.4124 + g*0.3576 + b*0.1805;
  let y=r*0.2126 + g*0.7152 + b*0.0722;
  let z=r*0.0193 + g*0.1192 + b*0.9505;

  x/=0.95047;
  y/=1.0;
  z/=1.08883;

  [x,y,z]=[x,y,z].map(v=>{
    return v>0.008856 ? Math.cbrt(v) : (7.787*v)+(16/116);
  });

  return {
    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)
  };
}

// ---------------- ΔE ----------------
function deltaE(a,b){
  return Math.sqrt(
    (a.L-b.L)**2 +
    (a.a-b.a)**2 +
    (a.b-b.b)**2
  );
}

// ---------------- CORES ----------------
const colors = [
  {n:"Preto", lab:rgbToLab(15,15,15)},
  {n:"Branco", lab:rgbToLab(245,245,245)},
  {n:"Cinza", lab:rgbToLab(128,128,128)},

  {n:"Vermelho", lab:rgbToLab(220,60,60)},
  {n:"Verde", lab:rgbToLab(60,200,60)},
  {n:"Azul", lab:rgbToLab(60,80,220)},

  {n:"Amarelo", lab:rgbToLab(240,220,80)},
  {n:"Laranja", lab:rgbToLab(240,150,80)},
  {n:"Rosa", lab:rgbToLab(240,120,180)},
  {n:"Roxo", lab:rgbToLab(140,70,170)},
  {n:"Marrom", lab:rgbToLab(120,80,60)}
];

// ---------------- DETECÇÃO ----------------
function detect(r,g,b){

  const lab = rgbToLab(r,g,b);

  let best = {n:"Indefinido", d:999};

  for(const c of colors){
    const d = deltaE(lab,c.lab);
    if(d < best.d) best = {n:c.n, d};
  }

  return {
    name: best.n,
    confidence: Math.max(0, 100 - best.d*2)
  };
}

// ---------------- STATIC CAPTURE ----------------
function captureStatic(x,y){

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  const size = 12;

  const data = ctx.getImageData(
    x-size,y-size,size*2,size*2
  ).data;

  let r=0,g=0,b=0,c=0;

  for(let i=0;i<data.length;i+=4){
    r+=data[i];
    g+=data[i+1];
    b+=data[i+2];
    c++;
  }

  r/=c; g/=c; b/=c;

  return detect(r,g,b);
}

// ---------------- LIVE CAPTURE ----------------
function captureLive(){

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const x = canvas.width/2;
  const y = canvas.height/2;

  const size = 15;

  ctx.drawImage(video,0,0);

  const data = ctx.getImageData(
    x-size,y-size,size*2,size*2
  ).data;

  let r=0,g=0,b=0,c=0;

  for(let i=0;i<data.length;i+=4){
    r+=data[i];
    g+=data[i+1];
    b+=data[i+2];
    c++;
  }

  r/=c; g/=c; b/=c;

  return detect(r,g,b);
}

// ---------------- STATIC MODE CLICK ----------------
video.addEventListener("click",(e)=>{

  if(mode !== "static") return;

  const rect = video.getBoundingClientRect();

  const x = (e.clientX-rect.left)*(video.videoWidth/rect.width);
  const y = (e.clientY-rect.top)*(video.videoHeight/rect.height);

  // 🔥 snapshot visual
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  snapshot.src = canvas.toDataURL();
  snapshot.style.display = "block";

  const res = captureStatic(x,y);

  document.getElementById("box").style.background =
    `rgb(255,255,255)`;

  document.getElementById("txt").innerText =
    `STATIC: ${res.name} | ${res.confidence.toFixed(1)}%`;
});

// ---------------- LIVE LOOP ----------------
function loop(){

  if(mode !== "live") return;

  const res = captureLive();

  liveLabel.innerText =
    `${res.name} | ${res.confidence.toFixed(1)}%`;

  document.getElementById("txt").innerText =
    "LIVE MODE ACTIVE";

  requestAnimationFrame(loop);
}

// ---------------- MODE SWITCH ----------------
function setMode(m){

  mode = m;

  if(m === "live"){
    cross.style.display = "block";
    liveLabel.style.display = "block";
    snapshot.style.display = "none";
    loop();
  }

  if(m === "static"){
    cross.style.display = "none";
    liveLabel.style.display = "none";
  }
}

</script>

</body>
</html>
