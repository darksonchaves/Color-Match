<script>

/* ===================================================== */
/* ELEMENTOS */
/* ===================================================== */

const video = document.getElementById("video");

const canvasA = document.getElementById("canvasA");
const canvasB = document.getElementById("canvasB");

const ctxA = canvasA.getContext("2d",{willReadFrequently:true});
const ctxB = canvasB.getContext("2d",{willReadFrequently:true});

const txt = document.getElementById("txt");

const cross = document.getElementById("cross");

const rgbValue = document.getElementById("rgbValue");
const hexValue = document.getElementById("hexValue");
const colorName = document.getElementById("colorName");
const similarityValue = document.getElementById("similarityValue");
const precisionText = document.getElementById("precisionText");
const liveFill = document.getElementById("liveFill");
const modeText = document.getElementById("modeText");
const solidIndicator = document.getElementById("solidIndicator");

/* ===================================================== */
/* CONTROLE */
/* ===================================================== */

let mode = "static";

let voice = true;

let streamTrack = null;
let flashOn = false;

let processingPaused = false;

let lastSpokenColor = "";
let speechLocked = false;

const MIN_SIMILARITY_TO_SPEAK = 72;

/* ===================================================== */
/* UNIVERSAL COLORS */
/* ===================================================== */

const universalColors = [

{name:"Branco",rgb:{r:255,g:255,b:255}},
{name:"Preto",rgb:{r:0,g:0,b:0}},
{name:"Cinza",rgb:{r:128,g:128,b:128}},
{name:"Vermelho",rgb:{r:255,g:0,b:0}},
{name:"Azul",rgb:{r:0,g:0,b:255}},
{name:"Verde",rgb:{r:0,g:255,b:0}},
{name:"Amarelo",rgb:{r:255,g:255,b:0}},
{name:"Laranja",rgb:{r:255,g:140,b:0}},
{name:"Roxo",rgb:{r:128,g:0,b:128}},
{name:"Marrom",rgb:{r:101,g:67,b:33}},
{name:"Bege",rgb:{r:210,g:180,b:140}}

];

/* ===================================================== */
/* CAMERA */
/* ===================================================== */

async function startCamera(){

  try{

    const stream =
    await navigator.mediaDevices.getUserMedia({

      video:{
        facingMode:{ideal:"environment"},
        width:{ideal:1920},
        height:{ideal:1080}
      },

      audio:false

    });

    video.srcObject = stream;

    await video.play();

    streamTrack = stream.getVideoTracks()[0];

    txt.innerHTML =
    "<span class='statusGood'>Câmera iniciada</span>";

  }catch(e){

    txt.innerHTML =
    "<span class='statusBad'>Falha na câmera</span>";

  }

}

startCamera();

/* ===================================================== */
/* AUDIO */
/* ===================================================== */

function speak(text){

  if(!voice) return;

  if(!window.speechSynthesis) return;

  if(speechLocked) return;

  speechLocked = true;

  speechSynthesis.cancel();

  const msg =
  new SpeechSynthesisUtterance(text);

  msg.lang = "pt-BR";

  msg.onend = ()=>{

    setTimeout(()=>{

      speechLocked = false;

    },250);

  };

  speechSynthesis.speak(msg);

}

function smartSpeakColor(color,similarity){

  similarity = parseFloat(similarity);

  if(similarity < MIN_SIMILARITY_TO_SPEAK){
    return;
  }

  if(color !== lastSpokenColor){

    lastSpokenColor = color;

    speak(color);

  }

}

/* ===================================================== */
/* RGB */
/* ===================================================== */

function rgbToHex(r,g,b){

  return "#" + [r,g,b]
  .map(v=>v.toString(16).padStart(2,"0"))
  .join("")
  .toUpperCase();

}

/* ===================================================== */
/* LAB */
/* ===================================================== */

function rgbToLab(r,g,b){

  r/=255;
  g/=255;
  b/=255;

  [r,g,b]=[r,g,b].map(v=>

    v > 0.04045
    ? Math.pow((v+0.055)/1.055,2.4)
    : v/12.92

  );

  let x =
  r*0.4124 +
  g*0.3576 +
  b*0.1805;

  let y =
  r*0.2126 +
  g*0.7152 +
  b*0.0722;

  let z =
  r*0.0193 +
  g*0.1192 +
  b*0.9505;

  x/=0.95047;
  y/=1;
  z/=1.08883;

  [x,y,z]=[x,y,z].map(v=>

    v > 0.008856
    ? Math.cbrt(v)
    : (7.787*v)+(16/116)

  );

  return{

    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)

  };

}

function deltaE(a,b){

  return Math.sqrt(

    (a.L-b.L)**2 +
    (a.a-b.a)**2 +
    (a.b-b.b)**2

  );

}

/* ===================================================== */
/* PREPARA LAB */
/* ===================================================== */

universalColors.forEach(item=>{

  item.lab = rgbToLab(
    item.rgb.r,
    item.rgb.g,
    item.rgb.b
  );

});

/* ===================================================== */
/* NOVO MOTOR SOLID ENGINE */
/* ===================================================== */

function analyzeSurfaceQuality(samples){

  let variance = 0;

  const avgR =
  samples.reduce((a,b)=>a+b.r,0)/samples.length;

  const avgG =
  samples.reduce((a,b)=>a+b.g,0)/samples.length;

  const avgB =
  samples.reduce((a,b)=>a+b.b,0)/samples.length;

  for(const s of samples){

    variance +=

    Math.abs(s.r - avgR) +
    Math.abs(s.g - avgG) +
    Math.abs(s.b - avgB);

  }

  variance /= samples.length;

  const max =
  Math.max(avgR,avgG,avgB);

  const min =
  Math.min(avgR,avgG,avgB);

  const chroma =
  max - min;

  return{

    variance,
    chroma,

    isSolid:

      variance < 18 &&
      chroma > 18

  };

}

/* ===================================================== */
/* CAPTURA PROFISSIONAL */
/* ===================================================== */

function captureRaw(x,y){

  if(!video.videoWidth || processingPaused){

    return{
      r:0,
      g:0,
      b:0
    };

  }

  canvasA.width = video.videoWidth;
  canvasA.height = video.videoHeight;

  ctxA.drawImage(video,0,0);

  const samples = [];

  const area = 20;

  for(let sy=-area; sy<=area; sy+=8){

    for(let sx=-area; sx<=area; sx+=8){

      const px = x + sx;
      const py = y + sy;

      const data = ctxA.getImageData(
        px,
        py,
        1,
        1
      ).data;

      samples.push({

        r:data[0],
        g:data[1],
        b:data[2]

      });

    }

  }

  let r=0,g=0,b=0;

  samples.forEach(s=>{

    r += s.r;
    g += s.g;
    b += s.b;

  });

  r = Math.round(r/samples.length);
  g = Math.round(g/samples.length);
  b = Math.round(b/samples.length);

  drawPreview(r,g,b);

  const surface =
  analyzeSurfaceQuality(samples);

  return{

    r,g,b,
    surface

  };

}

/* ===================================================== */
/* PREVIEW */
/* ===================================================== */

function drawPreview(r,g,b){

  canvasA.width = 200;
  canvasA.height = 200;

  ctxA.fillStyle =
  rgb(${r},${g},${b});

  ctxA.fillRect(0,0,200,200);

  canvasB.width = 200;
  canvasB.height = 200;

  ctxB.fillStyle =
  rgb(${r},${g},${b});

  ctxB.fillRect(0,0,200,200);

  rgbValue.innerHTML =
  ${r}, ${g}, ${b};

  hexValue.innerHTML =
  rgbToHex(r,g,b);

}

/* ===================================================== */
/* UNIVERSAL DETECT */
/* ===================================================== */

function detectUniversal(sig){

  if(!sig.surface.isSolid){

    return{
      blocked:true
    };

  }

  const targetLab =
  rgbToLab(sig.r,sig.g,sig.b);

  let best = null;
  let bestDelta = 999;

  for(const color of universalColors){

    const d =
    deltaE(targetLab,color.lab);

    if(d < bestDelta){

      bestDelta = d;
      best = color;

    }

  }

  return{

    blocked:false,
    match:best,
    delta:bestDelta

  };

}

/* ===================================================== */
/* UI */
/* ===================================================== */

function updateUI(name,similarity){

  colorName.innerHTML = name;

  similarityValue.innerHTML =
  similarity + "%";

  precisionText.innerHTML =
  similarity + "%";

  liveFill.style.width =
  similarity + "%";

}

/* ===================================================== */
/* UNIVERSAL ANALYZE */
/* ===================================================== */

function analyzeUniversal(){

  const sig = captureRaw(

    video.videoWidth/2,
    video.videoHeight/2

  );

  if(sig.surface.isSolid){

    solidIndicator.style.display = "block";
    solidIndicator.innerHTML =
    "SUPERFÍCIE SÓLIDA";
    solidIndicator.style.borderColor =
    "#00ff99";

  }else{

    solidIndicator.style.display = "block";
    solidIndicator.innerHTML =
    "EFEITO / METÁLICO DETECTADO";
    solidIndicator.style.borderColor =
    "#ff5555";

  }

  const result =
  detectUniversal(sig);

  if(result.blocked){

    txt.innerHTML = `
    <span class='statusBad'>
    Superfície rejeitada pelo
    Universal Solid Engine
    <br><br>
    Motivo:
    efeito metálico,
    brilho irregular ou reflexo
    </span>`;

    return;

  }

  const similarity = Math.max(
    0,
    100 - result.delta
  ).toFixed(1);

  updateUI(
    result.match.name,
    similarity
  );

  txt.innerHTML = `
  <span class='statusGood'>

  COR SÓLIDA DETECTADA

  <br><br>

  ${result.match.name}

  <br>

  Similaridade:
  ${similarity}%

  </span>`;

  smartSpeakColor(
    result.match.name,
    similarity
  );

}

/* ===================================================== */
/* LOOP LIVE */
/* ===================================================== */

function universalMoveLoop(){

  if(mode !== "universalMove") return;

  const sig = captureRaw(

    video.videoWidth/2,
    video.videoHeight/2

  );

  const result =
  detectUniversal(sig);

  if(result.blocked){

    solidIndicator.style.display = "block";

    solidIndicator.innerHTML =
    "SUPERFÍCIE NÃO SÓLIDA";

    solidIndicator.style.borderColor =
    "#ff4444";

    txt.innerHTML = `
    <span class='statusBad'>
    Universal Solid Engine
    bloqueou superfície metálica
    </span>`;

    requestAnimationFrame(
      universalMoveLoop
    );

    return;

  }

  solidIndicator.style.display = "block";

  solidIndicator.innerHTML =
  "SUPERFÍCIE SÓLIDA";

  solidIndicator.style.borderColor =
  "#00ff99";

  const similarity = Math.max(
    0,
    100 - result.delta
  ).toFixed(1);

  updateUI(
    result.match.name,
    similarity
  );

  txt.innerHTML = `
  <span class='statusGood'>

  ${result.match.name}

  <br>

  Similaridade:
  ${similarity}%

  </span>`;

  smartSpeakColor(
    result.match.name,
    similarity
  );

  requestAnimationFrame(
    universalMoveLoop
  );

}

/* ===================================================== */
/* MODOS */
/* ===================================================== */

function clearButtons(){

  document.querySelectorAll("button")
  .forEach(btn=>{

    btn.classList.remove("active");

  });

}

function setMode(m){

  mode = m;

  lastSpokenColor = "";
  speechLocked = false;

  clearButtons();

  if(m === "universal"){
    btnUniversal.classList.add("active");
    modeText.innerHTML =
    "UNIVERSAL SÓLIDO";
  }

  if(m === "universalMove"){
    btnUniversalMove.classList.add("active");
    modeText.innerHTML =
    "UNIVERSAL LIVE";
  }

  cross.style.display = (

    m === "universalMove"

  )

  ? "block"
  : "none";

  txt.innerHTML = `
  <span class='statusGood'>
  Modo ${m.toUpperCase()} ativado
  </span>`;

  if(m === "universalMove"){

    universalMoveLoop();

  }

}

setMode("universal");

/* ===================================================== */
/* CLICK */
/* ===================================================== */

video.addEventListener("click",()=>{

  if(mode === "universal"){

    analyzeUniversal();

  }

});

/* ===================================================== */
/* FLASH */
/* ===================================================== */

async function toggleFlash(){

  if(!streamTrack) return;

  try{

    const capabilities =
    streamTrack.getCapabilities();

    if(!capabilities.torch){

      alert("Flash não suportado");
      return;

    }

    flashOn = !flashOn;

    await streamTrack.applyConstraints({

      advanced:[{torch:flashOn}]

    });

  }catch(e){

    console.error(e);

  }

}

/* ===================================================== */
/* AUDIO */
/* ===================================================== */

function toggleVoice(){

  voice = !voice;

  if(!voice){

    speechSynthesis.cancel();

  }

  txt.innerHTML = voice

  ? "<span class='statusGood'>Áudio ativado</span>"

  : "<span class='statusBad'>Áudio desativado</span>";

}

</script>
