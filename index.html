<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro – Unified Precision Engine FINAL</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
  text-align:center;
}

video {
  width:90%;
  border-radius:10px;
}

button {
  padding:10px;
  margin:5px;
}

#panel {
  display:flex;
  justify-content:space-around;
  flex-wrap:wrap;
  margin-top:10px;
}

.box {
  width:45%;
  min-width:160px;
}

canvas {
  width:100%;
  border-radius:10px;
  background:#222;
}

#cross {
  position:fixed;
  top:50%;
  left:50%;
  width:24px;
  height:24px;
  border:2px solid #00ffcc;
  border-radius:50%;
  transform:translate(-50%,-50%);
  display:none;
  pointer-events:none;
}

.point {
  position:absolute;
  width:12px;
  height:12px;
  border-radius:50%;
  border:2px solid;
  pointer-events:none;
  display:none;
}

#p1 { border-color:lime; }
#p2 { border-color:red; }

#txt {
  margin-top:10px;
}
</style>
</head>

<body>

<h2>ColorMatch Pro – Unified Engine</h2>

<button onclick="setMode('static')">Estático</button>
<button onclick="setMode('move')">Movimento</button>
<button onclick="setMode('compare')">Comparar</button>
<button onclick="toggleVoice()">🔊 Áudio</button>

<video id="video" autoplay playsinline></video>

<div id="cross"></div>
<div id="p1" class="point"></div>
<div id="p2" class="point"></div>

<div id="panel">
  <div class="box">
    <canvas id="canvasA"></canvas>
    <div>Referência</div>
  </div>

  <div class="box">
    <canvas id="canvasB"></canvas>
    <div>Comparação</div>
  </div>
</div>

<p id="txt">Selecione um modo</p>

<script>

const video = document.getElementById("video");
const canvasA = document.getElementById("canvasA");
const canvasB = document.getElementById("canvasB");

const ctxA = canvasA.getContext("2d");
const ctxB = canvasB.getContext("2d");

let mode = "static";
let voice = true;

let step = 0;
let sampleA = null;
let sampleB = null;
let lastColor = "";

/* ================= CAMERA ================= */
navigator.mediaDevices.getUserMedia({
  video:{facingMode:"environment"}
}).then(stream=>{
  video.srcObject = stream;
});

/* ================= VOZ GLOBAL ================= */
function speak(t){
  if(!voice) return;
  speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance(t);
  msg.lang = "pt-BR";
  speechSynthesis.speak(msg);
}

/* ================= LAB (NÃO ALTERADO) ================= */
function rgbToLab(r,g,b){
  r/=255; g/=255; b/=255;

  [r,g,b]=[r,g,b].map(v=>
    v>0.04045?Math.pow((v+0.055)/1.055,2.4):v/12.92
  );

  let x=r*0.4124+g*0.3576+b*0.1805;
  let y=r*0.2126+g*0.7152+b*0.0722;
  let z=r*0.0193+g*0.1192+b*0.9505;

  x/=0.95047; y/=1; z/=1.08883;

  [x,y,z]=[x,y,z].map(v=>v>0.008856?Math.cbrt(v):(7.787*v)+(16/116));

  return {
    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)
  };
}

/* ================= ΔE (NÃO ALTERADO) ================= */
function deltaE(a,b){
  return Math.sqrt(
    (a.L-b.L)**2+
    (a.a-b.a)**2+
    (a.b-b.b)**2
  );
}

/* ================= CORES BASE ================= */
const colors = [
  {n:"Preto",lab:rgbToLab(10,10,10)},
  {n:"Branco",lab:rgbToLab(245,245,245)},
  {n:"Cinza",lab:rgbToLab(128,128,128)},
  {n:"Vermelho",lab:rgbToLab(220,60,60)},
  {n:"Verde",lab:rgbToLab(60,200,60)},
  {n:"Azul",lab:rgbToLab(60,80,220)}
];

/* ================= DETECÇÃO ORIGINAL ================= */
function detect(r,g,b){
  const lab = rgbToLab(r,g,b);

  let best={n:"Indef",d:999};

  for(const c of colors){
    const d = deltaE(lab,c.lab);
    if(d<best.d) best={n:c.n,d};
  }

  return best;
}

/* ================= CAPTURA ORIGINAL ================= */
function capture(ctx,x,y){

  ctx.canvas.width = video.videoWidth;
  ctx.canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  const s=10;
  const d=ctx.getImageData(x-s,y-s,s*2,s*2).data;

  let r=0,g=0,b=0,c=0;

  for(let i=0;i<d.length;i+=4){
    r+=d[i]; g+=d[i+1]; b+=d[i+2]; c++;
  }

  return detect(r/c,g/c,b/c);
}

/* ================= MODE ================= */
function setMode(m){
  mode = m;
  step = 0;
  sampleA = null;
  sampleB = null;

  document.getElementById("txt").innerText =
    "Modo: "+m.toUpperCase();

  if(m==="move") moveLoop();
}

/* ================= MOVIMENTO (NÃO ALTERADO) ================= */
function moveLoop(){

  if(mode!=="move") return;

  const s = capture(ctxA,video.videoWidth/2,video.videoHeight/2);

  document.getElementById("txt").innerText =
    "Movimento: "+s.n;

  if(s.n !== lastColor){
    speak(s.n);
    lastColor = s.n;
  }

  requestAnimationFrame(moveLoop);
}

/* ================= CLICK ================= */
video.addEventListener("click",(e)=>{

  const rect = video.getBoundingClientRect();

  const x = (e.clientX-rect.left)*(video.videoWidth/rect.width);
  const y = (e.clientY-rect.top)*(video.videoHeight/rect.height);

  document.getElementById("cross").style.display="block";

  /* ESTÁTICO */
  if(mode==="static"){
    const s = capture(ctxA,x,y);
    speak(s.n);
    document.getElementById("txt").innerText="Estático: "+s.n;
  }

  /* COMPARAÇÃO (ADICIONADO SEM ALTERAR MOTOR) */
  if(mode==="compare"){

    if(step===0){
      sampleA = capture(ctxA,x,y);
      step = 1;

      document.getElementById("p1").style.left=e.clientX+"px";
      document.getElementById("p1").style.top=e.clientY+"px";
      document.getElementById("p1").style.display="block";

      document.getElementById("txt").innerText =
        "Referência selecionada";
    }
    else{
      sampleB = capture(ctxB,x,y);

      const sim = Math.max(0,100 - deltaE(sampleA.lab,sampleB.lab));

      document.getElementById("txt").innerText =
        `${sampleA.n} → ${sampleB.n} | ${sim.toFixed(1)}%`;

      speak(`${sampleA.n} comparado com ${sampleB.n}, similaridade ${sim.toFixed(1)} por cento`);

      step = 0;
    }
  }
});

/* ================= VOZ ================= */
function toggleVoice(){
  voice = !voice;
  alert("Áudio: "+(voice?"ON":"OFF"));
}

</script>

</body>
</html>
