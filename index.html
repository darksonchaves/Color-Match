<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Análise Colorimétrica em Tempo Real</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e0e0f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  #header {
    background: rgba(10,10,20,0.88);
    padding: 5px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(100,100,255,0.15);
    z-index: 30;
    position: relative;
    flex-shrink: 0;
  }
  #header h1 {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 2px;
    color: #7b8cde;
    text-transform: uppercase;
  }

  #top-bar {
    background: rgba(8,8,20,0.86);
    border-bottom: 1px solid rgba(100,100,255,0.12);
    padding: 5px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 25;
    position: relative;
    flex-shrink: 0;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    flex-wrap: wrap;
  }

  #color-swatch {
    width: 28px;
    height: 28px;
    border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.12);
    flex-shrink: 0;
    transition: background 0.25s ease;
  }
  #color-name {
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.4px;
    min-width: 110px;
  }
  #delta-e-display {
    font-size: 0.58rem;
    color: #556;
    white-space: nowrap;
  }
  .sep {
    color: rgba(100,100,255,0.3);
    font-size: 0.7rem;
    flex-shrink: 0;
  }
  .data-inline {
    font-size: 0.64rem;
    font-family: 'Courier New', monospace;
    color: #aab;
    white-space: nowrap;
  }
  .data-inline .lbl { color: #558; margin-right: 1px; }
  #base-info {
    font-size: 0.58rem;
    color: #446;
    white-space: nowrap;
  }

  .btn-top {
    padding: 4px 8px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    transition: all 0.18s ease;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #btn-calibrate {
    background: linear-gradient(135deg, #2a2a6e, #3a3a9e);
    color: #aac;
    border: 1px solid rgba(100,100,255,0.3);
  }
  #btn-calibrate:hover { background: linear-gradient(135deg, #3a3a8e, #5a5abe); color: #eef; }
  #btn-calibrate.calibrated {
    background: linear-gradient(135deg, #1a4a2e, #2a7a4e);
    border-color: rgba(50,200,100,0.4);
    color: #8fc;
  }
  #btn-camera {
    background: linear-gradient(135deg, #2a1a3e, #4a2a6e);
    color: #bac;
    border: 1px solid rgba(180,100,255,0.3);
  }
  #btn-camera:hover { background: linear-gradient(135deg, #3a2a5e, #6a4a9e); color: #edf; }
  #btn-audio {
    background: linear-gradient(135deg, #1a1a2e, #2a2a3e);
    color: #446;
    border: 1px solid rgba(100,100,150,0.2);
  }
  #btn-audio:hover { background: linear-gradient(135deg, #252535, #353550); color: #778; }
  #btn-audio.audio-on {
    background: linear-gradient(135deg, #163a1e, #1f6030);
    color: #6effa0;
    border: 1px solid rgba(60,200,100,0.45);
    box-shadow: 0 0 6px rgba(60,200,100,0.2);
  }
  #btn-universal {
    background: linear-gradient(135deg, #1a1a2e, #2a2a3e);
    color: #446;
    border: 1px solid rgba(100,100,150,0.2);
  }
  #btn-universal:hover { background: linear-gradient(135deg, #252535, #353550); color: #778; }
  #btn-universal.universal-on {
    background: linear-gradient(135deg, #163a1e, #1f6030);
    color: #6effa0;
    border: 1px solid rgba(60,200,100,0.45);
    box-shadow: 0 0 6px rgba(60,200,100,0.2);
  }

  #main {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #camera-container {
    position: absolute;
    inset: 0;
    background: #000;
  }
  #videoEl {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
  }
  #canvasEl { display: none; }

  #reticle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60px;
    height: 60px;
    pointer-events: none;
    z-index: 20;
  }
  .reticle-h {
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    height: 2px;
    background: rgba(120,220,255,0.9);
    transform: translateY(-50%);
  }
  .reticle-v {
    position: absolute;
    left: 50%;
    top: 0;
    height: 100%;
    width: 2px;
    background: rgba(120,220,255,0.9);
    transform: translateX(-50%);
  }
  .reticle-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 22px;
    height: 22px;
    border: 1.5px solid rgba(120,220,255,0.5);
  }
  /* MELHORIA #5: círculo pontilhado = área real de amostragem (SAMPLE=10px) */
  .reticle-sample-circle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1px dashed rgba(120,220,255,0.55);
  }
  /* ponto central exato */
  .reticle-dot {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(120,220,255,0.9);
  }

  #start-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 30;
    gap: 14px;
  }
  #start-overlay p { color: #778; font-size: 0.88rem; }
  #btn-start {
    padding: 13px 30px;
    background: linear-gradient(135deg, #3a3a9e, #7b5ce8);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  #btn-start:hover { transform: scale(1.05); }
</style>
</head>
<body>

<div id="header">
  <h1>&#9632; Análise Colorimétrica</h1>
  <span style="font-size:0.6rem;color:#334;letter-spacing:1px;">CIE L*a*b* · D65</span>
</div>

<!-- BARRA SUPERIOR COMPACTA — centro e parte inferior da tela ficam livres -->
<div id="top-bar">
  <div id="color-swatch" style="background:#1a1a2e;"></div>
  <div id="color-name" style="color:#445;">Aguardando...</div>
  <div id="delta-e-display"></div>
  <span class="sep">│</span>
  <div class="data-inline" id="lab-line">
    <span class="lbl">L*:</span>--- &nbsp;<span class="lbl">a*:</span>--- &nbsp;<span class="lbl">b*:</span>---
  </div>
  <span class="sep">│</span>
  <div class="data-inline" id="rgb-line">
    <span class="lbl">R:</span>--- &nbsp;<span class="lbl">G:</span>--- &nbsp;<span class="lbl">B:</span>---
  </div>
  <span class="sep">│</span>
  <div id="base-info">Base: não calibrada</div>
  <span class="sep">│</span>
  <button class="btn-top" id="btn-calibrate" onclick="calibrate()">&#9670; Calibrar</button>
  <button class="btn-top" id="btn-camera"    onclick="switchCamera()">&#8635; Câmera</button>
  <button class="btn-top" id="btn-audio"     onclick="toggleAudio()">&#128263; Áudio</button>
  <button class="btn-top" id="btn-universal" onclick="toggleUniversalMode()">&#128263; Universal</button>
</div>

<div id="main">
  <div id="camera-container">
    <video id="videoEl" autoplay playsinline muted></video>
    <canvas id="canvasEl"></canvas>

    <div id="reticle">
      <div class="reticle-h"></div>
      <div class="reticle-v"></div>
      <div class="reticle-box"></div>
      <div class="reticle-sample-circle"></div>
      <div class="reticle-dot"></div>
    </div>

    <div id="start-overlay">
      <p>Toque para iniciar a câmera</p>
      <button id="btn-start" onclick="startCamera()">&#9654; Iniciar Câmera</button>
    </div>
  </div>
</div>

<script>
  const video  = document.getElementById('videoEl');
  const canvas = document.getElementById('canvasEl');
  const ctx    = canvas.getContext('2d');

  let stream        = null;
  let devices       = [];
  let deviceIndex   = 0;
  let running       = false;
  let base          = null;
  let universalMode = false;

  const SAMPLE            = 10;
  const DELTA_E_THRESHOLD = 12;

  // ── Conversões colorimétricas ─────────────────────────────────────────────

  function linearize(c) {
    const v = c / 255;
    return v <= 0.04045 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  }

  function rgbToXYZ(r, g, b) {
    const rl = linearize(r), gl = linearize(g), bl = linearize(b);
    return {
      X: (0.4124564*rl + 0.3575761*gl + 0.1804375*bl) * 100,
      Y: (0.2126729*rl + 0.7151522*gl + 0.0721750*bl) * 100,
      Z: (0.0193339*rl + 0.1191920*gl + 0.9503041*bl) * 100
    };
  }

  function xyzToLab(X, Y, Z) {
    const Xn=95.047, Yn=100.000, Zn=108.883;
    const e=0.008856, k=903.3;
    function f(t) { return t > e ? Math.cbrt(t) : (k*t + 16) / 116; }
    const fx=f(X/Xn), fy=f(Y/Yn), fz=f(Z/Zn);
    return { L: 116*fy - 16, a: 500*(fx - fy), b: 200*(fy - fz) };
  }

  function rgbToLab(r, g, b) {
    const xyz = rgbToXYZ(r, g, b);
    return xyzToLab(xyz.X, xyz.Y, xyz.Z);
  }

  function deltaE(lab1, lab2) {
    return Math.sqrt(
      Math.pow(lab1.L - lab2.L, 2) +
      Math.pow(lab1.a - lab2.a, 2) +
      Math.pow(lab1.b - lab2.b, 2)
    );
  }

  // ── CLASSIFICAÇÃO DE COR — zonas Lab abrangentes (FIX #2) ─────────────────
  //
  //  1. Preto / Escuro       — L* < 18 (independe de croma)
  //  2. Branco / Muito Claro — L* > 85, abs(a*) < 8, abs(b*) < 8
  //  3. Cinza / Neutro       — abs(a*) < 8, abs(b*) < 8 (qualquer L*)
  //  4. Roxo / Violeta       — a*+ / b*-
  //  5. Azul                 — b* muito negativo
  //  6. Ciano / Turquesa     — a*- / b*- ou b*≈0
  //  7. Verde / Verde-Limão  — a*- / b*+
  //  8. Amarelo              — b*+ alto, a* neutro/levem. positivo
  //  9. Laranja              — a*+ moderado-alto / b*+ moderado
  // 10. Vermelho             — a*+ alto (faixa ampliada)
  // 11. Rosa / Magenta       — a*+ / b* baixo

  function classifyColor(lab) {
    const { L, a, b } = lab;

    if (L < 18)
      return { name: 'Preto / Escuro', color: '#8899aa' };

    if (L > 85 && Math.abs(a) < 8 && Math.abs(b) < 8)
      return { name: 'Branco / Muito Claro', color: '#ffffff' };

    if (Math.abs(a) < 8 && Math.abs(b) < 8)
      return { name: 'Cinza / Neutro', color: '#9aaabb' };

    if (a > 8 && b < -3)
      return { name: 'Roxo / Violeta', color: '#a855f7' };

    if (b < -12 && a <= 8)
      return { name: 'Azul', color: '#3b82f6' };

    if (a < -5 && b <= 5)
      return { name: 'Ciano / Turquesa', color: '#22d3ee' };

    if (a < -5 && b > 5)
      return { name: 'Verde / Verde-Limão', color: '#4ade80' };

    if (b > 20 && a >= -5 && a < 15)
      return { name: 'Amarelo', color: '#facc15' };

    if (a >= 12 && a <= 30 && b >= 8 && b <= 40)
      return { name: 'Laranja', color: '#fb923c' };

    if (a > 20 && b > -5 && b < 35 && L >= 18)
      return { name: 'Vermelho', color: '#e03040' };

    if (a >= 8 && b < 8)
      return { name: 'Rosa / Magenta', color: '#e070b0' };

    return { name: 'Indefinido', color: '#445566' };
  }

  // ── Amostragem pixels — object-fit:cover (preservado) ────────────────────

  function samplePixels() {
    const vw = video.videoWidth, vh = video.videoHeight;
    if (!vw || !vh) return null;

    const cw = video.clientWidth, ch = video.clientHeight;
    const scale   = Math.max(cw / vw, ch / vh);
    const offsetX = (vw * scale - cw) / 2;
    const offsetY = (vh * scale - ch) / 2;
    const nativeCX     = Math.round((cw / 2 + offsetX) / scale);
    const nativeCY     = Math.round((ch / 2 + offsetY) / scale);
    const nativeSample = Math.max(1, Math.round(SAMPLE / scale));

    canvas.width = vw; canvas.height = vh;
    ctx.drawImage(video, 0, 0);

    const x0 = Math.max(0, nativeCX - nativeSample);
    const y0 = Math.max(0, nativeCY - nativeSample);
    const data = ctx.getImageData(x0, y0, nativeSample*2, nativeSample*2).data;

    let rSum=0, gSum=0, bSum=0, count=0;
    for (let i=0; i < data.length; i += 4) {
      rSum += data[i]; gSum += data[i+1]; bSum += data[i+2]; count++;
    }
    return {
      r: Math.round(rSum/count),
      g: Math.round(gSum/count),
      b: Math.round(bSum/count)
    };
  }

  // ── ÁUDIO — debounce 300ms + cancel() imediato (FIX #4) ──────────────────

  let audioEnabled=false, lastSpokenName='', pendingName='', stableTimer=null;
  const STABLE_MS = 300;

  function toggleAudio() {
    if (window.speechSynthesis)
      window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
    audioEnabled = !audioEnabled;
    const btn = document.getElementById('btn-audio');
    if (audioEnabled) {
      btn.textContent = '🔊 Áudio: ON';
      btn.classList.add('audio-on');
    } else {
      btn.textContent = '🔇 Áudio: OFF';
      btn.classList.remove('audio-on');
      if (window.speechSynthesis) window.speechSynthesis.cancel();
      if (stableTimer) { clearTimeout(stableTimer); stableTimer = null; }
      pendingName = ''; lastSpokenName = '';
    }
  }

  function toggleUniversalMode() {
    universalMode = !universalMode;
    const btn = document.getElementById('btn-universal');
    btn.textContent = universalMode ? '🔊 Universal: ON' : '🔇 Universal: OFF';
    btn.classList.toggle('universal-on', universalMode);
  }

  function speakColor(name) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();   // limpa fila IMEDIATAMENTE
    setTimeout(() => {
      if (!audioEnabled) return;
      const utt = new SpeechSynthesisUtterance(name);
      utt.lang='pt-BR'; utt.rate=1.1; utt.pitch=1.0;
      window.speechSynthesis.speak(utt);
    }, 60);
  }

  function triggerAudioIfChanged(name) {
    if (!audioEnabled) return;
    if (name === lastSpokenName) {
      if (pendingName !== name && stableTimer) {
        clearTimeout(stableTimer); stableTimer=null; pendingName='';
      }
      return;
    }
    if (name !== pendingName) {
      pendingName = name;
      if (stableTimer) clearTimeout(stableTimer);
      stableTimer = setTimeout(() => {
        if (!audioEnabled) { stableTimer=null; return; }
        lastSpokenName = pendingName;
        speakColor(pendingName);
        stableTimer = null;
      }, STABLE_MS);
    }
  }

  // ── LOOP — com compensação ambiental (FIX #3) ─────────────────────────────

  function update() {
    if (!running || video.readyState < 2) { requestAnimationFrame(update); return; }

    const pixels = samplePixels();
    if (!pixels) { requestAnimationFrame(update); return; }

    const { r, g, b } = pixels;
    const rawLab = rgbToLab(r, g, b);
    const dE = base ? deltaE(rawLab, base) : 999;

    // Compensação ambiental: subtrai desvio cromático do ambiente calibrado
    // e normaliza L* pelo ponto de branco, isolando a cor real do objeto
    let labForClass;
    if (base) {
      labForClass = {
        L: Math.min(100, Math.max(0, rawLab.L * (100 / Math.max(base.L, 1)))),
        a: rawLab.a - base.a,
        b: rawLab.b - base.b
      };
    } else {
      labForClass = rawLab;
    }

    const cls = classifyColor(labForClass);

    document.getElementById('rgb-line').innerHTML =
      `<span class="lbl">R:</span>${r} <span class="lbl">G:</span>${g} <span class="lbl">B:</span>${b}`;
    document.getElementById('lab-line').innerHTML =
      `<span class="lbl">L*:</span>${rawLab.L.toFixed(1)} <span class="lbl">a*:</span>${rawLab.a.toFixed(1)} <span class="lbl">b*:</span>${rawLab.b.toFixed(1)}`;
    document.getElementById('color-swatch').style.background = `rgb(${r},${g},${b})`;
    document.getElementById('color-name').textContent = cls.name;
    document.getElementById('color-name').style.color  = cls.color;

    if (base)
      document.getElementById('delta-e-display').textContent = `ΔE=${dE.toFixed(1)}`;

    triggerAudioIfChanged(cls.name);
    requestAnimationFrame(update);
  }

  // ── Câmera (preservado) ───────────────────────────────────────────────────

  async function getDevices() {
    const devs = await navigator.mediaDevices.enumerateDevices();
    devices = devs.filter(d => d.kind === 'videoinput');
  }

  async function openCamera(preferredDeviceId) {
    if (stream) stream.getTracks().forEach(t => t.stop());
    const tryOpen = async (c) => { stream = await navigator.mediaDevices.getUserMedia(c); video.srcObject = stream; };
    if (preferredDeviceId) {
      try { await tryOpen({ video: { deviceId: { exact: preferredDeviceId }, width:{ideal:1280}, height:{ideal:720} } }); return; } catch(_){}
    }
    try { await tryOpen({ video: { facingMode:{exact:'environment'}, width:{ideal:1280}, height:{ideal:720} } }); return; } catch(_){}
    try { await tryOpen({ video: { facingMode:'environment', width:{ideal:1280}, height:{ideal:720} } }); return; } catch(_){}
    try { await tryOpen({ video: true }); } catch(e) { alert('Erro ao acessar a câmera: ' + e.message); }
  }

  async function startCamera() {
    document.getElementById('start-overlay').style.display = 'none';
    await getDevices();
    await openCamera();
    running = true;
    requestAnimationFrame(update);
  }

  async function switchCamera() {
    if (devices.length < 2) { alert('Apenas uma câmera disponível.'); return; }
    deviceIndex = (deviceIndex + 1) % devices.length;
    await openCamera(devices[deviceIndex].deviceId);
  }

  // ── Calibração ────────────────────────────────────────────────────────────

  function calibrate() {
    if (!running) { alert('Inicie a câmera primeiro.'); return; }
    const pixels = samplePixels();
    if (!pixels) return;
    base = rgbToLab(pixels.r, pixels.g, pixels.b);
    const btn = document.getElementById('btn-calibrate');
    btn.textContent = '✓ Calibrado';
    btn.classList.add('calibrated');
    document.getElementById('base-info').textContent =
      `Base: L*=${base.L.toFixed(1)} a*=${base.a.toFixed(1)} b*=${base.b.toFixed(1)}`;
    document.getElementById('delta-e-display').textContent = '';
  }
</script>
</body>
</html>
