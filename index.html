<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ColorMatch Pro - v34.0 Apex Matrix</title>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: #fff; overflow: hidden; text-align: center; }
        #header { 
            position: absolute; top: 0; width: 100%; z-index: 20;
            background: rgba(10, 10, 10, 0.95); display: flex; justify-content: center; 
            padding: 10px 0; gap: 5px; border-bottom: 1px solid #333; flex-wrap: wrap;
        }
        button { 
            background: #1a1a1a; color: #aaa; border: 1px solid #444; padding: 8px 12px; 
            border-radius: 6px; font-weight: bold; font-size: 10px; text-transform: uppercase; cursor: pointer;
            transition: all 0.1s ease;
        }
        .active { background: #007bff !important; color: #fff !important; }
        .audio-on { background: #28a745 !important; color: #fff !important; }
        .univ-on { background: #ffc107 !important; color: #000 !important; }

        #video-container { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #crosshair { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border: 2px solid rgba(255,255,255,0.7); border-radius: 50%; pointer-events: none; z-index: 10;
            transition: all 0.1s;
        }
        .mira-livre { width: 14px; height: 14px; }
        .mira-padrao { width: 14vw; height: 14vw; border: 2px dashed rgba(255,255,255,0.6); }
        .locked { border-color: #00ffcc !important; box-shadow: 0 0 20px #00ffcc; background: rgba(0,255,204,0.05); }

        #ui-overlay { position: absolute; bottom: 0; width: 100%; padding: 45px 0; background: linear-gradient(transparent, #000 85%); z-index: 20; }
        #color-name { font-size: 55px; font-weight: 900; text-transform: uppercase; color: #444; min-height: 70px; letter-spacing: 2px; }
        .active-text { color: #00ffcc !important; text-shadow: 0 0 30px rgba(0,255,204,0.7); }
    </style>
</head>
<body>

<div id="header">
    <button onclick="toggleSystem()" id="btnPower">SISTEMA: OFF</button>
    <button onclick="toggleAudio()" id="btnAudio">ÁUDIO: OFF</button>
    <button onclick="toggleUniversal()" id="btnUniv">MODO UNIVERSAL: OFF</button>
    <button onclick="calibrate()" id="btnCalib">CALIBRAR BRANCO</button>
    <button onclick="setMode('LIVRE')" id="btnLivre">MODO LIVRE</button>
    <button onclick="setMode('PADRAO')" id="btnPadrao">MODO PADRÃO</button>
</div>

<div id="video-container">
    <video id="v" autoplay playsinline muted></video>
    <div id="crosshair" class="mira-livre"></div>
</div>

<div id="ui-overlay">
    <div id="color-name">INATIVO</div>
</div>

<canvas id="c" style="display:none;"></canvas>

<script>
    const v = document.getElementById('v'), c = document.getElementById('c');
    const ctx = c.getContext('2d', {willReadFrequently: true, alpha: false});
    const colorTxt = document.getElementById('color-name'), cross = document.getElementById('crosshair');

    let active = false, audioActive = false, universalMode = false, mode = 'LIVRE';
    
    // Matriz Von Kries pura para adaptação de iluminante em tempo real
    let calibGains = { r: 1.0, g: 1.0, b: 1.0 };
    let history = [], lastSpeach = "", isSpeaking = false;

    const constraints = {
        video: {
            facingMode: "environment",
            width: { ideal: 1280 },
            height: { ideal: 720 },
            frameRate: { ideal: 60 }
        }
    };

    navigator.mediaDevices.getUserMedia(constraints)
        .then(s => { v.srcObject = s; })
        .catch(() => {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => v.srcObject = s);
        });

    function toggleSystem() { 
        active = !active; 
        document.getElementById('btnPower').classList.toggle('active', active);
        document.getElementById('btnPower').innerText = `SISTEMA: ${active ? 'ON' : 'OFF'}`;
        if(!active) { colorTxt.innerText = "INATIVO"; colorTxt.className = ""; history = []; }
    }

    function toggleAudio() {
        audioActive = !audioActive;
        document.getElementById('btnAudio').classList.toggle('audio-on', audioActive);
        document.getElementById('btnAudio').innerText = `ÁUDIO: ${audioActive ? 'ON' : 'OFF'}`;
        if(audioActive && active) speak("Áudio ligado");
    }

    function toggleUniversal() {
        universalMode = !universalMode;
        document.getElementById('btnUniv').classList.toggle('univ-on', universalMode);
        document.getElementById('btnUniv').innerText = `MODO UNIVERSAL: ${universalMode ? 'ON' : 'OFF'}`;
        if(audioActive) speak("Universal " + (universalMode ? "On" : "Off"));
    }

    function setMode(m) {
        mode = m;
        document.getElementById('btnLivre').classList.toggle('active', m === 'LIVRE');
        document.getElementById('btnPadrao').classList.toggle('active', m === 'PADRAO');
        cross.className = (m === 'LIVRE' ? 'mira-livre' : 'mira-padrao');
        if(audioActive) speak("Modo " + m);
    }

    function calibrate() {
        if(!active) return;
        c.width = v.videoWidth; c.height = v.videoHeight;
        ctx.drawImage(v, 0, 0);
        
        const size = 16;
        const sample = ctx.getImageData(v.videoWidth/2 - size/2, v.videoHeight/2 - size/2, size, size).data;
        let r=0, g=0, b=0, total=0;
        
        for(let i=0; i<sample.length; i+=4) {
            r+=sample[i]; g+=sample[i+1]; b+=sample[i+2]; total++;
        }
        
        let avgR = r/total, avgG = g/total, avgB = b/total;
        let maxChannel = Math.max(avgR, avgG, avgB);
        
        if(maxChannel > 20) {
            calibGains.r = maxChannel / avgR;
            calibGains.g = maxChannel / avgG;
            calibGains.b = maxChannel / avgB;
        }
        
        history = []; 
        if(audioActive) speak("Calibrado");
    }

    // Conversão matemática para o espaço de cor Lab (Perceptualmente uniforme)
    function rgbToLab(r, g, b) {
        // Normalização RGB
        r /= 255; g /= 255; b /= 255;

        // Conversão para sRGB Linear
        r = (r > 0.04045) ? Math.pow((r + 0.055) / 1.055, 2.4) : r / 12.92;
        g = (g > 0.04045) ? Math.pow((g + 0.055) / 1.055, 2.4) : g / 12.92;
        b = (b > 0.04045) ? Math.pow((b + 0.055) / 1.055, 2.4) : b / 12.92;

        // Conversão para XYZ (Matriz D65)
        let x = (r * 0.4124 + g * 0.3576 + b * 0.1805) * 100;
        let y = (r * 0.2126 + g * 0.7152 + b * 0.0722) * 100;
        let z = (r * 0.0193 + g * 0.1192 + b * 0.9505) * 100;

        // Referência D65
        x /= 95.047; y /= 100.000; z /= 108.883;

        x = (x > 0.008856) ? Math.pow(x, 1/3) : (7.787 * x) + (16 / 116);
        y = (y > 0.008856) ? Math.pow(y, 1/3) : (7.787 * y) + (16 / 116);
        z = (z > 0.008856) ? Math.pow(z, 1/3) : (7.787 * z) + (16 / 116);

        let L = (116 * y) - 16;
        let a = 500 * (x - y);
        let bK = 200 * (y - z);

        return { L, a, b: bK };
    }

    // Centroides Mapeados estritamente no Espaço Lab D65
    const LAB_CENTROIDS = [
        { name: "VERMELHO",  L: 53,  a: 80,  b: 67 },
        { name: "LARANJA",   L: 67,  a: 43,  b: 74 },
        { name: "AMARELO",   L: 97,  a: -16, b: 93 },
        { name: "VERDE",     L: 46,  a: -52, b: 50 },
        { name: "AZUL",      L: 32,  a: 22,  b: -70 },
        { name: "ROXO",      L: 29,  a: 58,  b: -60 }, // Centroide focado no isqueiro Roxo real do vídeo
        { name: "ROSA",      L: 65,  a: 75,  b: -25 }, // Centroide focado na camiseta Rosa
        { name: "MARROM",    L: 30,  a: 20,  b: 25 }
    ];

    function getFinalColor(rawR, rawG, rawB) {
        // Aplica matriz de ganhos de balanço de branco
        let r = Math.min(255, Math.max(0, rawR * calibGains.r));
        let g = Math.min(255, Math.max(0, rawG * calibGains.g));
        let b = Math.min(255, Math.max(0, rawB * calibGains.b));

        let max = Math.max(r, g, b);
        let min = Math.min(r, g, b);
        let rgbDiff = max - min;

        // Isoladores absolutos de Tons Neutros
        if (max < 45 && rgbDiff < 15) return "PRETO";
        if (min > 195 && rgbDiff < 20) return "BRANCO";
        if (rgbDiff < 12 && max > 45 && min < 195) return "CINZA";

        // Converte amostragem atual para Lab
        let currentLab = rgbToLab(r, g, b);

        // Modo Universal Seletivo por quadrantes Lab
        if (universalMode) {
            if (currentLab.a > 30 && currentLab.b > 30) {
                return (currentLab.b > currentLab.a * 1.1) ? "AMARELO" : "VERMELHO";
            }
            if (currentLab.a < -15) return "VERDE";
            if (currentLab.b < -25) return "AZUL";
            if (currentLab.a > 30 && currentLab.b < 0) {
                return (currentLab.L < 45) ? "ROXO" : "ROSA";
            }
            return "ESPECTRO";
        }

        // Busca pela menor distância Delta E (CIE76)
        let minDeltaE = Infinity;
        let matchedName = "ANALISANDO";

        for (let target of LAB_CENTROIDS) {
            let dL = currentLab.L - target.L;
            let da = currentLab.a - target.a;
            let db = currentLab.b - target.b;
            
            // Fórmula da Distância Euclidiana 3D no espaço Lab
            let deltaE = Math.sqrt(dL*dL + da*da + db*db);

            if (deltaE < minDeltaE) {
                minDeltaE = deltaE;
                matchedName = target.name;
            }
        }

        // Refinamento cirúrgico para Amarelo Limão vs Laranja baseado no canal 'b' (azul/amarelo)
        if (matchedName === "LARANJA" && r > g && g > 160 && (g / r > 0.78)) {
            return "AMARELO";
        }

        return matchedName;
    }

    function loop() {
        if (active && v.videoWidth > 0) {
            c.width = v.videoWidth; c.height = v.videoHeight;
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(v, 0, 0);
            
            let size = (mode === 'LIVRE' ? 6 : 24); 
            const p = ctx.getImageData(v.videoWidth/2 - size/2, v.videoHeight/2 - size/2, size, size).data;
            
            let r=0, g=0, b=0, count=0;
            for(let i=0; i<p.length; i+=4) {
                // Elimina reflexos especulares brancos (lâmpada refletida no plástico polido)
                if(p[i] > 250 && p[i+1] > 250 && p[i+2] > 250) continue; 
                r += p[i]; g += p[i+1]; b += p[i+2];
                count++;
            }
            
            if(count === 0) { r=255; g=255; b=255; count=1; }
            
            let res = getFinalColor(r/count, g/count, b/count);
            
            // Buffer amortecido estável de 12 frames
            history.push(res);
            if(history.length > 12) history.shift(); 
            
            const votes = {};
            history.forEach(x => votes[x] = (votes[x] || 0) + 1);
            const winner = Object.keys(votes).reduce((a, b) => votes[a] > votes[b] ? a : b);

            // Resposta imediata: 7 frames idênticos (Cerca de 200ms) travam a resposta
            if (votes[winner] >= 7) { 
                if (colorTxt.innerText !== winner) {
                    colorTxt.innerText = winner;
                    colorTxt.className = "active-text";
                    cross.classList.add('locked');
                    
                    if (audioActive && winner !== lastSpeach) {
                        speak(winner);
                    }
                }
            } else {
                colorTxt.innerText = "ALINHANDO";
                colorTxt.className = "";
                cross.classList.remove('locked');
            }
        }
        requestAnimationFrame(loop);
    }

    function speak(t) {
        if(!audioActive || isSpeaking || !t || t === "ALINHANDO" || t === "INATIVO") return;
        try {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'pt-BR'; 
            m.rate = 1.9;
            m.onstart = () => isSpeaking = true;
            m.onend = () => isSpeaking = false;
            m.onerror = () => isSpeaking = false;
            window.speechSynthesis.speak(m);
            lastSpeach = t;
        } catch(e) {
            isSpeaking = false;
        }
    }
    loop();
</script>
</body>
</html>
