<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ColorMatch Pro – OEM MultiBrand Edition</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
  text-align:center;
}

h2{ margin-top:15px; }

video{
  width:92%;
  border-radius:12px;
  border:2px solid #333;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#222;
  color:#fff;
}

button:hover{ background:#333; }

input,select{
  padding:10px;
  border-radius:8px;
  border:none;
  margin:5px;
  width:90%;
  max-width:420px;
}

#panel{
  display:flex;
  justify-content:space-around;
  flex-wrap:wrap;
  margin-top:15px;
}

.box{
  width:45%;
  min-width:160px;
}

canvas{
  width:100%;
  border-radius:10px;
  background:#222;
}

#cross{
  position:fixed;
  top:50%;
  left:50%;
  width:26px;
  height:26px;
  transform:translate(-50%,-50%);
  border:2px solid #00ffcc;
  border-radius:50%;
  display:none;
  pointer-events:none;
  z-index:999;
}

#databasePanel{
  margin-top:20px;
  padding:15px;
  background:#181818;
  border-top:2px solid #333;
}

#resultList{
  margin-top:10px;
  text-align:left;
  width:90%;
  max-width:700px;
  margin-left:auto;
  margin-right:auto;
  background:#1f1f1f;
  border-radius:10px;
  padding:10px;
}

.item{
  padding:10px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

.item:hover{ background:#2c2c2c; }

.colorBox{
  width:18px;
  height:18px;
  display:inline-block;
  border-radius:50%;
  margin-right:8px;
  border:1px solid #fff;
  vertical-align:middle;
}

.selectedColor{
  background:#004d40 !important;
}

#txt{
  margin-top:15px;
  font-size:18px;
  padding:10px;
}

</style>

</head>

<body>

<h2>ColorMatch Pro – OEM MultiBrand Edition</h2>

<button onclick="setMode('static')">Estático</button>
<button onclick="setMode('move')">Movimento</button>
<button onclick="setMode('comparePoint')">Comparar Ponto a Ponto</button>
<button onclick="setMode('compareDatabase')">Comparar Base de Dados</button>
<button onclick="analyzeOEM()">🎨 OEM Scan</button>
<button onclick="toggleFlash()">⚡ Flash</button>
<button onclick="toggleVoice()">🔊 Áudio</button>

<br><br>

<video id="video" autoplay playsinline></video>

<div id="cross"></div>

<div id="panel">

  <div class="box">
    <canvas id="canvasA"></canvas>
    <div>Referência</div>
  </div>

  <div class="box">
    <canvas id="canvasB"></canvas>
    <div>Comparação</div>
  </div>

</div>

<div id="databasePanel">

<h3>Pesquisa OEM</h3>

<input type="text" id="brandSearch" placeholder="Digite a montadora..." oninput="searchBrand()">

<br>

<select id="modelSelect" onchange="showModelColors()">

<option value="">Selecione o modelo</option>

</select>

<div id="resultList"></div>

</div>

<p id="txt">Inicializando...</p>

<script>

/* ================= ELEMENTOS ================= */

const video = document.getElementById("video");
const canvasA = document.getElementById("canvasA");
const canvasB = document.getElementById("canvasB");
const ctxA = canvasA.getContext("2d");
const ctxB = canvasB.getContext("2d");
const cross = document.getElementById("cross");

/* ================= CONTROLE ================= */

let mode = "static";
let voice = true;
let lastSpeak = "";
let compareA = null;
let compareALab = null;
let compareStep = 0;
let selectedDatabaseColor = null;

/* ================= FLASH ================= */

let streamTrack = null;
let flashOn = false;
let flashBusy = false;
let processingPaused = false;
navigator.mediaDevices.getUserMedia({
  video:{ facingMode:"environment" }
})
.then(stream=>{
  video.srcObject = stream;
  streamTrack = stream.getVideoTracks()[0];
})
.catch(()=> alert("Erro ao acessar câmera"));

function speak(text){
  if(!voice) return;
  speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = "pt-BR";
  speechSynthesis.speak(msg);
}

async function toggleFlash(){

  if(flashBusy) return;
  if(!streamTrack){
    alert("Câmera não iniciada");
    return;
  }

  flashBusy = true;
  processingPaused = true;

  try{

    const capabilities = streamTrack.getCapabilities();

    if(!capabilities.torch){
      alert("Flash não suportado");
      processingPaused = false;
      flashBusy = false;
      return;
    }

    flashOn = !flashOn;

    await streamTrack.applyConstraints({
      advanced:[{ torch:flashOn }]
    });

    await new Promise(r=>setTimeout(r,700));

  }catch(e){
    flashOn = false;
    alert("Falha no flash");
  }

  processingPaused = false;

  setTimeout(()=>flashBusy=false,500);
}

/* ================= RGB -> LAB ================= */

function rgbToLab(r,g,b){

  r/=255; g/=255; b/=255;

  [r,g,b]=[r,g,b].map(v=>
    v>0.04045 ? Math.pow((v+0.055)/1.055,2.4) : v/12.92
  );

  let x=r*0.4124+g*0.3576+b*0.1805;
  let y=r*0.2126+g*0.7152+b*0.0722;
  let z=r*0.0193+g*0.1192+b*0.9505;

  x/=0.95047; y/=1; z/=1.08883;

  [x,y,z]=[x,y,z].map(v=>
    v>0.008856 ? Math.cbrt(v) : (7.787*v)+(16/116)
  );

  return{
    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)
  };
}

/* ================= DELTA E ================= */

function deltaE(a,b){
  return Math.sqrt((a.L-b.L)*2+(a.a-b.a)2+(a.b-b.b)*2);
}
/* ================= 🔥 CAPTURA UNIVERSAL MELHORADA ================= */

function captureRaw(x,y){

  if(!video.videoWidth || processingPaused){
    return {r:0,g:0,b:0};
  }

  canvasA.width = video.videoWidth;
  canvasA.height = video.videoHeight;

  ctxA.drawImage(video,0,0);

  const radius = 6;
  const step = 3;

  let r=0,g=0,b=0,c=0;

  for(let dx=-radius; dx<=radius; dx+=step){
    for(let dy=-radius; dy<=radius; dy+=step){

      const px = Math.max(0, Math.min(video.videoWidth-1, x+dx));
      const py = Math.max(0, Math.min(video.videoHeight-1, y+dy));

      const data = ctxA.getImageData(px,py,1,1).data;

      r+=data[0];
      g+=data[1];
      b+=data[2];
      c++;
    }
  }

  return{
    r:Math.round(r/c),
    g:Math.round(g/c),
    b:Math.round(b/c)
  };
}

/* ================= OEM DATABASE ================= */

const oemDatabase = [

{brand:"Toyota",model:"Corolla",year:"2024",code:"040",name:"Super White II",rgb:{r:244,g:244,b:241}},
{brand:"Toyota",model:"Corolla",year:"2024",code:"1F7",name:"Classic Silver Metallic",rgb:{r:169,g:173,b:177}},
{brand:"Toyota",model:"Corolla",year:"2024",code:"218",name:"Midnight Black Metallic",rgb:{r:27,g:27,b:27}},
{brand:"Toyota",model:"Corolla",year:"2024",code:"3U5",name:"Emotional Red",rgb:{r:126,g:31,b:36}}

];

oemDatabase.forEach(i=>{
  i.lab = rgbToLab(i.rgb.r,i.rgb.g,i.rgb.b);
});

/* ================= DETECT ================= */

function detectOEM(sig){

  const lab = rgbToLab(sig.r,sig.g,sig.b);

  let best=null;
  let bestDelta=999;

  for(const c of oemDatabase){
    const d = deltaE(lab,c.lab);
    if(d<bestDelta){
      bestDelta=d;
      best=c;
    }
  }

  return{match:best,delta:bestDelta};
}

/* ================= ANALYZE ================= */

function analyzeOEM(){

  const sig = captureRaw(
    video.videoWidth/2,
    video.videoHeight/2
  );

  const result = detectOEM(sig);

  const sim = Math.max(0,100-result.delta).toFixed(1);

  document.getElementById("txt").innerText =
  result.match.brand+" | "+
  result.match.model+" | "+
  result.match.year+" | "+
  result.match.code+" | "+
  result.match.name+" | "+
  sim+"%";

  speak(result.match.name);
}
/* ================= MODOS ================= */

function setMode(m){

  mode=m;
  compareStep=0;

  document.getElementById("txt").innerText =
  "Modo: "+m;

}

/* ================= CLIQUE ================= */

video.addEventListener("click",(e)=>{

  if(processingPaused) return;

  const rect = video.getBoundingClientRect();

  const x=(e.clientX-rect.left)*(video.videoWidth/rect.width);
  const y=(e.clientY-rect.top)*(video.videoHeight/rect.height);

  const sig = captureRaw(x,y);

  if(mode==="static"){
    analyzeOEM();
  }

  if(mode==="compareDatabase"){

    if(!selectedDatabaseColor){
      alert("Selecione uma cor primeiro");
      return;
    }

    const lab = rgbToLab(sig.r,sig.g,sig.b);

    const sim = Math.max(0,100-deltaE(lab,selectedDatabaseColor.lab)).toFixed(1);

    document.getElementById("txt").innerText =
    selectedDatabaseColor.name+" | "+sim+"%";

    speak(sim+" por cento similar");
  }

});

/* ================= PESQUISA ================= */

function searchBrand(){

  const brand = document.getElementById("brandSearch").value.toLowerCase();

  const models = [...new Set(
    oemDatabase.filter(i=>i.brand.toLowerCase().includes(brand)).map(i=>i.model)
  )];

  const select = document.getElementById("modelSelect");

  select.innerHTML = <option value="">Selecione o modelo</option>;

  models.forEach(m=>{
    select.innerHTML += <option value="${m}">${m}</option>;
  });

  document.getElementById("resultList").innerHTML="";
}

/* ================= MODELOS ================= */

function showModelColors(){

  const model = document.getElementById("modelSelect").value;

  const list = document.getElementById("resultList");

  list.innerHTML="";

  oemDatabase
  .filter(i=>i.model===model)
  .forEach((item,i)=>{

    list.innerHTML += `
    <div class="item" onclick="selectDatabaseColor(${i})">
      <span class="colorBox" style="background:rgb(${item.rgb.r},${item.rgb.g},${item.rgb.b})"></span>
      <strong>${item.name}</strong>
    </div>`;
  });

}

/* ================= SELEÇÃO ================= */

function selectDatabaseColor(i){

  const model = document.getElementById("modelSelect").value;

  const list = oemDatabase.filter(i=>i.model===model);

  selectedDatabaseColor = list[i];

  document.getElementById("txt").innerText =
  "Selecionado: "+selectedDatabaseColor.name;

  speak(selectedDatabaseColor.name);
}

/* ================= ÁUDIO ================= */

function toggleVoice(){
  voice=!voice;
  alert("Áudio: "+(voice?"ON":"OFF"));
}

</script>

</body>
</html>
