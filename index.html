<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro – OEM MultiBrand Edition</title>
<style>
  body{ margin:0; font-family:Arial; background:#111; color:#fff; text-align:center; }
  h2{ margin-top:15px; }
  video{ width:92%; border-radius:12px; border:2px solid #333; object-fit:cover; }
  button{ padding:10px; margin:5px; border:none; border-radius:8px; cursor:pointer; background:#222; color:#fff; }
  button:hover{ background:#333; }
  .activeMode{ background:#00695c !important; }
  input,select{ padding:10px; border-radius:8px; border:none; margin:5px; width:90%; max-width:420px; }
  #panel{ display:flex; justify-content:space-around; flex-wrap:wrap; margin-top:15px; }
  .box{ width:45%; min-width:160px; }
  canvas{ width:100%; border-radius:10px; background:#222; }
  #cross{
    position:fixed; top:50%; left:50%; width:26px; height:26px;
    transform:translate(-50%,-50%); border:2px solid #00ffcc;
    border-radius:50%; display:none; pointer-events:none; z-index:999;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #databasePanel{ margin-top:20px; padding:15px; background:#181818; border-top:2px solid #333; }
  #resultList{ margin-top:10px; text-align:left; width:90%; max-width:700px; margin:0 auto; background:#1f1f1f; border-radius:10px; padding:10px; }
  .item{ padding:10px; border-bottom:1px solid #333; cursor:pointer; }
  .item:hover{ background:#2c2c2c; }
  .colorBox{ width:18px; height:18px; display:inline-block; border-radius:50%; margin-right:8px; border:1px solid #fff; vertical-align:middle; }
  #txt{ margin-top:15px; font-size:18px; padding:10px; min-height: 40px;}
  #universalPanel{ margin-top:15px; padding:10px; background:#181818; border-top:2px solid #333; }
</style>
</head>
<body>

<h2>ColorMatch Pro – OEM MultiBrand Edition</h2>

<button onclick="setMode('static')">Estático</button>
<button onclick="setMode('move')">Movimento</button>
<button onclick="setMode('comparePoint')">Comparar Ponto a Ponto</button>
<button onclick="setMode('compareDatabase')">Comparar Base de Dados</button>
<button onclick="analyzeOEM()">🎨 OEM Scan</button>
<button onclick="toggleFlash()">⚡ Flash</button>
<button id="voiceBtn" onclick="toggleVoice()">🔊 Áudio: ON</button>

<div id="universalPanel">
  <h3>Modo Universal</h3>
  <button id="universalBtn" onclick="toggleUniversalMode()">Universal OFF</button>
</div>

<video id="video" autoplay playsinline muted></video>
<div id="cross"></div>

<div id="panel">
  <div class="box"><canvas id="canvasA"></canvas><div>Referência</div></div>
  <div class="box"><canvas id="canvasB"></canvas><div>Comparação</div></div>
</div>

<div id="databasePanel">
  <h3>Pesquisa OEM</h3>
  <input type="text" id="brandSearch" placeholder="Digite a montadora..." oninput="searchBrand()">
  <br>
  <select id="modelSelect" onchange="showModelColors()">
    <option value="">Selecione o modelo</option>
  </select>
  <div id="resultList"></div>
</div>

<p id="txt">Inicializando...</p>

<script>
/* ================= ELEMENTOS ================= */
const video = document.getElementById("video");
const canvasA = document.getElementById("canvasA");
const canvasB = document.getElementById("canvasB");
const ctxA = canvasA.getContext("2d", {willReadFrequently:true});
const cross = document.getElementById("cross");
const txt = document.getElementById("txt");

/* ================= CONTROLE ================= */
let mode = "static";
let voice = true;
let universalMode = false;
let moveRunning = false;
let compareA = null;
let compareALab = null;
let compareStep = 0;
let selectedDatabaseColor = null;

/* ================= AUDIO & ESTABILIDADE ================= */
let lastAnnouncedColor = ""; // Evita repetição (ex: azul, azul, azul)
let isSpeaking = false;
let detectedColor = "";
let stableFrames = 0;
const MIN_STABLE_FRAMES = 12; 
let rgbBuffer = []; 
const BUFFER_SIZE = 10;

/* ================= FLASH & CAMERA ================= */
let streamTrack = null;
let flashOn = false;
let flashBusy = false;
let processingPaused = false;

navigator.mediaDevices.getUserMedia({
  video:{ facingMode:{ ideal:"environment" } },
  audio:false
}).then(stream=>{
  video.srcObject = stream;
  streamTrack = stream.getVideoTracks()[0];
}).catch(()=>{ alert("Erro ao acessar câmera"); });

/* ================= FUNÇÃO DE VOZ GLOBAL ================= */
function speak(text) {
  if (!voice || !text || isSpeaking) return;
  
  // No modo movimento, só fala se a cor for diferente da última dita
  if (mode === "move" && text === lastAnnouncedColor) return;

  lastAnnouncedColor = text;
  isSpeaking = true;
  
  speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = "pt-BR";
  msg.rate = 1.1;
  msg.onend = () => { isSpeaking = false; };
  msg.onerror = () => { isSpeaking = false; };
  speechSynthesis.speak(msg);
}

function toggleVoice(){
  voice = !voice;
  const btn = document.getElementById("voiceBtn");
  btn.innerText = voice ? "🔊 Áudio: ON" : "🔇 Áudio: OFF";
  if(!voice) {
    speechSynthesis.cancel();
    lastAnnouncedColor = "";
  }
}

/* ================= MODO UNIVERSAL ================= */
function toggleUniversalMode(){
  universalMode = !universalMode;
  const btn = document.getElementById("universalBtn");
  lastAnnouncedColor = ""; stableFrames = 0; detectedColor = "";
  if(universalMode){
    btn.innerText = "Universal ON";
    btn.classList.add("activeMode");
    speak("Modo universal ativado");
  }else{
    btn.innerText = "Universal OFF";
    btn.classList.remove("activeMode");
    speak("Modo universal desativado");
  }
}

/* ================= FLASH ================= */
async function toggleFlash(){
  if(flashBusy || !streamTrack) return;
  flashBusy = true;
  try{
    const capabilities = streamTrack.getCapabilities();
    if(!capabilities.torch) throw new Error();
    flashOn = !flashOn;
    await streamTrack.applyConstraints({ advanced:[{ torch:flashOn }] });
  }catch(e){ alert("Flash não disponível"); }
  flashBusy = false;
}

/* ================= MATEMÁTICA DE CORES ================= */
function rgbToHsl(r,g,b){
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h,s,l = (max + min) / 2;
  if(max === min){ h = s = 0; }else{
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch(max){
      case r: h = (g - b) / d + (g < b ? 6 : 0); break;
      case g: h = (b - r) / d + 2; break;
      case b: h = (r - g) / d + 4; break;
    }
    h /= 6;
  }
  return{ h:h * 360, s:s * 100, l:l * 100 };
}

function rgbToLab(r,g,b){
  r/=255; g/=255; b/=255;
  [r,g,b]=[r,g,b].map(v=> v>0.04045 ? Math.pow((v+0.055)/1.055,2.4) : v/12.92);
  let x = r*0.4124 + g*0.3576 + b*0.1805, y = r*0.2126 + g*0.7152 + b*0.0722, z = r*0.0193 + g*0.1192 + b*0.9505;
  x/=0.95047; y/=1; z/=1.08883;
  [x,y,z]=[x,y,z].map(v=> v>0.008856 ? Math.cbrt(v) : (7.787*v)+(16/116));
  return{ L:(116*y)-16, a:500*(x-y), b:200*(y-z) };
}

function deltaE(a,b){
  return Math.sqrt((a.L-b.L)**2 + (a.a-b.a)**2 + (a.b-b.b)**2);
}

/* ================= BANCO DE DADOS OEM ================= */
const oemDatabase = [
  { brand:"Toyota", model:"Corolla", year:"2024", code:"040", name:"Branco Polar", rgb:{r:244,g:244,b:241} },
  { brand:"Toyota", model:"Corolla", year:"2024", code:"1F7", name:"Prata Clássico", rgb:{r:169,g:173,b:177} },
  { brand:"Toyota", model:"Corolla", year:"2024", code:"218", name:"Preto Atitude", rgb:{r:27,g:27,b:27} },
  { brand:"Toyota", model:"Corolla", year:"2024", code:"3U5", name:"Vermelho Infinito", rgb:{r:126,g:31,b:36} }
];

oemDatabase.forEach(item=>{
  item.lab = rgbToLab(item.rgb.r, item.rgb.g, item.rgb.b);
});

/* ================= CAPTURA COM ESTABILIDADE ================= */
function captureRaw(x,y){
  if(!video.videoWidth || processingPaused){ return {r:0,g:0,b:0}; }
  canvasA.width = video.videoWidth;
  canvasA.height = video.videoHeight;
  ctxA.drawImage(video,0,0);
  const s = 10;
  const data = ctxA.getImageData(x-s, y-s, s*2, s*2).data;
  let r=0,g=0,b=0,c=0;
  for(let i=0;i<data.length;i+=4){
    r += data[i]; g += data[i+1]; b += data[i+2]; c++;
  }
  const raw = { r:Math.round(r/c), g:Math.round(g/c), b:Math.round(b/c) };
  
  rgbBuffer.push(raw);
  if(rgbBuffer.length > BUFFER_SIZE) rgbBuffer.shift();
  const avg = rgbBuffer.reduce((acc, curr) => {
    acc.r += curr.r; acc.g += curr.g; acc.b += curr.b; return acc;
  }, {r:0,g:0,b:0});

  const finalRgb = {
    r: Math.round(avg.r / rgbBuffer.length),
    g: Math.round(avg.g / rgbBuffer.length),
    b: Math.round(avg.b / rgbBuffer.length)
  };

  const diff = Math.abs(raw.r - finalRgb.r) + Math.abs(raw.g - finalRgb.g);
  if(diff < 5 && rgbBuffer.length >= 5){
    cross.style.borderColor = "#00ffcc";
    cross.style.boxShadow = "0 0 15px #00ffcc";
  } else {
    cross.style.borderColor = "#ff4444";
    cross.style.boxShadow = "none";
  }

  return finalRgb;
}

/* ================= DETECTOR UNIVERSAL ================= */
function detectUniversalColor(r,g,b){
  const hsl = rgbToHsl(r,g,b);
  const {h, s, l} = hsl;
  if(s <= 12 && l >= 80) return "Branco";
  if(l <= 15) return "Preto";
  if(s <= 15) return "Cinza";
  if((h >= 0 && h <= 15) || (h >= 345 && h <= 360)) return "Vermelho";
  if(h >= 16 && h <= 45) return "Laranja";
  if(h >= 46 && h <= 70) return "Amarelo";
  if(h >= 71 && h <= 160) return "Verde";
  if(h >= 161 && h <= 255) return "Azul";
  if(h >= 256 && h <= 310) return "Roxo";
  if(h >= 311 && h <= 344) return "Rosa";
  return "";
}

/* ================= LOOP DE MOVIMENTO ================= */
function moveLoop(){
  if(mode !== "move"){ moveRunning = false; return; }
  const sig = captureRaw(video.videoWidth/2, video.videoHeight/2);

  if(universalMode){
    const colorName = detectUniversalColor(sig.r, sig.g, sig.b);
    if(colorName !== ""){
        txt.innerText = "Cor: " + colorName;
        if(colorName === detectedColor){ 
            stableFrames++; 
        } else { 
            detectedColor = colorName; 
            stableFrames = 0; 
        }
        
        if(stableFrames >= MIN_STABLE_FRAMES){
            speak(colorName);
        }
    } else {
        txt.innerText = "Analisando...";
    }
  } else {
    txt.innerText = `RGB: ${sig.r}, ${sig.g}, ${sig.b}`;
  }
  requestAnimationFrame(moveLoop);
}

/* ================= FUNÇÕES DE AÇÃO ================= */
function analyzeOEM(){
  const sig = captureRaw(video.videoWidth/2, video.videoHeight/2);
  const targetLab = rgbToLab(sig.r, sig.g, sig.b);
  let best = null, bestDelta = 999;
  for(const color of oemDatabase){
    const d = deltaE(targetLab, color.lab);
    if(d < bestDelta){ bestDelta = d; best = color; }
  }
  const similarity = Math.max(0, 100 - bestDelta).toFixed(1);
  txt.innerText = `${best.name} (${best.code}) - ${similarity}%`;
  speak(best.name);
}

function setMode(m){
  mode = m; compareStep = 0; lastAnnouncedColor = ""; stableFrames = 0;
  cross.style.display = (m === "move" || m === "comparePoint" || m === "compareDatabase") ? "block" : "none";
  txt.innerText = "Modo: " + m.toUpperCase();
  if(m === "move" && !moveRunning){ moveRunning = true; moveLoop(); }
}

function searchBrand(){
  const brand = document.getElementById("brandSearch").value.trim().toLowerCase();
  const models = [...new Set(oemDatabase.filter(item=> item.brand.toLowerCase().includes(brand)).map(item=>item.model))].sort();
  const select = document.getElementById("modelSelect");
  select.innerHTML = `<option value="">Selecione o modelo</option>`;
  models.forEach(model=>{ select.innerHTML += `<option value="${model}">${model}</option>`; });
}

function showModelColors(){
  const model = document.getElementById("modelSelect").value;
  const resultList = document.getElementById("resultList");
  resultList.innerHTML = "";
  const colors = oemDatabase.filter(item=>item.model===model);
  colors.forEach(item=>{
    resultList.innerHTML += `<div class="item" onclick="selectDatabaseColor('${item.name}')">
      <span class="colorBox" style="background:rgb(${item.rgb.r},${item.rgb.g},${item.rgb.b})"></span>
      ${item.name} - ${item.code}
    </div>`;
  });
}

function selectDatabaseColor(name){
  selectedDatabaseColor = oemDatabase.find(i=>i.name===name);
  txt.innerText = "Selecionado: " + name;
  speak(name);
}

/* ================= EVENTO DE CLIQUE ================= */
video.addEventListener("click",(e)=>{
  const rect = video.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (video.videoWidth / rect.width);
  const y = (e.clientY - rect.top) * (video.videoHeight / rect.height);
  const sig = captureRaw(x,y);

  if(mode === "static") analyzeOEM();
  if(mode === "compareDatabase"){
    if(!selectedDatabaseColor) return alert("Selecione uma cor na lista");
    const dE = deltaE(rgbToLab(sig.r,sig.g,sig.b), selectedDatabaseColor.lab);
    const sim = Math.max(0, 100 - dE).toFixed(1);
    txt.innerText = `Similaridade: ${sim}%`;
    speak(sim + " por cento");
  }
  if(mode === "comparePoint"){
    if(compareStep === 0){
      compareALab = rgbToLab(sig.r, sig.g, sig.b);
      compareStep = 1; txt.innerText = "Ponto 1 capturado"; speak("Ponto um");
    } else {
      const dE = deltaE(compareALab, rgbToLab(sig.r, sig.g, sig.b));
      const sim = Math.max(0, 100 - dE).toFixed(1);
      txt.innerText = `Similaridade: ${sim}%`;
      speak(sim + " por cento");
      compareStep = 0;
    }
  }
});
</script>
</body>
</html>
