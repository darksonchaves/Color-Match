<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro – Stable Full Engine</title>

<style>
body {
  text-align:center;
  font-family:Arial;
  background:#111;
  color:#fff;
  margin:0;
}

video {
  width:90%;
  border-radius:10px;
  position:relative;
}

#cross {
  position:absolute;
  width:20px;
  height:20px;
  border:2px solid #00ffcc;
  border-radius:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
  display:none;
}

.point {
  position:absolute;
  width:16px;
  height:16px;
  border-radius:50%;
  pointer-events:none;
  border:2px solid;
  display:none;
}

#p1 { border-color:lime; }
#p2 { border-color:red; }

button {
  padding:10px;
  margin:5px;
}
</style>
</head>

<body>

<h2>ColorMatch Pro – Stable Engine</h2>

<button onclick="setMode('static')">Estático</button>
<button onclick="setMode('live')">Live</button>
<button onclick="setMode('compare')">Comparativo</button>
<button onclick="toggleFlash()">⚡ Flash</button>
<button onclick="toggleVoice()">🔊 Áudio</button>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="cross"></div>
<div id="p1" class="point"></div>
<div id="p2" class="point"></div>

<p id="txt">Selecione um modo</p>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let mode = "static";
let voice = true;

let stepCompare = 0;
let sampleA = null;
let sampleB = null;

let lastColor = "";
let streamTrack = null;
let flashOn = false;

/* ================= VOZ ================= */
function speak(text){
  if(!voice) return;
  speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = "pt-BR";
  setTimeout(()=>speechSynthesis.speak(msg), 80);
}

/* ================= CAMERA ================= */
navigator.mediaDevices.getUserMedia({
  video:{facingMode:"environment"}
}).then(s=>{
  video.srcObject = s;
  streamTrack = s.getVideoTracks()[0];
});

/* ================= FLASH ================= */
function toggleFlash(){
  if(!streamTrack) return alert("Flash não disponível");

  flashOn = !flashOn;

  try{
    streamTrack.applyConstraints({
      advanced:[{torch:flashOn}]
    });
  }catch(e){
    alert("Flash não suportado");
  }
}

/* ================= LAB ================= */
function rgbToLab(r,g,b){
  r/=255; g/=255; b/=255;

  [r,g,b]=[r,g,b].map(v=>
    v>0.04045?Math.pow((v+0.055)/1.055,2.4):v/12.92
  );

  let x=r*0.4124+g*0.3576+b*0.1805;
  let y=r*0.2126+g*0.7152+b*0.0722;
  let z=r*0.0193+g*0.1192+b*0.9505;

  x/=0.95047; y/=1; z/=1.08883;

  [x,y,z]=[x,y,z].map(v=>v>0.008856?Math.cbrt(v):(7.787*v)+(16/116));

  return {
    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)
  };
}

/* ================= ΔE ================= */
function deltaE(a,b){
  return Math.sqrt(
    (a.L-b.L)**2 +
    (a.a-b.a)**2 +
    (a.b-b.b)**2
  );
}

/* ================= CORES ================= */
const colors = [
  {n:"Preto",lab:rgbToLab(10,10,10)},
  {n:"Branco",lab:rgbToLab(245,245,245)},
  {n:"Cinza",lab:rgbToLab(128,128,128)},
  {n:"Vermelho",lab:rgbToLab(220,60,60)},
  {n:"Verde",lab:rgbToLab(60,200,60)},
  {n:"Azul",lab:rgbToLab(60,80,220)},
  {n:"Amarelo",lab:rgbToLab(240,220,80)},
  {n:"Laranja",lab:rgbToLab(240,150,80)},
  {n:"Rosa",lab:rgbToLab(240,120,180)},
  {n:"Roxo",lab:rgbToLab(140,70,170)},
  {n:"Marrom",lab:rgbToLab(120,80,60)}
];

/* ================= DETECÇÃO ================= */
function detect(r,g,b){
  const lab = rgbToLab(r,g,b);

  let best={n:"Indef",d:999};

  for(const c of colors){
    const d=deltaE(lab,c.lab);
    if(d<best.d) best={n:c.n,d};
  }

  return best.n;
}

/* ================= CAPTURA ================= */
function capture(x,y){
  if(!video.videoWidth) return "Carregando...";

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  const s=12;
  const d=ctx.getImageData(x-s,y-s,s*2,s*2).data;

  let r=0,g=0,b=0,c=0;

  for(let i=0;i<d.length;i+=4){
    r+=d[i];
    g+=d[i+1];
    b+=d[i+2];
    c++;
  }

  return detect(r/c,g/c,b/c);
}

/* ================= CLICK ================= */
video.addEventListener("click",(e)=>{

  const rect = video.getBoundingClientRect();

  const x = (e.clientX - rect.left) * (video.videoWidth / rect.width);
  const y = (e.clientY - rect.top) * (video.videoHeight / rect.height);

  const cross = document.getElementById("cross");
  cross.style.left = e.clientX + "px";
  cross.style.top = e.clientY + "px";
  cross.style.display = "block";

  /* ================= STATIC ================= */
  if(mode==="static"){
    const name = capture(x,y);

    document.getElementById("txt").innerText = "STATIC: " + name;
    speak(name);

    const p1 = document.getElementById("p1");
    p1.style.left = e.clientX + "px";
    p1.style.top = e.clientY + "px";
    p1.style.display = "block";
  }

  /* ================= COMPARE FIXADO ================= */
  if(mode==="compare"){

    const sample = capture(x,y);

    if(stepCompare===0){

      sampleA = sample;

      const p1 = document.getElementById("p1");
      p1.style.left = e.clientX + "px";
      p1.style.top = e.clientY + "px";
      p1.style.display = "block";

      document.getElementById("txt").innerText =
        "Referência fixada: " + sampleA;

      stepCompare = 1;

    } else {

      sampleB = sample;

      const p2 = document.getElementById("p2");
      p2.style.left = e.clientX + "px";
      p2.style.top = e.clientY + "px";
      p2.style.display = "block";

      const sim = Math.max(0, 100 - deltaE(
        rgbToLab(100,100,100),
        rgbToLab(100,100,100)
      ));

      const text =
        `Ref: ${sampleA} | Atual: ${sampleB} | Similaridade: ${sim.toFixed(1)}%`;

      document.getElementById("txt").innerText = text;
      speak(text);

      stepCompare = 0;
    }
  }
});

/* ================= MODE ================= */
function setMode(m){

  mode = m;

  stepCompare = 0;
  sampleA = null;
  sampleB = null;

  document.getElementById("p1").style.display = "none";
  document.getElementById("p2").style.display = "none";
  document.getElementById("cross").style.display = "none";

  document.getElementById("txt").innerText = "Modo: " + m.toUpperCase();
}

/* ================= VOZ ================= */
function toggleVoice(){
  voice = !voice;
  alert("Áudio: " + (voice ? "ON" : "OFF"));
}

</script>

</body>
</html>
