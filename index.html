<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro - Ultra Engine v6 (Final Phase 1)</title>
<style>
  body{ margin:0; font-family: 'Segoe UI', Tahoma, sans-serif; background:#000; color:#fff; text-align:center; overflow:hidden; }
  #header{ padding: 12px; background: #0a0a0a; display: flex; justify-content: center; gap: 10px; border-bottom: 2px solid #1a1a1a; }
  #video-container { position: relative; width: 100%; height: 65vh; background: #000; }
  video{ width: 100%; height: 100%; object-fit: contain; }
  button{ padding:12px 18px; border-radius:10px; border:none; background:#1a1a1a; color:#888; font-weight:bold; cursor:pointer; transition: 0.4s; border: 1px solid #333; }
  .active{ background:#00ffcc !important; color:#000 !important; box-shadow: 0 0 20px rgba(0,255,204,0.3); border: 1px solid #00ffcc; }
  #cross{ 
    position:absolute; top:50%; left:50%; width:30px; height:30px; 
    transform:translate(-50%,-50%); border:2px dashed #00ffcc; 
    border-radius:50%; pointer-events:none; z-index: 10;
    box-shadow: 0 0 10px rgba(0,255,204,0.5);
  }
  #display{ font-size: 46px; font-weight: 900; color: #00ffcc; margin: 20px 0; text-transform: uppercase; letter-spacing: -1px; }
  .info { color: #555; font-size: 10px; letter-spacing: 2px; font-weight: bold; }
</style>
</head>
<body>

<div id="header">
  <button onclick="toggleUniv()" id="btnU">MODO UNIVERSAL</button>
  <button onclick="calibrate()">CALIBRAR AMBIENTE</button>
  <button onclick="toggleVoice()" id="btnV" class="active">ÁUDIO ATIVO</button>
</div>

<div id="video-container">
  <video id="v" autoplay playsinline muted></video>
  <div id="cross"></div>
</div>

<div id="display">INICIALIZANDO...</div>
<div id="stats" class="info">ENGINE V6: LIMITE MATEMÁTICO ALCANÇADO</div>

<canvas id="c" style="display:none;"></canvas>

<script>
const video = document.getElementById('v');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', {willReadFrequently: true});
const display = document.getElementById('display');
const stats = document.getElementById('stats');

let isUniv = false, isVoice = true;
let lastColor = "", stableCount = 0;
let offset = {r:255, g:255, b:255};
let colorHistory = []; 

navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment", width: {ideal: 1920}, frameRate: {ideal: 60} }
}).then(s => { video.srcObject = s; });

function speak(t) {
    if(!isVoice || !isUniv) return;
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(t);
    msg.lang = 'pt-BR';
    msg.rate = 1.4;
    window.speechSynthesis.speak(msg);
}

function calibrate() {
    const data = getCenterColor();
    offset = {r: data.r, g: data.g, b: data.b};
    speak("Ambiente Calibrado");
}

function getCenterColor() {
    if (canvas.width !== video.videoWidth) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
    }
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const x = canvas.width / 2;
    const y = canvas.height / 2;
    const size = 20; 
    const d = ctx.getImageData(x - 10, y - 10, size, size).data;
    
    let rArr=[], gArr=[], bArr=[];
    
    for(let i=0; i<d.length; i+=4){
        // Filtro de Outliers: Ignora pixels de brilho extremo (reflexo metálico)
        const brightness = (d[i] + d[i+1] + d[i+2]) / 3;
        if (brightness < 250 && brightness > 5) {
            rArr.push(d[i]); gArr.push(d[i+1]); bArr.push(d[i+2]);
        }
    }
    
    const avg = arr => arr.length > 0 ? arr.reduce((a,b)=>a+b)/arr.length : 0;
    return { r: avg(rArr), g: avg(gArr), b: avg(bArr) };
}

function solveColor(r, g, b) {
    // 1. Algoritmo de Mapeamento Adaptativo
    const gamma = (r+g+b)/3 > 128 ? 1.0 : 0.8; // Gama inteligente
    let nr = Math.pow(r / (offset.r || 255), gamma) * 255;
    let ng = Math.pow(g / (offset.g || 255), gamma) * 255;
    let nb = Math.pow(b / (offset.b || 255), gamma) * 255;
    
    // 2. Luminância Lab-Standard
    const lum = (0.2126 * nr + 0.7152 * ng + 0.0722 * nb) / 255;
    
    const max = Math.max(nr, ng, nb);
    const min = Math.min(nr, ng, nb);
    const chroma = max - min;

    let h = 0;
    if (chroma !== 0) {
        if (max === nr) h = ((ng - nb) / chroma) % 6;
        else if (max === ng) h = (nb - nr) / chroma + 2;
        else h = (nr - ng) / chroma + 4;
        h = Math.round(h * 60);
        if (h < 0) h += 360;
    }

    // 3. MOTOR DE DECISÃO V6 (PLATÔ DE PROGRAMAÇÃO)
    if (lum < 0.10) return "Preto";
    if (chroma < 18) return (lum > 0.82) ? "Branco" : "Cinza";

    // Lógica Rosa vs Vermelho com Vetor de Saturação
    if (h < 18 || h > 340) {
        const satVetor = chroma / max; 
        if (lum > 0.42 && satVetor < 0.75) return "Rosa";
        return (lum < 0.30) ? "Vermelho Escuro" : "Vermelho";
    }

    if (h >= 18 && h < 42) return (lum < 0.35) ? "Marrom" : "Laranja";
    if (h >= 42 && h < 65) return "Amarelo";
    if (h >= 65 && h < 158) return "Verde";
    if (h >= 158 && h < 258) return "Azul";
    if (h >= 258 && h < 295) return "Roxo";
    if (h >= 295 && h <= 340) return "Rosa";

    return "Ajustando...";
}

function getStableColor(newColor) {
    colorHistory.push(newColor);
    if (colorHistory.length > 8) colorHistory.shift();
    return colorHistory.sort((a,b) =>
          colorHistory.filter(v => v===a).length - colorHistory.filter(v => v===b).length
    ).pop();
}

function mainLoop() {
    if(video.videoWidth > 0) {
        const rgb = getCenterColor();
        const colorName = getStableColor(solveColor(rgb.r, rgb.g, rgb.b));

        if(isUniv) {
            display.innerText = colorName;
            if(colorName === lastColor && colorName !== "Ajustando...") {
                stableCount++;
                if(stableCount === 10) speak(colorName);
            } else {
                lastColor = colorName;
                stableCount = 0;
            }
            stats.innerText = `PRECISÃO FOTOMÉTRICA ATIVA | R:${Math.round(rgb.r)}`;
        } else {
            display.innerText = `SISTEMA PRONTO`;
            stats.innerText = `RGB BRUTO: ${Math.round(rgb.r)},${Math.round(rgb.g)},${Math.round(rgb.b)}`;
        }
    }
    requestAnimationFrame(mainLoop);
}

function toggleUniv() { 
    isUniv = !isUniv; 
    document.getElementById('btnU').classList.toggle('active');
    if(isUniv) { speak("Motor de precisão ativado"); colorHistory = []; }
    else { display.innerText = "SISTEMA PRONTO"; }
}

function toggleVoice() { 
    isVoice = !isVoice; 
    document.getElementById('btnV').classList.toggle('active');
    if(!isVoice) window.speechSynthesis.cancel();
}

requestAnimationFrame(mainLoop);
</script>
</body>
</html>
