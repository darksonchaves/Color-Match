<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro - Universal Pure v7.1</title>
<style>
  body{ margin:0; font-family: 'Segoe UI', sans-serif; background:#000; color:#fff; text-align:center; overflow:hidden; }
  #header{ padding: 12px; background: #0a0a0a; display: flex; justify-content: center; gap: 10px; border-bottom: 2px solid #1a1a1a; }
  #video-container { position: relative; width: 100%; height: 65vh; background: #000; }
  video{ width: 100%; height: 100%; object-fit: contain; }
  button{ padding:12px 18px; border-radius:10px; border:none; background:#1a1a1a; color:#888; font-weight:bold; cursor:pointer; transition: 0.4s; border: 1px solid #333; }
  .active{ background:#00ffcc !important; color:#000 !important; box-shadow: 0 0 20px rgba(0,255,204,0.3); border: 1px solid #00ffcc; }
  #cross{ 
    position:absolute; top:50%; left:50%; width:30px; height:30px; 
    transform:translate(-50%,-50%); border:2px dashed #00ffcc; 
    border-radius:50%; pointer-events:none; z-index: 10;
  }
  #display{ font-size: 48px; font-weight: 900; color: #00ffcc; margin: 20px 0; text-transform: uppercase; letter-spacing: -2px; }
  .info { color: #444; font-size: 10px; letter-spacing: 2px; font-weight: bold; }
</style>
</head>
<body>

<div id="header">
  <button onclick="toggleUniv()" id="btnU">MODO UNIVERSAL: OFF</button>
  <button onclick="calibrate()">CALIBRAR PIGMENTO</button>
  <button onclick="toggleVoice()" id="btnV" class="active">ÁUDIO: ON</button>
</div>

<div id="video-container">
  <video id="v" autoplay playsinline muted></video>
  <div id="cross"></div>
</div>

<div id="display">PRONTO</div>
<div id="stats" class="info">EXTRATOR DE PIGMENTO ATIVO</div>

<canvas id="c" style="display:none;"></canvas>

<script>
const video = document.getElementById('v');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', {willReadFrequently: true});
const display = document.getElementById('display');
const stats = document.getElementById('stats');

let isUniv = false, isVoice = true, lastColor = "", stableCount = 0;
let offset = {r:255, g:255, b:255}, colorHistory = []; 

navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment", width: {ideal: 1920}, frameRate: {ideal: 60} }
}).then(s => { video.srcObject = s; });

function speak(t) {
    if(!isVoice || !isUniv) return;
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(t);
    msg.lang = 'pt-BR';
    msg.rate = 1.4;
    window.speechSynthesis.speak(msg);
}

function calibrate() {
    const data = getCenterColor();
    offset = {r: data.r, g: data.g, b: data.b};
    speak("Pigmento Referência Calibrado");
}

function getCenterColor() {
    if (canvas.width !== video.videoWidth) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
    }
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const x = canvas.width / 2, y = canvas.height / 2;
    const size = 12;
    const d = ctx.getImageData(x - (size/2), y - (size/2), size, size).data;
    
    let r=0, g=0, b=0, v=0;
    for(let i=0; i<d.length; i+=4){
        // Filtro de Rejeição de Brilho: Ignora pixels excessivamente claros que distorcem o pigmento
        if ((d[i] + d[i+1] + d[i+2]) / 3 < 240) {
            r += d[i]; g += d[i+1]; b += d[i+2]; v++;
        }
    }
    return v > 0 ? { r: r/v, g: g/v, b: b/v } : { r: 128, g: 128, b: 128 };
}

function solveColor(r, g, b) {
    // 1. Normalização Anti-Iluminação
    let nr = (r / (offset.r || 255)) * 255;
    let ng = (g / (offset.g || 255)) * 255;
    let nb = (b / (offset.b || 255)) * 255;
    
    // 2. Luminância Perceptual Lab
    const lum = (0.299 * nr + 0.587 * ng + 0.114 * nb) / 255;
    const max = Math.max(nr, ng, nb);
    const min = Math.min(nr, ng, nb);
    const chroma = max - min;

    let h = 0;
    if (chroma !== 0) {
        if (max === nr) h = ((ng - nb) / chroma) % 6;
        else if (max === ng) h = (nb - nr) / chroma + 2;
        else h = (nr - ng) / chroma + 4;
        h = Math.round(h * 60); if (h < 0) h += 360;
    }

    // --- LOGICA DE ALTA FIDELIDADE AO PIGMENTO ---

    // 1. Trava do Preto (Impede que o Preto vire Cinza ou Azul Escuro)
    if (lum < 0.22) {
        // Se a cor for muito escura, verificamos se há saturação real
        if (chroma < 25) return "Preto";
        // Se houver um matiz azulado mas a luminosidade for baixa, ainda é Preto/Cinza Escuro
        if (nb > nr && lum < 0.15) return "Preto";
    }

    // 2. Filtro de Neutros (Branco e Cinza)
    if (chroma < 22) {
        if (lum > 0.82) return "Branco";
        return "Cinza";
    }

    // 3. Conflito Rosa / Roxo / Vermelho
    if (h > 290 && h <= 345) {
        // No pigmento, o Rosa tem muito mais Vermelho que o Roxo
        if (nr > nb * 0.85) return "Rosa";
        return "Roxo";
    }
    
    if (h <= 15 || h > 345) {
        // Vermelho vs Rosa (baseado em intensidade e brilho)
        if (lum > 0.40 && nr / (ng + 1) < 2.0) return "Rosa";
        return (lum < 0.32) ? "Vermelho Escuro" : "Vermelho";
    }

    // 4. Conflito Verde / Azul (Matizes de transição)
    if (h >= 155 && h < 190) {
        // Se o verde for forte, é um tom de Verde Água/Turquesa, mas no Universal chamamos de Verde
        if (ng > nb * 0.9) return "Verde";
        return "Azul";
    }

    // Categorias Padrão
    if (h >= 15 && h < 45) return (lum < 0.38) ? "Marrom" : "Laranja";
    if (h >= 45 && h < 68) return "Amarelo";
    if (h >= 68 && h < 155) return "Verde";
    if (h >= 190 && h < 265) return "Azul";
    if (h >= 265 && h <= 290) return "Roxo";

    return "Analisando...";
}

function getStableColor(newColor) {
    colorHistory.push(newColor);
    if (colorHistory.length > 12) colorHistory.shift();
    return colorHistory.sort((a,b) =>
          colorHistory.filter(v => v===a).length - colorHistory.filter(v => v===b).length
    ).pop();
}

function mainLoop() {
    if(video.videoWidth > 0) {
        const rgb = getCenterColor();
        const colorName = getStableColor(solveColor(rgb.r, rgb.g, rgb.b));

        if(isUniv) {
            display.innerText = colorName;
            if(colorName === lastColor && colorName !== "Analisando...") {
                stableCount++;
                if(stableCount === 14) speak(colorName);
            } else { lastColor = colorName; stableCount = 0; }
        } else {
            display.innerText = "MODO STANDBY";
            stats.innerText = `R:${Math.round(rgb.r)} G:${Math.round(rgb.g)} B:${Math.round(rgb.b)}`;
        }
    }
    requestAnimationFrame(mainLoop);
}

function toggleUniv() { 
    isUniv = !isUniv; 
    const btn = document.getElementById('btnU');
    btn.classList.toggle('active');
    btn.innerText = isUniv ? "MODO UNIVERSAL: ON" : "MODO UNIVERSAL: OFF";
    if(isUniv) { speak("Modo Universal Ativado"); colorHistory = []; }
}

function toggleVoice() { 
    isVoice = !isVoice; 
    document.getElementById('btnV').classList.toggle('active');
    document.getElementById('btnV').innerText = isVoice ? "ÁUDIO: ON" : "ÁUDIO: OFF";
}

requestAnimationFrame(mainLoop);
</script>
</body>
</html>
