<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ColorMatch Pro - v30.0 Ultra-Stressed</title>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: #fff; overflow: hidden; text-align: center; }
        #header { 
            position: absolute; top: 0; width: 100%; z-index: 20;
            background: rgba(10, 10, 10, 0.95); display: flex; justify-content: center; 
            padding: 10px 0; gap: 5px; border-bottom: 1px solid #333; flex-wrap: wrap;
        }
        button { 
            background: #1a1a1a; color: #aaa; border: 1px solid #444; padding: 8px 12px; 
            border-radius: 6px; font-weight: bold; font-size: 10px; text-transform: uppercase; cursor: pointer;
            transition: all 0.1s ease;
        }
        .active { background: #007bff !important; color: #fff !important; }
        .audio-on { background: #28a745 !important; color: #fff !important; }
        .univ-on { background: #ffc107 !important; color: #000 !important; }

        #video-container { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #crosshair { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border: 2px solid rgba(255,255,255,0.7); border-radius: 50%; pointer-events: none; z-index: 10;
            transition: all 0.2s;
        }
        .mira-livre { width: 30px; height: 30px; }
        .mira-padrao { width: 20vw; height: 20vw; border: 3px dashed rgba(255,255,255,0.5); }
        .locked { border-color: #00ffcc !important; box-shadow: 0 0 30px #00ffcc; background: rgba(0,255,204,0.1); }

        #ui-overlay { position: absolute; bottom: 0; width: 100%; padding: 45px 0; background: linear-gradient(transparent, #000 85%); z-index: 20; }
        #color-name { font-size: 55px; font-weight: 900; text-transform: uppercase; color: #444; min-height: 70px; letter-spacing: 2px; }
        .active-text { color: #00ffcc !important; text-shadow: 0 0 30px rgba(0,255,204,0.7); }
    </style>
</head>
<body>

<div id="header">
    <button onclick="toggleSystem()" id="btnPower">SISTEMA: OFF</button>
    <button onclick="toggleAudio()" id="btnAudio">ÁUDIO: OFF</button>
    <button onclick="toggleUniversal()" id="btnUniv">MODO UNIVERSAL: OFF</button>
    <button onclick="calibrate()" id="btnCalib">CALIBRAR</button>
    <button onclick="setMode('LIVRE')" id="btnLivre">MODO LIVRE</button>
    <button onclick="setMode('PADRAO')" id="btnPadrao">MODO PADRÃO</button>
</div>

<div id="video-container">
    <video id="v" autoplay playsinline muted></video>
    <div id="crosshair" class="mira-livre"></div>
</div>

<div id="ui-overlay">
    <div id="color-name">INATIVO</div>
</div>

<canvas id="c" style="display:none;"></canvas>

<script>
    const v = document.getElementById('v'), c = document.getElementById('c');
    const ctx = c.getContext('2d', {willReadFrequently: true, alpha: false});
    const colorTxt = document.getElementById('color-name'), cross = document.getElementById('crosshair');

    let active = false, audioActive = false, universalMode = false, mode = 'LIVRE';
    let balance = { r: 1, g: 1, b: 1 };
    let history = [], lastSpeach = "", isSpeaking = false;

    const constraints = {
        video: {
            facingMode: "environment",
            width: { ideal: 4096, max: 7680 }, 
            height: { ideal: 2160, max: 4320 },
            frameRate: { ideal: 60, max: 120 },  
            whiteBalanceMode: "manual",          
            exposureMode: "manual"
        }
    };

    navigator.mediaDevices.getUserMedia(constraints)
        .then(s => { 
            v.srcObject = s;
            setTimeout(() => {
                const track = s.getVideoTracks()[0];
                const capabilities = track.getCapabilities ? track.getCapabilities() : {};
                const settings = {};
                if (capabilities.focusMode && capabilities.focusMode.includes('continuous')) settings.focusMode = 'continuous';
                if (track.applyConstraints) track.applyConstraints(settings).catch(e => console.log(e));
            }, 1000);
        })
        .catch(err => {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", focusMode: "continuous" } }).then(s => v.srcObject = s);
        });

    function toggleSystem() { 
        active = !active; 
        document.getElementById('btnPower').classList.toggle('active', active);
        document.getElementById('btnPower').innerText = `SISTEMA: ${active ? 'ON' : 'OFF'}`;
        if(!active) { colorTxt.innerText = "INATIVO"; colorTxt.className = ""; history = []; }
    }

    function toggleAudio() {
        if(!active) return;
        audioActive = !audioActive;
        document.getElementById('btnAudio').classList.toggle('audio-on', audioActive);
        document.getElementById('btnAudio').innerText = `ÁUDIO: ${active ? (audioActive ? 'ON' : 'OFF') : 'OFF'}`;
        if(audioActive) speak("Áudio ligado");
    }

    function toggleUniversal() {
        universalMode = !universalMode;
        document.getElementById('btnUniv').classList.toggle('univ-on', universalMode);
        document.getElementById('btnUniv').innerText = `MODO UNIVERSAL: ${universalMode ? 'ON' : 'OFF'}`;
        if(audioActive) speak("Universal " + (universalMode ? "On" : "Off"));
    }

    function setMode(m) {
        mode = m;
        document.getElementById('btnLivre').classList.toggle('active', m === 'LIVRE');
        document.getElementById('btnPadrao').classList.toggle('active', m === 'PADRAO');
        cross.className = (m === 'LIVRE' ? 'mira-livre' : 'mira-padrao');
        if(audioActive) speak("Modo " + m);
    }

    function calibrate() {
        if(!active) return;
        c.width = v.videoWidth; c.height = v.videoHeight;
        ctx.drawImage(v, 0, 0);
        const p = ctx.getImageData(v.videoWidth/2, v.videoHeight/2, 1, 1).data;
        const avg = (p[0] + p[1] + p[2]) / 3;
        balance.r = avg / Math.max(p[0], 1);
        balance.g = avg / Math.max(p[1], 1);
        balance.b = avg / Math.max(p[2], 1);
        history = []; 
        if(audioActive) speak("Calibrado");
    }

    function getFinalColor(r, g, b) {
        r = Math.min(255, Math.max(0, r * balance.r));
        g = Math.min(255, Math.max(0, g * balance.g));
        b = Math.min(255, Math.max(0, b * balance.b));

        let currentAvg = (r + g + b) / 3;
        if (currentAvg < 35 && currentAvg > 5) { 
            let factor = 35 / currentAvg;
            r = Math.min(255, r * factor); g = Math.min(255, g * factor); b = Math.min(255, b * factor);
        }

        let r1 = r/255, g1 = g/255, b1 = b/255;
        let max = Math.max(r1, g1, b1), min = Math.min(r1, g1, b1);
        let h, s, l = (max + min) / 2;

        if(max === min) h = s = 0;
        else {
            let d = max - min;
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            if(max === r1) h = (g1 - b1) / d + (g1 < b1 ? 6 : 0);
            else if(max === g1) h = (b1 - r1) / d + 2;
            else h = (r1 - g1) / d + 4;
            h *= 60;
        }

        let rgbDiff = Math.max(r, g, b) - Math.min(r, g, b);
        if (l > 0.40 && rgbDiff < 12) return "BRANCO";

        if (l < 0.10) return "PRETO";
        if (l > 0.88 && s < 0.18) return "BRANCO";

        if (universalMode) {
            if (l < 0.14) return "PRETO";
            if (s < 0.18) return "BRANCO"; 
            if (h < 20 || h >= 335) return "VERMELHO";
            if (h >= 20 && h < 50) return "LARANJA";
            if (h >= 50 && h < 75) return "AMARELO";
            if (h >= 75 && h < 165) return "VERDE";
            if (h >= 165 && h < 255) return "AZUL";
            if (h >= 255 && h < 300) return "ROXO";
            if (h >= 300 && h < 335) return "ROSA";
            return "ESPECTRO";
        }

        if (s < 0.14) {
            if (l > 0.68) return "BRANCO";
            if (l < 0.28) return "PRETO";
            return "CINZA";
        }

        if (l < 0.38 && (h < 35 || h >= 330) && s > 0.18) return "MARROM";

        if (h < 15 || h >= 330) return (s > 0.45 && l > 0.45 && h >= 330) ? "ROSA" : "VERMELHO";
        if (h >= 15 && h < 45) return "LARANJA";
        if (h >= 45 && h < 70) return "AMARELO";
        if (h >= 70 && h < 160) return "VERDE";
        if (h >= 160 && h < 255) return "AZUL";
        if (h >= 255 && h < 295) return "ROXO";
        if (h >= 295 && h < 330) return "ROSA";

        return "ANALISANDO";
    }

    function loop() {
        if (active && v.videoWidth > 0) {
            c.width = v.videoWidth; c.height = v.videoHeight;
            
            // FORÇANDO ESTRESSE DE GPU: Reativada suavização na qualidade máxima suportada
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(v, 0, 0);
            
            let size = (mode === 'LIVRE' ? 10 : 35); 
            const p = ctx.getImageData(v.videoWidth/2 - size/2, v.videoHeight/2 - size/2, size, size).data;
            
            let r=0, g=0, b=0, count=0;
            
            // PROCESSAMENTO MATRICIAL COMPLETO: Varredura total sem saltos para consistência cromática severa
            for(let i=0; i<p.length; i+=4) {
                let pr = p[i], pg = p[i+1], pb = p[i+2];
                if(pr > 252 && pg > 252 && pb > 252) continue; // Descarte de especularidade extrema
                r += pr; g += pg; b += pb;
                count++;
            }
            
            if(count === 0) { r=255; g=255; b=255; count=1; }
            
            let res = getFinalColor(r/count, g/count, b/count);
            
            history.push(res);
            if(history.length > 15) history.shift(); 
            
            const votes = {};
            history.forEach(x => votes[x] = (votes[x] || 0) + 1);
            const winner = Object.keys(votes).reduce((a, b) => votes[a] > votes[b] ? a : b);

            if (votes[winner] >= 11) { 
                if (colorTxt.innerText !== winner) {
                    colorTxt.innerText = winner;
                    colorTxt.className = "active-text";
                    cross.classList.add('locked');
                    if (audioActive && winner !== lastSpeach) speak(winner);
                }
            } else {
                colorTxt.innerText = "ALINHANDO";
                colorTxt.className = "";
                cross.classList.remove('locked');
            }
        }
        requestAnimationFrame(loop);
    }

    function speak(t) {
        if(!audioActive || isSpeaking || !t || t === "ALINHANDO" || t === "INATIVO") return;
        speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'pt-BR'; m.rate = 1.8;
        m.onstart = () => isSpeaking = true;
        m.onend = () => isSpeaking = false;
        speechSynthesis.speak(m);
        lastSpeach = t;
    }
    loop();
</script>
</body>
</html>
