<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro LAB v3</title>

<style>
body { text-align:center; font-family:Arial; background:#111; color:#fff; }
video { width:90%; border-radius:10px; }
#colorBox { width:120px; height:120px; margin:15px auto; border-radius:10px; border:2px solid #fff; }
button { padding:10px; margin:10px; }
</style>
</head>

<body>

<h2>ColorMatch Pro 🎯 v3 (Ultra Engine)</h2>

<button onclick="calibrate()">Calibrar Branco</button>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<div id="colorBox"></div>
<p id="colorText">---</p>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let whiteRef = null;

// 🔥 BUFFER TEMPORAL (NOVA CAMADA)
let frameBuffer = [];

// -------------------------
// CÂMERA
// -------------------------
navigator.mediaDevices.getUserMedia({
  video: { facingMode: { ideal: "environment" } }
})
.then(stream => video.srcObject = stream);

// -------------------------
// CALIBRAÇÃO
// -------------------------
function calibrate() {
  captureFrame((r,g,b)=>{
    whiteRef = {r,g,b};
    alert("Calibrado com base de iluminação");
  });
}

// -------------------------
// NORMALIZAÇÃO MAIS ESTÁVEL
// -------------------------
function normalizeLight(r,g,b){

  const ref = whiteRef || {r:255,g:255,b:255};

  let nr = r / ref.r;
  let ng = g / ref.g;
  let nb = b / ref.b;

  // normalização de energia (mais estável que média simples)
  const max = Math.max(nr, ng, nb);

  nr = nr / max;
  ng = ng / max;
  nb = nb / max;

  return {
    r: Math.min(255, nr * 255),
    g: Math.min(255, ng * 255),
    b: Math.min(255, nb * 255)
  };
}

// -------------------------
// RGB -> LAB (inalterado, já bom)
// -------------------------
function rgbToLab(r,g,b){

  r/=255; g/=255; b/=255;

  [r,g,b]=[r,g,b].map(v=>{
    return v>0.04045?Math.pow((v+0.055)/1.055,2.4):v/12.92;
  });

  let x=r*0.4124 + g*0.3576 + b*0.1805;
  let y=r*0.2126 + g*0.7152 + b*0.0722;
  let z=r*0.0193 + g*0.1192 + b*0.9505;

  x/=0.95047; y/=1.00000; z/=1.08883;

  [x,y,z]=[x,y,z].map(v=>{
    return v>0.008856?Math.cbrt(v):(7.787*v)+(16/116);
  });

  return {
    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)
  };
}

// -------------------------
// DELTA E
// -------------------------
function deltaE(lab1, lab2){
  return Math.sqrt(
    (lab1.L-lab2.L)**2 +
    (lab1.a-lab2.a)**2 +
    (lab1.b-lab2.b)**2
  );
}

// -------------------------
// BASE DE CORES
// -------------------------
const colorBase = [
  {name:"Vermelho", lab:rgbToLab(255,0,0)},
  {name:"Verde", lab:rgbToLab(0,255,0)},
  {name:"Azul", lab:rgbToLab(0,0,255)},
  {name:"Amarelo", lab:rgbToLab(255,255,0)},
  {name:"Laranja", lab:rgbToLab(255,165,0)},
  {name:"Roxo", lab:rgbToLab(128,0,128)},
  {name:"Rosa", lab:rgbToLab(255,192,203)},
  {name:"Marrom", lab:rgbToLab(139,69,19)},
  {name:"Branco", lab:rgbToLab(255,255,255)},
  {name:"Preto", lab:rgbToLab(0,0,0)},
  {name:"Cinza", lab:rgbToLab(128,128,128)}
];

// -------------------------
// DETECÇÃO COM CONFIDÊNCIA
// -------------------------
function detectColor(r,g,b){

  const lab = rgbToLab(r,g,b);

  let min = Infinity;
  let result = "Indefinida";

  for(const c of colorBase){
    const d = deltaE(lab, c.lab);
    if(d < min){
      min = d;
      result = c.name;
    }
  }

  const confidence = Math.max(0, 100 - min * 2.5);

  return { name: result, confidence: confidence.toFixed(1) };
}

// -------------------------
// CAPTURA FRAME INDIVIDUAL
// -------------------------
function captureFrame(callback){

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  const size = 25;
  const x = canvas.width/2;
  const y = canvas.height/2;

  const data = ctx.getImageData(x-size,y-size,size*2,size*2).data;

  let pixels = [];

  for(let i=0;i<data.length;i+=4){
    pixels.push([data[i], data[i+1], data[i+2]]);
  }

  // remove extremos (25% mais forte agora)
  pixels.sort((a,b)=>(a[0]+a[1]+a[2])-(b[0]+b[1]+b[2]));

  const cut = Math.floor(pixels.length * 0.25);
  pixels = pixels.slice(cut, pixels.length-cut);

  let r=0,g=0,b=0;

  for(const p of pixels){
    r += p[0];
    g += p[1];
    b += p[2];
  }

  r /= pixels.length;
  g /= pixels.length;
  b /= pixels.length;

  const norm = normalizeLight(r,g,b);

  callback(norm.r, norm.g, norm.b);
}

// -------------------------
// ESTABILIZAÇÃO TEMPORAL REAL
// -------------------------
function getStableFrame(callback){

  captureFrame((r,g,b)=>{

    frameBuffer.push([r,g,b]);

    if(frameBuffer.length > 7){
      frameBuffer.shift();
    }

    if(frameBuffer.length < 5) return;

    // mediana temporal
    let rs = frameBuffer.map(v=>v[0]).sort((a,b)=>a-b);
    let gs = frameBuffer.map(v=>v[1]).sort((a,b)=>a-b);
    let bs = frameBuffer.map(v=>v[2]).sort((a,b)=>a-b);

    const mid = Math.floor(frameBuffer.length/2);

    const fr = rs[mid];
    const fg = gs[mid];
    const fb = bs[mid];

    callback(fr, fg, fb);
  });
}

// -------------------------
// INTERAÇÃO FINAL
// -------------------------
video.addEventListener('click', ()=>{

  getStableFrame((r,g,b)=>{

    const color = `rgb(${r},${g},${b})`;
    const result = detectColor(r,g,b);

    document.getElementById('colorBox').style.background = color;
    document.getElementById('colorText').innerText =
      `${color} - ${result.name} (${result.confidence}% conf)`;
  });
});

</script>

</body>
</html>
