<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro – Visual Compare Engine</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
  text-align:center;
}

h2 { margin:10px; }

#video {
  width:90%;
  border-radius:10px;
}

/* BOTÕES */
#controls button {
  padding:10px;
  margin:5px;
}

/* PAINEL */
#panel {
  display:flex;
  justify-content:space-around;
  margin-top:15px;
  flex-wrap:wrap;
}

.box {
  width:45%;
  min-width:160px;
}

canvas {
  width:100%;
  border-radius:10px;
  background:#222;
}

.label {
  margin-top:5px;
  font-size:14px;
  color:#aaa;
}

/* 🎯 MIRA CENTRAL FIXA */
#centerCross {
  position:fixed;
  top:50%;
  left:50%;
  width:30px;
  height:30px;
  transform:translate(-50%,-50%);
  pointer-events:none;
  display:none;
}

#centerCross::before,
#centerCross::after {
  content:"";
  position:absolute;
  background:#00ffcc;
}

/* linha horizontal */
#centerCross::before {
  width:30px;
  height:2px;
  top:14px;
  left:0;
}

/* linha vertical */
#centerCross::after {
  width:2px;
  height:30px;
  left:14px;
  top:0;
}
</style>
</head>

<body>

<h2>ColorMatch Pro – Comparação Visual</h2>

<div id="controls">
  <button onclick="setMode('static')">Estático</button>
  <button onclick="setMode('compare')">Comparar</button>
</div>

<video id="video" autoplay playsinline></video>

<!-- 🎯 MIRA CENTRAL -->
<div id="centerCross"></div>

<!-- PAINEL -->
<div id="panel">

  <div class="box">
    <canvas id="canvasA"></canvas>
    <div class="label">Referência</div>
  </div>

  <div class="box">
    <canvas id="canvasB"></canvas>
    <div class="label">Comparação</div>
  </div>

</div>

<p id="txt">Selecione um modo</p>

<script>

const video = document.getElementById("video");

const canvasA = document.getElementById("canvasA");
const ctxA = canvasA.getContext("2d");

const canvasB = document.getElementById("canvasB");
const ctxB = canvasB.getContext("2d");

const centerCross = document.getElementById("centerCross");

let mode = "static";
let step = 0;

let sampleA = null;
let sampleB = null;

/* ================= CAMERA ================= */
navigator.mediaDevices.getUserMedia({
  video:{facingMode:"environment"}
}).then(stream=>{
  video.srcObject = stream;
});

/* ================= COR SIMPLES ================= */
function getColor(x,y){

  const c = document.createElement("canvas");
  const ctx = c.getContext("2d");

  c.width = video.videoWidth;
  c.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  const d = ctx.getImageData(x,y,1,1).data;

  return `RGB(${d[0]},${d[1]},${d[2]})`;
}

/* ================= MIRA NO PONTO ================= */
function drawPoint(ctx,x,y,color){

  ctx.strokeStyle = color;

  ctx.beginPath();
  ctx.arc(x,y,10,0,Math.PI*2);
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(x,y,3,0,Math.PI*2);
  ctx.fillStyle = color;
  ctx.fill();
}

/* ================= CLICK ================= */
video.addEventListener("click",(e)=>{

  const rect = video.getBoundingClientRect();

  const x = (e.clientX - rect.left) * (video.videoWidth / rect.width);
  const y = (e.clientY - rect.top) * (video.videoHeight / rect.height);

  /* ================= STATIC ================= */
  if(mode === "static"){
    const color = getColor(x,y);
    document.getElementById("txt").innerText =
      "Cor: " + color;
  }

  /* ================= COMPARE ================= */
  if(mode === "compare"){

    // PRIMEIRO PONTO
    if(step === 0){

      canvasA.width = video.videoWidth;
      canvasA.height = video.videoHeight;

      ctxA.drawImage(video,0,0);

      sampleA = getColor(x,y);

      drawPoint(ctxA,x,y,"lime");

      document.getElementById("txt").innerText =
        "Referência: " + sampleA;

      step = 1;
    }

    // SEGUNDO PONTO
    else{

      canvasB.width = video.videoWidth;
      canvasB.height = video.videoHeight;

      ctxB.drawImage(video,0,0);

      sampleB = getColor(x,y);

      drawPoint(ctxB,x,y,"red");

      document.getElementById("txt").innerText =
        `Ref: ${sampleA} | Atual: ${sampleB}`;

      step = 0;
    }
  }
});

/* ================= MODO ================= */
function setMode(m){

  mode = m;
  step = 0;
  sampleA = null;
  sampleB = null;

  /* 🎯 ativa mira central só no compare */
  centerCross.style.display = (m === "compare") ? "block" : "none";

  document.getElementById("txt").innerText =
    "Modo: " + m.toUpperCase();
}

</script>

</body>
</html>
