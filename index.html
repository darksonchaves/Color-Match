<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorMatch Pro – Fixed Engine</title>

<style>
body {
  text-align:center;
  font-family:Arial;
  background:#111;
  color:#fff;
  margin:0;
}

video {
  width:90%;
  border-radius:10px;
}

canvas { display:none; }

button {
  padding:10px;
  margin:5px;
}

/* SNAPSHOTS VISUAIS */
.snap {
  width:90px;
  height:90px;
  border-radius:10px;
  border:2px solid #fff;
  display:inline-block;
  margin:5px;
  background:#222;
}

/* PONTOS FIXOS */
.point {
  position:absolute;
  width:14px;
  height:14px;
  border-radius:50%;
  pointer-events:none;
}

#pointA { border:2px solid lime; display:none; }
#pointB { border:2px solid red; display:none; }

#result {
  margin-top:10px;
  color:#00ffcc;
}
</style>
</head>

<body>

<h2>ColorMatch Pro – Fixed + Flash</h2>

<button onclick="setMode('static')">Estático</button>
<button onclick="setMode('compare1')">Amostra 1</button>
<button onclick="setMode('compare2')">Amostra 2</button>
<button onclick="runCompare()">Comparar</button>
<button onclick="toggleFlash()">⚡ Flash</button>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="pointA" class="point"></div>
<div id="pointB" class="point"></div>

<br>

<div>
  <div id="snapA" class="snap"></div>
  <div id="snapB" class="snap"></div>
</div>

<p id="result">Selecione o modo</p>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let stream = null;
let track = null;
let flash = false;

let mode = "static";

let sampleA = null;
let sampleB = null;

// ---------------- CAMERA ----------------
navigator.mediaDevices.getUserMedia({
  video: { facingMode: { ideal: "environment" } }
}).then(s => {
  stream = s;
  video.srcObject = stream;
  track = stream.getVideoTracks()[0];
});

// ---------------- FLASH ----------------
async function toggleFlash(){

  if(!track) return;

  const caps = track.getCapabilities();

  if(!caps.torch){
    alert("Flash não suportado");
    return;
  }

  flash = !flash;

  await track.applyConstraints({
    advanced: [{ torch: flash }]
  });

  alert("Flash: " + (flash ? "ON" : "OFF"));
}

// ---------------- LAB ----------------
function rgbToLab(r,g,b){

  r/=255; g/=255; b/=255;

  [r,g,b]=[r,g,b].map(v=>{
    return v>0.04045
      ? Math.pow((v+0.055)/1.055,2.4)
      : v/12.92;
  });

  let x=r*0.4124 + g*0.3576 + b*0.1805;
  let y=r*0.2126 + g*0.7152 + b*0.0722;
  let z=r*0.0193 + g*0.1192 + b*0.9505;

  x/=0.95047;
  y/=1;
  z/=1.08883;

  [x,y,z]=[x,y,z].map(v=>{
    return v>0.008856 ? Math.cbrt(v) : (7.787*v)+(16/116);
  });

  return {
    L:(116*y)-16,
    a:500*(x-y),
    b:200*(y-z)
  };
}

// ---------------- ΔE ----------------
function deltaE(a,b){
  return Math.sqrt(
    (a.L-b.L)**2 +
    (a.a-b.a)**2 +
    (a.b-b.b)**2
  );
}

// ---------------- CAPTURA REAL ----------------
function captureAt(x,y){

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  const size = 20;

  const data = ctx.getImageData(
    x-size,y-size,size*2,size*2
  ).data;

  let r=0,g=0,b=0,c=0;

  for(let i=0;i<data.length;i+=4){
    r+=data[i];
    g+=data[i+1];
    b+=data[i+2];
    c++;
  }

  return {
    rgb:{r:r/c,g:g/c,b:b/c},
    lab: rgbToLab(r/c,g/c,b/c)
  };
}

// ---------------- CLICK ----------------
video.addEventListener("click",(e)=>{

  const rect = video.getBoundingClientRect();

  const x = (e.clientX-rect.left)*(video.videoWidth/rect.width);
  const y = (e.clientY-rect.top)*(video.videoHeight/rect.height);

  const sample = captureAt(x,y);

  const color = `rgb(${sample.rgb.r},${sample.rgb.g},${sample.rgb.b})`;

  // ponto visual persistente
  const px = document.createElement("div");

  if(mode === "compare1"){

    sampleA = sample;
    document.getElementById("snapA").style.background = color;

    const p = document.getElementById("pointA");
    p.style.left = e.clientX + "px";
    p.style.top = e.clientY + "px";
    p.style.display = "block";
  }

  if(mode === "compare2"){

    sampleB = sample;
    document.getElementById("snapB").style.background = color;

    const p = document.getElementById("pointB");
    p.style.left = e.clientX + "px";
    p.style.top = e.clientY + "px";
    p.style.display = "block";
  }

});

// ---------------- COMPARAÇÃO ----------------
function runCompare(){

  if(!sampleA || !sampleB){
    alert("Selecione as duas amostras");
    return;
  }

  const d = deltaE(sampleA.lab, sampleB.lab);

  const sim = Math.max(0, 100 - d*2.5);

  document.getElementById("result").innerText =
    `Similaridade: ${sim.toFixed(1)}%`;
}

// ---------------- MODE ----------------
function setMode(m){

  mode = m;

  sampleA = null;
  sampleB = null;

  document.getElementById("pointA").style.display = "none";
  document.getElementById("pointB").style.display = "none";

  document.getElementById("snapA").style.background = "#222";
  document.getElementById("snapB").style.background = "#222";

  document.getElementById("result").innerText = "Modo: " + m;
}

</script>

</body>
</html>
