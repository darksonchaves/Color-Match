<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColorMatch Pro – Quantum Precision</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', system-ui; background: #050505; color: #fff; overflow: hidden; }
        #videoContainer { position: relative; width: 100vw; height: 60vh; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Interface de Dados em Tempo Real */
        #hud { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; font-family: monospace; font-size: 11px; color: #00ffcc; border: 1px solid #333; pointer-events: none; }
        
        #mainDisplay { height: 15vh; display: flex; align-items: center; justify-content: center; background: #111; border-top: 2px solid #00ffcc; flex-direction: column; }
        #colorName { font-size: 28px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        #confidence { font-size: 12px; opacity: 0.8; margin-top: 5px; }

        .controls { height: 25vh; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; padding: 10px; background: #0a0a0a; }
        button { background: #222; border: 1px solid #444; color: white; border-radius: 8px; font-weight: bold; font-size: 12px; transition: 0.2s; }
        button:active { transform: scale(0.95); background: #00ffcc; color: #000; }
        .active { background: #004d40; border-color: #00ffcc; box-shadow: 0 0 10px #00ffcc; }

        #crosshair { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 40px; height: 40px; pointer-events: none;
        }
        #crosshair::before { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: rgba(0,255,204,0.5); }
        #crosshair::after { content: ''; position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: rgba(0,255,204,0.5); }
        
        .dot { position: absolute; width: 6px; height: 6px; background: #ff5252; border-radius: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

<div id="videoContainer">
    <video id="video" autoplay playsinline muted></video>
    <div id="hud">
        RGB: <span id="valRGB">0,0,0</span><br>
        LAB: <span id="valLAB">0,0,0</span><br>
        RATIO R/B: <span id="valRatio">0.0</span>
    </div>
    <div id="crosshair"></div>
</div>

<div id="mainDisplay">
    <div id="colorName">ANALISANDO...</div>
    <div id="confidence">AGUARDANDO ESTABILIDADE</div>
</div>

<div class="controls">
    <button onclick="setMode('static')" id="btn-static" class="active">ESTÁTICO</button>
    <button onclick="setMode('move')" id="btn-move">CONTÍNUO</button>
    <button onclick="toggleFlash()">FLASH (AUTO)</button>
    <button onclick="compareMode()">COMPARAR</button>
    <button onclick="location.reload()">RECALIBRAR</button>
    <button style="background: #311b92;" onclick="alert('Modo Roxo/Rosa Ativado: Prioridade de Sensor Azul')">MODO P/P</button>
</div>

<script>
    const video = document.getElementById('video');
    const colorDisplay = document.getElementById('colorName');
    const confidenceDisplay = document.getElementById('confidence');
    const valRGB = document.getElementById('valRGB');
    const valLAB = document.getElementById('valLAB');
    const valRatio = document.getElementById('valRatio');

    let mode = 'static';
    let track = null;
    let flash = false;
    let lastSpeak = "";

    async function init() {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', focusMode: 'continuous', whiteBalanceMode: 'continuous' }
        });
        video.srcObject = stream;
        track = stream.getVideoTracks()[0];
    }

    function rgbToLab(r, g, b) {
        let rL = r/255, gL = g/255, bL = b/255;
        rL = rL > 0.04045 ? Math.pow((rL + 0.055) / 1.055, 2.4) : rL / 12.92;
        gL = gL > 0.04045 ? Math.pow((gL + 0.055) / 1.055, 2.4) : gL / 12.92;
        bL = bL > 0.04045 ? Math.pow((bL + 0.055) / 1.055, 2.4) : bL / 12.92;
        let x = (rL * 0.4124 + gL * 0.3576 + bL * 0.1805) / 0.95047;
        let y = (rL * 0.2126 + gL * 0.7152 + bL * 0.0722) / 1.00000;
        let z = (rL * 0.0193 + gL * 0.1192 + bL * 0.9505) / 1.08883;
        const f = t => t > 0.008856 ? Math.pow(t, 1/3) : (7.787 * t) + (16/116);
        return { L: (116 * f(y)) - 16, a: 500 * (f(x) - f(y)), b: 200 * (f(y) - f(z)) };
    }

    function processKernel() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const size = 10; // Kernel 10x10 para média
        canvas.width = size; canvas.height = size;
        
        const vW = video.videoWidth;
        const vH = video.videoHeight;
        ctx.drawImage(video, vW/2 - size/2, vH/2 - size/2, size, size, 0, 0, size, size);
        
        const data = ctx.getImageData(0, 0, size, size).data;
        let r=0, g=0, b=0;
        for(let i=0; i<data.length; i+=4) {
            r += data[i]; g += data[i+1]; b += data[i+2];
        }
        return { r: r/(size*size), g: g/(size*size), b: b/(size*size) };
    }

    function solveColor() {
        const rgb = processKernel();
        const lab = rgbToLab(rgb.r, rgb.g, rgb.b);
        const ratio = rgb.r / (rgb.b + 1);
        
        valRGB.innerText = `${Math.round(rgb.r)},${Math.round(rgb.g)},${Math.round(rgb.b)}`;
        valLAB.innerText = `${lab.L.toFixed(1)}, ${lab.a.toFixed(1)}, ${lab.b.toFixed(1)}`;
        valRatio.innerText = ratio.toFixed(2);

        let name = "Indefinido";
        let confidence = "Baixa";

        // LÓGICA QUANTUM ROXO VS ROSA
        const chroma = Math.sqrt(lab.a**2 + lab.b**2);
        let hue = Math.atan2(lab.b, lab.a) * (180 / Math.PI);
        if (hue < 0) hue += 360;

        if (chroma < 10) {
            name = lab.L > 70 ? "Branco" : (lab.L < 25 ? "Preto" : "Cinza");
        } else {
            // ZONA CRÍTICA (270 - 350)
            if (hue > 260 && hue < 355) {
                // Algoritmo de Decisão por Força de Azul
                if (ratio < 1.25 || lab.b < -15) {
                    name = "Roxo";
                    confidence = ratio < 1.0 ? "Alta (Puro)" : "Média (Violeta)";
                } else {
                    name = "Rosa";
                    confidence = ratio > 1.6 ? "Alta (Pink)" : "Média (Claro)";
                }
            } else {
                // Outras Cores
                if (hue >= 355 || hue < 20) name = "Vermelho";
                else if (hue >= 20 && hue < 45) name = "Laranja";
                else if (hue >= 45 && hue < 85) name = "Amarelo";
                else if (hue >= 85 && hue < 165) name = "Verde";
                else if (hue >= 165 && hue < 260) name = "Azul";
            }
        }

        colorDisplay.innerText = name;
        colorDisplay.style.color = (name === "Roxo") ? "#b388ff" : (name === "Rosa" ? "#ff80ab" : "#00ffcc");
        confidenceDisplay.innerText = `CONFIANÇA: ${confidence}`;

        if (mode === 'move' && name !== lastSpeak) {
            speak(name);
            lastSpeak = name;
        }
    }

    function speak(t) {
        speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(t);
        msg.lang = 'pt-BR';
        speechSynthesis.speak(msg);
    }

    function setMode(m) {
        mode = m;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + m).classList.add('active');
        if(m === 'move') setInterval(solveColor, 1000);
    }

    function toggleFlash() {
        flash = !flash;
        track.applyConstraints({ advanced: [{ torch: flash }] });
    }

    video.addEventListener('click', solveColor);
    init();
</script>
</body>
</html>
