<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ColorMatch Pro - Matrix v1.9.1</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            font-family: sans-serif; 
            color: #fff; 
            overflow: hidden; 
            text-align: center; 
            user-select: none;
        }
        
        /* Menu Superior de Controle */
        #header { 
            position: absolute; 
            top: 0; 
            width: 100%; 
            z-index: 20;
            background: rgba(10, 10, 10, 0.95); 
            display: flex; 
            justify-content: center; 
            padding: 10px 0; 
            gap: 8px; 
            border-bottom: 1px solid #333; 
            flex-wrap: wrap;
        }
        
        button { 
            background: #1a1a1a; 
            color: #aaa; 
            border: 1px solid #444; 
            padding: 10px 14px; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 11px; 
            text-transform: uppercase; 
            cursor: pointer;
            transition: all 0.1s ease; 
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Estados de Ativação Visual */
        .active { background: #007bff !important; color: #fff !important; }
        .audio-on { background: #28a745 !important; color: #fff !important; }
        
        /* Botão Mestre Independente: Modo Universal */
        #btnPower { background: #1a1a1a; color: #aaa; }
        #btnPower.universal-on { background: #dc3545 !important; color: #fff !important; box-shadow: 0 0 10px #dc3545; }

        /* Renderização e Proporções do Vídeo */
        #video-container { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Elemento de Alvo (Mira Central) */
        #crosshair { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            border: 2px solid transparent; 
            border-radius: 50%; 
            pointer-events: none; 
            z-index: 10;
            transition: all 0.1s; 
            display: none;
        }
        .mira-livre { width: 6px; height: 6px; border: 2px solid rgba(255,255,255,0.8) !important; display: block !important; }
        .mira-padrao { width: 32px; height: 32px; border: 2px dashed rgba(255,255,255,0.7) !important; display: block !important; }
        .locked { border-color: #00ffcc !important; box-shadow: 0 0 20px #00ffcc; background: rgba(0,255,204,0.05); }

        /* Elementos de Texto do Painel Inferior */
        #ui-overlay { 
            position: absolute; 
            bottom: 0; 
            width: 100%; 
            padding: 45px 0; 
            background: linear-gradient(transparent, #000 85%); 
            z-index: 20; 
        }
        #color-name { 
            font-size: 55px; 
            font-weight: 900; 
            text-transform: uppercase; 
            color: #444; 
            min-height: 70px; 
            letter-spacing: 2px; 
        }
        .active-text { color: #00ffcc !important; text-shadow: 0 0 30px rgba(0,255,204,0.7); }
    </style>
</head>
<body>

<div id="header">
    <button onclick="toggleUniversal()" id="btnPower">SISTEMA: OFF</button>
    <button onclick="toggleAudio()" id="btnAudio">ÁUDIO: OFF</button>
    <button onclick="calibrate()" id="btnCalib">CALIBRAR</button>
    <button onclick="setMode('LIVRE')" id="btnLivre">MODO LIVRE</button>
    <button onclick="setMode('PADRAO')" id="btnPadrao">MODO PADRÃO</button>
</div>

<div id="video-container">
    <video id="v" autoplay playsinline webkit-playsinline muted></video>
    <div id="crosshair"></div>
</div>

<div id="ui-overlay">
    <div id="color-name">INATIVO</div>
</div>

<canvas id="c" style="display:none;"></canvas>

<script>
    const v = document.getElementById('v'), c = document.getElementById('c');
    const ctx = c.getContext('2d', {willReadFrequently: true, alpha: false});
    const colorTxt = document.getElementById('color-name'), cross = document.getElementById('crosshair');

    // Inicialização Absoluta - Nenhum submódulo ativo por padrão
    let universalActive = false, audioActive = false, mode = null;
    
    // Parâmetros de Balanço de Branco
    let calibR = 255, calibG = 255, calibB = 255; 
    let isCalibrated = false;
    let history = [], lastSpeech = "", isSpeaking = false;

    // Centroides Espaciais CIE L*a*b* Estabilizados
    const LAB_CENTROIDS = [
        { name: "VERMELHO", L: 38,  a: 68,  b: 40 },
        { name: "LARANJA",  L: 56,  a: 38,  b: 58 },
        { name: "AMARELO",  L: 86,  a: -4,  b: 82 },
        { name: "VERDE",    L: 48,  a: -48, b: 34 },
        { name: "AZUL",     L: 26,  a: 8,   b: -52 },
        { name: "ROXO",     L: 20,  a: 38,  b: -44 }, 
        { name: "ROSA",     L: 52,  a: 60,  b: -2 },   
        { name: "MARROM",   L: 24,  a: 16,  b: 16 }
    ];

    // Inicialização nativa do stream de vídeo
    const constraints = {
        video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } }
    };

    navigator.mediaDevices.getUserMedia(constraints)
        .then(s => { 
            v.srcObject = s; 
            v.play().catch(() => {});
        })
        .catch(() => {
            navigator.mediaDevices.getUserMedia({ video: true }).then(s => { v.srcObject = s; });
        });

    // BARREIRA LÓGICA INTRANSIVEIL - MODO UNIVERSAL MESTRE
    function toggleUniversal() { 
        universalActive = !universalActive; 
        
        const btnPower = document.getElementById('btnPower');
        btnPower.classList.toggle('universal-on', universalActive);
        btnPower.innerText = 'SISTEMA: ' + (universalActive ? 'ON' : 'OFF');
        
        if (universalActive) {
            // Não pré-ativa modos visuais automaticamente. Aguarda o clique do usuário.
            colorTxt.innerText = "SISTEMA PRONTO";
            colorTxt.className = "active-text";
            if (v.paused) { v.play().catch(() => {}); }
        } else { 
            // Reset Completo e Forçado de Segurança (Congelamento)
            audioActive = false;
            mode = null;
            
            const btnAudio = document.getElementById('btnAudio');
            btnAudio.classList.remove('active', 'audio-on');
            btnAudio.innerText = 'ÁUDIO: OFF';
            
            document.getElementById('btnLivre').classList.remove('active');
            document.getElementById('btnPadrao').classList.remove('active');
            
            cross.className = '';
            cross.style.display = 'none';
            cross.classList.remove('locked');
            
            colorTxt.innerText = "INATIVO"; 
            colorTxt.className = ""; 
            history = []; 
        }
    }

    function toggleAudio() {
        if (!universalActive) return; 
        audioActive = !audioActive;
        const btnAudio = document.getElementById('btnAudio');
        btnAudio.classList.toggle('active', audioActive);
        btnAudio.classList.toggle('audio-on', audioActive);
        btnAudio.innerText = 'ÁUDIO: ' + (audioActive ? 'ON' : 'OFF');
        if (audioActive) speak("Áudio ligado");
    }

    function setMode(m) {
        if (!universalActive) return; 
        mode = m;
        document.getElementById('btnLivre').classList.toggle('active', m === 'LIVRE');
        document.getElementById('btnPadrao').classList.toggle('active', m === 'PADRAO');
        
        cross.className = (m === 'LIVRE' ? 'mira-livre' : 'mira-padrao');
        colorTxt.innerText = "LENDO...";
        history = []; 
    }

    function calibrate() {
        if (!universalActive || v.videoWidth === 0) return;
        c.width = v.videoWidth; c.height = v.videoHeight;
        ctx.drawImage(v, 0, 0);
        
        const size = 20;
        const sample = ctx.getImageData(v.videoWidth/2 - size/2, v.videoHeight/2 - size/2, size, size).data;
        let r=0, g=0, b=0, total=0;
        
        for (let i=0; i<sample.length; i+=4) {
            if (sample[i] > 248 && sample[i+1] > 248 && sample[i+2] > 248) continue; 
            r+=sample[i]; g+=sample[i+1]; b+=sample[i+2]; total++;
        }
        
        if (total > 0) {
            calibR = r / total;
            calibG = g / total;
            calibB = b / total;
            isCalibrated = true;
        }
        
        history = []; 
        if (audioActive) speak("Calibrado");
    }

    function rgbToLab(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        r = (r > 0.04045) ? Math.pow((r + 0.055) / 1.055, 2.4) : r / 12.92;
        g = (g > 0.04045) ? Math.pow((g + 0.055) / 1.055, 2.4) : g / 12.92;
        b = (b > 0.04045) ? Math.pow((b + 0.055) / 1.055, 2.4) : b / 12.92;

        let x = (r * 0.4124 + g * 0.3576 + b * 0.1805) * 100;
        let y = (r * 0.2126 + g * 0.7152 + b * 0.0722) * 100;
        let z = (r * 0.0193 + g * 0.1192 + b * 0.9505) * 100;

        x /= 95.047; y /= 100.000; z /= 108.883;
        x = (x > 0.008856) ? Math.pow(x, 1/3) : (7.787 * x) + (16 / 116);
        y = (y > 0.008856) ? Math.pow(y, 1/3) : (7.787 * y) + (16 / 116);
        z = (z > 0.008856) ? Math.pow(z, 1/3) : (7.787 * z) + (16 / 116);

        return { L: (116 * y) - 16, a: 500 * (x - y), b: 200 * (y - z) };
    }

    function getFinalColor(rawR, rawG, rawB) {
        // CORREÇÃO FILTRADA (Vídeo 28.mp4): Teto estendido para capturar Preto Polido com reflexo periférico
        if (rawR <= 45 && rawG <= 45 && rawB <= 45) return "PRETO";

        let rNorm = calibR > 0 ? (rawR / calibR) * 255 : rawR;
        let gNorm = calibG > 0 ? (rawG / calibG) * 255 : rawG;
        let bNorm = calibB > 0 ? (rawB / calibB) * 255 : rawB;

        let r = Math.min(255, Math.max(0, rNorm));
        let g = Math.min(255, Math.max(0, gNorm));
        let b = Math.min(255, Math.max(0, bNorm));

        let max = Math.max(r, g, b);
        let min = Math.min(r, g, b);
        let rgbDiff = max - min;

        if (r < 50 && g < 50 && b < 50 && rgbDiff < 20) return "PRETO";

        // Classificação Acromática Rígida
        if (isCalibrated) {
            if (rgbDiff < 25) {
                if (rawR >= calibR * 0.76) return "BRANCO";
                if (rawR <= 45) return "PRETO";
                return "CINZA";
            }
        } else {
            if (max < 48 && rgbDiff < 15) return "PRETO";
            if (min > 210 && rgbDiff < 18) return "BRANCO";
            if (rgbDiff < 16) return "CINZA";
        }

        let currentLab = rgbToLab(r, g, b);
        let chroma = Math.sqrt(currentLab.a * currentLab.a + currentLab.b * currentLab.b);

        if (chroma < 12) {
            if (currentLab.L > 75) return "BRANCO";
            if (currentLab.L < 30) return "PRETO";
            return "CINZA";
        }

        // CORREÇÃO MANDATÓRIA (Vídeo 25): Superexposição de Verdes Limão
        if (g > r && g > b) {
            if (currentLab.L > 50 && (currentLab.a < -10 || (g / r > 1.15))) return "VERDE";
        }

        // CORREÇÃO CRÍTICA CRUCIAL (Vídeo 28.mp4): Isolamento Antioscilamento Vermelho vs Rosa
        // Casamento de barreiras condicionais por amostragem vetorial para blindar tampas plásticas
        if (currentLab.a > 18) {
            if (currentLab.b < -8) return "ROXO";
            if (currentLab.b >= -8 && currentLab.b <= 24) {
                // Se houver dominância expressiva de R em relação a B, força Vermelho e impede desvio para Rosa
                if (r > b * 1.62) {
                    return "VERMELHO";
                }
                // Filtro refinado de Rosa para malhas têxteis reais sob iluminação difusa
                if (currentLab.L > 45 && b > 65 && currentLab.a > 22) {
                    return "ROSA";
                }
                return "VERMELHO";
            }
        }

        let minDeltaE = Infinity;
        let matchedName = "CINZA";

        // Laço Euclidiano Delta E
        for (let target of LAB_CENTROIDS) {
            let dL = currentLab.L - target.L;
            let da = currentLab.a - target.a;
            let db = currentLab.b - target.b;
            let deltaE = Math.sqrt(dL*dL + da*da + db*db);

            if (deltaE < minDeltaE) {
                minDeltaE = deltaE;
                matchedName = target.name;
            }
        }

        // Limiares de Transição Estabilizados
        if (matchedName === "LARANJA") {
            if (currentLab.L < 32) return "MARROM";
            if (r > g && g > 115 && (g / r > 0.82)) return "AMARELO";
            if (currentLab.a > 42 && currentLab.b < 24) return "VERMELHO"; 
        }

        if (matchedName === "AMARELO") {
            if (currentLab.a < -5 && g > r) return "VERDE";
        }

        return matchedName;
    }

    function loop() {
        // CURTO-CIRCUITO LOGICO MESTRE: Totalmente adormecido se SISTEMA estiver OFF
        if (!universalActive) {
            requestAnimationFrame(loop);
            return;
        }

        // Só processa dados se o usuário tiver selecionado um dos modos de amostragem
        if (mode && v.videoWidth > 0) {
            c.width = v.videoWidth; c.height = v.videoHeight;
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(v, 0, 0);
            
            let size = (mode === 'LIVRE' ? 6 : 32); 
            const p = ctx.getImageData(v.videoWidth/2 - size/2, v.videoHeight/2 - size/2, size, size).data;
            
            let r=0, g=0, b=0, count=0;
            for (let i=0; i<p.length; i+=4) {
                // Filtro Especular Ativo (>248)
                if (p[i] > 248 && p[i+1] > 248 && p[i+2] > 248) continue; 
                r += p[i]; g += p[i+1]; b += p[i+2];
                count++;
            }
            
            if (count === 0) { r=255; g=255; b=255; count=1; }
            
            let res = getFinalColor(r/count, g/count, b/count);
            
            // Estabilização por Moda Temporal (18 frames)
            history.push(res);
            if (history.length > 18) history.shift(); 
            
            const votes = {};
            history.forEach(x => votes[x] = (votes[x] || 0) + 1);
            const winner = Object.keys(votes).reduce((a, b) => votes[a] > votes[b] ? a : b);

            // Corte rigoroso fixado em 10 votos para travar estado visual
            if (votes[winner] >= 10) { 
                if (colorTxt.innerText !== winner) {
                    colorTxt.innerText = winner;
                    cross.classList.add('locked');
                    
                    if (audioActive && winner !== lastSpeech) {
                        speak(winner);
                    }
                }
            } else {
                cross.classList.remove('locked');
            }
        }
        requestAnimationFrame(loop);
    }

    function speak(t) {
        if (!audioActive || isSpeaking || !t || t === "INATIVO" || !universalActive) return;
        try {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'pt-BR'; 
            m.rate = 1.9; // Velocidade Mandatória de 1.9x
            m.onstart = () => isSpeaking = true;
            m.onend = () => isSpeaking = false;
            m.onerror = () => isSpeaking = false;
            window.speechSynthesis.speak(m);
            lastSpeech = t;
        } catch(e) {
            isSpeaking = false;
        }
    }
    
    loop();
</script>
</body>
</html>
